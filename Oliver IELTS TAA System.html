<style>
:root{
  --brand:#08722a;
  --green:#0d6b2f;
  --green2:#11853b;
  --green3:#eaf7ef;
  --green4:#f4fbf7;
  --yellow:#f6c95f;
  --warm:#fff3d6;
  --paper:#fffdf7;
  --ink:#14211a;
  --muted:#66756d;
  --line:#dfe9e3;

  --dangerbg:#fff1f0;
  --warn:#9a6700;
  --warnbg:#fff7d6;
  --ok:#1a7f37;
  --okbg:#e9f8ee;

  --bluebg:#eef5ff;

  --shadow2:0 10px 30px rgba(21, 77, 44, .08);
  --radius:20px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
  color:var(--ink);
  min-height:100vh;
  background:
    radial-gradient(circle at 8% 86%, rgba(246,201,95,.48) 0 17%, transparent 36%),
    radial-gradient(circle at 92% 74%, rgba(81,225,162,.40) 0 18%, transparent 38%),
    radial-gradient(circle at 45% 0%, rgba(15,127,58,.10), transparent 42%),
    linear-gradient(135deg,#fffdf7 0%,#f4fbf7 45%,#eef9f2 100%);
  overflow-x:hidden;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:-2;
  background:
    linear-gradient(112deg,transparent 0 58%,rgba(28,183,113,.11) 59%,rgba(28,183,113,.18) 65%,transparent 76%),
    linear-gradient(25deg,transparent 0 57%,rgba(246,201,95,.17) 58%,rgba(246,201,95,.28) 64%,transparent 74%);
  filter:blur(.2px);
}
body::after{
  content:"";position:fixed;right:-160px;bottom:-110px;width:760px;height:430px;pointer-events:none;z-index:-1;
  background:radial-gradient(ellipse at center, rgba(25,202,128,.24), transparent 66%);
  border-radius:48% 52% 0 0;
  transform:rotate(-12deg);
}
button,input,select,textarea{font-family:inherit}
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
.sidebar{
  background:rgba(255,255,255,.72);
  color:var(--ink);
  padding:22px 18px;
  position:sticky;top:0;height:100vh;overflow:auto;
  border-right:1px solid rgba(204,219,211,.75);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  box-shadow:8px 0 32px rgba(21,77,44,.05);
}
.brand{
  display:flex;align-items:center;gap:12px;margin:-2px -4px 22px;padding:12px 10px 18px;
  border-bottom:1px solid rgba(221,232,225,.82);
}

function loadState(){
  const raw = localStorage.getItem(STORE_KEY);
  if(!raw){
    const fresh = structuredClone(SEED);
    saveState(fresh);
    return fresh;
  }
  try{
    const parsed = JSON.parse(raw);
    return Object.assign(structuredClone(SEED), parsed);
  }catch(e){
    alert("本地数据读取失败，已载入初始数据。建议检查备份文件。");
    return structuredClone(SEED);
  }
}

function uid(type){return type.slice(0,4)+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,6);}
function esc(v){return String(v ?? "").replace(/[&<>"']/g, s=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[s]));}
function today(){return new Date().toISOString().slice(0,10);}
function daysUntil(dateStr){
  if(!dateStr || !/^\d{4}-\d{2}-\d{2}/.test(dateStr)) return null;
  const a = new Date(today()+"T00:00:00");
  const b = new Date(dateStr+"T00:00:00");
  return Math.ceil((b-a)/86400000);
}

function tag(text, color="gray"){return text ? `<span class="tag ${color}">${esc(text)}</span>` : "";}
function statusColor(v){
  v=String(v||"");
  if(/高|风险|争议|逾期|未达标|退款|流失|拒绝/.test(v)) return "red";
  if(/待|考虑|协商|中|待确认|未询问/.test(v)) return "yellow";
  if(/已|可以|达标|完成|结课|签约|结算/.test(v)) return "green";
  if(/A-|新|推荐|发布/.test(v)) return "blue";
  return "gray";
}
function truncate(v,n=58){
  const s = String(v ?? "");
  if(!s) return `<span class="muted">未填写</span>`;
  const cut = s.length > n ? s.slice(0,n)+"…" : s;
  return esc(cut);
}

function recordSubtitle(type,r){
  const bits=[];
  if(type==="students") bits.push(r.status, r.examType, r.targetScore, r.wechat, r.phone, r.parentPhone);
  else if(type==="leads") bits.push(r.status, r.intentLevel, r.source, r.interestedProducts, r.wechat, r.phone, r.nextFollowup);
  else if(type==="orders") bits.push(r.product, r.paymentMethod, r.paidAmount?`实付 ${money(r.paidAmount)}`:"", r.orderDate || r.paymentDate);
  else if(type==="lessons") bits.push(r.lessonDate, r.startTime, r.lessonSubject, r.teacher, r.hours?`${r.hours}h`:"", r.status);
  else if(type==="exams") bits.push(r.examDate, r.examType, r.scoreOverall?`总分 ${r.scoreOverall}`:"", r.resultStatus);
  else if(type==="followups") bits.push(r.followupDate, r.method, r.nextAction, r.status);
  else if(type==="refunds") bits.push(r.requestDate, r.reasonCategory, r.actualAmount?`实退 ${money(r.actualAmount)}`:"", r.status);
  else if(type==="referrals") bits.push(r.targetCountry, r.partner, r.referStatus, r.commissionStatus);
  else if(type==="marketingCases") bits.push(r.caseType, r.permission, r.materialStatus, r.publishDate);
  else if(type==="shipments") bits.push(r.shipDate, r.item, r.receiver, r.company, r.trackingNo);
  else bits.push(r.status, r.notes);
  return bits.filter(Boolean).join("｜") || "暂无摘要";
}
function globalSearchResultsHTML(query){
  const q = String(query||"").trim().toLowerCase();

  }
  const types = ["students","leads","orders","lessons","exams","followups","refunds","referrals","marketingCases","shipments"];
  const results=[];
  types.forEach(type=>{
    (state[type]||[]).forEach(r=>{
      if(recordSearchBlob(type,r).includes(q)) results.push({type,r});
    });
  });
  if(!results.length) return `<div class="search-empty">没有找到匹配结果。可以换用姓名、微信号、手机号尾号、家长电话或英文名再搜一次。</div>`;
  const limit = 80;
  return `<div class="notice">找到 ${results.length} 条相关记录${results.length>limit?`，先显示前 ${limit} 条`:""}。搜索结果会覆盖学生档案、线索、订单、课程、考试、回访、退款、转介绍和案例。</div>` +
    results.slice(0,limit).map(x=>globalSearchResultCard(x.type,x.r,q)).join("");
}

function topSearchRecords(query){
  const q=String(query||"").trim().toLowerCase();
  if(!q) return [];
  const results=[]; const seen=new Set();
  function add(type,r,reason){
    if(!r || !r.id) return;
    const key=type+":"+r.id;
    if(seen.has(key)) return;
    seen.add(key); results.push({type,r,reason});
  }
  (state.students||[]).forEach(r=>{ if(recordSearchBlob("students",r).includes(q)) add("students",r,"学生档案"); });
  (state.leads||[]).forEach(r=>{ if(recordSearchBlob("leads",r).includes(q)) add("leads",r,"咨询线索"); });
  ["orders","lessons","exams","followups","refunds","referrals","marketingCases","shipments"].forEach(type=>{
    (state[type]||[]).forEach(r=>{
      if(!recordSearchBlob(type,r).includes(q)) return;
      const stu = r.studentId ? state.students.find(s=>s.id===r.studentId) : null;
      if(stu) add("students",stu,`关联${labels[type]||type}`); else add(type,r,labels[type]||type);
    });
  });
  return results.slice(0,12);
}
function topSearchResultsHTML(q){
  const query=String(q||"").trim();
  if(!query) return `<div class="top-search-help"><b>可以搜什么？</b><br>优先输入：学生姓名、英文名/昵称、微信号、手机号/尾号、家长电话。<br>也可以搜老师、订单产品、付款渠道、考试日期；系统会把关联学生档案带出来。</div>`;
  const results=topSearchRecords(query);
  if(!results.length) return `<div class="top-search-help">没有找到。建议换用：姓名、微信号、手机号尾号、家长电话、英文名/昵称。</div>`;
  return results.map(({type,r,reason})=>{
    const name=displayRecordName(type,r); const subtitle=recordSubtitle(type,r); const label=type==="students"?"学生档案":(labels[type]||type);
    const detailBtn=(type==="students"||type==="leads") ? `<button class="icon-btn" onclick="closeTopSearch();openDetail('${type}','${r.id}')">详情</button>` : `<button class="icon-btn" onclick="closeTopSearch();openEditor('${type}','${r.id}')">打开</button>`;
    const goBtn = type==="students" ? `<button class="icon-btn" onclick="searchInModule('students','${escAttr(query)}')">去学生档案</button>` : `<button class="icon-btn" onclick="searchInModule('${type}','${escAttr(query)}')">去模块</button>`;
    return `<div class="top-search-item"><div><strong>${esc(name)} ${tag(label,"blue")} ${tag(reason,"green")}</strong><small>${esc(subtitle)}</small></div><div class="row-actions">${detailBtn}${goBtn}</div></div>`;
  }).join("");
}
function renderTopSearch(){
  const input=document.getElementById("topGlobalSearchInput"); const box=document.getElementById("topSearchResults");
  if(!input||!box) return;
  box.innerHTML=topSearchResultsHTML(input.value);
  box.classList.add("show");
}
function closeTopSearch(){const box=document.getElementById("topSearchResults"); if(box) box.classList.remove("show");}
function openFirstTopSearchResult(){
  const q=document.getElementById("topGlobalSearchInput")?.value||""; const first=topSearchRecords(q)[0];
  if(!first) return;
  closeTopSearch();
  if(first.type==="students"||first.type==="leads") openDetail(first.type,first.r.id); else openEditor(first.type,first.r.id);
}
function searchInModule(type,query){
  closeTopSearch(); currentView=type; render();
  setTimeout(()=>{const input=document.getElementById("searchInput"); if(input){input.value=query; renderTable(type);}},50);
}
function escAttr(v){return String(v??"").replace(/[&<>"']/g, s=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[s]));}

document.addEventListener("click", function(e){

function coreBusinessMetrics(){
  const totalLeads = state.leads.length;
  const highIntent = state.leads.filter(l=>/A-|高意向/.test((l.intentLevel||"")+" "+(l.status||""))).length;
  const converted = state.leads.filter(l=>/已成交/.test(l.status||"")).length;
  const activeStudents = state.students.filter(s=>!/结课|已流失|已归档/.test(s.status||"")).length;
  const reached = state.exams.filter(e=>/已达标/.test(e.resultStatus||"")).length;
  const cases = state.marketingCases.filter(c=>/已发布|已整理|已收集/.test(c.materialStatus||"")).length;
  const max = Math.max(1,totalLeads,highIntent,converted,activeStudents,reached,cases);
  return {totalLeads,highIntent,converted,activeStudents,reached,cases,max};
}
function dataHealth(){
  const dueLeadMissing = state.leads.filter(l=>!l.wechat || !l.source || !l.interestedProducts || !l.nextFollowup || (!l.noBuyReason && !/已成交/.test(l.status||""))).length;
  const studentMissing = state.students.filter(s=>!s.strengths || !s.weaknesses || (!s.listeningTeacher && !s.readingTeacher && !s.writingTeacher && !s.speakingTeacher && !s.grammarTeacher) || (!s.targetCountry && /留学|硕士|本科|博士|交换/.test(s.examPurpose||""))).length;
  const orderMissing = state.orders.filter(o=>!o.paymentDate || !o.paidAmount || !o.paymentMethod || !o.saleChannel || (!o.soldHours && !o.speakingHours && !o.writingPieces)).length;
  const lessonMissing = state.lessons.filter(l=>!l.studentId || !l.lessonDate || !l.teacher || !l.hours || !l.lessonSubject).length;
  const examMissing = state.exams.filter(e=>e.examDate && daysUntil(e.examDate)!==null && daysUntil(e.examDate)<0 && !e.scoreOverall && !/已取消|改期/.test(e.resultStatus||"")).length;
  return {dueLeadMissing,studentMissing,orderMissing,lessonMissing,examMissing,total:dueLeadMissing+studentMissing+orderMissing+lessonMissing+examMissing};

function num(v){
  const n = Number(String(v ?? "").replace(/[^0-9.\-]/g,""));
  return Number.isFinite(n) ? n : 0;
}
function money(v){return "¥" + Math.round(num(v)).toLocaleString("zh-CN");}
function monthKey(dateStr){return /^\d{4}-\d{2}/.test(dateStr||"") ? dateStr.slice(0,7) : "未填日期";}
function monthLabel(k){return k === "未填日期" ? k : k.replace("-","/");}
function currentMonth(){return new Date().toISOString().slice(0,7);}
function orderMonth(o){return monthKey(o.paymentDate || o.orderDate || o.createdAt || "");}
function refundMonth(r){return monthKey(r.refundDate || r.requestDate || r.createdAt || "");}
function monthRangeFromData(){
  const months = new Set();
  state.orders.forEach(o=>{const m=orderMonth(o); if(m!=="未填日期") months.add(m);});
  state.refunds.forEach(r=>{const m=refundMonth(r); if(m!=="未填日期") months.add(m);});
  const arr=[...months].sort();
  if(arr.length >= 6) return arr.slice(-12);
  const now=new Date();
  const out=[];
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1); out.push(d.toISOString().slice(0,7));}
  return [...new Set([...out,...arr])].sort().slice(-12);
}
function getMonthField(row, fields){
  for(const k of fields){ if(row && row[k]) return monthKey(row[k]); }
  return "未填日期";
}
function teacherPayMonth(p){return getMonthField(p,["payDate","periodMonth","createdAt"]);}
function expenseMonth(e){return getMonthField(e,["expenseDate","createdAt"]);}
function isPlatformFee(e){return /平台扣点|手续费/.test(String(e.category||"")) || /小红书|淘宝/.test(String(e.platform||""));}
function salesSeries(){
  const months=monthRangeFromData();
  state.teacherPayments = state.teacherPayments || [];
  state.expenses = state.expenses || [];
  state.teacherPayments.forEach(p=>{const m=teacherPayMonth(p); if(m!=="未填日期") months.push?.(m);});
  state.expenses.forEach(e=>{const m=expenseMonth(e); if(m!=="未填日期") months.push?.(m);});
  const allMonths=[...new Set(months)].sort().slice(-12);
  const base={}; allMonths.forEach(m=>base[m]={month:m,gross:0,refund:0,netRevenue:0,hours:0,bonusHours:0,orders:0,avg:0,teacherCost:0,platformFee:0,otherExpense:0,totalCost:0,grossProfit:0,margin:0});
  state.orders.forEach(o=>{
    const m=orderMonth(o); if(!base[m]) base[m]={month:m,gross:0,refund:0,netRevenue:0,hours:0,bonusHours:0,orders:0,avg:0,teacherCost:0,platformFee:0,otherExpense:0,totalCost:0,grossProfit:0,margin:0};
    base[m].gross += num(o.paidAmount);
    base[m].hours += num(o.soldHours) + num(o.speakingHours);
    base[m].bonusHours += num(o.bonusHours);
    base[m].orders += 1;
    base[m].platformFee += num(o.platformFeeAmount);
  });
  state.refunds.forEach(r=>{
    const m=refundMonth(r); if(!base[m]) base[m]={month:m,gross:0,refund:0,netRevenue:0,hours:0,bonusHours:0,orders:0,avg:0,teacherCost:0,platformFee:0,otherExpense:0,totalCost:0,grossProfit:0,margin:0};
    base[m].refund += num(r.actualAmount);
  });
  (state.teacherPayments||[]).forEach(p=>{
    const m=teacherPayMonth(p); if(!base[m]) base[m]={month:m,gross:0,refund:0,netRevenue:0,hours:0,bonusHours:0,orders:0,avg:0,teacherCost:0,platformFee:0,otherExpense:0,totalCost:0,grossProfit:0,margin:0};
    base[m].teacherCost += num(p.paidAmount) || num(p.payableAmount);
  });
  (state.expenses||[]).forEach(e=>{
    const m=expenseMonth(e); if(!base[m]) base[m]={month:m,gross:0,refund:0,netRevenue:0,hours:0,bonusHours:0,orders:0,avg:0,teacherCost:0,platformFee:0,otherExpense:0,totalCost:0,grossProfit:0,margin:0};
    if(isPlatformFee(e)) base[m].platformFee += num(e.amount);
    else base[m].otherExpense += num(e.amount);
  });
  return Object.values(base).sort((a,b)=>a.month.localeCompare(b.month)).map(x=>{
    x.netRevenue = x.gross - x.refund;
    x.totalCost = x.teacherCost + x.platformFee + x.otherExpense;
    x.grossProfit = x.netRevenue - x.totalCost;
    x.avg = x.orders ? x.gross / x.orders : 0;
    x.margin = x.gross ? x.grossProfit / x.gross * 100 : 0;
    return x;
  });
}
function thisMonthStats(){
  const m=currentMonth();
  const series=salesSeries();
  const cur=series.find(x=>x.month===m) || {gross:0,hours:0,refund:0,netRevenue:0,orders:0,avg:0,teacherCost:0,platformFee:0,otherExpense:0,totalCost:0,grossProfit:0,margin:0};
  return {gross:cur.gross,hours:cur.hours,refund:cur.refund,net:cur.netRevenue,orderCount:cur.orders,avg:cur.avg,teacherCost:cur.teacherCost,platformFee:cur.platformFee,otherExpense:cur.otherExpense,totalCost:cur.totalCost,grossProfit:cur.grossProfit,margin:cur.margin};
}
function groupSum(rows,key,valueFn){
  const map={}; rows.forEach(r=>{const k=r[key]||"未填写"; map[k]=(map[k]||0)+valueFn(r);});
  return Object.entries(map).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
}
function deliveredHoursByMonth(){
  const months=monthRangeFromData();
  const base={}; months.forEach(m=>base[m]={month:m,hours:0});
  state.lessons.forEach(l=>{const m=monthKey(l.lessonDate||l.createdAt||""); if(!base[m]) base[m]={month:m,hours:0}; base[m].hours += num(l.hours);});
  return Object.values(base).sort((a,b)=>a.month.localeCompare(b.month));
}
function simpleLineChart(data,key,{prefix="",suffix="",label=""}={}){
  const w=780,h=250,pad=38;
  const vals=data.map(d=>num(d[key]));
  const max=Math.max(1,...vals);
  const min=Math.min(0,...vals);
  const range=Math.max(1,max-min);
  const pts=data.map((d,i)=>{
    const x=pad+(data.length===1?0:i*(w-pad*2)/(data.length-1));
    const y=h-pad-((num(d[key])-min)/range)*(h-pad*2);
    return {x,y,d};
  });
  const baseY=h-pad-((0-min)/range)*(h-pad*2);
  const area = pts.length ? `M ${pts[0].x} ${baseY} L `+pts.map(p=>`${p.x} ${p.y}`).join(" L ")+` L ${pts[pts.length-1].x} ${baseY} Z` : "";
  const path = pts.length ? `M `+pts.map(p=>`${p.x} ${p.y}`).join(" L ") : "";
  const grid=[0,.25,.5,.75,1].map(t=>{const y=h-pad-t*(h-pad*2); const val=min+range*t; return `<line class="grid-line" x1="${pad}" y1="${y}" x2="${w-pad}" y2="${y}"/><text class="axis-label" x="4" y="${y+4}">${prefix}${Math.round(val).toLocaleString("zh-CN")}${suffix}</text>`}).join("");
  const xlabels=pts.map((p,i)=> i%Math.ceil(Math.max(1,pts.length/6))===0 || i===pts.length-1 ? `<text class="axis-label" text-anchor="middle" x="${p.x}" y="${h-8}">${monthLabel(p.d.month)}</text>` : "").join("");
  const dots=pts.map(p=>`<circle class="chart-dot" cx="${p.x}" cy="${p.y}" r="4"><title>${monthLabel(p.d.month)}：${prefix}${num(p.d[key]).toLocaleString("zh-CN")}${suffix}</title></circle>`).join("");
  return `<svg class="svg-chart" viewBox="0 0 ${w} ${h}" role="img" aria-label="${esc(label)}">${grid}<path class="chart-area" d="${area}"/><path class="chart-line" d="${path}"/>${dots}${xlabels}</svg>`;
}
function simpleBarList(rows,{prefix="",suffix=""}={}){
  const top=rows.slice(0,8); const max=Math.max(1,...top.map(r=>Math.abs(num(r.value))));
  if(!top.length) return `<div class="empty">暂无可统计数据。请先补订单、老师课时费或经营支出。</div>`;
  return `<div class="data-list">${top.map(r=>`<div class="data-row"><strong>${esc(r.name)}</strong><div class="mini-bar"><i style="width:${Math.max(4, Math.abs(num(r.value))/max*100)}%"></i></div><span>${prefix}${Math.round(num(r.value)).toLocaleString("zh-CN")}${suffix}</span></div>`).join("")}</div>`;
}

function filterOptions(type){

function renderTable(type){

    const text = JSON.stringify(r).toLowerCase()+" "+studentName(r.studentId).toLowerCase();
    const statusText = [r.status,r.intentLevel,r.riskLevel,r.resultStatus,r.referStatus,r.commissionStatus,r.materialStatus,r.serviceStatus].filter(Boolean).join(" ");

  const cols = columns[type] || Object.keys(rows[0]).filter(k=>k!=="id").slice(0,8);

    <div class="row-actions"><button class="icon-btn" onclick="clearSelection('${type}')">取消选择</button><button class="icon-btn" onclick="batchDelete('${type}')">批量删除</button></div>
  </div><div class="table-wrap"><table><thead><tr><th style="width:44px"><input class="row-check" type="checkbox" ${allVisibleChecked?"checked":""} onclick="toggleAllRows('${type}', this.checked, '${visibleIds}')"></th>${cols.map(c=>`<th>${titles[c] || getSchemaLabel(type,c)}</th>`).join("")}<th>操作</th></tr></thead><tbody>${
    rows.map(r=>`<tr><td><input class="row-check" type="checkbox" ${selectedRows[type].has(r.id)?"checked":""} onclick="toggleRow('${type}','${r.id}',this.checked)"></td>${cols.map(c=>`<td>${cell(type,r,c)}</td>`).join("")}<td>${rowActions(type,r)}</td></tr>`).join("")
  }</tbody></table></div>`;
}
function toggleRow(type,id,checked){
  if(!selectedRows[type]) selectedRows[type] = new Set();
  checked ? selectedRows[type].add(id) : selectedRows[type].delete(id);
  renderTable(type);
}
function toggleAllRows(type,checked,ids){
  if(!selectedRows[type]) selectedRows[type] = new Set();
  String(ids||"").split("|").filter(Boolean).forEach(id=> checked ? selectedRows[type].add(id) : selectedRows[type].delete(id));
  renderTable(type);
}
function clearSelection(type){selectedRows[type] = new Set(); renderTable(type);}
function batchDelete(type){
  const ids = [...(selectedRows[type] || [])];
  if(!ids.length){alert("请先勾选要删除的记录。"); return;}
  if(!confirm(`确认删除选中的 ${ids.length} 条记录吗？删除后只能通过之前导出的 JSON 备份恢复。`)) return;
  state[type] = (state[type]||[]).filter(x=>!ids.includes(x.id));
  selectedRows[type] = new Set();
  saveState();
  render();
}
function cell(type,r,c){
  let v = c==="studentId" ? studentName(r[c]) : r[c];
  if(["status","intentLevel","riskLevel","resultStatus","referStatus","commissionStatus","materialStatus","serviceStatus","paymentStatus","canUseCase","permission"].includes(c)){
    return tag(v, statusColor(v));
  }

    return v ? `<strong>${esc(v)}</strong>` : `<span class="muted">—</span>`;
  }
  return truncate(v, c==="product" || c==="purchasedServices" || c==="content" || c==="homework" ? 80 : 48);

function rowActions(type,r){
  const detail = (type==="students" || type==="leads") ? `<button class="icon-btn" onclick="openDetail('${type}','${r.id}')">详情</button>` : "";
  const convert = type==="leads" && r.status!=="已成交" ? `<button class="icon-btn" onclick="convertLead('${r.id}')">转学生</button>` : "";
  return `<div class="row-actions">${detail}<button class="icon-btn" onclick="openEditor('${type}','${r.id}')">编辑</button>${convert}<button class="icon-btn" onclick="removeRecord('${type}','${r.id}')">删除</button></div>`;

function openEditor(type,id=null,preset={}){
  const schema = schemas[type];
  const isEdit = Boolean(id);
  const rec = isEdit ? state[type].find(x=>x.id===id) : Object.assign({}, preset);
  document.getElementById("modalTitle").textContent = `${isEdit ? "编辑" : "新增"}${labels[type] || type}`;
  document.getElementById("modalBody").innerHTML = `<div class="form-grid">${schema.map(fieldHTML(type,rec||{})).join("")}</div>`;
  const quick = type==="orders" ? `<button class="btn" onclick="applyOrderDefaults(true)">应用默认价格/扣点</button>` : type==="teacherPayments" ? `<button class="btn" onclick="applyTeacherPaymentDefaults(true)">应用课时费默认值</button>` : type==="lessons" ? `<button class="btn" onclick="applyLessonTeacherFromStudent(true)">按学生分科老师带出</button>` : "";
  document.getElementById("modalFoot").innerHTML = `<button class="btn" onclick="closeModal()">取消</button>${quick}<button class="btn primary" onclick="saveRecord('${type}','${id||""}')">保存</button>`;
  document.getElementById("modalBackdrop").classList.add("show");
  setTimeout(()=>setupAutoFill(type),0);
}
function parseMulti(val){
  return String(val || "").split(/[，,、]/).map(x=>x.trim()).filter(Boolean);
}
function ensureOptions(options,val){
  const arr = [...(options || [])];
  const cur = String(val ?? "").trim();
  if(cur && !arr.map(String).includes(cur)) arr.unshift(cur);
  return arr;
}
function fieldHTML(type,rec){
  return (field)=>{
    const val = rec[field.key] ?? "";
    const cls = field.wide || field.type==="textarea" || field.type==="multiselect" ? "field wide" : "field";
    const req = field.required ? " required" : "";
    let input = "";
    if(field.type==="textarea") input = `<textarea id="form_${field.key}" ${req}>${esc(val)}</textarea>`;
    else if(field.type==="select") {
      const opts = ensureOptions(field.options||[], val);
      if(!field.required && !opts.map(String).includes("")) opts.unshift("");
      input = `<select id="form_${field.key}" ${req}>${opts.map(o=>`<option value="${esc(o)}" ${String(val)===String(o)?"selected":""}>${esc(o||"未填写")}</option>`).join("")}</select>`;
    }
    else if(field.type==="combo") {
      const listId = `list_${field.key}_${Math.random().toString(36).slice(2,8)}`;
      const opts = ensureOptions(field.options||[], val).filter(o=>String(o).trim()!=="");
      input = `<input id="form_${field.key}" list="${listId}" type="text" value="${esc(val)}" ${req}><datalist id="${listId}">${opts.map(o=>`<option value="${esc(o)}"></option>`).join("")}</datalist><div class="option-hint">可直接下拉/输入关键词选择；特殊情况也可以手动补充。</div>`;
    }
    else if(field.type==="multiselect") {
      const selected = new Set(parseMulti(val));
      const opts = [...new Set([...(field.options||[]), ...selected])];
      input = `<div class="check-grid" data-multikey="${field.key}">${opts.map((o,i)=>`<label class="check-item"><input type="checkbox" class="multi_${field.key}" value="${esc(o)}" ${selected.has(String(o))?"checked":""}>${esc(o)}</label>`).join("")}</div><div class="option-hint">可多选；如有特殊情况，可先选“其他”，再写在备注里。</div>`;
    }
    else if(field.type==="student") input = `<select id="form_${field.key}" ${req}><option value="">未关联</option>${state.students.map(s=>`<option value="${s.id}" ${val===s.id?"selected":""}>${esc(s.name)}</option>`).join("")}</select>`;
    else input = `<input id="form_${field.key}" type="${field.type}" value="${esc(val)}" ${req}>`;
    return `<div class="${cls}"><label>${field.label}${field.required?" *":""}</label>${input}</div>`;
  };
}
function formNode(key){return document.getElementById("form_"+key);}
function nval(key){const node=formNode(key); return node ? num(node.value) : 0;}
function setFormValue(key,val,force=false){
  const node=formNode(key); if(!node) return;
  if(force || String(node.value||"").trim()==="") node.value = (val===undefined || val===null) ? "" : String(val);
}
function getCheckedMulti(key){return [...document.querySelectorAll(`.multi_${key}:checked`)].map(x=>x.value);}
function getProductDefault(name){return state.config?.productDefaults?.[name] || DEFAULT_PRODUCT_DEFAULTS[name] || null;}
function getPlatformRate(method){
  const fees = state.config?.platformFees || DEFAULT_PLATFORM_FEES;
  return Number(fees[method] ?? 0) || 0;
}
function setupAutoFill(type){
  if(type==="orders"){
    document.querySelectorAll('.multi_product').forEach(x=>x.addEventListener('change',()=>applyOrderDefaults(false)));
    ["paymentMethod","paidAmount","amount","discountAmount"].forEach(k=>{const node=formNode(k); if(node) node.addEventListener('input',()=>calcPlatformFee(false)); if(node && node.tagName==="SELECT") node.addEventListener('change',()=>calcPlatformFee(true));});
    calcPlatformFee(false);
  }
  if(type==="teacherPayments"){
    ["teacher","subject","lessonHours"].forEach(k=>{const node=formNode(k); if(node){node.addEventListener('input',()=>applyTeacherPaymentDefaults(false)); node.addEventListener('change',()=>applyTeacherPaymentDefaults(false));}});
    applyTeacherPaymentDefaults(false);
  }
  if(type==="lessons"){
    ["studentId","lessonSubject"].forEach(k=>{const node=formNode(k); if(node){node.addEventListener('change',()=>applyLessonTeacherFromStudent(false));}});
    applyLessonTeacherFromStudent(false);
  }
}
function applyOrderDefaults(force=false){
  const products = getCheckedMulti("product");
  if(!products.length){calcPlatformFee(force); return;}
  let amount=0, soldHours=0, bonusHours=0, speakingHours=0, writingPieces=0;
  let firstCategory="", firstUnit="";
  const notes=[];
  products.forEach(p=>{
    const d=getProductDefault(p); if(!d) return;
    amount += num(d.defaultPrice);
    soldHours += num(d.defaultHours);
    bonusHours += num(d.bonusHours);
    speakingHours += num(d.speakingHours);
    writingPieces += num(d.writingPieces);
    if(!firstCategory && d.category) firstCategory=d.category;
    if(!firstUnit && d.unitPrice) firstUnit=d.unitPrice;
    if(d.note) notes.push(`${p}：${d.note}`);
  });
  if(firstCategory) setFormValue("productCategory", firstCategory, force);
  if(soldHours) setFormValue("soldHours", soldHours, force);
  if(bonusHours) setFormValue("bonusHours", bonusHours, force);
  if(speakingHours) setFormValue("speakingHours", speakingHours, force);
  if(writingPieces) setFormValue("writingPieces", writingPieces, force);
  if(firstUnit) setFormValue("unitPrice", firstUnit, force);
  if(amount) setFormValue("amount", amount, force);
  const paid = nval("paidAmount");
  const gross = nval("amount");
  const discount = nval("discountAmount");
  if(!paid && gross) setFormValue("paidAmount", Math.max(0, gross-discount), force);
  const noteNode=formNode("paymentNotes");
  if(force && noteNode && notes.length){
    const old = String(noteNode.value||"").trim();
    const add = "系统默认规则："+notes.join("；");
    if(!old.includes(add)) noteNode.value = old ? old+"\n"+add : add;
  }
  calcPlatformFee(force);
}
function calcPlatformFee(force=false){
  const method = formNode("paymentMethod")?.value || "";
  const rate = getPlatformRate(method);
  setFormValue("platformFeeRate", rate, force || method==="小红书" || method==="淘宝");
  const paid = nval("paidAmount") || Math.max(0, nval("amount")-nval("discountAmount"));
  const fee = Math.round(paid * rate) / 100;
  setFormValue("platformFeeAmount", fee.toFixed(2), force || rate>0);
  setFormValue("netReceived", (paid-fee).toFixed(2), force || rate>0);
}
function teacherRate(teacher,subject){
  const p = state.config?.teacherProfiles?.[teacher] || DEFAULT_TEACHER_PROFILES[teacher];
  if(!p) return 0;
  if(/口语陪练/.test(String(subject||""))) return num(p.speakingPracticeRate) || num(p.hourlyRate);
  return num(p.hourlyRate) || num(p.oneToOneRate) || 0;
}
function applyTeacherPaymentDefaults(force=false){
  const teacher = formNode("teacher")?.value || "";
  const subject = formNode("subject")?.value || "";
  const rate = teacherRate(teacher, subject);
  if(rate) setFormValue("hourlyRate", rate, force);
  const hours = nval("lessonHours");
  const finalRate = nval("hourlyRate") || rate;
  if(hours && finalRate){
    const payable = Math.round(hours*finalRate*100)/100;
    setFormValue("payableAmount", payable.toFixed(2), force);
    setFormValue("paidAmount", payable.toFixed(2), force);
  }
}
function applyLessonTeacherFromStudent(force=false){
  const sid = formNode("studentId")?.value || "";
  const subject = formNode("lessonSubject")?.value || "";
  const stu = state.students.find(x=>x.id===sid);
  if(!stu || !subject) return;
  const map={"听力":"listeningTeacher","阅读":"readingTeacher","写作":"writingTeacher","口语":"speakingTeacher","语法":"grammarTeacher"};
  const key = map[subject];
  if(key && stu[key]) setFormValue("teacher", stu[key], force);
}
function saveRecord(type,id){
  const schema = schemas[type];
  const obj = {};
  for(const field of schema){
    if(field.type==="multiselect"){
      obj[field.key] = [...document.querySelectorAll(`.multi_${field.key}:checked`)].map(x=>x.value).join("、");
    }else{
      const node = document.getElementById("form_"+field.key);
      obj[field.key] = node ? node.value.trim() : "";
    }
    if(field.required && !obj[field.key]){
      alert(`请填写：${field.label}`);
      return;
    }
  }
  if(type==="orders") normalizeOrderBeforeSave(obj);
  if(type==="teacherPayments") normalizeTeacherPaymentBeforeSave(obj);
  if(id){
    const idx = state[type].findIndex(x=>x.id===id);
    state[type][idx] = Object.assign({}, state[type][idx], obj, {updatedAt:today()});
  }else{
    state[type].unshift(Object.assign({id:uid(type), createdAt:today()}, obj));
  }
  saveState();
  closeModal();
  render();
}
function normalizeOrderBeforeSave(obj){
  const rate = getPlatformRate(obj.paymentMethod);
  if(!obj.platformFeeRate && rate!==undefined) obj.platformFeeRate = String(rate);
  const paid = num(obj.paidAmount) || Math.max(0, num(obj.amount)-num(obj.discountAmount));
  if(!obj.paidAmount && paid) obj.paidAmount = String(paid);

let currentCalendarMonth = currentMonth();
function toDate(dateStr){
  if(!dateStr || !/^\d{4}-\d{2}-\d{2}/.test(dateStr)) return null;
  const [y,m,d]=dateStr.slice(0,10).split("-").map(Number);
  return new Date(y,m-1,d);
}
function ymd(date){
  if(!(date instanceof Date) || Number.isNaN(date.getTime())) return "";
  const y=date.getFullYear(), m=String(date.getMonth()+1).padStart(2,"0"), d=String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
function addCalendarDays(dateStr,n){const d=toDate(dateStr); if(!d) return ""; d.setDate(d.getDate()+Number(n||0)); return ymd(d);}
function addBusinessDays(dateStr,n){
  let d=toDate(dateStr); if(!d) return "";
  let left=Number(n||0);
  while(left>0){d.setDate(d.getDate()+1); const day=d.getDay(); if(day!==0 && day!==6) left--;}
  return ymd(d);
}
function cnDate(dateStr){const d=toDate(dateStr); return d?`${d.getMonth()+1}月${d.getDate()}日`:"未定";}
function eventTypeClass(type){
  if(/回访/.test(type)) return "followup";
  if(/考试/.test(type)) return "exam";
  if(/出分|成绩/.test(type)) return "result";
  if(/生日/.test(type)) return "birthday";
  if(/转介绍|留学/.test(type)) return "referral";
  if(/退款|争议/.test(type)) return "refund";
  return "manual";
}
function pushEvent(arr,seen,e){
  if(!e.date) return;
  const key=[e.date,e.type,e.source,e.refId,e.title].join("|");
  if(seen.has(key)) return;
  seen.add(key); arr.push(e);
}
function predictedResultDate(exam){
  if(!exam || !exam.examDate) return "";
  const rules = state.config?.calendarRules || DEFAULT_CALENDAR_RULES;

function calendarStats(events){
  const t=today(); const win=num(state.config?.calendarRules?.upcomingWindowDays)||30;
  return {
    overdue:events.filter(e=>e.date<t).length,
    today:events.filter(e=>e.date===t).length,
    week:events.filter(e=>{const d=daysUntil(e.date); return d!==null && d>=0 && d<=7;}).length,
    month:events.filter(e=>{const d=daysUntil(e.date); return d!==null && d>=0 && d<=win;}).length
  };
}

function calendarGridHTML(events){

  const first=new Date(y,m-1,1); const start=new Date(first); const offset=(first.getDay()+6)%7; start.setDate(first.getDate()-offset);
  const byDate={}; events.forEach(e=>{(byDate[e.date] ||= []).push(e);});

function exportJSON(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `Oliver雅思客户学生管理系统备份_${today()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function importJSON(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      if(!data.students || !data.leads) throw new Error("备份结构不完整");
      if(!confirm("导入后会覆盖当前本地数据，确认继续吗？")) return;
      state = Object.assign(structuredClone(SEED), data);
      saveState();
      render();
      alert("导入成功。");
    }catch(e){alert("导入失败："+e.message);}
  };
  reader.readAsText(file,"utf-8");
}

function addSchemaFields(type, fields, beforeKey){
  const schema = schemas[type] || [];
  fields.forEach(field=>{
    if(schema.some(x=>x.key===field.key)) return;
    const idx = beforeKey ? schema.findIndex(x=>x.key===beforeKey) : -1;
    if(idx>=0) schema.splice(idx,0,field); else schema.push(field);
  });
}
function lessonStudentIds(l){
  const ids = [];

  return ids;
}
function studentNamesFromIds(ids){return ids.map(id=>studentName(id)||id).filter(Boolean).join("、");}
function lessonInvolvesStudent(l,sid){return lessonStudentIds(l).includes(sid);}
function isLessonCompleted(l){const st=String(l.lessonStatus||""); return !st || /已完成/.test(st);}
function isLessonScheduled(l){return Boolean(l.lessonDate) && !/已取消/.test(String(l.lessonStatus||""));}
function studentOrders(sid){return (state.orders||[]).filter(o=>o.studentId===sid);}
function studentLessons(sid){return (state.lessons||[]).filter(l=>lessonInvolvesStudent(l,sid));}
function studentPurchasedHours(sid){return studentOrders(sid).reduce((sum,o)=>sum+num(o.soldHours)+num(o.speakingHours)+num(o.bonusHours),0);}
function studentCompletedHours(sid){return studentLessons(sid).filter(isLessonCompleted).reduce((sum,l)=>sum+num(l.hours),0);}
function studentScheduledHours(sid){return studentLessons(sid).filter(isLessonScheduled).reduce((sum,l)=>sum+num(l.hours),0);}
function lastLessonDate(sid){return studentLessons(sid).filter(l=>l.lessonDate).map(l=>l.lessonDate).sort().pop() || "";}
function firstOrderDate(sid){return studentOrders(sid).filter(o=>o.orderDate||o.paymentDate).map(o=>o.orderDate||o.paymentDate).sort()[0] || "";}
function addMonths(dateStr, months){if(!/^\d{4}-\d{2}-\d{2}$/.test(dateStr||"")) return ""; const d=new Date(dateStr+"T00:00:00"); d.setMonth(d.getMonth()+Number(months||12)); return ymd(d);}
function effectiveExpiry(s){
  if(s.extensionExpiryDate) return s.extensionExpiryDate;
  if(s.courseExpiryDate) return s.courseExpiryDate;
  const orderExp = studentOrders(s.id).map(o=>o.expiryDate).filter(Boolean).sort().pop(); if(orderExp) return orderExp;
  const base = firstOrderDate(s.id) || s.planStartDate || s.classStartTime;
  return addMonths(base, s.courseValidityMonths || 12);
}
function dormantInfo(s){
  const purchased=studentPurchasedHours(s.id), completed=studentCompletedHours(s.id), remain=Math.max(0,purchased-completed);
  const last=lastLessonDate(s.id) || firstOrderDate(s.id) || s.createdAt || "";
  const inactive=last?Math.max(0, -daysUntil(last)):null;
  const expiry=effectiveExpiry(s); const expDays=expiry?daysUntil(expiry):null;
  let level="正常";
  if(remain>0 && inactive!==null){ if(inactive>=365) level="极高风险"; else if(inactive>=180) level="高风险"; else if(inactive>=90) level="中风险"; else if(inactive>=60) level="需激活"; else if(inactive>=30) level="轻度停滞"; }
  if(remain>0 && expDays!==null && expDays<=30 && expDays>=0) level="临近到期";
  if(remain>0 && expDays!==null && expDays<0) level="已过期";
  return {purchased,completed,scheduled:studentScheduledHours(s.id),remain,last,inactive,expiry,expDays,level};
}
function teacherCostFromLesson(l){
  if(/否/.test(String(l.teacherPayable||""))) return 0;
  if(!isLessonCompleted(l)) return 0;
  return num(l.hours) * teacherRate(l.teacher,l.lessonSubject);
}
function teacherMetrics(name){
  const lessons=(state.lessons||[]).filter(l=>l.teacher===name);
  const completed=lessons.filter(isLessonCompleted);
  const hours=completed.reduce((s,l)=>s+num(l.hours),0);
  const cost=completed.reduce((s,l)=>s+teacherCostFromLesson(l),0);
  const trial=lessons.filter(l=>/试听/.test(l.lessonType||""));
  const trialConverted=trial.filter(l=>/已转正|续课|抵扣|转正/.test((l.abnormal||"")+(l.nextPlan||"")+(l.performance||""))).length;
  const satisfaction=completed.map(l=>String(l.satisfaction||"").match(/([1-5])分/)).filter(Boolean).map(m=>Number(m[1]));
  const avgSat=satisfaction.length ? (satisfaction.reduce((a,b)=>a+b,0)/satisfaction.length).toFixed(1) : "—";
  const issueCount=lessons.filter(l=>l.teacherIssue && !/^无$/.test(String(l.teacherIssue))).length;
  const relatedRefunds=(state.refunds||[]).filter(r=>r.relatedTeacher===name && /主要相关|部分相关/.test(r.teacherRelated||""));
  const students=new Set(); lessons.forEach(l=>lessonStudentIds(l).forEach(id=>students.add(id)));
  return {lessons,completed,hours,cost,trial,trialConverted,trialRate: trial.length?Math.round(trialConverted/trial.length*100):null,avgSat,issueCount,relatedRefunds,studentCount:students.size};
}
function lifecycleCounts(){
  const dormant=(state.students||[]).filter(s=>/需激活|中风险|高风险|极高风险|已过期|临近到期/.test(dormantInfo(s).level)).length;
  const dueSoon=(state.students||[]).filter(s=>{const d=dormantInfo(s).expDays; return d!==null && d>=0 && d<=30;}).length;
  const highRiskRefunds=(state.refunds||[]).filter(r=>/高|争议|司法/.test((r.riskLevel||"")+(r.status||""))).length;
  return {dormant,dueSoon,highRiskRefunds};
}

function saveRecord(type,id){
  const schema = schemas[type];
  const obj = {};
  for(const field of schema){
    if(field.type==="multiselect" || field.type==="students") obj[field.key] = [...document.querySelectorAll(`.multi_${field.key}:checked`)].map(x=>x.value).join("、");
    else { const node = document.getElementById("form_"+field.key); obj[field.key] = node ? node.value.trim() : ""; }
    if(field.required && !obj[field.key]){ alert(`请填写：${field.label}`); return; }
  }
  if(type==="orders") normalizeOrderBeforeSave(obj);
  if(type==="teacherPayments") normalizeTeacherPaymentBeforeSave(obj);
  if(type==="lessons") normalizeLessonBeforeSave(obj);
  if(id){ const idx = state[type].findIndex(x=>x.id===id); state[type][idx] = Object.assign({}, state[type][idx], obj, {updatedAt:today()}); }
  else state[type].unshift(Object.assign({id:uid(type), createdAt:today()}, obj));

}

function applyResultDateV26(force=false){
  const examType=formNode('examType')?.value || ""; const form=formNode('form')?.value || ""; const examDate=formNode('examDate')?.value || "";
  if(!/雅思/.test(examType) || !examDate || (formNode('resultDate')?.value && !force)) return;
  let rd="";
  if(/机考/.test(form)) rd=addBusinessDaysV26(examDate, Number(state.config?.calendarRules?.computerResultBusinessDays||3));
  else if(/纸笔/.test(form)) { const d=new Date(examDate+'T00:00:00'); d.setDate(d.getDate()+Number(state.config?.calendarRules?.paperResultCalendarDays||13)); rd=ymd(d); }
  if(rd) setFormValue('resultDate', rd, force);
}
function addBusinessDaysV26(dateStr,n){
  const d=new Date(dateStr+'T00:00:00'); let added=0;
  while(added<n){ d.setDate(d.getDate()+1); const day=d.getDay(); if(day!==0 && day!==6) added++; }
  return ymd(d);
}

function genericDetail(type, rec){
  const schema = schemas[type] || [];
  const primary = (columns[type] || schema.map(x=>x.key)).filter(Boolean);
  const keys = [...new Set([...primary, ...schema.map(x=>x.key)])];
  const studentId = rec.studentId || "";
  const studentHeader = studentId ? `<div class="detail-section"><h4>关联学生</h4>${detailItems(type, rec, ["studentId"])}</div>` : "";
  const main = `<div class="detail-section"><h4>${esc(labels[type] || type)}详情</h4>${detailItems(type, rec, keys)}</div>`;
  return studentHeader + main;
}
window.openDetail = openDetail = function(type,id){
  const rec = (state[type] || []).find(x=>x.id===id);
  if(!rec) return;
  const titleName = type==="students" ? `学生详情｜${rec.name || "未命名学生"}` : type==="leads" ? `线索详情｜${rec.name || rec.wechatName || "未命名线索"}` : `${labels[type] || type}详情`;
  document.getElementById("modalTitle").textContent = titleName;
  if(type==="students") document.getElementById("modalBody").innerHTML = studentDetail(rec);
  else if(type==="leads") document.getElementById("modalBody").innerHTML = leadDetail(rec);
  else document.getElementById("modalBody").innerHTML = genericDetail(type, rec);
  const extra = rec.studentId ? `<button class="btn" onclick="closeModal();openDetail('students','${rec.studentId}')">去学生档案</button>` : "";
  document.getElementById("modalFoot").innerHTML = `${extra}<button class="btn" onclick="closeModal()">关闭</button><button class="btn primary" onclick="closeModal();openEditor('${type}','${id}')">编辑</button>`;

const TEACHER_RECEIVE_METHOD_OPTIONS_V28 = ["支付宝","微信","银行卡","现金","其他","待确认"];
function ensureTeacherPayrollDefaultsV28(){
  ensureBusinessConfig();
  state.teacherPayments = state.teacherPayments || [];
  state.config.teacherProfiles = state.config.teacherProfiles || {};
  (state.config.teachers || DEFAULT_TEACHERS).forEach(t=>{
    const p = state.config.teacherProfiles[t] || (state.config.teacherProfiles[t] = {subjects:["听力","阅读","写作","口语","语法"], hourlyRate:160, note:""});
    if(!p.receiveMethod) p.receiveMethod = "待确认";
    if(!p.payeeName) p.payeeName = t;
    if(p.alipayAccount === undefined) p.alipayAccount = "";
    if(p.wechatAccount === undefined) p.wechatAccount = "";
    if(p.bankName === undefined) p.bankName = "";
    if(p.bankCardLast4 === undefined) p.bankCardLast4 = "";
    if(p.accountNote === undefined) p.accountNote = "";
  });
}
function teacherProfileV28(t){ ensureTeacherPayrollDefaultsV28(); return state.config.teacherProfiles?.[t] || {}; }
function paymentLabelV28(t){
  const p=teacherProfileV28(t); const method=p.receiveMethod||"待确认";
  if(method==="银行卡") return `${method}${p.bankName?"｜"+p.bankName:""}${p.bankCardLast4?"｜尾号"+p.bankCardLast4:""}`;
  if(method==="支付宝") return `${method}${p.alipayAccount?"｜"+p.alipayAccount:""}`;
  if(method==="微信") return `${method}${p.wechatAccount?"｜"+p.wechatAccount:""}`;
  return method;
}
function activePayrollMonthV28(){ return window.__activePayrollMonthV28 || currentMonth(); }
function setPayrollMonthV28(v){ window.__activePayrollMonthV28 = v || currentMonth(); render(); }
function lessonMonthV28(l){ return monthKey(l.lessonDate || l.date || l.createdAt); }
function lessonPayableV28(l){ return teacherCostFromLesson(l); }
function monthlyTeacherPayrollV28(month){
  ensureTeacherPayrollDefaultsV28();
  const map={};
  (state.config.teachers||DEFAULT_TEACHERS).forEach(t=>{ map[t]={teacher:t,hours:0,payable:0,lessonCount:0,paid:0,record:null,status:"未生成",payDate:"",payMethod:teacherProfileV28(t).receiveMethod||"待确认"}; });
  (state.lessons||[]).filter(isLessonCompleted).forEach(l=>{
    const t=l.teacher||"未填老师"; if(month && lessonMonthV28(l)!==month) return;
    if(!map[t]) map[t]={teacher:t,hours:0,payable:0,lessonCount:0,paid:0,record:null,status:"未生成",payDate:"",payMethod:"待确认"};
    map[t].hours += num(l.hours); map[t].payable += lessonPayableV28(l); map[t].lessonCount += 1;
  });
  (state.teacherPayments||[]).forEach(p=>{
    if((p.periodMonth||"")!==month) return;
    const t=p.teacher||"未填老师"; if(!map[t]) map[t]={teacher:t,hours:0,payable:0,lessonCount:0,paid:0,record:null,status:"手动",payDate:"",payMethod:p.payMethod||""};
    map[t].record=p; map[t].paid += num(p.paidAmount); map[t].status=p.status||"待支付"; map[t].payDate=p.payDate||""; map[t].payMethod=p.payMethod||map[t].payMethod;
  });
  return Object.values(map).sort((a,b)=>b.payable-a.payable || a.teacher.localeCompare(b.teacher,'zh'));
}
function teacherSettlementIdV28(month, teacher){
  const rec=(state.teacherPayments||[]).find(p=>(p.periodMonth||"")===month && (p.teacher||"")===teacher && (p.settlementSource||"").includes("课程自动汇总"));
  return rec?.id || "";
}
function createOrUpdateTeacherSettlementV28(month, teacher, quiet=false){
  ensureTeacherPayrollDefaultsV28();
  month = month || activePayrollMonthV28();
  const rows=monthlyTeacherPayrollV28(month); const row=rows.find(x=>x.teacher===teacher);
  if(!row || row.hours<=0){ if(!quiet) alert(`${teacher} 在 ${month} 暂无已完成课程课时，不能生成结算。`); return null; }
  const p=teacherProfileV28(teacher);
  const existingId=teacherSettlementIdV28(month, teacher);
  const adjustment = existingId ? num((state.teacherPayments||[]).find(x=>x.id===existingId)?.adjustmentAmount) : 0;
  const obj={
    periodMonth: month,
    teacher,
    studentId:"",
    subject:"综合结算",
    lessonHours: row.hours.toFixed(2),
    hourlyRate: row.hours ? (row.payable/row.hours).toFixed(2) : (p.hourlyRate||0),
    payableAmount: row.payable.toFixed(2),
    adjustmentAmount: adjustment.toFixed(2),
    paidAmount: existingId ? ((state.teacherPayments||[]).find(x=>x.id===existingId)?.paidAmount || "") : "",
    payDate: existingId ? ((state.teacherPayments||[]).find(x=>x.id===existingId)?.payDate || "") : "",
    payMethod: p.receiveMethod || "待确认",
    payeeName: p.payeeName || teacher,
    accountInfo: paymentLabelV28(teacher),
    bankName: p.bankName || "",
    voucher:"",
    settlementSource:"课程自动汇总",
    status: existingId ? ((state.teacherPayments||[]).find(x=>x.id===existingId)?.status || "待支付") : "待支付",
    notes:`系统按 ${month} 已完成课程自动汇总：${row.lessonCount}节课，共${row.hours.toFixed(2)}h；应发${money(row.payable)}。实际发放前请核对排课通知、课程状态、异常/请假记录。`
  };
  if(existingId){
    const idx=state.teacherPayments.findIndex(x=>x.id===existingId);
    state.teacherPayments[idx]=Object.assign({}, state.teacherPayments[idx], obj, {updatedAt:today()});
  }else{
    state.teacherPayments.unshift(Object.assign({id:uid('teacherPayments'), createdAt:today()}, obj));
  }
  saveState();
  if(!quiet){ alert(`${teacher}｜${month} 工资结算已生成/更新。`); render(); }
  return obj;
}
function generateAllTeacherSettlementsV28(month){
  month = month || activePayrollMonthV28();
  const rows=monthlyTeacherPayrollV28(month).filter(r=>r.hours>0);
  if(!rows.length){ alert(`${month} 暂无已完成课程，无法生成教师工资结算。`); return; }
  if(!confirm(`确认根据 ${month} 已完成课程生成/更新 ${rows.length} 位老师的工资结算记录？`)) return;
  rows.forEach(r=>createOrUpdateTeacherSettlementV28(month, r.teacher, true));
  alert(`${month} 教师工资结算已生成/更新。`); render();
}
function markTeacherSettlementPaidV28(month, teacher){
  month=month||activePayrollMonthV28();
  let rec=(state.teacherPayments||[]).find(p=>(p.periodMonth||"")===month && (p.teacher||"")===teacher && (p.settlementSource||"").includes("课程自动汇总"));
  if(!rec) rec=createOrUpdateTeacherSettlementV28(month, teacher, true);
  if(!rec) return;
  const p=teacherProfileV28(teacher);
  const amount = Math.max(0, num(rec.payableAmount)+num(rec.adjustmentAmount));
  rec.paidAmount = amount.toFixed(2);
  rec.payDate = today();
  rec.payMethod = rec.payMethod || p.receiveMethod || "待确认";
  rec.payeeName = rec.payeeName || p.payeeName || teacher;
  rec.accountInfo = rec.accountInfo || paymentLabelV28(teacher);
  rec.status = "已支付";
  rec.updatedAt = today();
  saveState(); render();
}

  if(/已支付|已结清/.test(s||"")) return "green";
