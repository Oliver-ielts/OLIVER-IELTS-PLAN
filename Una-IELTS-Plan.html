<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Una徐之韻 · Oliver 雅思私人定制备考系统 Pro</title>
<style>
:root{
 --green:#316141;--green-deep:#264B33;--green-soft:#4E8366;
 --gold:#C49A3D;--gold-deep:#9A7A2E;
 --ink:#2D2A25;--ink-soft:#6A655D;--muted:#A8A296;
 --paper:#F4F1EA;
 --glass:rgba(255,255,255,.72);--glass-2:#FBFAF6;--glass-3:#FFFFFF;
 --glass-line:#ECE7DD;--hair:#E8E2D6;
 --shadow:0 1px 2px rgba(56,52,44,.045),0 14px 34px -20px rgba(56,52,44,.16);--shadow-sm:0 1px 2px rgba(56,52,44,.04),0 7px 18px -12px rgba(56,52,44,.1);
 --radius:18px;--radius-sm:18px;
 --sk-listen:#BD9A4F;--sk-read:#6E90B4;--sk-write:#8E7FAA;--sk-speak:#BE8585;--sk-core:#316141;
 --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,"Hiragino Sans GB",sans-serif;
 --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Songti SC",Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);color:var(--ink);min-height:100vh;line-height:1.7;-webkit-font-smoothing:antialiased;
 background:
  radial-gradient(1100px 560px at 6% -6%,#FCEFD9 0%,rgba(252,239,217,0) 52%),
  radial-gradient(900px 620px at 102% -2%,#F6E7F1 0%,rgba(246,231,241,0) 46%),
  radial-gradient(840px 760px at 50% 26%,rgba(150,162,228,.42) 0%,rgba(150,162,228,0) 56%),
  linear-gradient(168deg,#FBF4E8 0%,#EDEAF6 46%,#E2E8F4 100%);
 background-attachment:fixed;}
.glow{position:fixed;z-index:-1;border-radius:50%;filter:blur(90px);opacity:.55;pointer-events:none;animation:drift 32s ease-in-out infinite;}
.glow.g1{width:42vw;height:42vw;left:34vw;top:6vh;background:radial-gradient(circle,#A6B2EE,transparent 68%);}
.glow.g2{width:30vw;height:30vw;left:-6vw;top:38vh;background:radial-gradient(circle,#F2C9D8,transparent 70%);animation-delay:-12s;}
.glow.g3{width:34vw;height:34vw;right:-6vw;bottom:6vh;background:radial-gradient(circle,#B7E0C8,transparent 72%);animation-delay:-20s;}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(2.5vw,3vh) scale(1.07);}}

.wrap{max-width:1080px;margin:0 auto;padding:0 16px 40px;}

/* ===== app bar：大气品牌头 + 贴顶细导航 ===== */
.appbar{position:relative;z-index:40;}
.brand-hero{position:relative;overflow:hidden;padding:26px 0 22px;
 background:linear-gradient(165deg,rgba(251,249,243,.9) 0%,rgba(240,245,243,.78) 55%,rgba(238,243,247,.82) 100%);
 border-bottom:1px solid rgba(49,97,65,.07);}
.brand-hero::before{content:"";position:absolute;top:-30%;right:6%;width:46%;height:150%;
 background:radial-gradient(circle,rgba(155,127,201,.14),transparent 68%);filter:blur(26px);pointer-events:none;}
.brand-hero::after{content:"";position:absolute;bottom:-50%;left:-4%;width:38%;height:150%;
 background:radial-gradient(circle,rgba(242,183,5,.1),transparent 70%);filter:blur(26px);pointer-events:none;}
.bh-row{display:flex;align-items:center;gap:18px;position:relative;z-index:1;}
.bh-logo{width:62px;height:62px;flex:none;border-radius:18px;background:rgba(255,255,255,.95);display:grid;place-items:center;padding:9px;
 box-shadow:0 14px 30px -12px rgba(49,97,65,.42),inset 0 0 0 1px rgba(49,97,65,.07);}
.bh-logo img{width:100%;height:100%;object-fit:contain;}
.bh-text{flex:1;min-width:0;}
.bh-text h1{font-size:31px;font-weight:900;letter-spacing:-.02em;color:var(--green-deep);line-height:1.08;}
.bh-studio{font-size:13px;color:var(--green-soft);font-weight:800;margin-top:6px;letter-spacing:.02em;}
.bh-cd{flex:none;text-align:center;background:linear-gradient(140deg,rgba(242,183,5,.18),rgba(242,183,5,.05));
 border:1px solid rgba(242,183,5,.42);border-radius:18px;padding:11px 17px;min-width:84px;box-shadow:0 12px 26px -14px rgba(242,183,5,.5);}
.bh-cd .n{font-size:30px;font-weight:900;color:var(--gold-deep);line-height:1;font-feature-settings:"tnum";}
.bh-cd .l{font-size:10px;color:var(--ink-soft);font-weight:700;margin-top:3px;}
.bh-scores{position:relative;z-index:1;margin-top:16px;font-size:13px;color:var(--ink-soft);font-weight:600;letter-spacing:.01em;}
.bh-scores b{color:var(--green-deep);font-weight:900;}
.bh-dot{color:var(--muted);}
/* —— 大品牌 + 底部 Tab 重构 —— */
.bh-text h1{font-size:34px;letter-spacing:-.01em;}
.bh-studio{font-size:12.5px;}
.bh-plan{position:relative;z-index:1;margin-top:15px;font-size:13px;color:var(--ink-soft);font-weight:600;}
.bh-plan b{color:var(--green-deep);font-weight:900;}
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;
 background:rgba(252,251,247,.92);backdrop-filter:blur(22px) saturate(160%);-webkit-backdrop-filter:blur(22px) saturate(160%);
 border-top:1px solid var(--hair);padding:7px 6px calc(env(safe-area-inset-bottom) + 7px);box-shadow:0 -8px 26px -16px rgba(31,41,33,.4);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;
 color:var(--muted);font-size:10.5px;font-weight:700;padding:5px 0 3px;border-radius:12px;transition:color .18s,transform .12s;-webkit-tap-highlight-color:transparent;}
.tab .tic{display:grid;place-items:center;width:24px;height:24px;color:var(--muted);transition:color .18s;}
.tab .tic svg{width:23px;height:23px;}
.tab.on{color:var(--green-deep);font-weight:800;}
.tab.on .tic{color:var(--green);}
.tab:active{transform:scale(.9);}
main.wrap{padding-bottom:calc(env(safe-area-inset-bottom) + 80px);}
body{background:linear-gradient(178deg,#FBFAF5 0%,#F5F6F2 46%,#F2F4F1 100%);background-attachment:fixed;}
/* 首页大模块：统一品牌绿细线图标 + 暖中性底 */
.hmod-ic{background:rgba(49,97,65,.08)!important;color:var(--green-deep)!important;}
.hmod-ic svg{width:26px;height:26px;}
.hmod-stat{color:var(--green-deep)!important;}
.pillbar{position:sticky;top:0;z-index:41;background:rgba(247,248,250,.82);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);
 border-bottom:1px solid var(--hair);padding:9px 0;}
.pills{display:flex;gap:9px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px;}
.pills::-webkit-scrollbar{display:none;}
.pill{flex:none;font-size:13.5px;font-weight:700;color:var(--ink-soft);background:rgba(255,255,255,.55);
 border:1px solid rgba(255,255,255,.7);padding:9px 17px;border-radius:999px;cursor:pointer;transition:.22s;display:flex;align-items:center;gap:6px;white-space:nowrap;box-shadow:var(--shadow-sm);}
.pill:hover{background:rgba(255,255,255,.85);}
.pill.on{background:linear-gradient(135deg,var(--green),var(--green-soft));color:#fff;font-weight:800;box-shadow:0 10px 22px -8px rgba(49,97,65,.5);border-color:transparent;}
.pill .pi{font-size:14px;}
.brand-hero .wrap,.pillbar .wrap{padding-top:0;padding-bottom:0;}
/* ===== 首页：大模块卡 ===== */
.home-intro{font-size:13px;color:var(--ink-soft);font-weight:600;margin:4px 2px 16px;line-height:1.6;}
.home-intro b{color:var(--green-deep);font-weight:900;font-feature-settings:"tnum";}
.hgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:22px;}
.hmod{position:relative;overflow:hidden;background:var(--glass-3);border:1px solid var(--glass-line);border-radius:20px;
 padding:18px 18px 16px;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .2s,box-shadow .2s;
 display:flex;flex-direction:column;min-height:142px;}
.hmod:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
.hmod:active{transform:scale(.98);}
.hmod-ic{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;font-size:25px;margin-bottom:13px;}
.hmod-tt{font-size:17.5px;font-weight:900;color:var(--ink);letter-spacing:-.01em;}
.hmod-desc{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:4px;line-height:1.55;flex:1;}
.hmod-stat{font-size:12.5px;font-weight:900;margin-top:12px;font-feature-settings:"tnum";display:flex;align-items:center;gap:4px;}
.hmod-arr{opacity:.6;font-size:11px;}

/* ===== generic frosted card ===== */
.card{background:var(--glass-2);backdrop-filter:blur(22px) saturate(150%);-webkit-backdrop-filter:blur(22px) saturate(150%);
 border:1px solid var(--glass-line);border-radius:var(--radius);box-shadow:var(--shadow-sm);}
.view{display:none;padding-top:18px;}
.view.active{display:block;animation:viewin .34s cubic-bezier(.2,.8,.2,1);}
@keyframes viewin{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.page-title{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:900;color:var(--green-deep);margin:2px 2px 14px;}
.page-title .pt-ic{font-size:19px;}
.page-title .pt-sub{font-size:11px;color:var(--muted);font-weight:600;margin-left:auto;}

/* ===== TODAY hero ===== */
.hero{padding:22px 22px 20px;margin-bottom:16px;position:relative;overflow:hidden;}
.hero::after{content:"";position:absolute;top:-40%;right:-12%;width:46%;height:90%;border-radius:50%;background:radial-gradient(circle,rgba(242,183,5,.16),transparent 68%);pointer-events:none;}
.hero-mid{display:flex;align-items:center;gap:20px;position:relative;z-index:1;}
.ring-wrap{flex:none;width:122px;height:122px;position:relative;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(49,97,65,.12);stroke-width:10;}
.ring-fg{fill:none;stroke:url(#rg);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.05s cubic-bezier(.22,.8,.2,1);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-center .pct{font-size:30px;font-weight:900;color:var(--green-deep);line-height:1;font-feature-settings:"tnum";}
.ring-center .pct small{font-size:15px;color:var(--green-soft);}
.ring-center .lab{font-size:10.5px;color:var(--muted);font-weight:700;margin-top:3px;}
.hero-meta{flex:1;min-width:0;}
.hero-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px;}
.hchip{font-size:10.5px;font-weight:800;padding:3px 10px;border-radius:999px;background:rgba(49,97,65,.09);color:var(--green);}
.hchip.gold{background:rgba(242,183,5,.18);color:var(--gold-deep);}
.hero-focus{font-size:15px;font-weight:800;color:var(--green-deep);line-height:1.35;}
.hero-stat{font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-top:8px;}
.hero-stat b{color:var(--green-deep);font-feature-settings:"tnum";}
.hskills{margin-top:18px;display:grid;gap:9px;position:relative;z-index:1;}
.hsk{display:grid;grid-template-columns:70px 1fr 40px;align-items:center;gap:10px;}
.hsk .nm{font-size:12px;font-weight:800;color:var(--ink-soft);display:flex;align-items:center;gap:6px;}
.hsk .dot{width:8px;height:8px;border-radius:50%;flex:none;}
.hsk .tk{height:9px;border-radius:999px;background:rgba(49,97,65,.09);overflow:hidden;}
.hsk .fl{height:100%;border-radius:999px;width:0;transition:width 1.05s cubic-bezier(.22,.8,.2,1);}
.hsk .vl{font-size:11px;font-weight:800;color:var(--ink-soft);text-align:right;font-feature-settings:"tnum";}

/* urgent */
.urgent{background:linear-gradient(135deg,rgba(242,183,5,.14),rgba(242,183,5,.05));border:1px solid rgba(242,183,5,.36);
 border-radius:16px;padding:13px 15px;margin-bottom:16px;font-size:12px;font-weight:600;color:#7a5a08;line-height:1.7;}
.urgent strong{font-weight:800;color:#5a4206;}

/* subject section */
.sec{margin:18px 2px 10px;display:flex;align-items:center;gap:9px;}
.sec .bar{width:4px;height:18px;border-radius:3px;background:var(--c);}
.sec .ic{font-size:16px;}.sec .zh{font-size:14.5px;font-weight:900;color:var(--ink);}
.sec .en{font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:.04em;}
.sec .ct{margin-left:auto;font-size:10.5px;font-weight:800;color:var(--muted);}

/* task card (inline expand) */
.tcard{background:var(--glass-3);backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%);
 border:1px solid var(--glass-line);border-radius:16px;margin-bottom:9px;overflow:hidden;box-shadow:var(--shadow-sm);position:relative;transition:.2s;}
.tcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c);}
.tcard:hover{box-shadow:var(--shadow);}
.tc-main{display:flex;gap:12px;align-items:center;padding:13px 14px 13px 17px;cursor:pointer;}
.ttick{width:26px;height:26px;border-radius:50%;flex:none;border:2.5px solid var(--c);opacity:.5;background:transparent;display:grid;place-items:center;font-size:14px;color:transparent;transition:.2s;}
.ttick:hover{opacity:1;}
.tc-body{flex:1;min-width:0;}
.tc-title{font-size:13.5px;font-weight:800;color:var(--ink);line-height:1.42;}
.tc-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:6px;font-size:10.5px;font-weight:700;color:var(--muted);}
.tc-meta .m-sub{color:var(--c);font-weight:800;}
.tc-meta .m-time{color:var(--ink-soft);}
.tc-meta .sep{opacity:.4;}
.tc-exp{flex:none;color:var(--muted);font-size:17px;transition:transform .25s;opacity:.6;}
.tcard.open .tc-exp{transform:rotate(90deg);}
.tc-detail{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s cubic-bezier(.2,.8,.2,1);}
.tc-detail>div{overflow:hidden;}
.tcard.open .tc-detail{grid-template-rows:1fr;}
.td-pad{padding:2px 16px 15px 17px;}
.exec-row{display:grid;grid-template-columns:70px 1fr;gap:10px;background:rgba(255,255,255,.5);border:1px solid var(--glass-line);border-radius:11px;padding:10px 12px;margin-bottom:7px;}
.exec-label{font-size:11px;font-weight:800;color:var(--green);}
.exec-text{font-size:12px;color:var(--ink-soft);line-height:1.62;}
.exec-row.eg{background:rgba(242,183,5,.1);border-color:rgba(242,183,5,.3);}
.exec-row.eg .exec-label{color:var(--gold-deep);}.exec-row.eg .exec-text{color:#7a5a1a;}
.td-note{font-size:11.5px;color:var(--ink-soft);line-height:1.7;background:rgba(49,97,65,.05);border:1px solid var(--hair);border-radius:11px;padding:10px 12px;margin-bottom:8px;}
.td-note .warn{color:#c2410c;font-weight:700;}
.td-file{font-size:11px;color:var(--green);font-weight:700;margin-bottom:10px;}
.td-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;font-size:13.5px;font-weight:800;padding:12px;border-radius:13px;cursor:pointer;border:none;transition:.2s;
 background:linear-gradient(135deg,var(--green),var(--green-soft));color:#fff;box-shadow:0 12px 24px -12px rgba(49,97,65,.6);}
.td-btn:hover{filter:brightness(1.05);}.td-btn:active{transform:scale(.98);}
.td-btn.done{background:rgba(49,97,65,.12);color:var(--green);box-shadow:none;border:1px solid rgba(49,97,65,.3);}
.tcard.done .ttick{background:var(--c);border-color:var(--c);color:#fff;opacity:1;}
.tcard.done .tc-title{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(49,97,65,.4);}
.tcard.done::before{filter:saturate(.7);}

/* ===== plan: phase / calendar / list ===== */
.gsec{padding:18px 20px;margin-bottom:14px;}
.gsec .gh{font-size:14px;font-weight:900;color:var(--green-deep);display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.gsec .gh .gh-r{margin-left:auto;font-size:10.5px;font-weight:800;color:var(--gold-deep);}
.ppath{display:flex;align-items:flex-start;position:relative;}
.ppath::before{content:"";position:absolute;top:13px;left:9%;right:9%;height:3px;background:rgba(49,97,65,.13);border-radius:3px;}
.pnode{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;position:relative;z-index:1;}
.pdot{width:26px;height:26px;border-radius:50%;background:#fff;border:3px solid rgba(49,97,65,.2);display:grid;place-items:center;font-size:11px;font-weight:800;color:var(--muted);transition:.25s;}
.pnode.done .pdot{background:var(--green-soft);border-color:var(--green-soft);color:#fff;}
.pnode.cur .pdot{background:var(--green);border-color:var(--green);color:#fff;transform:scale(1.16);box-shadow:0 6px 16px -5px rgba(49,97,65,.6);}
.pnode .pl{font-size:11px;font-weight:800;color:var(--ink-soft);}.pnode.cur .pl{color:var(--green);}
.pnode .pw{font-size:9px;color:var(--muted);font-weight:700;}
/* calendar */
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:7px;}
.cal-head span{text-align:center;font-size:10px;font-weight:800;color:var(--muted);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-cell{aspect-ratio:1;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:800;position:relative;}
.cal-cell.empty{color:rgba(140,145,155,.35);font-weight:600;}
.cal-cell.study{cursor:pointer;border:1.5px solid transparent;transition:.18s;}
.cal-cell.study:hover{transform:translateY(-2px);}
.cal-cell.study .cd{font-size:11.5px;}
.cal-cell.study .ck{font-size:11px;line-height:1;margin-top:1px;}
.cal-cell.study.today{border-color:var(--gold);box-shadow:0 0 0 2px rgba(242,183,5,.28);}
.cal-cell.exam{box-shadow:0 0 0 2px rgba(232,120,120,.4);}
.cal-legend{display:flex;align-items:center;gap:6px;font-size:9.5px;color:var(--muted);font-weight:700;margin-top:12px;flex-wrap:wrap;}
.cal-legend .lg{width:12px;height:12px;border-radius:4px;}
.streakline{font-size:11px;color:var(--green);font-weight:800;margin-top:12px;}
/* schedule */
.wk-band{font-size:11.5px;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--c),var(--green));border-radius:13px;padding:10px 14px;margin:14px 0 8px;box-shadow:var(--shadow-sm);}
.wk-band .wb-s{font-weight:600;opacity:.9;font-size:10.5px;}
.dl-row{display:grid;grid-template-columns:60px 1fr auto;gap:10px;align-items:center;background:var(--glass-2);border:1px solid var(--glass-line);border-radius:13px;padding:11px 14px;margin-bottom:7px;cursor:pointer;transition:.18s;backdrop-filter:blur(12px);}
.dl-row:hover{transform:translateX(3px);box-shadow:var(--shadow-sm);}
.dl-row.today{border-color:var(--gold);box-shadow:0 0 0 2px rgba(242,183,5,.18);}
.dl-d{font-size:13px;font-weight:900;color:var(--green);}
.dl-f{font-size:11.5px;font-weight:600;color:var(--ink-soft);}
.dl-c{font-size:10.5px;font-weight:800;color:var(--muted);}
.dl-bar{grid-column:1/-1;height:3px;border-radius:3px;background:rgba(49,97,65,.1);overflow:hidden;margin-top:2px;}
.dl-bar i{display:block;height:100%;background:var(--green-soft);}
.deliv{background:var(--glass-2);border:1px solid var(--glass-line);border-left:5px solid var(--green);border-radius:14px;padding:13px 15px;margin:10px 0 14px;}
.deliv h4{font-size:12.5px;font-weight:800;color:var(--green);margin-bottom:7px;}
.deliv ul{padding-left:18px;color:var(--ink-soft);font-size:11.5px;line-height:1.75;}

/* ===== search + chips ===== */
.searchbar{display:flex;align-items:center;gap:9px;background:var(--glass-3);border:1px solid var(--glass-line);border-radius:14px;padding:11px 15px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
.searchbar input{flex:1;border:0;background:transparent;font-size:13px;color:var(--ink);font-family:var(--sans);outline:none;}
.searchbar .si{color:var(--muted);font-size:14px;}
.chiprow{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.fchip{font-size:11.5px;font-weight:700;color:var(--ink-soft);background:var(--glass-2);border:1px solid var(--glass-line);padding:6px 13px;border-radius:999px;cursor:pointer;transition:.2s;}
.fchip.on{background:var(--green);color:#fff;border-color:var(--green);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:11px;}

/* book / ency cards (native details) */
.acard{background:var(--glass-3);backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%);border:1px solid var(--glass-line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow-sm);transition:.2s;}
.acard:hover{box-shadow:var(--shadow);}
.acard>summary{cursor:pointer;list-style:none;padding:15px 16px;display:flex;align-items:center;gap:10px;}
.acard>summary::-webkit-details-marker{display:none;}
.acard>summary::after{content:"›";margin-left:auto;color:var(--muted);font-size:18px;transition:transform .25s;}
.acard[open]>summary::after{transform:rotate(90deg);}
.acard>summary:hover{background:rgba(49,97,65,.04);}
.btag{font-size:9.5px;font-weight:800;padding:3px 9px;border-radius:7px;color:#fff;flex:none;}
.bname{font-size:13px;font-weight:800;color:var(--ink);line-height:1.35;}
.abody{padding:0 16px 16px;font-size:12px;color:var(--ink-soft);line-height:1.78;}
.abody .meta{font-size:10.5px;color:var(--muted);font-weight:700;margin-bottom:8px;}

/* ===== 我的 menu + subpage ===== */
.stat-card{padding:18px 20px;margin-bottom:14px;}
.stat-card .gh{font-size:14px;font-weight:900;color:var(--green-deep);display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.strow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed var(--hair);}
.strow:last-child{border-bottom:none;}
.strow .k{font-size:12.5px;color:var(--muted);font-weight:800;}
.strow .v{font-size:13px;color:var(--ink);font-weight:800;font-feature-settings:"tnum";}
.menu-item{display:flex;align-items:center;gap:13px;background:var(--glass-2);border:1px solid var(--glass-line);border-radius:16px;padding:15px 16px;margin-bottom:9px;cursor:pointer;transition:.18s;box-shadow:var(--shadow-sm);}
.menu-item:hover{transform:translateX(3px);box-shadow:var(--shadow);}
.menu-item .mi-ic{width:40px;height:40px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:19px;background:var(--mc,rgba(49,97,65,.1));}
.menu-item .mi-t{flex:1;}
.menu-item .mi-t .t{font-size:13.5px;font-weight:800;color:var(--ink);}
.menu-item .mi-t .d{font-size:10.5px;color:var(--muted);font-weight:600;margin-top:1px;}
.menu-item .mi-go{color:var(--muted);font-size:18px;}
.subpage{animation:slidein .3s cubic-bezier(.2,.8,.2,1);}
@keyframes slidein{from{opacity:0;transform:translateX(24px);}to{opacity:1;transform:none;}}
.backbar{display:flex;align-items:center;gap:9px;margin:2px 2px 14px;cursor:pointer;}
.backbar .bk{width:34px;height:34px;border-radius:50%;background:var(--glass-3);border:1px solid var(--glass-line);display:grid;place-items:center;font-size:17px;color:var(--green);box-shadow:var(--shadow-sm);transition:.2s;}
.backbar:hover .bk{transform:translateX(-2px);}
.backbar .bt{font-size:16px;font-weight:900;color:var(--green-deep);}

/* milestone */
.ms-row{display:grid;grid-template-columns:80px 30px 1fr;gap:6px;align-items:flex-start;position:relative;padding-bottom:15px;}
.ms-row::before{content:"";position:absolute;left:94px;top:24px;bottom:-4px;width:2px;background:rgba(49,97,65,.16);}
.ms-row:last-child::before{display:none;}
.ms-week{font-size:11px;font-weight:800;color:var(--green);text-align:right;padding-top:3px;}
.ms-dotwrap{display:flex;justify-content:center;}
.ms-dot{width:22px;height:22px;border-radius:50%;background:#fff;border:3px solid rgba(49,97,65,.25);display:grid;place-items:center;font-size:11px;color:var(--muted);z-index:1;}
.ms-row.reached .ms-dot{background:var(--green-soft);border-color:var(--green-soft);color:#fff;}
.ms-row.cur .ms-dot{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 0 0 4px rgba(49,97,65,.15);}
.ms-card{background:var(--glass-2);border:1px solid var(--glass-line);border-radius:14px;padding:11px 14px;font-size:12px;color:var(--ink-soft);line-height:1.7;}
.ms-card .ms-chip{font-size:9px;font-weight:800;padding:2px 8px;border-radius:999px;margin-bottom:5px;display:inline-block;}

/* branded footer */
.brandfoot{padding:22px 18px;margin-top:18px;text-align:center;}
.brandfoot img{height:56px;opacity:.95;margin-bottom:10px;}
.brandfoot .cp{font-size:10px;color:var(--ink-soft);line-height:1.7;text-align:left;}
.brandfoot .cp strong{color:var(--green-deep);}

/* legacy injected (百科/使用说明/档案/思路/回执 inside subpages) */
.legacy .info-box,.legacy .profile-card{background:var(--glass-3);border:1px solid var(--glass-line);border-radius:16px;padding:16px 18px;margin-bottom:13px;box-shadow:var(--shadow-sm);color:var(--ink-soft);font-size:13px;line-height:1.78;}
.legacy h3{color:var(--green-deep);}
.legacy .profile-row{display:flex;padding:9px 0;border-bottom:1px dashed var(--hair);font-size:13px;}
.legacy .profile-row:last-child{border-bottom:none;}
.legacy .profile-key{width:96px;color:var(--muted);font-weight:800;flex-shrink:0;}
.legacy .profile-val{flex:1;color:var(--ink);}
.legacy details,.legacy .fold-card{background:var(--glass-3);border:1px solid var(--glass-line);border-radius:16px;padding:0;margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm);}
.legacy summary{cursor:pointer;font-weight:800;padding:14px 16px;list-style:none;display:flex;align-items:center;gap:8px;color:var(--green-deep);font-size:13.5px;transition:.2s;}
.legacy summary::-webkit-details-marker{display:none;}
.legacy summary::after{content:"›";margin-left:auto;font-size:17px;color:var(--green-soft);transition:transform .25s;}
.legacy details[open]>summary::after{transform:rotate(90deg);}
.legacy summary:hover{background:rgba(49,97,65,.04);}
.legacy .fold-body{padding:2px 16px 15px;font-size:11.8px;line-height:1.8;color:var(--ink-soft);}
.legacy table{width:100%;border-collapse:collapse;font-size:11.3px;line-height:1.6;margin-top:10px;}
.legacy th{background:rgba(49,97,65,.1)!important;color:var(--green-deep)!important;text-align:left;padding:8px 10px;border:1px solid rgba(49,97,65,.16)!important;font-weight:800;vertical-align:top;}
.legacy td{padding:8px 10px;border:1px solid rgba(49,97,65,.12)!important;background:rgba(255,255,255,.55)!important;color:var(--ink-soft);vertical-align:top;}
.legacy a,.legacy .inline-link{color:var(--green)!important;font-weight:700;text-decoration:none;}
.legacy a:hover{text-decoration:underline;}
.legacy .receipt-titlebar{background:var(--glass-3);border:1px solid var(--glass-line);border-left:5px solid var(--green);border-radius:16px;padding:15px 17px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
.legacy .receipt-kicker{font-size:10px;font-weight:900;color:var(--green);letter-spacing:2px;margin-bottom:3px;}
.legacy .receipt-title{font-size:18px;font-weight:900;color:var(--green-deep);}
.legacy .receipt-desc{font-size:11.5px;color:var(--ink-soft);line-height:1.75;margin-top:5px;}
.legacy .receipt-toolbar{display:grid;grid-template-columns:1.2fr repeat(4,1fr);gap:8px;margin-bottom:14px;}
.legacy .receipt-tool{background:var(--glass-3);border:1px solid var(--glass-line);border-radius:14px;padding:11px 12px;box-shadow:var(--shadow-sm);}
.legacy .receipt-tool label{display:block;font-size:10px;color:var(--muted);font-weight:800;margin-bottom:4px;}
.legacy .receipt-big{font-size:20px;font-weight:900;color:var(--green);line-height:1.2;font-feature-settings:"tnum";}
.legacy .receipt-tool input{width:100%;border:1px solid var(--glass-line);border-radius:8px;background:rgba(255,255,255,.6);padding:7px 8px;font-size:12px;color:var(--ink);}
.legacy .receipt-layout{display:grid;grid-template-columns:1.45fr .85fr;gap:12px;}
.legacy .receipt-box{background:var(--glass-3);border:1px solid var(--glass-line);border-radius:16px;padding:14px 15px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
.legacy .receipt-box h3{font-size:13.5px;margin-bottom:3px;color:var(--green-deep);}
.legacy .receipt-hint{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:9px;}
.legacy .receipt-count{float:right;background:rgba(49,97,65,.1);border:1px solid var(--glass-line);border-radius:6px;padding:1px 8px;font-size:10.5px;color:var(--green);font-weight:800;}
.legacy .checkin-task{display:grid;grid-template-columns:22px 92px 1fr 96px;gap:8px;align-items:center;border-top:1px dashed var(--hair);padding:9px 0;}
.legacy .checkin-task:first-of-type{border-top:none;}
.legacy .checkin-task input[type='checkbox']{width:18px;height:18px;accent-color:var(--green);}
.legacy .task-mini-title{font-size:12px;font-weight:900;color:var(--ink);}
.legacy .task-mini-tag{display:block;width:max-content;margin-top:2px;font-size:9px;background:rgba(49,97,65,.1);color:var(--green);border:1px solid var(--glass-line);padding:1px 6px;border-radius:5px;}
.legacy .target-input{width:100%;border:1px solid var(--glass-line);border-radius:8px;background:rgba(255,255,255,.6);padding:7px 8px;font-size:12px;color:var(--ink);}
.legacy .minute-box{display:flex;align-items:center;gap:3px;justify-content:center;border:1px solid var(--glass-line);background:rgba(255,255,255,.5);border-radius:8px;padding:5px 4px;font-size:10px;color:var(--muted);}
.legacy .minute-box input{width:42px;border:0;background:transparent;text-align:center;font-weight:900;color:var(--ink);}
.legacy .target-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.legacy .checkin-log{font-size:11px;color:var(--ink-soft);line-height:1.7;max-height:160px;overflow:auto;background:rgba(255,255,255,.4);border:1px dashed var(--glass-line);border-radius:10px;padding:10px;margin-top:9px;}
.legacy .receipt-reset{margin-top:10px;border:0;background:linear-gradient(135deg,var(--green),var(--green-soft));color:#fff;border-radius:10px;padding:10px 12px;font-size:12px;font-weight:900;cursor:pointer;box-shadow:0 8px 18px -8px rgba(49,97,65,.5);}
.legacy textarea{width:100%!important;border:1px solid var(--glass-line)!important;border-radius:10px!important;background:rgba(255,255,255,.6)!important;padding:9px!important;font-size:12px;color:var(--ink);font-family:var(--sans);}
.legacy .receipt-note{background:rgba(242,183,5,.1);border:1px solid rgba(242,183,5,.3);border-radius:10px;padding:10px 12px;font-size:11px;color:#7a5a1a;line-height:1.7;margin-bottom:11px;}

/* pop-in stagger for cards & calendar cells */
@keyframes popin{from{opacity:0;transform:translateY(10px) scale(.985);}to{opacity:1;transform:none;}}
@keyframes cellpop{from{opacity:0;transform:scale(.6);}to{opacity:1;transform:scale(1);}}
.tcard{animation:popin .4s cubic-bezier(.2,.8,.2,1) both;}
.acard{animation:popin .4s cubic-bezier(.2,.8,.2,1) both;}
.cal-cell.study{animation:cellpop .4s cubic-bezier(.2,.9,.3,1.2) both;}
.dl-row{animation:popin .38s cubic-bezier(.2,.8,.2,1) both;}

/* horizontal swipeable heatmap on phone */
.cal-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin:0 -4px;padding:0 4px;}
.cal-scroll::-webkit-scrollbar{display:none;}
.swipe-hint{font-size:10px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:5px;margin:-2px 0 10px;}

/* toggle switch (聚焦未完成) */
.tg-row{display:flex;align-items:center;gap:10px;background:var(--glass-2);border:1px solid var(--glass-line);border-radius:999px;padding:9px 15px;margin-bottom:14px;box-shadow:var(--shadow-sm);width:max-content;cursor:pointer;user-select:none;}
.tg-row .tg-l{font-size:12.5px;font-weight:800;color:var(--ink-soft);}
.switch{width:38px;height:21px;border-radius:999px;background:rgba(49,97,65,.2);position:relative;transition:.22s;flex:none;}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.2);transition:.22s;}
.tg-row.on .switch{background:var(--green);}
.tg-row.on .switch::after{transform:translateX(17px);}

/* ===== popup sheet (弹窗) ===== */
.scrim{position:fixed;inset:0;z-index:60;background:rgba(31,46,38,.36);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);opacity:0;pointer-events:none;transition:.28s;}
.scrim.open{opacity:1;pointer-events:auto;}
.sheet{position:fixed;z-index:61;top:50%;left:50%;transform:translate(-50%,-44%) scale(.96);width:min(640px,94vw);max-height:88vh;overflow-y:auto;opacity:0;pointer-events:none;transition:.32s cubic-bezier(.2,.85,.25,1);
 background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(255,255,255,.88));backdrop-filter:blur(30px) saturate(160%);-webkit-backdrop-filter:blur(30px) saturate(160%);border:1px solid var(--glass-line);border-radius:26px;box-shadow:0 40px 90px -24px rgba(31,46,38,.5);}
.sheet.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1);}
.sheet-head{position:sticky;top:0;z-index:2;padding:20px 24px 14px;background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(255,255,255,.5));backdrop-filter:blur(12px);border-bottom:1px solid var(--hair);border-radius:26px 26px 0 0;display:flex;align-items:flex-start;gap:12px;}
.sheet-head .sh-tag{font-size:9.5px;font-weight:800;padding:3px 9px;border-radius:7px;color:#fff;flex:none;margin-top:3px;}
.sheet-head .tt{flex:1;min-width:0;}
.sheet-head .sh-time{font-size:11px;font-weight:800;color:var(--green);background:rgba(49,97,65,.1);padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:6px;}
.sheet-head h3{font-size:16.5px;font-weight:900;color:var(--green-deep);line-height:1.35;}
.x{flex:none;width:34px;height:34px;border-radius:50%;border:1px solid var(--glass-line);background:rgba(255,255,255,.7);cursor:pointer;font-size:17px;color:var(--ink-soft);display:grid;place-items:center;transition:.2s;}
.x:hover{background:#fff;color:var(--green);transform:rotate(90deg);}
.sheet-body{padding:14px 24px 28px;}
.sb-note{font-size:12px;color:var(--ink-soft);line-height:1.7;background:rgba(49,97,65,.05);border:1px solid var(--hair);border-radius:12px;padding:11px 13px;margin-bottom:10px;}
.sb-note .warn{color:#c2410c;font-weight:700;}
.sb-file{font-size:11.5px;color:var(--green);font-weight:700;margin-bottom:14px;}
.sb-detail{font-size:13px;color:var(--ink-soft);line-height:1.85;}
.sheet-checkin{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin:18px 0 2px;font-size:14px;font-weight:800;padding:14px;border-radius:14px;cursor:pointer;border:none;transition:.2s;background:linear-gradient(135deg,var(--green),var(--green-soft));color:#fff;box-shadow:0 14px 28px -12px rgba(49,97,65,.6);}
.sheet-checkin:hover{filter:brightness(1.05);}.sheet-checkin:active{transform:scale(.98);}
.sheet-checkin.done{background:rgba(49,97,65,.12);color:var(--green);box-shadow:none;border:1px solid rgba(49,97,65,.3);}
@media(max-width:640px){.sheet{width:100vw;max-height:92vh;top:auto;bottom:0;left:0;transform:translateY(10%);border-radius:24px 24px 0 0;}.sheet.open{transform:translateY(0);}.sheet-head{border-radius:24px 24px 0 0;}}

/* celebrate */
.celebrate{position:fixed;inset:0;z-index:80;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;}
.celebrate.show{animation:celebpop 1.6s ease forwards;}
.celebrate .cbig{font-size:76px;}
.celebrate .ctxt{position:absolute;bottom:34%;font-size:15px;font-weight:800;color:var(--green-deep);background:rgba(255,255,255,.9);padding:8px 18px;border-radius:999px;box-shadow:var(--shadow-sm);}
@keyframes celebpop{0%{opacity:0}12%{opacity:1}30%{opacity:1}100%{opacity:0}}
.confetti{position:fixed;top:-12px;width:9px;height:14px;z-index:79;pointer-events:none;border-radius:2px;animation:fall 1.5s ease-in forwards;}
@keyframes fall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(540deg);opacity:0}}

/* timer */
.timer{background:rgba(49,97,65,.06);border:1px solid var(--glass-line);border-radius:14px;padding:14px;margin-bottom:12px;text-align:center;}
.tm-disp{font-size:38px;font-weight:900;color:var(--green-deep);font-feature-settings:'tnum';line-height:1;letter-spacing:1px;}
.tm-disp.done{color:#c2410c;animation:flash .5s ease 3;}
@keyframes flash{50%{opacity:.35;}}
.tm-sub{font-size:11px;color:var(--muted);font-weight:700;margin-top:5px;}
.tm-btns{display:flex;gap:9px;justify-content:center;margin-top:11px;}
.tm-b{font-size:13px;font-weight:800;padding:9px 18px;border-radius:11px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--green),var(--green-soft));color:#fff;transition:.2s;}
.tm-b.ghost{background:rgba(49,97,65,.1);color:var(--green);}
.tm-b:active{transform:scale(.96);}
/* week cards */
.wk-card{padding:16px 18px;margin-bottom:13px;}
.wk-head{display:flex;align-items:center;gap:11px;margin-bottom:10px;}
.wk-tag{flex:none;width:42px;height:42px;border-radius:12px;background:var(--c);color:#fff;font-size:15px;font-weight:900;display:grid;place-items:center;box-shadow:0 8px 16px -8px var(--c);}
.wk-ht{flex:1;min-width:0;}
.wk-phase{font-size:10.5px;font-weight:800;color:var(--green-soft);}
.wk-title{font-size:13.5px;font-weight:800;color:var(--green-deep);line-height:1.35;margin-top:2px;}
.wk-desc{font-size:12px;color:var(--ink-soft);line-height:1.65;background:rgba(49,97,65,.04);border-radius:10px;padding:9px 12px;margin-bottom:9px;}
.wk-meta{display:flex;align-items:center;gap:8px;font-size:11.5px;margin-bottom:9px;}
.wk-k{font-weight:800;color:var(--green);flex:none;}
.wk-v{font-weight:700;color:var(--ink-soft);}
.wk-deliv{background:rgba(242,183,5,.08);border:1px solid rgba(242,183,5,.28);border-radius:12px;padding:10px 13px;margin-bottom:11px;}
.wk-dh{font-size:11.5px;font-weight:800;color:var(--gold-deep);margin-bottom:5px;}
.wk-deliv ul{padding-left:17px;font-size:11.5px;color:var(--ink-soft);line-height:1.7;}
/* 我的 sub-heading + backup */
.section-sub{font-size:14px;font-weight:900;color:var(--green-deep);margin:6px 2px 10px;display:flex;align-items:center;gap:7px;}
.bk-btn{font-size:12.5px;font-weight:800;padding:11px 16px;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--green),var(--green-soft));color:#fff;box-shadow:0 10px 22px -12px rgba(49,97,65,.6);transition:.2s;display:inline-flex;align-items:center;gap:6px;}
.bk-btn.ghost{background:var(--glass-2);color:var(--green);border:1px solid var(--glass-line);box-shadow:var(--shadow-sm);}
.bk-btn:active{transform:scale(.97);}
/* segmented + add + cards (复盘) */
.seg{display:flex;gap:6px;background:var(--glass-2);border:1px solid var(--glass-line);border-radius:14px;padding:5px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
.seg-b{flex:1;text-align:center;font-size:13px;font-weight:800;color:var(--ink-soft);padding:9px;border-radius:10px;cursor:pointer;transition:.2s;}
.seg-b.on{background:linear-gradient(135deg,var(--green),var(--green-soft));color:#fff;box-shadow:0 8px 18px -8px rgba(49,97,65,.5);}
.add-btn{width:100%;font-size:13.5px;font-weight:800;padding:13px;border-radius:14px;border:1.5px dashed rgba(49,97,65,.4);background:rgba(49,97,65,.05);color:var(--green);cursor:pointer;margin-bottom:14px;transition:.2s;}
.add-btn:hover{background:rgba(49,97,65,.1);}.add-btn:active{transform:scale(.99);}
.empty-tip{font-size:12.5px;color:var(--muted);line-height:1.7;text-align:center;padding:24px 16px;background:var(--glass);border:1px dashed var(--glass-line);border-radius:14px;}
.mk-card{background:var(--glass-3);border:1px solid var(--glass-line);border-radius:14px;padding:13px 15px;margin-bottom:9px;box-shadow:var(--shadow-sm);animation:popin .35s both;}
.mk-top{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.mk-subj{font-size:10px;font-weight:800;color:#fff;padding:2px 9px;border-radius:7px;}
.mk-date{font-size:11px;color:var(--muted);font-weight:700;}
.mk-cause{font-size:10px;font-weight:800;color:var(--green);background:rgba(49,97,65,.1);padding:2px 8px;border-radius:7px;}
.mk-del{margin-left:auto;color:var(--muted);font-size:13px;cursor:pointer;width:24px;height:24px;display:grid;place-items:center;border-radius:50%;transition:.2s;}
.mk-del:hover{background:rgba(232,120,120,.15);color:#E87878;}
.mk-item{font-size:13px;font-weight:700;color:var(--ink);line-height:1.5;}
.mk-fix{font-size:11.5px;color:var(--ink-soft);line-height:1.6;margin-top:6px;background:rgba(49,97,65,.05);border-radius:9px;padding:8px 11px;}
.mk-fix b{color:var(--green);}
.mock-scores{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);font-weight:600;align-items:center;}
.mock-scores b{color:var(--green-deep);font-weight:900;font-size:13.5px;}
.mock-scores .ov{margin-left:auto;font-weight:900;color:var(--green);background:rgba(49,97,65,.1);padding:2px 10px;border-radius:8px;}
.mk-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:10px;color:var(--muted);font-weight:700;margin-top:9px;align-items:center;}
.mk-legend span{display:inline-flex;align-items:center;gap:4px;}
.mk-legend i{width:11px;height:3px;border-radius:2px;display:inline-block;}
/* 今日页 日期条 + 提示条 */
.daystrip{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px;scrollbar-width:none;margin:0 -2px;}
.daystrip::-webkit-scrollbar{display:none;}
.dchip{position:relative;flex:none;min-width:56px;text-align:center;padding:9px 12px;border-radius:14px;background:var(--glass-2);border:1px solid var(--glass-line);cursor:pointer;transition:.18s;box-shadow:var(--shadow-sm);}
.dchip:active{transform:scale(.95);}
.dchip .dd{font-size:13px;font-weight:900;color:var(--green-deep);line-height:1;}
.dchip .dm{font-size:9.5px;font-weight:700;color:var(--muted);margin-top:3px;}
.dchip .dck{margin-left:2px;font-size:10px;}
.dchip.done{background:rgba(49,97,65,.1);}
.dchip.sel{background:linear-gradient(135deg,var(--green),var(--green-soft));border-color:transparent;box-shadow:0 8px 18px -8px rgba(49,97,65,.5);}
.dchip.sel .dd,.dchip.sel .dm{color:#fff;}
.dchip .td-dot{position:absolute;top:5px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 2px #fff;}
.nav-banner{display:flex;align-items:center;gap:8px;background:rgba(242,183,5,.12);border:1px solid rgba(242,183,5,.34);border-radius:12px;padding:9px 13px;margin-bottom:13px;font-size:12px;font-weight:700;color:#7a5a08;}
.nb-btn{margin-left:auto;flex:none;font-size:11.5px;font-weight:800;color:#fff;background:var(--green);border:none;border-radius:9px;padding:6px 13px;cursor:pointer;transition:.2s;}
.nb-btn:active{transform:scale(.95);}
.how-tip{font-size:12px;color:var(--ink-soft);line-height:1.7;background:rgba(91,150,214,.1);border:1px solid rgba(91,150,214,.28);border-radius:12px;padding:11px 13px;margin-bottom:11px;}
/* 任务弹窗里的「开始背词」按钮 */
.vocab-go{display:flex;align-items:center;gap:12px;width:100%;margin:2px 0 14px;padding:13px 15px;border:none;cursor:pointer;border-radius:16px;background:linear-gradient(135deg,var(--green),var(--green-soft));box-shadow:0 12px 26px -12px rgba(49,97,65,.55);transition:.2s;text-align:left;}
.vocab-go:active{transform:scale(.98);}
.vocab-go .vg-ic{font-size:22px;flex:none;}
.vocab-go .vg-tx{flex:1;display:flex;flex-direction:column;color:#fff;}
.vocab-go .vg-tx b{font-size:15px;font-weight:900;}
.vocab-go .vg-sub{font-size:11px;font-weight:600;opacity:.86;margin-top:2px;}
.vocab-go .vg-arr{flex:none;color:#fff;font-size:13px;opacity:.85;}
.vocab-hint{display:flex;gap:9px;align-items:flex-start;background:rgba(91,150,214,.1);border:1px solid rgba(91,150,214,.28);border-radius:14px;padding:11px 13px;margin:2px 0 14px;font-size:12px;font-weight:600;color:var(--ink-soft);line-height:1.6;}
.vocab-hint .vh-ic{font-size:16px;flex:none;}
/* 背词全屏覆盖层 */
.vocab-overlay{position:fixed;inset:0;z-index:400;display:flex;flex-direction:column;background:linear-gradient(165deg,#F4F1EA 0%,#EAEFF3 52%,#E8ECF3 100%);opacity:0;visibility:hidden;transform:translateY(14px);transition:opacity .26s,transform .26s,visibility .26s;overflow:hidden;}
.vocab-overlay.open{opacity:1;visibility:visible;transform:none;}
.vocab-overlay::before{content:"";position:absolute;top:-12%;right:-8%;width:62%;height:42%;background:radial-gradient(circle,rgba(155,127,201,.16),transparent 70%);filter:blur(20px);pointer-events:none;}
.vov-head{flex:none;display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top) + 16px) 18px 12px;}
.vov-x{flex:none;width:38px;height:38px;border-radius:12px;border:1px solid var(--glass-line);background:var(--glass-3);font-size:16px;color:var(--ink);cursor:pointer;box-shadow:var(--shadow-sm);}
.vov-x:active{transform:scale(.93);}
.vov-tt{display:flex;flex-direction:column;}
.vov-tt h3{font-size:18px;font-weight:900;color:var(--green-deep);letter-spacing:.3px;}
.vov-tt span{font-size:11.5px;font-weight:700;color:var(--muted);margin-top:1px;}
.vov-bar{flex:none;display:flex;align-items:center;gap:10px;padding:4px 18px 8px;}
.vseg{display:flex;background:var(--glass-2);border:1px solid var(--glass-line);border-radius:13px;padding:3px;box-shadow:var(--shadow-sm);}
.vseg-b{border:none;background:transparent;font-size:12.5px;font-weight:800;color:var(--ink-soft);padding:7px 15px;border-radius:10px;cursor:pointer;transition:.18s;}
.vseg-b.on{background:linear-gradient(135deg,var(--green),var(--green-soft));color:#fff;box-shadow:0 6px 14px -7px rgba(49,97,65,.6);}
.vov-all{margin-left:auto;border:1px solid var(--glass-line);background:var(--glass-3);font-size:12px;font-weight:800;color:var(--green-deep);padding:8px 13px;border-radius:11px;cursor:pointer;}
.vov-all:active{transform:scale(.95);}
.vov-prog{flex:none;display:flex;align-items:center;gap:11px;padding:2px 20px 12px;}
.vov-pl{font-size:11.5px;font-weight:800;color:var(--ink-soft);white-space:nowrap;}
.vov-track{flex:1;height:7px;border-radius:5px;background:rgba(49,97,65,.12);overflow:hidden;}
.vov-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--green-soft),var(--green));transition:width .4s;}
.vgrid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(2,1fr);gap:11px;padding:4px 16px calc(env(safe-area-inset-bottom) + 22px);-webkit-overflow-scrolling:touch;}
.vcard{position:relative;background:var(--glass-3);border:1px solid var(--glass-line);border-radius:16px;padding:11px 12px 12px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;}
.vcard.mastered{background:rgba(49,97,65,.07);border-color:rgba(49,97,65,.2);}
.vc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.vc-tools{display:flex;align-items:center;gap:6px;}
.vc-spk{width:26px;height:26px;border-radius:50%;border:1px solid var(--glass-line);background:#fff;font-size:13px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;box-shadow:var(--shadow-sm);transition:.16s;}
.vc-spk:active{transform:scale(.85);background:rgba(91,150,214,.14);}
.vc-spk.spk-on{background:var(--sk-read);border-color:var(--sk-read);transform:scale(1.12);}
.vtoast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 28px);transform:translateX(-50%) translateY(8px);z-index:600;background:rgba(42,45,51,.94);color:#fff;font-size:12.5px;font-weight:700;padding:10px 16px;border-radius:12px;box-shadow:0 12px 30px -10px rgba(0,0,0,.5);opacity:0;visibility:hidden;transition:opacity .25s,transform .25s,visibility .25s;max-width:80vw;text-align:center;}
.vtoast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}
.vov-auto{border:1px solid var(--glass-line);background:var(--glass-3);font-size:12px;font-weight:800;color:var(--ink-soft);padding:8px 12px;border-radius:11px;cursor:pointer;transition:.18s;white-space:nowrap;}
.vov-auto.on{background:rgba(91,150,214,.16);border-color:rgba(91,150,214,.4);color:var(--sk-read);}
.vov-auto:active{transform:scale(.95);}
.vc-num{font-size:10px;font-weight:800;color:var(--muted);}
.vc-ck{width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(49,97,65,.3);background:#fff;color:transparent;font-size:13px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.18s;padding:0;}
.vc-ck.on{background:var(--green);border-color:var(--green);color:#fff;}
.vc-ck:active{transform:scale(.88);}
.vc-prompt{flex:none;margin-bottom:9px;}
.vc-en{font-size:17px;font-weight:800;color:var(--ink);line-height:1.25;font-family:var(--serif);}
.vc-ipa{font-size:11.5px;color:var(--sk-read);font-weight:600;margin-top:2px;}
.vc-pos{display:inline-block;font-size:10px;font-weight:700;color:var(--muted);background:rgba(49,97,65,.08);padding:1px 6px;border-radius:6px;margin-top:4px;}
.vc-zhp{font-size:15.5px;font-weight:800;color:var(--ink);line-height:1.4;}
.vc-zh{font-size:13.5px;font-weight:700;color:var(--green-deep);line-height:1.45;}
.vc-ans{position:relative;margin-top:0;border-top:1px dashed rgba(49,97,65,.18);padding-top:9px;cursor:pointer;min-height:34px;display:flex;align-items:center;}
.vc-ansin{filter:blur(7px);opacity:.45;transition:filter .22s,opacity .22s;user-select:none;}
.vc-ans.show .vc-ansin{filter:none;opacity:1;user-select:auto;}
.vc-tap{position:absolute;left:50%;top:calc(50% + 4px);transform:translate(-50%,-50%);font-size:11px;font-weight:800;color:var(--green-soft);background:rgba(255,255,255,.7);padding:3px 10px;border-radius:8px;pointer-events:none;transition:opacity .2s;white-space:nowrap;}
.vc-ans.show .vc-tap{opacity:0;}
.vov-foot{flex:none;padding:9px 20px calc(env(safe-area-inset-bottom) + 10px);font-size:10.5px;font-weight:600;color:var(--muted);text-align:center;background:linear-gradient(0deg,rgba(244,241,234,.95),transparent);}
.vov-empty{grid-column:1/-1;text-align:center;color:var(--muted);font-size:13px;font-weight:700;padding:40px;}
/* 三套资料：单列 + 句子/逻辑词/同义替换 */
.vgrid-1{grid-template-columns:1fr;}
.vmode{display:flex;align-items:center;font-size:12.5px;font-weight:800;color:var(--green-deep);background:var(--glass-2);border:1px solid var(--glass-line);border-radius:13px;padding:9px 15px;box-shadow:var(--shadow-sm);}
.vcat{grid-column:1/-1;font-size:11.5px;font-weight:900;color:var(--gold-deep);margin:8px 2px 0;letter-spacing:.04em;text-transform:none;}
.vc-arrow{color:var(--sk-read);font-weight:900;padding:0 2px;}
.vc-syn{font-size:15px;font-weight:800;color:var(--green-deep);line-height:1.55;}
.vc-conn{color:var(--green-deep);}
.vc-ex{font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.6;font-family:var(--serif);}
.vc-sentq{font-size:16px;font-weight:800;color:var(--ink);line-height:1.55;}
.vc-senta{font-size:14.5px;font-weight:700;color:var(--green-deep);line-height:1.62;font-family:var(--serif);}
.vgrid-1 .vc-en{font-size:18px;}
.how-tip b{color:var(--green);font-weight:800;}
.mk-card.demo{border-style:dashed;border-color:rgba(49,97,65,.35);background:rgba(255,255,255,.55);opacity:.92;position:relative;}
.demo-badge{margin-left:auto;font-size:9.5px;font-weight:800;color:#fff;background:var(--muted);padding:2px 9px;border-radius:7px;}
.form-eg{font-size:11.5px;color:var(--ink-soft);line-height:1.65;background:rgba(242,183,5,.1);border:1px solid rgba(242,183,5,.3);border-radius:11px;padding:10px 12px;margin-bottom:14px;}
.form-eg b{color:var(--green-deep);font-weight:800;}
.fld{margin-bottom:13px;}
.fld label{display:block;font-size:11.5px;font-weight:800;color:var(--green);margin-bottom:6px;}
.fld input,.fld textarea{width:100%;border:1px solid var(--glass-line);border-radius:11px;background:rgba(255,255,255,.7);padding:10px 12px;font-size:13px;color:var(--ink);font-family:var(--sans);outline:none;transition:.2s;}
.fld input:focus,.fld textarea:focus{border-color:var(--green-soft);box-shadow:0 0 0 3px rgba(49,97,65,.12);}
.opt-row{display:flex;gap:7px;flex-wrap:wrap;}
.opt{font-size:12px;font-weight:700;color:var(--ink-soft);background:var(--glass-2);border:1px solid var(--glass-line);padding:7px 13px;border-radius:999px;cursor:pointer;transition:.2s;}
.opt.on{background:var(--green);color:#fff;border-color:var(--green);}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.hsk{grid-template-columns:92px 1fr 40px;}

<div class="profile-row"><div class="profile-key">课程服务</div><div class="profile-val">本次档案未注明固定作文批改篇数或口语陪练时长；系统按“课程配合 + 自主执行 + 口语题库App录音”设计。如后续另购作文批改/口语陪练，优先使用计划中标记的【作文批改候选】与阶段口语模拟任务。</div></div>
</div>
<div class="info-box" style="background:#EFF5F1;border:2px solid #316141"><strong style="color:#316141;font-size:14px">⚠️ Oliver 重要叮嘱（请Una先读这一段）：</strong><br/><br/>这不是短线速成计划。你10月有考试窗口，但每天可用时间只有1–3小时，且词汇记忆能力弱，所以系统会把任务拆成<strong>必做任务 + 可顺延任务</strong>。<br/><br/>① <strong style="color:#316141">目标6.5不能只靠上课。</strong>系统已经把每天要做的资料、范围、动作和完成标准拆开；老师可以提供规划和课程，但不能替代你完成默写、听写、作文订正、口语录音和错题复盘。<br/>② 如果当天只有1小时，优先完成标记为“🔴必做”的词汇/听写/输出任务；加做项可以顺延，但必须写入学习回执。<br/>③ 词汇记忆弱不是问题，问题是只看不写、错了不回炉。每天的错词和错句必须留下记录。<br/>④ 如果连续多周执行率不足、口语不录音、作文不订正，10月考试风险会明显增加，考试时间必须顺延。<br/><br/><strong style="color:#316141">今天不用想太多，先把系统里这几件事做完。每天时间不算多，所以不要跳过默写、听写、作文订正和口语录音。</strong></div>
<div class="info-box" style="background:#EAF1FA;border:2px solid #5B96D6;margin-top:10px"><strong style="color:#5B96D6;font-size:14px">🕐 1–3小时怎么安排（Una版本）：</strong><br/><br/>✅ <strong>只有1小时</strong>：只做“🔴必做”任务 + 学习回执，不做加做项。<br/>✅ <strong>有2小时</strong>：完成必做任务 + 1项听读/写作输出。<br/>✅ <strong>有3小时</strong>：完成全部任务，并把错词、错题、错句写入复盘。<br/><br/>每周默认预留1天弹性休息；如果本周休息日临时变化，把当天任务顺延到本周空档，不新增额外任务。</div>

<details class="info-box fold-card" style="background:#FBF4E0;border:2px solid #C8920A;margin-top:10px"><summary style="color:#C8920A;">💻 雅思机考模考入口</summary><div class="fold-body"><div style="font-size:11.5px;color:#444;line-height:1.8;margin-top:5px">

<details class="info-box fold-card" style="background:#EFF5F1;border:2px solid #316141;margin-top:12px"><summary style="color:#316141;">第一章：关于雅思你必须知道的事</summary><div class="fold-body"><div style="font-size:11.5px;color:#444;line-height:1.8">
普通雅思主要分为 <strong>2种考试类型（A/G）</strong> 和 <strong>9个分段</strong>。IELTS（International English Language Testing System）是一项用于考察母语为非英语使用者英语水平的国际化英语考试。雅思最终成绩以0-9分呈现，听力、阅读、写作、口语四项分别计分，再计算总分。考试通常包括听力、阅读、写作、口语四个部分。听力、阅读、写作一般在同一考试日连续完成；口语仍为线下一对一人人对话，具体日期、时间与地点以准考证为准。

</div>
</div></details>
<details class="info-box fold-card" style="background:#fff;border:1px solid #E1E7E2;margin-top:10px"><summary style="color:#5B96D6;">1. 报名 &amp; 费用</summary><div class="fold-body"><div style="font-size:11.5px;color:#444;line-height:1.8;margin-top:6px">报名方式：BC英国文化教育协会 - 雅思考试（IELTS）中文官方网站。报名时务必确认考试类型、考试模式、考点城市、证件信息与成绩用途。<br/><br/><strong>普通雅思考试和 IELTS for UKVI 的区别：</strong>UKVI 是用于英国签证及移民的雅思考试。考试内容与普通雅思基本一致，但报名用途、考点安排和费用政策不同。大部分本科、硕士留学申请通常选择普通雅思；若就读语言课、预科、中学、非学位课程或签证机构明确要求 UKVI，则应选择 IELTS for UKVI。<br/><br/><strong>考试结果及获取方式：</strong>机考成绩公布时间已优化为 1-5天，多数考生可在2天内查询到成绩，最快考后1天即可出分。纸笔考试成绩一般在笔试后第13天（自然日，遇节假日顺延）查询。成绩查询与成绩单寄送安排以报名网站和准考证信息为准。<table style="width:100%;border-collapse:collapse;font-size:11.5px;line-height:1.65;margin-top:8px"> <thead><tr><th style="padding:7px 8px;border:1px solid #DCE6DE;background:#EFF5F1;color:#316141;text-align:left;font-weight:700;vertical-align:top">项目</th><th style="padding:7px 8px;border:1px solid #DCE6DE;background:#EFF5F1;color:#316141;text-align:left;font-weight:700;vertical-align:top">最新费用与说明</th></tr></thead><tbody><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">雅思考试（IELTS）</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">自2026年1月1日起，学术类 / 培训类报名费统一调整为 <strong>1,990 元人民币</strong>。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">用于英国签证及移民的雅思考试（IELTS for UKVI）</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">自2026年1月1日起，学术类 / 培训类报名费统一调整为 <strong>1,990 元人民币</strong>。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">雅思生活技能类考试</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">费用维持 <strong>1,250 元人民币</strong> 不变。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">IDP雅思（中国大陆）</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff"><strong>1,890 元人民币</strong>，较BC便宜100元；仅提供机考，官网 <a class="inline-link" href="https://www.idpielts.cn/" rel="noopener noreferrer" target="_blank">www.idpielts.cn</a>。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">退考费 / 转考费</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">自2026年1月1日起统一调整为 <strong>380 元人民币</strong>。</td></tr></tbody></table></div>
</div></details>
<details class="info-box fold-card" style="background:#fff;border:1px solid #E1E7E2;margin-top:10px"><summary style="color:#2E8B6B;">1.1 雅思如何退考 / 1.2 雅思如何转考</summary><div class="fold-body"><div style="display:grid;grid-template-columns:1fr;gap:8px;margin-top:8px">
<div style="background:#fff;border-left:4px solid #2E8B6B;border-radius:8px;padding:10px 11px;margin-top:8px;border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee">
<strong style="color:#2E8B6B;font-size:12.5px">1.1 雅思如何退考</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">考生只能在教育部考试中心 IELTS 报名网站上取消报名。进入系统后点击“我的状态”，在对应考试记录中选择取消报名。报名截止日期之前可办理退考；系统会扣除退考费 380元，剩余考试费退回账户余额。退考后应按网站要求联系呼叫中心或完成退款手续。退款通常转入考生登记的银行账户或按官方流程处理。</div>
</div>
<div style="background:#fff;border-left:4px solid #2E8B6B;border-radius:8px;padding:10px 11px;margin-top:8px;border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee">
<strong style="color:#2E8B6B;font-size:12.5px">1.2 雅思如何转考</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">考生如需改变考试日期或考点，可在报名截止日期之前登录 IELTS 报名网站，在“我的状态”页面选择“转考”。自2026年1月1日起，转考费统一调整为 380元。每场考试的报名、转考和退考截止日期以报名系统显示为准。</div>
</div>
</div>
</div></details>
<details class="info-box fold-card" style="background:#fff;border:1px solid #E1E7E2;margin-top:10px"><summary style="color:#9B7FC9;">1.3 机考 vs 笔考：怎么选？</summary><div class="fold-body"><div style="font-size:11.5px;color:#444;line-height:1.8;margin-top:6px"><strong>最重大变化：纸笔考试将全面取消。</strong><br/>对考生而言，核心变化不是“要不要选机考”，而是必须提前适应机考输入、屏幕阅读、电脑作答和界面操作。习惯手写答题的考生，尤其要提前训练打字速度、屏幕阅读和写作编辑能力。<br/><br/>雅思官方已宣布，自2026年年中起，全球将不再提供纸笔雅思考试，所有考试统一为机考形式。中国大陆已明确：2026年6月28日起全面取消纸笔考试，2026年4-6月仅剩最后7场纸笔考试。<table style="width:100%;border-collapse:collapse;font-size:11.5px;line-height:1.65;margin-top:8px"> <thead><tr><th style="padding:7px 8px;border:1px solid #DCE6DE;background:#EFF5F1;color:#316141;text-align:left;font-weight:700;vertical-align:top">项目</th><th style="padding:7px 8px;border:1px solid #DCE6DE;background:#EFF5F1;color:#316141;text-align:left;font-weight:700;vertical-align:top">最新判断</th><th style="padding:7px 8px;border:1px solid #DCE6DE;background:#EFF5F1;color:#316141;text-align:left;font-weight:700;vertical-align:top">对备考的影响</th></tr></thead><tbody><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">考试形式</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">2026年年中起全球统一转向机考。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">机考不再是可选项，而是默认考试形态。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">Writing on Paper</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">部分市场过渡期可能推出机考中手写写作部分的选项。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">听力、阅读仍需电脑作答；写作是否可手写以考点实际开放为准。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">口语考试</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">仍为线下一对一人人对话。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">形式基本不变；时间与地点需以准考证为准。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">成绩公布</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">机考1-5天，多数2天内，最快1天。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">适合赶申请截止日期或需要快速刷分的考生。</td></tr></tbody></table></div>
</div></details>
<details class="info-box fold-card" style="background:#fff;border:1px solid #E1E7E2;margin-top:10px"><summary style="color:#316141;">1.3.1 Oliver有话说</summary><div class="fold-body"><div style="font-size:11.5px;color:#444;line-height:1.8;margin-top:6px"><table style="width:100%;border-collapse:collapse;font-size:11.5px;line-height:1.65;margin-top:8px"> <thead><tr><th style="padding:7px 8px;border:1px solid #DCE6DE;background:#EFF5F1;color:#316141;text-align:left;font-weight:700;vertical-align:top">项目</th><th style="padding:7px 8px;border:1px solid #DCE6DE;background:#EFF5F1;color:#316141;text-align:left;font-weight:700;vertical-align:top">机考最新信息</th><th style="padding:7px 8px;border:1px solid #DCE6DE;background:#EFF5F1;color:#316141;text-align:left;font-weight:700;vertical-align:top">备考建议</th></tr></thead><tbody><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">考试场次</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">几乎每日开考，一天多场，考位相对充足。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">优先选择自己状态最稳定的时段，不要只看“哪天最近”。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">报名截止</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">通常为考前3天。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">临时报名虽更灵活，但热门城市和热门时段仍建议提前锁定考位。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">口语时间</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">通常安排在笔试当天；特殊情况下可能不在同一天，口试和笔试地点也可能不同。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">准考证信息优先级最高，考前务必逐项核对。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">听力部分</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">没有纸笔考试的例题时间；录音结束后只有2分钟检查时间。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">边听边输入答案，不要把大量答案留到最后誊写。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">阅读部分</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">左侧文章、右侧题目；可调节字体大小和屏幕颜色；可高亮、备注、划删除线。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">训练屏幕阅读和工具使用，但高亮不宜过多。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">写作部分</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">系统自动统计字数；可剪切、复制、粘贴；无自动拼写检查。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">重点练键盘输入、段落调整和最后5分钟自查。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">考场物品</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">必须携带报名时完全一致的有效身份证件原件和准考证；电子设备需关机并寄存。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">水可携带透明无标签饮用水；其他物品按考点要求寄存。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">纸笔文具规则</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">中国大陆自2025年5月起纸笔考试已改用考点统一提供的黑色中性笔，不再提供铅笔和橡皮。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">写错只能划掉，无法擦除；过渡期仍参加纸笔的考生应提前用中性笔模拟。</td></tr></tbody></table></div>
</div></details>
<details class="info-box fold-card" style="background:#fff;border:1px solid #E1E7E2;margin-top:10px"><summary style="color:#5B96D6;">1.4 雅思单科重考（拼分）</summary><div class="fold-body"><div style="font-size:11.5px;color:#444;line-height:1.8;margin-top:6px">如果你在雅思机考某一科发挥失常，不一定要重新考四科。雅思机考单科重考允许考生在完成一次全科机考并取得成绩后，在规定时间内选择一个单科重新考试。<table style="width:100%;border-collapse:collapse;font-size:11.5px;line-height:1.65;margin-top:8px"> <thead><tr><th style="padding:7px 8px;border:1px solid #DCE6DE;background:#EFF5F1;color:#316141;text-align:left;font-weight:700;vertical-align:top">规则</th><th style="padding:7px 8px;border:1px solid #DCE6DE;background:#EFF5F1;color:#316141;text-align:left;font-weight:700;vertical-align:top">最新说明</th></tr></thead><tbody><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">适用对象</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">仅适用于参加过全科雅思机考并收到成绩单的考生；纸笔考生暂无法参加单科重考。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">报名时限</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">自最近一次全科机考日（即原成绩单上注明的考试日期）起60天内，可注册并参加一次单科重考。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">证件要求</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">必须使用与最近一次全科机考相同的身份证件报名并参加单科重考。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">成绩使用</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">单科重考成绩单不能单独使用，必须与原成绩单配合使用。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">考点城市</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">2026年仍仅在北京、上海、广州、重庆四个城市的英国文化教育协会办公室考点开放；其他城市暂未开放。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">考点数量</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">2026年各城市考点数量有所增加，例如北京新增国贸商圈考点和嘉华世达（崇文门）考点，可根据地理位置就近选择。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">费用</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">报名费1,400元人民币不变；退考费更新为380元人民币。</td></tr></tbody></table><br/><strong>是否建议单科重考？</strong><br/>如果只有一个单项明显拖后腿，且目标院校认可单科重考成绩，单科重考的性价比通常高于四科重考。报名之前务必与成绩接收机构确认是否接受该成绩，尤其是申请截止日期临近时。<br/><br/><strong>1.4.1 雅思机考单科重考认可机构：</strong><br/>已有超过1,100所院校机构认可雅思机考单科重考成绩，覆盖英、美、加、澳、新、欧洲、亚洲等国家和地区，且认可机构数量仍在增加。注意：不是所有大学都认可单科重考，最终以申请学校或成绩接收机构的确认结果为准。</div>
</div></details>
<details class="info-box fold-card" style="background:#FBF4E0;border:1px solid #C8920A;margin-top:10px"><summary style="color:#C8920A;">1.5 成绩复议</summary><div class="fold-body"><div style="font-size:11.5px;color:#444;line-height:1.8;margin-top:6px">若对成绩有异议，考生需在收到成绩单后登录教育部考试中心雅思报名网站个人主页，在线申请成绩复议服务并支付复议费 1,400元。<br/>复议服务申请时限为成绩公布后4周（28个自然日）。若复议结果高于原成绩，复议费用全数退还；若成绩相同或低于原分数，费用不予退还。<br/>复议流程已优化，整体时效提升约25%；纸笔复议已提速至21天内完成。</div>
</div></details>
<details class="info-box fold-card" style="background:#fff;border:2px solid #316141;margin-top:12px"><summary style="color:#316141;">1.6 备考误区（升级版）</summary><div class="fold-body"><div style="font-size:11.5px;color:#444;line-height:1.8;margin-top:6px">下面10个误区不是“鸡汤提醒”，而是备考过程中最容易浪费时间、制造焦虑、导致分数停滞的真实问题。</div>
<div style="background:#fff;border:1px solid #E1E7E2;border-radius:8px;padding:10px 11px;margin-top:8px">
<strong style="color:#316141;font-size:12.5px">1. “雅思就跟普通英语考试一样，考前冲一下就好了。”</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">这个观点最大的问题在于，它把雅思当成知识点测验，而雅思本质上是语言能力测试。大学四六级往往可以通过刷真题、背模板短期过关，但雅思四项全能考察——听、说、读、写，每项都要求你实实在在能够输入和输出英语。打个比方，突击复习或许能让你在几天内背诵大量历史事件，但你不可能在几天内学会游泳。雅思考试里的口语和写作，就是检验你是否真的“会游泳”。备考周期建议为1-3个月，前提是词汇和语法基础已经打牢。否则，就像没有水泥就直接贴瓷砖，迟早会掉。</div>
</div><div style="background:#fff;border:1px solid #E1E7E2;border-radius:8px;padding:10px 11px;margin-top:8px">
<strong style="color:#316141;font-size:12.5px">2. “备考时间越长，分数越高。”</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">目前并没有大数据表明备考时长和分数呈正相关，就像高考复读并不一定能提分。语言学习存在“平台期”——进步很快，然后停滞，然后再次进步。如果备考时间拉得太长（超过6个月），很容易产生倦怠感和自我怀疑，甚至出现“越学越退步”的错觉。因此，Oliver建议最长备考周期不超过4个月（四级基础左右），集中火力、限时突破，比拉长战线更有效。</div>
</div><div style="background:#fff;border:1px solid #E1E7E2;border-radius:8px;padding:10px 11px;margin-top:8px">
<strong style="color:#316141;font-size:12.5px">3. “基础不好/自制力不好 = 要去报班。”</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">基础薄弱确实可以针对性地补，但不等于必须报班。学习本质上是个人认知过程的产物，老师可以给你铺路，但路得自己走。同理，自制力差的根本问题在于时间管理和内在驱动力，如果这个问题不解决，报班只是花钱买安慰——你会发现自己开始逃课、不做作业，然后抱怨课程没用。先自我诊断：你到底是缺少方向，还是缺少行动？前者可通过几节一对一课程快速获得方向；后者则需要建立学习习惯，与报班无关。</div>
</div><div style="background:#fff;border:1px solid #E1E7E2;border-radius:8px;padding:10px 11px;margin-top:8px">
<strong style="color:#316141;font-size:12.5px">4. “其他考试我可以搞定，雅思我也可以自学。”</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">雅思和国内英语考试的核心差异在于输出项占比极重。高考、四六级哪怕口语和写作弱，还可以靠阅读听力拉分。但雅思是四个单项单独计分，任何一个短板都会直接拖后腿。更重要的是，口语和写作这两项输出技能，在没有外部反馈的情况下很难自己发现系统性错误。自学的同学往往在阅读和听力上没问题，但在口语和写作上容易出现“练了很多却没有进步”的情况——因为你可能在不断重复同样的错误。详细对比见第6章的6.3节。</div>
</div><div style="background:#fff;border:1px solid #E1E7E2;border-radius:8px;padding:10px 11px;margin-top:8px">
<strong style="color:#316141;font-size:12.5px">5. “英语和雅思题目练的越多越好。”</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">刷题本身没有错，但无脑刷题只是在巩固你现有的水平，不会让你变强。雅思提分的关键在于质量而非数量：每做完一套题，能否精确地说出每一道错题的错误原因？是词汇不认识？定位不准？还是被干扰选项误导了？只有把错题研究透了，下次遇到同类陷阱才能避开。建议每做1套题，花2倍的时间复盘。错题不总结，等于白做。</div>
</div><div style="background:#fff;border:1px solid #E1E7E2;border-radius:8px;padding:10px 11px;margin-top:8px">
<strong style="color:#316141;font-size:12.5px">6. “单词背的越多越好。”</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">词汇量确实是雅思的基础，但不同分数段对词汇的需求是不同的。目标6分的考生，不需要花大量时间去背低频学术词汇；目标7分以上的考生，则需要更多服务于写作和口语的积极词汇（即你能主动使用的词）。考官偏爱的是准确、恰当、地道的词汇使用，而非生僻词。简单说，用一个简单的词用对位置，远比用一个高级词用错位置强。备考写作和口语时，重点应放在：这个词在什么语境下用？和哪个词搭配？有没有更地道的表达方式？这些比单纯追求词汇量更重要。</div>
</div><div style="background:#fff;border:1px solid #E1E7E2;border-radius:8px;padding:10px 11px;margin-top:8px">
<strong style="color:#316141;font-size:12.5px">7. “听力精听可以提分。”</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">精听确实是非常有效的训练方法，但有门槛。如果你的听力目标分数在7分以下，问题往往不在于听不听得清，而在于听到了但反应不过来，或者判断不出答案。这种情况下，把有限的备考时间花在研究题型规律、分析错因、抓定位词和同义替换上，提分效率要比精听高出很多。精听更适合听力已稳定在6.5-7分、想要突破瓶颈冲8分的考生。</div>
</div><div style="background:#fff;border:1px solid #E1E7E2;border-radius:8px;padding:10px 11px;margin-top:8px">
<strong style="color:#316141;font-size:12.5px">8. “口语套模板/背诵可以拿高分。”</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">这一点Oliver想特别强调：国内考官已经被各种模板训练得“百毒不侵”了。你只要说第一句“With the development of society...”，考官已经在心里给你扣了分。背答案最大的破绽不是内容，而是你的眼神、语气和流畅度——真实交流中的停顿和回忆式停顿，考官能一秒辨别。目标6分以下可以用一些固定句型保底，但如果你想上6分，那就必须放弃明显的模板痕迹，用真正属于自己的自然表达。</div>
</div><div style="background:#fff;border:1px solid #E1E7E2;border-radius:8px;padding:10px 11px;margin-top:8px">
<strong style="color:#316141;font-size:12.5px">9. “写作/口语可以突击冲分。”</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">这是备考雅思最危险的幻觉。写作和口语是输出型技能，需要调动你多年积累的词汇、语法和思维组织能力。输入（阅读听力）或许能短期突击，但输出就像种树——你今天种下去，不可能明天就吃果子。举个例子，写作中哪怕你背了再多范文，但没有经过反复的笔头练习和纠错，考场上一紧张就会原形毕露。所以，不要把写作和口语留到最后一个月才开始准备，从备考第一天就要接触、练习。</div>
</div><div style="background:#fff;border:1px solid #E1E7E2;border-radius:8px;padding:10px 11px;margin-top:8px">
<strong style="color:#316141;font-size:12.5px">10. “写作/口语题一定要练很多才能考高分。”</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">这和误区9正好是另一个极端。练得多不等于练得对。如果你每次写作文都是沿着自己习惯的错误路线走，写10篇和写1篇本质没有区别。关键在于每一次练习后是否能发现自己的“规律性错误”——比如总是用错某个句型、分不清可数不可数、逻辑跳跃——然后在下一次练习中刻意避免。这样，练一道题就有一道题的效果，否则辛辛苦苦写的都是无效练习。</div>
</div>
</div></details>
<details class="info-box fold-card" style="background:#F0EAF7;border:2px solid #9B7FC9;margin-top:12px"><summary style="color:#9B7FC9;">第二章：雅思机考必须知道的事</summary><div class="fold-body"><div style="font-size:11.5px;color:#444;line-height:1.8">机考不是把纸笔考试搬到电脑上，而是把“读题、定位、标记、排除、检查”全部界面化。后续所有模考与考前训练，都应主动适应机考界面。</div>
</div></details>
<details class="info-box fold-card" style="background:#fff;border:1px solid #E1E7E2;margin-top:10px"><summary style="color:#5B96D6;">2.1 考前准备与考试流程</summary><div class="fold-body"><div style="background:#fff;border-left:4px solid #5B96D6;border-radius:8px;padding:10px 11px;margin-top:8px;border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee">
<strong style="color:#5B96D6;font-size:12.5px">关键时间点</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">机考准考证可在笔试前2天登录官网下载打印。强烈建议考前一天去考点实地踩点，规划好路线。机考分上、下午及晚场，入场截止时间分别为8:30、13:30、17:30，迟到会直接取消考试资格且无法退费，务必预留充足时间。</div>
</div>
<div style="background:#fff;border-left:4px solid #5B96D6;border-radius:8px;padding:10px 11px;margin-top:8px;border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee">
<strong style="color:#5B96D6;font-size:12.5px">必带与禁带物品</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">必须携带与报名时完全一致的有效身份证件原件和准考证。可以带一瓶完全撕掉标签的透明饮用水。所有电子设备（手机、手表等）必须关机并寄存，考试全程禁止携带。</div>
</div>
<div style="background:#fff;border-left:4px solid #5B96D6;border-radius:8px;padding:10px 11px;margin-top:8px;border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee">
<strong style="color:#5B96D6;font-size:12.5px">入场后流程</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">依次完成身份核验、指纹录入和现场拍照，然后对号入座。入座后，使用监考人员发放的登录单（含用户名和密码）登录系统，务必核对个人信息。之后可点击“Settings”键，将字体和屏幕颜色调整为最舒适的状态。</div>
</div>
</div></details>
<details class="info-box fold-card" style="background:#fff;border:1px solid #E1E7E2;margin-top:10px"><summary style="color:#2E8B6B;">2.2 各科目深度解析与核心技巧</summary><div class="fold-body"><div style="background:#fff;border-left:4px solid #5B96D6;border-radius:8px;padding:10px 11px;margin-top:8px;border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee">
<strong style="color:#5B96D6;font-size:12.5px">听力理解</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">关键差异：没有纸笔考试的例题时间；录音结束后只有2分钟检查时间，而非10分钟。开始前点击 Play Sound 进行试音，确保耳机和音量正常。尽量边听边直接在电脑上作答，不要全部留到最后2分钟誊写。按 Tab 键可快速跳到下一题。对于匹配题，直接拖拽选项到对应位置即可。</div>
</div>
<div style="background:#fff;border-left:4px solid #2E8B6B;border-radius:8px;padding:10px 11px;margin-top:8px;border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee">
<strong style="color:#2E8B6B;font-size:12.5px">阅读理解</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">关键差异：界面采用左右分屏，左侧文章、右侧题目，节省翻页时间。善用高亮（Highlight）功能标记关键信息，但不宜过多，一篇文章5-7处为佳，以免失去重点。遇到复杂句子或段落，可用备注（Note）功能快速记录总结或推理过程。判断题或多选题中，可对确定错误的选项使用删除线，简化决策。标题配对题等题型需将答案直接拖拽到文章中对应位置。</div>
</div>
<div style="background:#fff;border-left:4px solid #316141;border-radius:8px;padding:10px 11px;margin-top:8px;border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee">
<strong style="color:#316141;font-size:12.5px">写作表达</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">关键差异：系统自动统计字数，并能剪切、复制、粘贴，方便调整文章结构。无自动拼写检查，需自己留出时间仔细检查拼写和语法错误。作答区输入时，按 Enter 键不会跳到下一个空格，必须用鼠标手动点击。合理分配时间：Task 1 用20分钟，Task 2 用40分钟。</div>
</div>
<div style="background:#fff;border-left:4px solid #9B7FC9;border-radius:8px;padding:10px 11px;margin-top:8px;border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee">
<strong style="color:#9B7FC9;font-size:12.5px">口语交流</strong>
<div style="font-size:11.5px;color:#555;line-height:1.75;margin-top:4px">核心不变：口语考试依然是与真人考官一对一视频或面对面交流，无需为形式过度担心。口语可能和笔试不在同一天或同一地点，务必以准考证信息为准。Part 2 有一分钟准备时间，可用考场提供的纸笔写下关键词，构思演讲框架。</div>
</div>

<details class="info-box fold-card" style="background:#fff;border:1px solid #E1E7E2;margin-top:10px"><summary style="color:#9B7FC9;">2.3 机考核心功能一览</summary><div class="fold-body"><div style="font-size:11.5px;color:#444;line-height:1.8;margin-top:6px">以下功能最好在考前模拟系统中练熟。<table style="width:100%;border-collapse:collapse;font-size:11.5px;line-height:1.65;margin-top:8px"> <thead><tr><th style="padding:7px 8px;border:1px solid #DCE6DE;background:#EFF5F1;color:#316141;text-align:left;font-weight:700;vertical-align:top">功能</th><th style="padding:7px 8px;border:1px solid #DCE6DE;background:#EFF5F1;color:#316141;text-align:left;font-weight:700;vertical-align:top">如何操作</th><th style="padding:7px 8px;border:1px solid #DCE6DE;background:#EFF5F1;color:#316141;text-align:left;font-weight:700;vertical-align:top">最佳用途</th></tr></thead><tbody><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">高亮（Highlight）</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">选中文本后右键点击“Highlight”或使用快捷键（如 Ctrl+H）。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">标记题干和原文中的定位词，如人名、地名、数字等，以便快速回读。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">备注（Note）</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">选中文本后右键点击“Note”或使用快捷键（如 Ctrl+M）。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">记录答题思路、段落大意总结或标记不确定的题目，方便最后检查。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">删除线（Strikethrough）</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">选中文本后点击删除线图标或使用快捷键（如 Ctrl+S）。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">排除选择题或判断题中确定错误的选项，缩小选择范围。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">复查标记（Review）</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">点击屏幕下方题号旁的方框或右键选择。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">对不确定题目进行标记，题号会变为圆形，便于剩余时间快速回查。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">拖拽（Drag &amp; Drop）</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">用鼠标按住选项拖放到目标位置。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">完成匹配题、标题配对题；已用选项会自动消失，方便排除干扰。</td></tr><tr><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">字体/颜色设置（Settings）</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">点击屏幕右上角“Settings”按钮。</td><td style="padding:7px 8px;border:1px solid #DCE6DE;vertical-align:top;background:#fff">开考前根据个人习惯调整字体大小、屏幕颜色和背景，提升阅读舒适度。</td></tr></tbody></table></div>
</div></details>
<details class="info-box fold-card" style="background:#EFF5F1;border:2px solid #316141;margin-top:10px"><summary style="color:#316141;">2.4 考场纪律与避坑指南</summary><div class="fold-body"><div style="background:#fff;border-left:4px solid #316141;border-radius:8px;padding:10px 11px;margin-top:8px;border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee">

<div style="background:#fff;border-left:4px solid #316141;border-radius:8px;padding:10px 11px;margin-top:8px;border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee">

</div>
<div style="background:#fff;border-left:4px solid #316141;border-radius:8px;padding:10px 11px;margin-top:8px;border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee">

<details class="info-box fold-card" style="background:#EAF5EE;border:2px solid #2E8B6B;margin-top:10px"><summary style="color:#2E8B6B;">2.5 给机考新手的备考建议</summary><div class="fold-body"><div style="font-size:11.5px;color:#444;line-height:1.8;margin-top:6px">

<strong>练习屏幕阅读：</strong>日常多看英文电子文章，训练自己直接阅读长篇内容的能力。
