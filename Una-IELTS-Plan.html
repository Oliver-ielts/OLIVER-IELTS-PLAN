ation declined because the habitat was destroyed by urban expansion.","zh":"由于城市扩张破坏了栖息地，种群数量有所下降 。","cat":"因果关系"},{"n":2,"en":"since (因为/既然)","ex":"Since the new policy was introduced, unemployment rates have dropped significantly.","zh":"自从新政策实施以来，失业率显著下降。","cat":"因果关系"},{"n":3,"en":"as (由于)","ex":"As temperatures continue to rise, polar ice caps are melting at an alarming rate.","zh":"随着气温持续上升，极地冰盖正以惊人的速度融 化。","cat":"因果关系"},{"n":4,"en":"due to / owing to (由于)","ex":"The event was cancelled due to insufficient funding from sponsors.","zh":"由于赞助商资金不足，该活动被取消。","cat":"因果关系"},{"n":5,"en":"thanks to (幸亏/由于)","ex":"Thanks to innovative medical research, the survival rate has improved dramatically.","zh":"得益于创新的医学研究，存活率大幅提高。","cat":"因果关系"},{"n":6,"en":"on account of (鉴于/因为)","ex":"The flight was delayed on account of severe weather conditions at the destination airport.","zh":"鉴于目的地机场恶劣天气状况，航班被延误。","cat":"因果关系"},{"n":7,"en":"as a result (因此)","ex":"Investment in education increased; as a result, literacy rates improved nationwide.","zh":"教育投入增加，因此全国识字率随之提高。","cat":"因果关系"},{"n":8,"en":"therefore / thus / hence (因此/从而)","ex":"The data was inconclusive; therefore, further investigation is required.","zh":"数据尚无定论，因此需要进一步调查。","cat":"因果关系"},{"n":9,"en":"consequently ( consequently / 结果)","ex":"Consequently, many small businesses were forced to close during the economic downturn.","zh":"结果，许多小企业在经济低迷期间被迫关闭。","cat":"因果关系"},{"n":10,"en":"lead to / result in (导致)","ex":"Poor dietary habits can lead to various chronic health conditions in later life.","zh":"不良饮食习惯可能导致晚年出现各种慢性健康问 题。","cat":"因果关系"},{"n":11,"en":"bring about / cause (引起/造成)","ex":"Technological advancements have brought about fundamental changes in the workplace.","zh":"技术进步给工作场所带来了根本性变化。","cat":"因果关系"},{"n":12,"en":"trigger / provoke (触发/引发)","ex":"The new legislation triggered widespread debate among industry professionals.","zh":"新立法在行业专业人士中引发了广泛争论。","cat":"因果关系"},{"n":13,"en":"contribute to (促成/加剧)","ex":"Industrial emissions contribute to the deterioration of air quality in urban areas.","zh":"工业排放加剧了城市地区空气质量的恶化。","cat":"因果关系"},{"n":14,"en":"account for / be attributed to (归因于)","ex":"The rise in obesity can be partly attributed to increasingly sedentary lifestyles.","zh":"肥胖率上升部分归因于日益久坐的生活方式。","cat":"因果关系"},{"n":15,"en":"stem from / originate from (源于)","ex":"The conflict stems from a misunderstanding of cultural differences that had accumulated over decades.","zh":"这场冲突源于数十年来对文化差异的误解积累。","cat":"因果关系"},{"n":16,"en":"given that (考虑到/鉴于)","ex":"Given that resources are limited, we must prioritize the most vulnerable populations.","zh":"鉴于资源有限，我们必须优先照顾最脆弱的群体 。","cat":"因果关系"},{"n":17,"en":"resulting in (导致/结果是)","ex":"The factory released toxic chemicals into the river, resulting in massive fish mortality.","zh":"工厂向河流排放有毒化学物质，导致大量鱼类死 亡。","cat":"因果关系"},{"n":18,"en":"and / also / too / as well (和/也)","ex":"The solution is cost-effective and environmentally sustainable; it is also easy to implement.","zh":"该方案既经济高效又环境友好；而且实施起来也 很容易。","cat":"并列/附加"},{"n":19,"en":"as well as (以及/和)","ex":"She speaks fluent French as well as having a working knowledge of German and Italian.","zh":"她法语流利，此外还具备德语和意大利语的实用 知识。","cat":"并列/附加"},{"n":20,"en":"in addition (此外)","ex":"In addition to theoretical knowledge, practical skills are essential for this role.","zh":"除了理论知识外，实践技能对这一职位也至关重 要。","cat":"并列/附加"},{"n":21,"en":"besides (况且/此外)","ex":"I don't want to go out; besides, it is starting to rain heavily outside.","zh":"我不想出门；况且外面开始下大雨了。","cat":"并列/附加"},{"n":22,"en":"furthermore / moreover (而且/况且)","ex":"The plan is financially risky; furthermore, it lacks community support.","zh":"该计划在财务上存在风险，而且缺乏社区支持。","cat":"并列/附加"},{"n":23,"en":"what's more / additionally (另外/此外)","ex":"He is highly qualified; what's more, he has extensive field experience in developing countries.","zh":"他资历很高；另外，他还在发展中国家拥有丰富 的实地经验。","cat":"并列/附加"},{"n":24,"en":"plus (外加/而且)","ex":"The apartment is spacious, plus it comes with a fully equipped kitchen and free parking.","zh":"这套公寓很宽敞，外加还配有设施齐全的厨房和 免费停车位。","cat":"并列/附加"},{"n":25,"en":"likewise / similarly (同样地/类似地)","ex":"The first experiment failed; likewise, the second attempt produced no valid results.","zh":"第一次实验失败了，同样地，第二次尝试也未产 生有效结果。","cat":"并列/附加"},{"n":26,"en":"in the same way / by the same token (同样地)","ex":"Just as exercise benefits the body, meditation strengthens the mind in the same way.","zh":"正如运动有益于身体，冥想也以同样的方式强化 心智。","cat":"并列/附加"},{"n":27,"en":"equally / correspondingly (同样地/相 应地)","ex":"The new policy benefits urban residents; equally, it improves infrastructure in rural regions.","zh":"新政策惠及城市居民；相应地，它也改善了农村 地区的基础设施。","cat":"并列/附加"},{"n":28,"en":"not only...but also (不但…而且)","ex":"The program not only educates students but also empowers local communities through sustainable projects.","zh":"该项目不仅教育学生，而且通过可持续项目赋能 当地社区。","cat":"并列/附加"},{"n":29,"en":"both...and / neither...nor (既…又/既不 …也不)","ex":"Effective leaders exhibit both empathy and decisive judgment under pressure.","zh":"高效的领导者在压力下既表现出同理心，又具备 果断的判断力。","cat":"并列/附加"},{"n":30,"en":"apart from / coupled with (除了/加上)","ex":"Apart from its economic benefits, the project coupled with environmental safeguards has won public approval.","zh":"除了经济效益外，该项目加上环保保障措施赢得 了公众认可。","cat":"并列/附加"},{"n":31,"en":"along with / together with (连同/和… 一起)","ex":"The CEO, along with senior managers, attended the annual shareholders' meeting together with external auditors.","zh":"首席执行官连同高级经理们一起，和外部审计师 共同出席了年度股东大会。","cat":"并列/附加"},{"n":32,"en":"alternatively (或者/ alternatively)","ex":"You can submit your application online; alternatively, you may visit our office in person.","zh":"你可以在线提交申请；或者，你也可以亲自来我 们办公室办理。","cat":"并列/附加"},{"n":33,"en":"but / however / yet (但是/然而)","ex":"The theory is intriguing; however, it lacks sufficient empirical evidence to support its claims.","zh":"这个理论很有趣，然而它缺乏充分的实证证据来 支撑其主张。","cat":"对比/转折"},{"n":34,"en":"whereas / while (而/却)","ex":"Urban populations grew rapidly, whereas rural areas experienced significant demographic decline.","zh":"城市人口迅速增长，而农村地区却经历了显著的 人口下降。","cat":"对比/转折"},{"n":35,"en":"nevertheless / nonetheless (尽管如此)","ex":"The evidence was purely circumstantial; nevertheless, the jury reached a unanimous guilty verdict.","zh":"证据虽是间接的，尽管如此，陪审团仍一致作出 了有罪判决。","cat":"对比/转折"},{"n":36,"en":"still / even so / all the same (仍然/即使 如此)","ex":"The forecast predicted heavy rain; still, thousands of fans gathered outside the stadium even so.","zh":"天气预报说有大雨；即使如此，仍有数千名球迷 聚集在体育场外。","cat":"对比/转折"},{"n":37,"en":"conversely / on the contrary (相反地)","ex":"Some believe technology isolates us; conversely, it can enhance social connectivity when used intentionally.","zh":"有人认为科技使人孤立，相反地，当有意识地使 用时它实际上可以增强社会连接。","cat":"对比/转折"},{"n":38,"en":"in contrast / by contrast (相比之下)","ex":"In contrast to previous findings, this longitudinal study suggests no significant correlation between the two variables.","zh":"与以往发现相比，这项纵向研究表明两个变量之 间并无显著相关性。","cat":"对比/转折"},{"n":39,"en":"on the other hand (另一方面)","ex":"On the other hand, critics argue that the policy may inadvertently increase social inequality.","zh":"另一方面，批评者认为该政策可能无意中加剧社 会不平等。","cat":"对比/转折"},{"n":40,"en":"unlike / different from (不像/与…不同)","ex":"Unlike his predecessor, the new director favors a collaborative rather than authoritarian management style.","zh":"与他的前任不同，新总监偏爱协作式而非权威式 的管理风格。","cat":"对比/转折"},{"n":41,"en":"in comparison / compared to/with (与 …相比)","ex":"In comparison with last year's figures, this quarter's sales have increased by nearly twenty percent.","zh":"与去年数据相比，本季度销售额增长了近百分之 二十。","cat":"对比/转折"},{"n":42,"en":"instead / rather than (而不是/相反)","ex":"Instead of punishing offenders, the restorative justice system focuses on rehabilitation rather than retribution.","zh":"恢复性司法制度专注于改造而非惩罚，而不是简 单地惩处违法者。","cat":"对比/转折"},{"n":43,"en":"on the flip side (另一方面/反过来)","ex":"Remote work offers flexibility; on the flip side, it can blur the boundaries between personal and professional life.","zh":"远程工作提供了灵活性；但反过来，它也可能模 糊个人生活与职业生活的界限。","cat":"对比/转折"},{"n":44,"en":"having said that / that said (话虽如此)","ex":"The proposal seems promising; having said that, we must remain cautious about implementation costs.","zh":"该提案看起来很有前景；话虽如此，我们必须对 实施成本保持谨慎。","cat":"对比/转折"},{"n":45,"en":"despite this / notwithstanding (尽管如 此)","ex":"Notwithstanding the fierce competition, the startup secured substantial venture capital funding within its first year.","zh":"尽管竞争激烈，这家初创企业在成立第一年内就 获得了大量风险投资。","cat":"对比/转折"},{"n":46,"en":"although / though / even though (虽然 /尽管)","ex":"Although the methodology was sound, the sample size remained inadequate for generalizable conclusions.","zh":"虽然研究方法合理，但样本量仍然不足以得出可 推广的结论。","cat":"对比/转折"},{"n":47,"en":"even if (即使/纵然)","ex":"Even if the data is incomplete, preliminary trends are clearly visible and warrant further investigation.","zh":"即使数据不完整，初步趋势已清晰可见并值得进 一步调查。","cat":"对比/转折"},{"n":48,"en":"while (虽然/尽管)","ex":"While I understand your concerns, I must point out that the benefits substantially outweigh the potential risks involved.","zh":"虽然我理解你的担忧，但我必须指出收益大大超 过潜在风险。","cat":"对比/转折"},{"n":49,"en":"despite / in spite of (尽管)","ex":"Despite limited funding, the research team completed the project ahead of schedule with remarkable results.","zh":"尽管资金有限，研究团队仍提前完成了项目并取 得了显著成果。","cat":"对比/转折"},{"n":50,"en":"regardless of / irrespective of (不管/无 论)","ex":"The law applies equally to all citizens regardless of their social status or political affiliations.","zh":"法律平等适用于所有公民，不论其社会地位或政 治 affiliations 如何。","cat":"让步关系"},{"n":51,"en":"albeit (尽管/虽然)","ex":"The solution is effective, albeit somewhat expensive for small-scale operations.","zh":"该方案虽然有效，但对小规模运营来说有些昂贵 。","cat":"让步关系"},{"n":52,"en":"much as (尽管/虽然)","ex":"Much as I admire his courage, I cannot endorse his reckless approach to decision-making.","zh":"尽管我很钦佩他的勇气，但我无法认同他鲁莽的 决策方式。","cat":"让步关系"},{"n":53,"en":"for all (尽管)","ex":"For all its shortcomings, the traditional system has maintained remarkable stability over the past century.","zh":"尽管有种种缺点，传统系统在过去一个世纪里保 持了显著的稳定性。","cat":"让步关系"},{"n":54,"en":"notwithstanding (尽管)","ex":"Notwithstanding the adverse weather conditions, the outdoor concert proceeded as planned and attracted a full house.","zh":"尽管天气条件恶劣，户外音乐会仍按计划进行并 吸引了满座观众。","cat":"让步关系"},{"n":55,"en":"in any case / at any rate (无论如何)","ex":"In any case, we should proceed with the backup plan at any rate to ensure continuity.","zh":"无论如何，我们都应执行备用计划以确保连续性 。","cat":"让步关系"},{"n":56,"en":"even so / all the same (即使如此/仍然)","ex":"The evidence was weak; even so, the committee decided to approve the proposal all the same.","zh":"证据很薄弱；即使如此，委员会仍然决定批准该 提案。","cat":"让步关系"},{"n":57,"en":"be that as it may (即便如此)","ex":"Be that as it may, we cannot ignore the ethical implications of such a controversial experiment.","zh":"即便如此，我们也不能忽视这项有争议实验的伦 理影响。","cat":"让步关系"},{"n":58,"en":"admittedly / granted that (诚然/假定)","ex":"Admittedly, the proposal has flaws; granted that these are addressed, the benefits outweigh the risks.","zh":"诚然，该提案存在缺陷；假定这些问题得到解 决，收益大于风险。","cat":"让步关系"},{"n":59,"en":"it is true that...but (的确…但是)","ex":"It is true that the initial costs are high, but the long-term savings will more than compensate for this investment.","zh":"的确初始成本很高，但长期节省将远超补偿这项 投资。","cat":"让步关系"},{"n":60,"en":"first(ly) / second(ly) / third(ly) (第一/第 二/第三)","ex":"Firstly, we must identify the variables; secondly, we establish the control group; thirdly, we collect baseline data.","zh":"首先，我们必须确定变量；其次，建立对照组； 第三，收集基线数据。","cat":"让步关系"},{"n":61,"en":"next / then / afterwards (接下来/然后/ 之后)","ex":"The samples were collected from the field, then analyzed in the laboratory, and afterwards compared with historical records.","zh":"样本从现场采集，然后在实验室分析，之后与历 史记录进行比较。","cat":"让步关系"},{"n":62,"en":"after / before (在…之后/之前)","ex":"After completing the survey, participants were asked to sign consent forms before undergoing any medical examinations.","zh":"完成调查后，参与者被要求在进行任何医学检查 前签署知情同意书。","cat":"让步关系"},{"n":63,"en":"finally / lastly / in the end (最后/终于)","ex":"Finally, the results were compared with baseline measurements from 2010 to assess long-term trends.","zh":"最后，将结果与2010年的基线测量数据进行比 较，以评估长期趋势。","cat":"让步关系"},{"n":64,"en":"meanwhile / in the meantime (同时/在 此期间)","ex":"Meanwhile, the control group showed no significant changes in behavior during the same observation period.","zh":"与此同时，在同一观察期内对照组的行为没有显 著变化。","cat":"让步关系"},{"n":65,"en":"at the same time / simultaneously (同 时)","ex":"The two processes occur simultaneously at the same time, requiring careful coordination to avoid conflicts.","zh":"两个过程同时发生，需要仔细协调以避免冲突。","cat":"让步关系"},{"n":66,"en":"subsequently / eventually (随后/最终)","ex":"The company expanded rapidly into Asian markets, subsequently acquiring two smaller competitors and eventually dominating the sector.","zh":"公司迅速向亚洲市场扩张，随后收购了两家较小 的竞争对手，最终主导了该行业。","cat":"让步关系"},{"n":67,"en":"previously / formerly / prior to (先前/ 以前)","ex":"Previously, researchers had largely ignored the role of microplastics in soil; prior to 2015, few studies existed.","zh":"此前，研究人员在很大程度上忽视了微塑料在土 壤中的作用；2015年以前，相关研究寥寥无几。","cat":"时间/顺序"},{"n":68,"en":"until / by the time (直到)","ex":"The species was not protected until its population fell below critical levels recognized by conservationists.","zh":"直到该物种数量降至环保人士认可的临界水平以 下，才受到保护。","cat":"时间/顺序"},{"n":69,"en":"as soon as / once / the moment (一…就 /一旦)","ex":"As soon as the results are published, we will notify all participants once the peer review process is completed.","zh":"一旦结果发表且同行评审完成，我们将立即通知 所有参与者。","cat":"时间/顺序"},{"n":70,"en":"when / whenever (当…时/每当)","ex":"When the temperature exceeds thirty degrees, the system automatically activates cooling mechanisms whenever necessary.","zh":"当温度超过三十度时，系统会在必要时自动启动 冷却机制。","cat":"时间/顺序"},{"n":71,"en":"during / throughout (在…期间/贯穿)","ex":"During the trial period, volunteers were monitored throughout the entire twelve-week duration of the study.","zh":"在试验期间，志愿者在研究持续的整个十二周内 都受到监测。","cat":"时间/顺序"},{"n":72,"en":"at present / currently / nowadays (目 前/如今)","ex":"At present, renewable energy accounts for approximately thirty percent of total consumption; nowadays, this figure is rising steadily.","zh":"目前，可再生能源约占总消费量的百分之三十； 如今，这一数字正在稳步上升。","cat":"时间/顺序"},{"n":73,"en":"to begin with / originally / initially (起 初/最初)","ex":"To begin with, the project faced strong opposition; initially, only three team members supported the proposal.","zh":"起初，该项目遭到强烈反对；最初，只有三名团 队成员支持该提案。","cat":"时间/顺序"},{"n":74,"en":"ultimately / at last (最终/终于)","ex":"Ultimately, after years of negotiation, the two nations signed the treaty at last, ending decades of hostility.","zh":"最终，经过多年的谈判，两国终于签署了条约， 结束了数十年的敌对状态。","cat":"时间/顺序"},{"n":75,"en":"if / unless (如果/除非)","ex":"Unless immediate action is taken, the ecosystem will face irreversible damage within the next decade.","zh":"除非立即采取行动，否则生态系统将在未来十年 内面临不可逆转的破坏。","cat":"条件/假设"},{"n":76,"en":"provided (that) / providing (that) (倘若 /假如)","ex":"The loan will be approved provided that sufficient collateral is offered and all documentation is verified.","zh":"倘若提供足够的抵押品并核实所有文件，贷款将 获得批准。","cat":"条件/假设"},{"n":77,"en":"as long as / so long as (只要)","ex":"The agreement remains valid as long as both parties comply with the terms and conditions stipulated herein.","zh":"只要双方都遵守此处规定的条款和条件，协议就 保持有效。","cat":"条件/假设"},{"n":78,"en":"on condition that (条件是)","ex":"The prisoner was released on condition that he report to authorities weekly and refrain from contacting witnesses.","zh":"囚犯获释的条件是他每周向当局报到并避免接触 证人。","cat":"条件/假设"},{"n":79,"en":"given that (鉴于/考虑到)","ex":"Given that resources are scarce, the allocation must prioritize emergency medical supplies over non-essential equipment.","zh":"鉴于资源稀缺，分配必须优先保障紧急医疗用品 而非非必需设备。","cat":"条件/假设"},{"n":80,"en":"assuming (that) / supposing (that) (假 设/假定)","ex":"Assuming that the trend continues unabated, what measures should policymakers implement to mitigate adverse effects?","zh":"假设这一趋势持续不减，政策制定者应实施哪些 措施来缓解负面影响？","cat":"条件/假设"},{"n":81,"en":"in case (万一/以防)","ex":"Please retain all original receipts in case the insurance company requires documentation for your claim.","zh":"请保留所有原始收据，以防保险公司需要索赔文 件。","cat":"条件/假设"},{"n":82,"en":"in the event that (如果发生)","ex":"In the event that the keynote speaker falls ill, a substitute has been prepared to deliver the opening address.","zh":"如果主题演讲者生病，已准备好替补人员来发表 开幕致辞。","cat":"条件/假设"},{"n":83,"en":"only if (只有在…条件下)","ex":"The scholarship will be awarded only if the recipient maintains a grade point average above 3.5 throughout the program.","zh":"只有在获得者整个项目期间保持平均绩点3.5以 上时，才会授予该奖学金。","cat":"条件/假设"},{"n":84,"en":"if only (要是…就好了)","ex":"If only the government had invested in public transportation earlier, the current congestion crisis might have been avoided.","zh":"要是政府早点投资公共交通就好了，目前的拥堵 危机或许可以避免。","cat":"条件/假设"},{"n":85,"en":"otherwise / or else (否则/不然)","ex":"You must submit the application form by Friday; otherwise, your candidacy will be rejected or else deferred to the next cycle.","zh":"你必须在周五前提交申请表；否则，你的候选资 格将被拒绝，不然就推迟到下一轮。","cat":"条件/假设"},{"n":86,"en":"but for / without (要不是/没有)","ex":"But for your timely intervention, the project would have failed completely without any chance of recovery.","zh":"要不是你的及时干预，该项目本会彻底失败，没 有任何恢复的机会。","cat":"条件/假设"},{"n":87,"en":"once (一旦)","ex":"Once the preliminary data is verified, the research team will proceed to the second phase of clinical trials immediately.","zh":"一旦初步数据得到核实，研究团队将立即进入临 床试验的第二阶段。","cat":"条件/假设"},{"n":88,"en":"whether...or... (无论…还是…)","ex":"Whether you choose to participate or prefer to observe, your contribution to the discussion is equally valued.","zh":"无论你选择参与还是倾向于观察，你对讨论的贡 献都受到同等重视。","cat":"条件/假设"},{"n":89,"en":"for example / for instance (例如)","ex":"Many factors affect health, for example, diet, exercise, and sleep patterns significantly influence overall wellbeing.","zh":"许多因素影响健康，例如饮食、运动和睡眠模式 对整体健康有显著影响。","cat":"解释/例证"},{"n":90,"en":"such as / like (比如)","ex":"Renewable energy sources such as wind and solar are becoming increasingly affordable and efficient like traditional alternatives.","zh":"风能和太阳能等可再生能源正变得越来越经济实 惠且高效，就像传统能源一样。","cat":"解释/例证"},{"n":91,"en":"including / notably / especially (包括/ 尤其)","ex":"Several countries, including Germany and Denmark, have adopted ambitious policies, especially regarding offshore wind development.","zh":"包括德国和丹麦在内的几个国家采取了雄心勃勃 的政策，尤其在海上风电发展方面。","cat":"解释/例证"},{"n":92,"en":"namely / specifically / in particular (即/ 具体而言/特别是)","ex":"Three countries, namely China, India, and Brazil, account for half of global demand, specifically in manufacturing sectors.","zh":"三个国家，即中国、印度和巴西，占据了全球需 求的一半，特别是在制造业领域。","cat":"解释/例证"},{"n":93,"en":"in other words / i.e. (换句话说)","ex":"The process is irreversible; in other words, it cannot be undone by any means once initiated.","zh":"这一过程是不可逆的，换句话说，一旦开始就无 法以任何方式撤销。","cat":"解释/例证"},{"n":94,"en":"that is (to say) (也就是说)","ex":"The deadline is non-negotiable, that is to say, no extensions will be granted under any circumstances whatsoever.","zh":"截止日期不可协商，也就是说，在任何情况下都 不会给予延期。","cat":"解释/例证"},{"n":95,"en":"to put it another way / more precisely (换一种说法/更精确地说)","ex":"The algorithm is computationally expensive; to put it another way, it requires substantial processing power and time.","zh":"该算法计算成本很高；换一种说法，它需要大量 的处理能力和时间。","cat":"解释/例证"},{"n":96,"en":"to illustrate / by way of illustration (举 例说明)","ex":"To illustrate, consider the case of the Scandinavian education model, which emphasizes equity over competition.","zh":"举例来说，可以考虑斯堪的纳维亚教育模式，该 模式强调公平而非竞争。","cat":"解释/例证"},{"n":97,"en":"as follows (如下)","ex":"The main findings are as follows: first, income inequality has widened; second, social mobility has declined significantly.","zh":"主要发现如下：第一，收入不平等加剧；第二， 社会流动性显著下降。","cat":"解释/例证"},{"n":98,"en":"a case in point (一个恰当的例子)","ex":"The recent financial crisis is a case in point, demonstrating how rapidly systemic risks can propagate globally.","zh":"最近的金融危机就是一个恰当的例子，展示了系 统性风险如何迅速在全球蔓延。","cat":"解释/例证"},{"n":99,"en":"for one thing...for another (一方面…另 一方面)","ex":"For one thing, the proposal is too costly; for another, it fails to address the root causes of the problem adequately.","zh":"一方面，该提案成本太高；另一方面，它未能充 分解决问题的根本原因。","cat":"解释/例证"},{"n":100,"en":"particularly / mainly / largely (尤其/主 要/很大程度上)","ex":"The decline was particularly evident in rural areas, mainly due to limited access to healthcare services and largely attributable to aging populations.","zh":"下降在农村地区尤为明显，主要是由于医疗服务 获取有限，很大程度上归因于人口老龄化。","cat":"解释/例证"},{"n":101,"en":"to / in order to (为了)","ex":"The study was designed to evaluate the long-term effects of the intervention on cognitive development in children.","zh":"该研究旨在评估干预措施对儿童认知发展的长期 影响。","cat":"目的关系"},{"n":102,"en":"so as to (以便)","ex":"The regulations were tightened so as to ensure that environmental standards could be maintained at acceptable levels.","zh":"规章制度被收紧，以便确保环境标准维持在可接 受的水平。","cat":"目的关系"},{"n":103,"en":"so that / in order that (以便/为了)","ex":"Regulations were tightened so that environmental standards could be maintained without compromising economic growth.","zh":"规章制度被收紧，以便在不损害经济增长的情况 下维持环境标准。","cat":"目的关系"},{"n":104,"en":"with the aim of / aiming to (旨在)","ex":"The campaign was launched with the aim of raising public awareness about the dangers of plastic pollution in oceans.","zh":"发起这场运动旨在提高公众对海洋塑料污染危害 的认识。","cat":"目的关系"},{"n":105,"en":"in a bid to / in an effort to (力图/努力)","ex":"The government reduced taxes in a bid to stimulate consumer spending in an effort to revive the stagnant economy.","zh":"政府减税以刺激消费支出，努力振兴停滞的经济 。","cat":"目的关系"},{"n":106,"en":"in an attempt to (试图)","ex":"The company diversified its product line in an attempt to capture emerging market segments before competitors.","zh":"公司试图使其产品线多样化，以在竞争对手之前 抢占新兴市场份额。","cat":"目的关系"},{"n":107,"en":"with the intention of / intended to (意 图/旨在)","ex":"The legislation is intended to protect consumers from fraudulent practices with the intention of restoring market confidence.","zh":"这项立法旨在保护消费者免受欺诈行为侵害，意 图恢复市场信心。","cat":"目的关系"},{"n":108,"en":"meant to / designed to (旨在/目的是)","ex":"The new software is designed to streamline workflow processes and meant to reduce administrative burdens on staff.","zh":"新软件旨在简化工作流程，目的是减轻员工的行 政负担。","cat":"目的关系"},{"n":109,"en":"with a view to (指望/为了)","ex":"She is learning Mandarin with a view to expanding her business operations into the Chinese market within two years.","zh":"她正在学习普通话，指望在两年内将业务扩展到 中国内地市场。","cat":"目的关系"},{"n":110,"en":"for fear of / lest (以免/唯恐)","ex":"He avoided the topic for fear of offending the sensitive audience lest the discussion escalate into controversy.","zh":"他回避了这个话题，以免冒犯敏感的听众，唯恐 讨论升级为争议。","cat":"目的关系"},{"n":111,"en":"in the hope that (怀着…的希望)","ex":"The researchers extended the trial period in the hope that additional data would clarify the ambiguous preliminary findings.","zh":"研究人员延长了试验期，希望更多数据能澄清初 步发现中的模糊之处。","cat":"目的关系"},{"n":112,"en":"to the end that (为了…的目的)","ex":"All procedures were standardized to the end that results could be replicated accurately across different laboratories worldwide.","zh":"所有程序都被标准化，以便结果能在全球不同实 验室中被准确复制。","cat":"目的关系"},{"n":113,"en":"in conclusion / to conclude (总之)","ex":"In conclusion, the evidence overwhelmingly supports the proposed hypothesis and validates the theoretical framework.","zh":"总之，证据压倒性地支持所提出的假设，并验证 了理论框架。","cat":"总结/归纳"},{"n":114,"en":"to sum up / in summary / to summarize (概括来说)","ex":"To sum up, the advantages clearly outweigh the potential disadvantages when considering long-term sustainability.","zh":"概括来说，考虑到长期可持续性，优势明显大于 潜在的劣势。","cat":"总结/归纳"},{"n":115,"en":"overall / on the whole / altogether (总 体而言)","ex":"Overall, the data suggests a positive correlation between the two variables on the whole, albeit with some regional variations altogether.","zh":"总体而言，数据表明两个变量之间存在正相关关 系，尽管存在一些地区差异。","cat":"总结/归纳"},{"n":116,"en":"in short / in brief / briefly (简而言之)","ex":"In short, the proposal is neither economically feasible nor socially desirable in its current form.","zh":"简而言之，该提案以其当前形式在经济上不可 行，在社会层面也不受欢迎。","cat":"总结/归纳"},{"n":117,"en":"by and large / for the most part (大体 上/在很大程度上)","ex":"By and large, the initiative has been successful for the most part, though minor adjustments are still necessary.","zh":"大体上，这项倡议在很大程度上是成功的，尽管 仍需进行微调。","cat":"总结/归纳"},{"n":118,"en":"in general / generally speaking (一般来 说)","ex":"In general, younger demographics prefer digital platforms; generally speaking, this trend is accelerating globally.","zh":"一般来说，年轻人群更喜欢数字平台；总体而 言，这一趋势正在全球加速。","cat":"总结/归纳"},{"n":119,"en":"as a general rule (通常)","ex":"As a general rule, investments in early childhood education yield the highest social returns over time.","zh":"通常，对幼儿教育的投资随着时间的推移会产生 最高的社会回报。","cat":"总结/归纳"},{"n":120,"en":"at the end of the day (说到底/归根结 底)","ex":"At the end of the day, what matters most is whether the policy improves quality of life for ordinary citizens.","zh":"说到底，最重要的是该政策是否改善了普通公民 的生活质量。","cat":"总结/归纳"},{"n":121,"en":"all things considered / taking everything into account (综合考虑)","ex":"All things considered, the project represents a worthwhile investment taking everything into account including environmental impact.","zh":"综合考虑，该项目是一项值得的投资，已将包括 环境影响在内的所有因素纳入考量。","cat":"总结/归纳"},{"n":122,"en":"as mentioned earlier / as noted above (如前所述)","ex":"As mentioned earlier, the methodology relies on longitudinal tracking; as noted above, this approach has limitations.","zh":"如前所述，该方法依赖于纵向追踪；如上所述， 这种方法存在局限性。","cat":"总结/归纳"},{"n":123,"en":"above / below / over / under (在…上方 /下方)","ex":"The apartment above the restaurant is currently available for rent, while storage space is located under the main floor.","zh":"餐厅楼上的公寓目前正在出租，而储藏空间位于 主楼层下方。","cat":"空间关系"},{"n":124,"en":"on top of / at the bottom of (在…顶部/ 底部)","ex":"A surveillance camera is mounted on top of the entrance gate, and the mailboxes are situated at the bottom of the staircase.","zh":"入口处大门顶部安装了监控摄像头，信箱位于楼 梯底部。","cat":"空间关系"},{"n":125,"en":"beneath / underneath (在…下面)","ex":"The ancient ruins lie beneath the modern city, and a network of tunnels runs underneath the central square.","zh":"古代遗迹位于现代城市之下，隧道网络在中心广 场地下穿行。","cat":"空间关系"},{"n":126,"en":"behind / in front of / ahead of (在…后 面/前面)","ex":"The main entrance is located in front of the central courtyard, with administrative offices situated behind the main building and parking ahead of it.","zh":"主入口位于中央庭院前面，行政办公室在主楼后 面，停车场在其前方。","cat":"空间关系"},{"n":127,"en":"opposite / across from (在…对面)","ex":"The library sits opposite the student union building, directly across from the main cafeteria and adjacent to the parking lot.","zh":"图书馆位于学生会大楼对面，正对着主食堂，紧 邻停车场。","cat":"空间关系"},{"n":128,"en":"next to / adjacent to / beside (紧邻/毗 邻/在旁边)","ex":"The laboratory is adjacent to the main lecture hall for easy access, with emergency exits located next to and beside each workstation.","zh":"实验室毗邻主讲堂，便于进出，紧急出口位于每 个工作站旁边和附近。","cat":"空间关系"},{"n":129,"en":"near / nearby / close to (靠近/附近/接 近)","ex":"The new metro station is near the commercial district, with several bus stops nearby and residential areas close to the northern exit.","zh":"新地铁站靠近商业区，附近有几个公交站，住宅 区接近北出口。","cat":"空间关系"},{"n":130,"en":"far from / away from (远离)","ex":"The recycling facility is far from residential zones, positioned well away from schools and hospitals for safety reasons.","zh":"回收设施远离住宅区，出于安全考虑，位置远离 学校和医院。","cat":"空间关系"},{"n":131,"en":"between / among (在…之间)","ex":"The café is situated between the bookstore and the pharmacy, creating a popular gathering spot among students and faculty.","zh":"这家咖啡馆位于书店和药店之间，成为学生和教 职员工间的热门聚集地。","cat":"空间关系"},{"n":132,"en":"in the centre of / in the middle of (在… 中心)","ex":"A memorial statue stands in the centre of the roundabout, surrounded by a fountain in the middle of the pedestrian plaza.","zh":"一座纪念雕像矗立在环岛中心，周围是位于步行 广场中央的喷泉。","cat":"空间关系"},{"n":133,"en":"inside / outside / within (在…里面/外 面/之内)","ex":"Please wait inside the lobby; the meeting room is just outside the main office within the same building complex.","zh":"请在大堂内等候；会议室就在主办公室外面，但 在同一建筑群之内。","cat":"空间关系"},{"n":134,"en":"alongside / facing / toward (沿着/面对 /朝向)","ex":"A pedestrian walkway runs alongside the river, facing the historic district and sloping gently toward the waterfront park.","zh":"一条步行道沿着河流延伸，面对历史区，并缓缓 朝向海滨公园倾斜。","cat":"空间关系"},{"n":135,"en":"at the back of / in the rear of (在…后 部)","ex":"Emergency supplies are stored at the back of the warehouse, with additional shelving in the rear of the loading area.","zh":"应急物资存放在仓库后部，装卸区后方还有额外 的货架。","cat":"空间关系"},{"n":136,"en":"to the north/south/east/west (在北/南 /东/西)","ex":"The car park lies to the north of the main campus entrance, with sports facilities located to the south and dormitories to the east.","zh":"停车场位于校园主入口北面，体育设施在南面， 宿舍在东面。","cat":"空间关系"},{"n":137,"en":"upstairs / downstairs / indoors / outdoors (楼上/楼下/室内/室外)","ex":"The conference room is upstairs on the second floor, while the gym is downstairs; dining is available indoors or outdoors on the terrace.","zh":"会议室在二楼楼上，健身房在楼下；用餐可在室 内或露台室外进行。","cat":"空间关系"}]},"120句":{"name":"写作语法密训 120 句","type":"sent","items":[{"n":1,"zh":"家长应该限制孩子使用电子设备的时间。","en":"Parents should limit the time children spend on electronic devices.","cat":"简单主谓宾句"},{"n":2,"zh":"政府需要改善公共交通服务。","en":"The government needs to improve public transport services.","cat":"简单主谓宾句"},{"n":3,"zh":"许多年轻人重视工作与生活的平衡。","en":"Many young people value work-life balance.","cat":"简单主谓宾句"},{"n":4,"zh":"学校应该培养学生的独立思考能力。","en":"Schools should develop students’ ability to think independently.","cat":"简单主谓宾句"},{"n":5,"zh":"广告会影响消费者的购买决定。","en":"Advertisements influence consumers’ purchasing decisions.","cat":"简单主谓宾句"},{"n":6,"zh":"很多大学生担心未来的就业前景。","en":"Many university students worry about their future job prospects.","cat":"简单主谓宾句"},{"n":7,"zh":"社交媒体改变了人们获取信息的方式。","en":"Social media has changed the way people get information.","cat":"简单主谓宾句"},{"n":8,"zh":"企业不应该忽视员工的心理健康。","en":"Companies should not ignore employees’ mental health.","cat":"简单主谓宾句"},{"n":9,"zh":"学校应该给学生提供更多实践机会。","en":"Schools should give students more practical opportunities.","cat":"双宾语句型"},{"n":10,"zh":"政府可以给低收入家庭更多支持。","en":"The government can give low-income families more support.","cat":"双宾语句型"},{"n":11,"zh":"老师需要教学生有效的学习方法。","en":"Teachers need to teach students effective learning methods.","cat":"双宾语句型"},{"n":12,"zh":"大学应该给毕业生提供职业指导。","en":"Universities should give graduates career guidance.","cat":"双宾语句型"},{"n":13,"zh":"社区可以给老年人提供更多数字技能培训。","en":"Communities can give older people more training in digital skills.","cat":"双宾语句型"},{"n":14,"zh":"父母应该给孩子更多独立思考的空间。","en":"Parents should give children more space to think independently.","cat":"双宾语句型"},{"n":15,"zh":"公司可以给员工提供更灵活的工作安排。","en":"Companies can give employees more flexible working arrangements.","cat":"双宾语句型"},{"n":16,"zh":"学校应该给青少年更多心理健康教育。","en":"Schools should give teenagers more education about mental health.","cat":"双宾语句型"},{"n":17,"zh":"年轻人经常被社交媒体上的内容影响。","en":"Young people are often influenced by content on social media.","cat":"被动语态"},{"n":18,"zh":"许多历史建筑正在被现代城市发展所威胁。","en":"Many historic buildings are being threatened by modern urban development.","cat":"被动语态"},{"n":19,"zh":"学生应该被鼓励独立思考。","en":"Students should be encouraged to think independently.","cat":"被动语态"},{"n":20,"zh":"垃圾食品广告应该受到更严格的监管。","en":"Junk food advertisements should be regulated more strictly.","cat":"被动语态"},{"n":21,"zh":"一些个人信息可能会在网上被泄露。","en":"Some personal information may be leaked online.","cat":"被动语态"},{"n":22,"zh":"老年人有时会在网上被误导。","en":"Elderly people are sometimes misled online.","cat":"被动语态"},{"n":23,"zh":"儿童不应该被过度商业化的信息包围。","en":"Children should not be surrounded by overly commercialized messages.","cat":"被动语态"},{"n":24,"zh":"公共资源应该被更公平地分配。","en":"Public resources should be distributed more fairly.","cat":"被动语态"},{"n":25,"zh":"许多老年人在数字时代挣扎。","en":"Many elderly people struggle in the digital age.","cat":"主语 + 不及物动词"},{"n":26,"zh":"在线教育近年来迅速发展。","en":"Online education has developed rapidly in recent years.","cat":"主语 + 不及物动词"},{"n":27,"zh":"许多年轻人在大城市定居。","en":"Many young people settle in big cities.","cat":"主语 + 不及物动词"},{"n":28,"zh":"空气污染在一些地区恶化。","en":"Air pollution is getting worse in some areas. 8 IELTS 奥力赴雅思留学工作室","cat":"主语 + 不及物动词"},{"n":29,"zh":"当代人的消费观念已经改变。","en":"Modern people’s attitudes towards consumption have changed.","cat":"主语 + 不及物动词"},{"n":30,"zh":"很多小城市正在扩张。","en":"Many small cities are expanding.","cat":"主语 + 不及物动词"},{"n":31,"zh":"一些传统行业正在衰落。","en":"Some traditional industries are declining.","cat":"主语 + 不及物动词"},{"n":32,"zh":"很多学生在考试前焦虑。","en":"Many students feel anxious before exams.","cat":"主语 + 不及物动词"},{"n":33,"zh":"网购已经成为现代生活的重要组成部分。","en":"Online shopping has become an important part of modern life.","cat":"主系表结构"},{"n":34,"zh":"过度使用社交媒体对青少年是有害的。","en":"Excessive use of social media is harmful to teenagers.","cat":"主系表结构"},{"n":35,"zh":"工作压力如今是许多成年人的一个严重问题。","en":"Work pressure is now a serious problem for many adults.","cat":"主系表结构"},{"n":36,"zh":"在线诈骗已经成为普通消费者面临的主要风险之一。","en":"Online fraud has become one of the main risks faced by ordinary consumers.","cat":"主系表结构"},{"n":37,"zh":"良好的教育对一个国家的未来是至关重要的。","en":"Good education is essential to a country’s future.","cat":"主系表结构"},{"n":38,"zh":"健康的生活方式对年轻人尤其重要。","en":"A healthy lifestyle is especially important for young people.","cat":"主系表结构"},{"n":39,"zh":"误导性广告对消费者是不公平的。","en":"Misleading advertisements are unfair to consumers.","cat":"主系表结构"},{"n":40,"zh":"心理健康问题在现代社会中越来越普遍。","en":"Mental health problems are becoming more common in modern society.","cat":"主系表结构"},{"n":41,"zh":"保护语言多样性是困难的。","en":"It is difficult to protect language diversity.","cat":"it 做形式主语 / 形式宾语"},{"n":42,"zh":"很明显，许多学生过度依赖人工智能工具。","en":"It is obvious that many students rely too much on AI tools.","cat":"it 做形式主语 / 形式宾语"},{"n":43,"zh":"政府有必要加强对虚假广告的监管。","en":"It is necessary for the government to strengthen the regulation of false advertising.","cat"  financial awareness.","cat":"名词性从句"},{"n":59,"zh":"一个明显的事实是，环境问题已经影响到了普通人的生活。","en":"One obvious fact is that environmental problems have already affected ordinary people’s lives.","cat":"名词性从句"},{"n":60,"zh":"许多家长担心孩子过早接触社交媒体会影响专注力。","en":"Many parents worry that early exposure to social media may affect children’s concentration.","cat":"名词性从句"},{"n":61,"zh":"大学生是否应该先工作再读研，仍然是一个有争议的话题。","en":"Whether university students should work before pursuing further study is still a controversial issue.","cat":"名词性从句"},{"n":62,"zh":"很多人支持这样一种观点：学校不应该只重视考试成绩。","en":"Many people support the view that schools should not focus only on exam results.","cat":"名词性从句"},{"n":63,"zh":"真正重要的是，年轻人是否具备解决实际问题的能力。","en":"What really matters is whether young people have the ability to solve practical problems.","cat":"名词性从句"},{"n":64,"zh":"有充分证据表明，缺乏锻炼会增加慢性病的风险。","en":"There is clear evidence that a lack of exercise increases the risk of chronic diseases.","cat":"名词性从句"},{"n":65,"zh":"那些能够鼓励学生独立思考的老师往往更受欢迎。","en":"Teachers who can encourage students to think independently are often more popular.","cat":"定语从句"},{"n":66,"zh":"政府应该帮助那些缺乏医疗资源的农村地区。","en":"The government should help rural areas that lack medical resources.","cat":"定语从句"},{"n":67,"zh":"社交媒体上发布的错误信息可能会误导青少年。","en":"False information posted on social media may mislead teenagers.","cat":"定语从句"},{"n":68,"zh":"很多学生喜欢能够提供互动活动的课堂。","en":"Many students like classes that can provide interactive activities.","cat":"定语从句"},{"n":69,"zh":"越来越多的人选择骑自行车上班，这不仅省钱，而且更环保。","en":"More and more people choose to cycle to work, which is not only cheaper but also more environmentally friendly.","cat":"定语从句"},{"n":70,"zh":"那些长期缺乏锻炼的人更容易出现健康问题。","en":"People who lack exercise for a long time are more likely to develop health problems.","cat":"定语从句"},{"n":71,"zh":"很多年轻人想去那些能够提供更多机会的城市工作。","en":"Many young people want to work in cities that can offer more opportunities.","cat":"定语从句"},{"n":72,"zh":"一些平台传播的内容会放大人们对外貌的焦虑，这会影响青少年的自信心。","en":"Some content spread function exportData(){const o={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(/^una/.test(k))o[k]=localStorage.getItem(k);}
 const blob=new Blob([JSON.stringify({app:'Una徐之韻雅思备考',exportAt:new Date().toISOString(),data:o},null,2)],{type:'application/json'});
 const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Una徐之韻备考进度_'+new Date().toISOString().slice(0,10)+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),2000);}
function importData(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const j=JSON.parse(r.result);const data=j.data||j;if(typeof data!=='object')throw 0;if(!confirm('导入会覆盖本机当前进度，确定继续？'))return;Object.keys(data).forEach(k=>{if(/^una/.test(k))localStorage.setItem(k,data[k]);});alert('导入成功，即将刷新。');location.reload();}catch(e){alert('文件无法识别，请选择本App导出的备份文件。');}};r.readAsText(f);}

let _tmr=null,_tsec=0,_tdir=1;
function fmtT(s){s=Math.max(0,s|0);const m=Math.floor(s/60),x=s%60;return (m<10?'0':'')+m+':'+(x<10?'0':'')+x;}
function timerHTML(planned){clearInterval(_tmr);_tmr=null;_tsec=planned>0?planned*60:0;_tdir=planned>0?-1:1;
 return `<div class="timer"><div class="tm-disp" id="tmDisp">${fmtT(_tsec)}</div><div class="tm-sub">${planned>0?('计划 '+planned+' 分钟 · 倒计时（到点提醒）'):'正计时'}</div><div class="tm-btns"><button class="tm-b" id="tmGo" onclick="timerToggle()">▶ 开始</button><button class="tm-b ghost" onclick="timerReset(${planned})">↺ 重置</button></div></div>`;}
function timerToggle(){const go=document.getElementById('tmGo');if(!go)return;if(_tmr){clearInterval(_tmr);_tmr=null;go.textContent='▶ 继续';return;}
 go.textContent='⏸ 暂停';_tmr=setInterval(()=>{_tsec+=_tdir;const disp=document.getElementById('tmDisp');if(!disp){clearInterval(_tmr);_tmr=null;return;}disp.textContent=fmtT(_tsec);
  if(_tdir<0&&_tsec<=0){clearInterval(_tmr);_tmr=null;disp.classList.add('done');go.textContent='✓ 时间到';if(navigator.vibrate)navigator.vibrate([200,80,200]);}},1000);}
function timerReset(p){clearInterval(_tmr);_tmr=null;_tsec=p>0?p*60:0;_tdir=p>0?-1:1;const disp=document.getElementById('tmDisp');if(disp){disp.textContent=fmtT(_tsec);disp.classList.remove('done');}const go=document.getElementById('tmGo');if(go)go.textContent='▶ 开始';}

function drawChartInto(boxId,a){const box=document.getElementById(boxId);if(!box||!a.length)return;
 const W=box.clientWidth||320,H=176,pad=26;const minS=4,maxS=9;
 const xs=i=>a.length>1?pad+i*(W-2*pad)/(a.length-1):W/2;
 const ys=v=>H-pad-((Math.max(minS,Math.min(maxS,v))-minS)/(maxS-minS))*(H-2*pad);
 const series=[['L','#E0A93C',6.5],['R','#5B96D6',6.5],['W','#9B7FC9',6],['S','#E87878',6]];
 let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">`;
 for(let g=5;g<=8;g++){const y=ys(g);svg+=`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="rgba(49,97,65,.1)"/><text x="2" y="${y+3}" font-size="9" fill="#8C919B">${g}</text>`;}
 series.forEach(([k,c,tg])=>{const y=ys(tg);svg+=`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="${c}" stroke-dasharray="2 4" opacity=".4"/>`;});
 a.forEach((m,i)=>{svg+=`<text x="${xs(i)}" y="${H-6}" font-size="9" fill="#8C919B" text-anchor="middle">第${i+1}次</text>`;});
 series.forEach(([k,c])=>{const valid=a.map((m,i)=>({v:+m[k],i})).filter(o=>!isNaN(o.v)&&o.v>0);if(!valid.length)return;
  const pts=valid.map(o=>`${xs(o.i)},${ys(o.v)}`).join(' ');const LEN=1600;
  if(valid.length>1)svg+=`<polyline points="${pts}" fill="none" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="${LEN}" stroke-dashoffset="${LEN}"><animate attributeName="stroke-dashoffset" from="${LEN}" to="0" dur=".9s" fill="freeze"/></polyline>`;
  valid.forEach(o=>{svg+=`<circle cx="${xs(o.i)}" cy="${ys(o.v)}" r="3.4" fill="${c}"/>`;});});
 svg+=`</svg>`;box.innerHTML=svg;}

function vocabForTask(t){const w=(t&&t.what)||'';const rules=[
  ['听力同替',/听力同义替换(?:词汇表)?[：:]\s*第?\s*(\d+)\s*[-–~]\s*(\d+)/],
  ['听力短语',/听力必备词组短语(?:表)?[：:]\s*第?\s*(\d+)\s*[-–~]\s*(\d+)/],
  ['不规则',/不规则动词(?:表)?[：:]\s*第?\s*(\d+)\s*[-–~]\s*(\d+)/],
  ['功能词',/真题功能考点词[：:]\s*第?\s*(\d+)\s*[-–~]\s*(\d+)/],
  ['核心',/核心考点词[：:]\s*第?\s*(\d+)\s*[-–~]\s*(\d+)/],
  ['538',/538考点词[\s\S]*?第?\s*(\d+)\s*[-–~]\s*(\d+)/],
  ['179',/179考点词[：:]\s*第?\s*(\d+)\s*[-–~]\s*(\d+)/],
  ['认知',/认知词汇[：:]\s*第?\s*(\d+)\s*[-–~]\s*(\d+)/],
  ['场景',/场景词[：:]\s*第?\s*(\d+)\s*[-–~]\s*(\d+)/],
  ['写作短语',/必备短语[：:]\s*第?\s*(\d+)\s*[-–~]\s*(\d+)/],
  ['120句',/语法密训\s*120\s*句[：:]\s*第?\s*(\d+)\s*[-–~]\s*(\d+)/],
  ['137',/137\s*逻辑关系结构[：:]\s*第?\s*(\d+)\s*[-–~]\s*(\d+)/],
  ['同义替换',/阅读同义替换[：:]\s*第?\s*(\d+)\s*[-–~]\s*(\d+)/],
  ['同义替换',/同义替换[：:]\s*第?\s*(\d+)\s*[-–~]\s*(\d+)/]
 ];
 for(let i=0;i<rules.length;i++){const m=w.match(rules[i][1]);if(m&&VOCAB[rules[i][0]])return{key:rules[i][0],from:+m[1],to:+m[2]};}
 return null;}
let vocabState={key:null,from:0,to:0,dir:'en2zh'};

function vMK(key,n){return key+':'+n;}

function pickEnVoice(){try{const vs=speechSynthesis.getVoices()||[];if(!vs.length)return null;return vs.find(v=>/en[-_]GB/i.test(v.lang))||vs.find(v=>/en[-_]GB/i.test(v.name||''))||vs.find(v=>/^en/i.test(v.lang))||vs.find(v=>/english/i.test(v.name||''))||null;}catch(e){return null;}}
function speakWord(text){if(!text)return false;var synth=window.speechSynthesis;if(!synth||typeof SpeechSynthesisUtterance==='undefined')return false;
 try{if(synth.speaking||synth.pending)synth.cancel();if(synth.paused){try{synth.resume();}catch(e){}}
  var u=new SpeechSynthesisUtterance(String(text));u.lang='en-GB';u.rate=.9;u.pitch=1;
  try{var v=pickEnVoice();if(v){u.voice=v;u.lang=v.lang||'en-GB';}}catch(e){}
  window.__vu=u;synth.speak(u);return true;}catch(e){return false;}}

  var enBlk='<div class="vc-en">'+esc(it.en)+'</div>'+(it.ipa?'<div class="vc-ipa">'+esc(it.ipa)+'</div>':'')+(it.pos?'<span class="vc-pos">'+esc(it.pos)+'</span>':'');
  var zhBlk='<div class="vc-zh">'+esc(it.zh)+'</div>';
  promptHTML=dir==='zh2en'?'<div class="vc-zhp">'+esc(it.zh)+'</div>':enBlk;
  ansHTML=dir==='zh2en'?enBlk:zhBlk;spk=it.en;
 }else if(type==='syn'){
  promptHTML='<div class="vc-en">'+esc(it.en)+'</div>';
  var chain=(it.syn&&it.syn.length)?it.syn.map(esc).join(' <span class="vc-arrow">→</span> '):'(无替换)';
  ansHTML='<div class="vc-syn">'+chain+'</div>'+(it.zh?'<div class="vc-zh">'+esc(it.zh)+'</div>':'');spk=it.en;
 }else if(type==='conn'){
  promptHTML='<div class="vc-en vc-conn">'+esc(it.en)+'</div>';
  ansHTML='<div class="vc-ex">“'+esc(it.ex)+'”</div>'+(it.zh?'<div class="vc-zh">'+esc(it.zh)+'</div>':'');spk=it.ex;
 }else{
  promptHTML='<div class="vc-sentq">'+esc(it.zh)+'</div>';
  ansHTML='<div class="vc-senta">'+esc(it.en)+'</div>';spk=it.en;
 }
 return '<div class="vcard '+(mastered?'mastered':'')+'"><div class="vc-top"><span class="vc-num">#'+it.n+'</span><div class="vc-tools"><button class="vc-spk" data-en="'+escA(spk)+'" onclick="event.stopPropagation();vSpeak(this)" aria-label="发音">🔊</button><button class="vc-ck '+(mastered?'on':'')+'" onclick="toggleVMaster(\''+key+'\','+it.n+')">✓</button></div></div>'
  +'<div class="vc-prompt">'+promptHTML+'</div>'
  +'<div class="vc-ans '+(mastered?'show':'')+'" data-en="'+escA(spk)+'" onclick="tapAns(this)"><div class="vc-ansin">'+ansHTML+'</div><span class="vc-tap">点击揭示</span></div></div>';
}
function vBuildCards(items,mast){var type=vType(),html='',lastCat=null;
 for(var i=0;i<items.length;i++){var it=items[i];
  if((type==='conn'||type==='sent')&&it.cat&&it.cat!==lastCat){lastCat=it.cat;html+='<div class="vcat">'+esc(it.cat)+'</div>';}
  html+=vCardHTML(it,!!mast[vMK(vocabState.key,it.n)]);}
 return html;}
function renderVocab(){
 const items=vocabItems();const mast=loadVMast();const dir=vocabState.dir;
 const mc=items.filter(it=>mast[vMK(vocabState.key,it.n)]).length;
 const pct=items.length?Math.round(mc/items.length*100):0;
 const cards=vBuildCards(items,mast);
 const U=vUnit();const isWord=vType()==='word';
 const barLeft=isWord
   ?`<div class="vseg"><button class="vseg-b ${dir==='en2zh'?'on':''}" onclick="setVDir('en2zh')">英 → 中</button><button class="vseg-b ${dir==='zh2en'?'on':''}" onclick="setVDir('zh2en')">中 → 英</button></div>`
   :`<div class="vmode">${({syn:'原词 → 替换词',conn:'逻辑词 → 例句·释义',sent:'中文 → 英文（翻译）'})[vType()]}</div>`;
 document.getElementById('vocabOverlay').innerHTML=
  `<div class="vov-head"><button class="vov-x" onclick="closeVocab()">✕</button><div class="vov-tt"><h3>${VOCAB[vocabState.key].name}</h3><span>第 ${vocabState.from}-${vocabState.to} ${U} · 共 ${items.length} ${U}</span></div></div>`
  +`<div class="vov-bar">${barLeft}<button class="vov-auto ${vocabState.auto?'on':''}" onclick="toggleVAuto()">🔊 自动读</button><button class="vov-all" onclick="revealAllV()">全部揭示</button></div>`
  +`<div class="vov-prog"><span class="vov-pl">已掌握 ${mc} / ${items.length}</span><div class="vov-track"><div class="vov-fill" style="width:${pct}%"></div></div></div>`
  +`<div class="vgrid ${isWord?'':'vgrid-1'}">${cards||'<div class="vov-empty">这一段没有内容</div>'}</div>`
  +`<div class="vov-foot">点卡片下半部分揭示答案 · 点「✓」标记已掌握(跨第1/2遍记忆) · 背完点左上角 ✕ 返回任务</div>`;
}

/* boot */
autoToday();switchView('home');paintIcons();
</script>
