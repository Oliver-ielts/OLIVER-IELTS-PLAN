用一种健康得多的方式来定义成功。", "p3": [{"q": "1) When do most children begin to have their own opinions?", "a": "I think it usually starts quite early, around the age of five or six. That's when they begin to express their likes and dislikes clearly. By their teenage years, their opinions become much stronger and more independent.", "t": ""}, {"q": "2) Whose opinions are more important to children, their parents' or teachers'?", "a": "It changes as they grow up. When they're young, parents' opinions usually matter most, since they spend the most time together. As children get older, teachers and especially friends start to have a bigger influence.", "t": ""}, {"q": "3) Do children communicate more with teachers or with parents?", "a": "Generally with their parents, since they live together and share daily life. However, at school they may open up to teachers about certain topics, like studies or problems they don't want to tell their parents. It really depends on the relationship.", "t": ""}, {"q": "4) Who do young people like to share opinions with?", "a": "Most young people prefer sharing their opinions with close friends of a similar age. They feel friends understand them better and won't judge them. Nowadays, many also share their views online with people who have similar interests.", "t": ""}]}, {"id": "c27", "tag": "本季新题", "emoji": "🌍", "ztitle": "想要颁布的环保法律（想推行的）", "describe": "Describe an environmental law you would like your country to introduce", "shouldsay": ["What law it should be", "Why people should follow the law", "Whether the law will be popular", "And explain how you feel about this law"], "a": "I'd like to talk about an environmental law I'd love my country to introduce, which is <mark class=\"idiom\">（漂亮、地道、可替换的万能开头句）</mark> <mark class=\"idiom\">a complete ban on（全面禁止）</mark> <mark class=\"idiom\">single-use plastics（一次性塑料）</mark>, like plastic bags, straws and <mark class=\"idiom\">cutlery（餐具）</mark>.<br><br>People should follow this law <span class=\"conn\">because</span> <mark class=\"idiom\">plastic waste（塑料垃圾）</mark> is one of the biggest threats to our environment. It <mark class=\"idiom\">pollutes the oceans（污染海洋）</mark>, harms wildlife <span class=\"conn\">and</span> takes hundreds of years to <mark class=\"idiom\">break down（降解）</mark>. Cutting it out would make a huge difference.<br><br>I think it would be popular with most people, <span class=\"conn\">since</span> <mark class=\"idiom\">environmental awareness（环保意识）</mark> is growing fast. <span class=\"conn\">However</span>, some businesses and shoppers might find it <mark class=\"idiom\">inconvenient（不方便的）</mark> at first, <span class=\"conn\">as</span> they'd need to switch to <mark class=\"idiom\">alternatives（替代品）</mark>.<br><br>Personally, I feel really strongly about this. A short-term inconvenience is <mark class=\"idiom\">a small price to pay（很值得付出的小代价）</mark> for <mark class=\"idiom\">a cleaner planet（一个更干净的地球）</mark>. <span class=\"conn\">That's why</span> I believe a law like this is worth introducing as soon as possible.", "t": "我想谈谈一部我很希望国家能推行的环保法律——全面禁止一次性塑料制品，比如塑料袋、吸管和餐具。<br><br>人们应该遵守这部法律，因为塑料垃圾是对我们环境最大的威胁之一。它污染海洋、伤害野生动物，而且要花几百年才能降解。把它彻底去掉会带来巨大的改变。<br><br>我觉得它会受到大多数人的欢迎，因为环保意识正在快速增强。不过，一些商家和消费者一开始可能会觉得不方便，因为他们得改用替代品。<br><br>就我个人而言，我对这件事感触很深。一时的不便，是为一个更干净的地球付出的、很值得的小代价。这就是为什么我相信这样一部法律值得尽快推行。", "p3": [{"q": "1) How does technology affect the law?", "a": "Technology influences the law in many ways. On one hand, it creates new issues that need regulating, like online privacy and fraud. On the other hand, it helps enforce laws better through tools like cameras and data tracking.", "t": ""}, {"q": "2) What kinds of rules do schools in China have?", "a": "Schools have rules about punctuality, uniforms, phone use and respecting teachers. There are also rules to keep the campus clean and safe. These are mainly designed to create an orderly environment for learning.", "t": ""}, {"q": "3) Will there be a law that is universally accepted?", "a": "That's a tough one. Some basic principles, like laws against murder or theft, are accepted almost everywhere. However, because cultures and values differ so much, I doubt every single law could ever be universally agreed upon.", "t": ""}, {"q": "4) What environmental laws does your country already have?", "a": "China already has quite a few. For example, there's the waste-sorting regulation in many cities, restrictions on plastic bags, and strict limits on factory emissions. The government has also been heavily promoting clean energy in recent years.", "t": ""}]}, {"id": "c28", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a perfect job you would like to have in the future", "shouldsay": ["What it is", "How you knew it", "What you need to learn to get this job", "And explain why you think it is a perfect job for you"], "a": "I'd like to describe a perfect job I would like to have in the future, which is becoming an English teacher who <mark class=\"idiom\">specialises in（专门研究）</mark> international exams, <span class=\"conn\">such as</span> IELTS and TOEFL. <span class=\"conn\">I first knew</span> about this job when I was a university student. <span class=\"conn\">At that time</span>, I met several teachers who were very professional and <mark class=\"idiom\">inspiring（鼓舞人心的）</mark>. They <span class=\"conn\">not only</span> taught language skills, <span class=\"conn\">but also</span> helped students <mark class=\"idiom\">build confidence（树立信心）</mark> and achieve important goals, <span class=\"conn\">such as</span> studying abroad. I realised that teaching could be both <mark class=\"idiom\">meaningful and challenging(既有意义又有挑战)</mark>. To get this job, I need to learn a lot of things. <span class=\"conn\">First</span>, I must improve my own English ability, <span class=\"conn\">especially</span> in speaking and <mark class=\"idiom\">academic writing（学术写作）</mark>. I also need to understand exam requirements and develop effective <mark class=\"idiom\">teaching methods（教学方法）</mark>. <span class=\"conn\">In addition</span>, communication skills are essential, <span class=\"conn\">because</span> a good teacher should know how to <mark class=\"idiom\">motivate（激励）</mark> students and explain difficult points clearly. I believe <mark class=\"idiom\">continuous learning（继续学习）</mark> is necessary in this field. I think this job is perfect for me <span class=\"conn\">because</span> I enjoy working with people and <mark class=\"idiom\">sharing knowledge(分享知识)</mark>. Helping students make progress gives me a strong <mark class=\"idiom\">sense of achievement（成就感）</mark>. It is also a career with <mark class=\"idiom\">long-term value(长远价值)</mark>, <span class=\"conn\">because</span> education can <mark class=\"idiom\">truly change（真正改变）</mark> someone's future. <span class=\"conn\">That's why</span> I see it as my ideal job.", "t": "我想描述一下自己未来希望拥有的一份理想工作——成为一名专门教授国际考试（如雅 思和托福）的英语教师。我最初了解这份工作时还是大学学生时期。那时，我结识了几位非常专业且富有感染力的教师。他们不仅教授语言技能，还帮助学生树立自信并达成重要目标，比如赴海外留学。我意识到教学工作既富有意义又充满挑战。为了获得这份工作，我需要学习许多东西。首先，我必须提升自己的英语能力，尤其是在口语和学术写作方面。同时，我还需了解考试要求并开发有效的教学方法。此外，沟通技巧也是不可或缺的，因为一名优秀的教师应当懂得如何激励学生并清晰解释难点。我相信在这个领域持续学习是必要的。我认为这份工作非常适合我，因为我乐于与人共事并乐于分享知识。帮助学生取得进步让我倍感成就感。此外，这份工作还具有长期价值，因为教育确实能够真正改变一个人的未来。正因如此，我将它视为理想的工作。", "p3": [{"q": "What kind of job can be called a “dream job”?", "a": "A dream job is one that matches a person’s interests and strengths, and also fits their lifestyle. It should give them a sense of purpose, not just money. For example, some people value creativity, while others care more about stability and work-life balance.", "t": ""}, {"q": "What jobs do children want to do when they grow up?", "a": "Many children choose jobs they see often or admire, like doctors, teachers, police officers, or pilots. These jobs look meaningful and powerful to them. Also, children today are more influenced by the internet, so some want to be YouTubers or game streamers.", "t": ""}, {"q": "Do people’s ideal jobs change as they grow up?", "a": "Yes, in most cases they do. When people are younger, they may focus on passion and excitement, but later they start thinking about income, pressure, and family responsibilities. After some real work experience, they also learn what they truly enjoy and what they can’t tolerate.", "t": ""}, {"q": "What should people consider when choosing jobs?", "a": "They should consider their skills, personality, and long-term development. Salary matters, but working environment and growth opportunities are also important. In my opinion, a job should be realistic and sustainable, not only “impressive” on paper.", "t": ""}, {"q": "Is salary the main reason why people choose a certain job?", "a": "For many people, yes, especially when they have financial pressure like rent or supporting a family. However, salary is not the only factor. Some people accept a lower salary for better work-life balance, a healthier workplace, or a stronger sense of achievement.", "t": ""}, {"q": "What kind of jobs are the most popular in your country?", "a": "In China, stable jobs are still very popular, such as civil servants, teachers, and jobs in large state- owned companies. Many people prefer stability because the competition is intense and life costs are high in big cities. At the same time, jobs in technology and finance are also attractive because they often offer higher pay and faster growth.<br><br><strong>想见的名人</strong>", "t": ""}]}, {"id": "c29", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a famous person you would like to meet", "shouldsay": ["Who he/she is", "How you knew him/her", "How/where you would like to meet him/her", "And explain why you would like to meet him/her"], "a": "The famous person I would like to meet is Elon Musk, who is well known as an <mark class=\"idiom\">entrepreneur and innovator(企业家与创新者)</mark>. <span class=\"conn\">I first</span> learned about him through the news and social media, <span class=\"conn\">especially</span> when people talked about <mark class=\"idiom\">new energy cars（新能源车）</mark>, <mark class=\"idiom\">space exploration（太空探索）</mark>, and <mark class=\"idiom\">innovative technology（前沿科技）</mark>. <span class=\"conn\">Over time（后来）</span>, I watched some interviews and speeches by him online, and I became more interested in the way he thinks and works. If I had the chance, I would like to meet him at a technology conference or a <mark class=\"idiom\">public talk（公开演讲）</mark>. I think that would be the <mark class=\"idiom\">most natural setting(最自然的场合)</mark>, <span class=\"conn\">because</span> he often <mark class=\"idiom\">shares his ideas openly（公开谈论想法）</mark> in those situations. I wouldn't expect a long conversation, <span class=\"conn\">but</span> even a <mark class=\"idiom\">short face-to-face meeting（面对面会谈）</mark> would be meaningful for me. The main reason I want to meet him is that I <mark class=\"idiom\">admire his mindset（钦佩他的观念）</mark>. He is <mark class=\"idiom\">not afraid of taking risks(不惧冒险)</mark> or challenging traditional ideas, even when many people doubt him. I would like to ask him how he <mark class=\"idiom\">stays motivated under pressure(在压力下保持动力)</mark> and how he <mark class=\"idiom\">deals with failure(应对失败)</mark>, <span class=\"conn\">because</span> these are common problems for many people today. <span class=\"conn\">Also</span>, I believe meeting someone like him would be <mark class=\"idiom\">inspiring(鼓舞人心的)</mark>. It might help me <mark class=\"idiom\">think bigger(把格局放大)</mark> and look at problems from a <mark class=\"idiom\">different perspective（站在不同的角度）</mark>. <span class=\"conn\">That's why</span> he is a famous person I would really like to meet.", "t": "要说最想见的公众人物，那肯定是埃隆·马斯克——这位大名鼎鼎的企业家和创新者。最早知道他是通过新闻和社交媒体，那会儿大家老在聊新能源车、太空探索这些前沿科技。后来在网上看了些他的采访和演讲，就对他那种思维方式和工作方法特别感兴趣。要是真有机会见面，我觉得在技术大会或他演讲的时候最合适——他本来就在这种场合公开分享想法，氛围也比较自然。不一定非要聊很久，哪怕就是简短的面对面交流一下，也绝对值了。最想见他的原因，是我特别佩服他那种思维模式——不怕冒险，敢挑战传统观念，哪怕被很多人质疑也不退缩。最想问他的就是：在那么大的压力下是怎么保持动力的？遇到失败又是怎么应对的？毕竟这些问题现在大家普遍都会碰到。而且我觉得，能见上他一面肯定特别受启发，能让自己想得更大胆些，看问题的角度也更开阔。所以说，他真的是我特别想见的一位人物。", "p3": [{"q": "What are the advantages and disadvantages of being a famous child?", "a": "A famous child may get more opportunities(获得更多机会), such as better training, more resources, and even a higher income(更高的收入). However, the biggest disadvantage is the lack of privacy(缺乏隐私). They can also face heavy pressure(巨大的压力) and online criticism(网络批 评), which may affect their mental health(心理健康)and normal growth(正常成长).", "t": ""}, {"q": "What can today’s children do to become famous?", "a": "Nowadays, children can become famous through social media(社交媒体) by sharing videos of their talents(分享才艺视频), like singing, dancing, or sports skills. Some also join competitions or talent shows(才艺选秀) to get public attention(获得公众关注). But in my opinion, they still need support from parents and proper guidance(恰当的引导), otherwise it can be risky(有风险的).", "t": ""}, {"q": "What can children do with their fame?", "a": "If a child becomes famous, they can use their influence(利用他们的影响力) in positive ways(以积极的方式), such as promoting learning, sports, or charity projects(慈善项目). They can also encourage other children by setting a good example(树立榜样). At the same time, adults around them should help them manage fame responsibly(负责任地管理名声), because they may not fully understand the consequences(理解后果).", "t": ""}, {"q": "Do people become famous because of their talent?", "a": "Talent is an important reason, especially in areas like(在诸如...的领域) music, sports, or science. However, nowadays fame is also influenced by luck, timing, and media exposure(媒体曝光度). Some people become well-known(知名的) simply because their content goes viral(在网络上走红), even if they are not the best in their field(在他们的领域).", "t": ""}, {"q": "Is it easy to become famous in your country?", "a": "It is easier than before because anyone can post content online and reach a large audience(触 达大量受众). But becoming truly famous and staying famous(保持名声) is still difficult, because the competition is intense and trends change quickly( 趋 势 变 化 极 快 ). Many people may get attention for a short time(获得短暂的关注) and then disappear(消失).", "t": ""}, {"q": "Do you want to be a famous person?", "a": "I don’t really want to be extremely famous, because I value privacy and a peaceful life(珍视隐 私与宁静的生活). However, I wouldn’t mind(不介意) being well-known in a professional way(在专业领域为人熟知), for example as a teacher or content creator, because that could help me reach more learners(触达更多学习者). So I prefer “positive influence” rather than celebrity-style fame(明星式的名声).<br><br><strong>禁用手机的场合</strong>", "t": ""}]}, {"id": "c30", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe an occasion when you were not allowed to use your mobile phone", "shouldsay": ["When it was", "Where it was", "Why you were not allowed to use your mobile phone", "And how you felt about it"], "a": "I'd like to describe an occasion when I was not allowed to use my mobile phone during an important exam. This happened about two years ago, when I was taking a formal English exam at a <mark class=\"idiom\">test centre(考试中心)</mark>. The exam was held in a large classroom, and before it started, the invigilator clearly told us that mobile phones were <mark class=\"idiom\">strictly forbidden（严禁使用）</mark>. We had to turn them off and put them in a bag at the front of the room. The main reason we were not allowed to use our phones was to <mark class=\"idiom\">make sure the exam was fair(确保考试公平)</mark>. Phones could be used for <mark class=\"idiom\">cheating(作弊)</mark>, <span class=\"conn\">such as</span> searching for answers or communicating with others, <span class=\"conn\">so</span> banning them was necessary. <span class=\"conn\">Also</span>, phone notifications or sounds could <mark class=\"idiom\">disturb other candidates(打扰其他考生)</mark> and affect their <mark class=\"idiom\">concentration(专注)</mark>. <span class=\"conn\">At the beginning</span>, I felt a little uncomfortable <span class=\"conn\">because</span> I was so used to checking my phone, <span class=\"conn\">especially</span> when I felt nervous. <span class=\"conn\">However</span>, after a while, I realised that being without my phone actually helped me <mark class=\"idiom\">focus better(更专注)</mark>. I became more calm and <mark class=\"idiom\">paid full attention（集中全部注意力）</mark> to the questions in front of me. <span class=\"conn\">Looking back</span>, I think it was a <mark class=\"idiom\">positive experience（良好体验）</mark>. It reminded me that I don't always need my phone, and sometimes <mark class=\"idiom\">disconnecting from it(放下手机)</mark> can make me more focused and productive. <span class=\"conn\">So</span> although it felt inconvenient at first, in the end I understood and accepted the rule.", "t": "我想描述一个场景：在一次重要的考试期间，我却被禁止使用手机。这件事大约发生在两年前，当时我正在一个考试中心参加一场正式的英语考试。考试在一个大教室里进行。考试开始前，监考人员明确告知我们，手机是绝对禁止带入考场的。我们不得不将其关闭并放入房间前方的一个袋子里。我们不被允许使用手机的主要原因是为了确保考试的公平性。手机可能被用于作弊，比如搜索答案或与他人交流，因此禁止使用手机是必要的。此外，手机通知或铃声可能会干扰其他考生，影响他们的专注度起初，我感到有些不适，因为我已习惯性地查看手机，尤其是在感到紧张的时候。但过了一段时间后，我意识到不带手机实际上有助于我更好地集中精力应对考试。我变得更为平静，能够全神贯注于面前的试题。回顾过去，我认为这是一次积极的体验。它让我意识到我并非总是需要使用手机，有时与它断开连接反而能让我更加专注和高效。因此，尽管起初感觉有些不方便，但最终我理解了并接受了这一规则。", "p3": [{"q": "How do young and old people use mobile phones differently?", "a": "Young people mainly use mobile phones for(主要将...用于) social media, entertainment, and online shopping. They are usually more comfortable with(对...感到得心应手) new apps and features(新应用与新功能). Older people, on the other hand(另一方面), tend to(倾向于) use phones for basic communication(基础通讯), such as calls, messages, and news, and they may prefer simple functions.", "t": ""}, {"q": "What positive and negative impact do mobile phones have on friendship?", "a": "On the positive side(从积极的一面来看), mobile phones help people stay in touch(保持联系) easily, even when they live far apart(相隔遥远). They also make it easier to share daily life through messages and photos. However, if people focus too much on their phones, it can reduce face-to-face communication(面对面交流) and weaken real emotional connections(削弱真实的情感连接).", "t": ""}, {"q": "Is it a waste of time to take pictures with mobile phones?", "a": "I don’t think it’s a waste of time(浪费时间) if people take photos to record meaningful moments(记录有意义的时刻), such as trips or family events(家庭活动). Photos can help people keep memories(留住回忆) and share experiences. However, it can become a problem if someone spends too much time taking pictures instead of enjoying the moment itself(享受当下).", "t": ""}, {"q": "Do you think it is necessary to have laws on the use of mobile phones?", "a": "Yes, in some situations(在某些情况下) it is necessary. For example, laws about using mobile phones while driving are important for public safety(公共安全). However, in daily life(日常生活), I think education and self-discipline(自律) are more effective(有效的) than strict laws.", "t": ""}, {"q": "What are examples of good and poor phone manners?", "a": "Good phone manners(手机礼仪) include putting your phone on silent(将手机调成静音) in meetings and paying attention(集中注意力) when talking to others. Poor phone manners would be checking your phone constantly(不停地看手机) during conversations or using it loudly in public places. These behaviours can make others feel disrespected(感到不被尊重).", "t": ""}, {"q": "How does the internet benefit people?", "a": "The internet gives people easy access to information( 获 取 信 息 的 渠 道 ), education, and communication. It allows people to learn new skills, work remotely( 远 程 办 公 ), and stay connected(保持联系) with others around the world(全世界). Overall, it has made life more convenient and efficient(便捷且高效).<br><br><strong>给别人建议</strong>", "t": ""}]}, {"id": "c31", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a time when you gave advice to others", "shouldsay": ["When it was", "To whom you gave the advice", "What the advice was", "And explain why you gave the advice"], "a": "I'd like to talk about a time when I gave advice to one of my close friends who was feeling stressed about his job. This happened about a year ago. <span class=\"conn\">At that time</span>, my friend was working in a company where he often had to <mark class=\"idiom\">work overtime（加班工作）</mark>, and he felt very tired and unhappy. He wasn't sure whether he should stay or look for a new job, <span class=\"conn\">so</span> he came to me for advice. I suggested that he first slow down and think clearly about <mark class=\"idiom\">what he really wanted（真正想要的）</mark>. I advised him to list the advantages and disadvantages of his <mark class=\"idiom\">current job（当前工作）</mark>, <span class=\"conn\">such as</span> salary, work pressure, and <mark class=\"idiom\">future development（发展前景）</mark>. I also told him not to quit immediately, <span class=\"conn\">but</span> to start looking for other opportunities while keeping his current job, <span class=\"conn\">so</span> he wouldn't feel too much <mark class=\"idiom\">financial pressure（经济压力）</mark>. I gave him this advice <span class=\"conn\">because</span> I had experienced a <mark class=\"idiom\">similar situation（相同状况）</mark> before. I knew that making decisions when you are stressed can <mark class=\"idiom\">lead to regret（导致遗憾）</mark>. I wanted him to make a calm and <mark class=\"idiom\">rational choice（理性选择）</mark> instead of <mark class=\"idiom\">acting on emotion（情绪化行动）</mark>. <span class=\"conn\">In the end</span>, he followed my advice. A few months later, he found a new job with <mark class=\"idiom\">better work-life balance（生活工作平衡）</mark>, and he felt much more relaxed. I felt quite happy and proud that my advice was helpful, and this experience also made me realise that <mark class=\"idiom\">listening carefully is just as important as giving advice(倾听和建议同样重要)</mark>.", "t": "我想谈谈一次我向一位与我关系亲密的朋友提供建议的经历。当时，他因工作压力而感到焦虑。这件事大约发生在一年前。当时，我的朋友在一家公司工作，他经常需要加班工作，这让他感到非常疲惫和不满。他拿不定主意是该继续留在这家公司还是另寻新职，于是便向我寻求建议。我建议他首先放慢脚步，仔细思考自己真正想要的是什么。我建议他将当前工作的利弊列出来，比如薪资、工作压力以及未来发展前景等。我还告诉他不要立即辞职，而是可以在保留现有工作的同时开始寻找其他机会，这样他就不会感到太大的经济压力。我之所以给他提出这样的建议，是因为我自己也曾经历过类似的情况。我知道在压力之下做决定可能会导致遗憾。我希望他能做出冷静而理性的选择，而非凭情绪行事。最终，他听从了我的建议。几个月后，他找到了一份工作，这份工作在工作与生活平衡方面有了显著改善。他感觉轻松了许多。我感到非常高兴和自豪，因为我的建议起到了作用。这段经历也让我意识到，认真倾听与提供建议同样重要。", "p3": [{"q": "Should people prepare before giving advice?", "a": "Yes, I think preparation is important, especially if the advice may influence someone’s major decision. People should first understand the situation clearly and ask a few questions, instead of giving quick opinions. Also, it helps to think about possible risks and practical steps. Otherwise, the advice may sound confident but be unrealistic.", "t": ""}, {"q": "Is it good to ask advice from strangers online?", "a": "It can be helpful, but it depends on the topic. Strangers online can offer different perspectives, and sometimes they are more honest because they don’t know you personally. However, the information may be inaccurate or biased, and people may not take responsibility for the results. So I think online advice is useful for general ideas, but for serious issues, it’s safer to consult professionals or trusted people.", "t": ""}, {"q": "What are the personalities of people whose job is to give advice to others?", "a": "People who give advice professionally, like counsellors, coaches, or teachers, are usually patient and good listeners. They often stay calm and don’t judge others too quickly. They also need to be responsible and careful with their words, because their advice can affect people’s feelings and choices. In addition, strong communication skills are essential.", "t": ""}, {"q": "What are the problems if you ask too many people for advice?", "a": "The biggest problem is that you may get too many different opinions, which can confuse you. It can also make you less confident, because you start doubting your own judgement. Another issue is that you might delay decisions, waiting for the “perfect” answer. In the end, it’s better to choose a few reliable sources and then make your own decision.", "t": ""}, {"q": "Why do some people think it is better to ask for advice from friends than from parents?", "a": "Some people prefer asking friends for advice because friends are usually closer to them in age and life experience. Friends may better understand modern pressures, such as relationships, career choices, or social life. In addition, people sometimes feel more comfortable sharing personal problems with friends, because there is less fear of being judged. Parents, although caring, may have more traditional views, which might not always match today’s reality. So advice from friends can feel more relatable and emotionally supportive.", "t": ""}, {"q": "When would old people ask young people for advice?", "a": "Older people often ask young people for advice when it comes to new technology, such as smartphones, online payments, or social media. They may also seek help with modern trends, like new ways of working or studying. In some cases, grandparents ask younger family members for suggestions about lifestyle, health apps, or travel arrangements. This shows that learning can go both ways, and younger generations can provide useful knowledge in a fast-changing world.<br><br><strong>外国的短期停留</strong>", "t": ""}]}, {"id": "c32", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a foreign country you would like to stay or work for a short period of", "shouldsay": ["Which country it is", "Where you got to know this country", "What you will do there", "Why you will stay or work there just for a short period of time"], "a": "The foreign country I would like to stay and work in for a short period of time is Japan. <span class=\"conn\">I first</span> got to know this country through movies, TV shows, and travel videos online. <span class=\"conn\">Later</span>, I also read articles about Japanese culture and <mark class=\"idiom\">daily life（日常生活）</mark>, <span class=\"conn\">especially</span> the way people <mark class=\"idiom\">value discipline（重视纪律）</mark>, politeness, and efficiency. <span class=\"conn\">Over time</span>, I became more curious about what it would be like to actually live and work there. If I had the chance, I would like to stay in a large city <span class=\"conn\">such as</span> Tokyo for a few months. During that time, I would like to work in an <mark class=\"idiom\">education-related（教育相关的）</mark> job, for example teaching English or helping with <mark class=\"idiom\">course materials（课程资料）</mark>. <mark class=\"idiom\">Outside of work（工作之外）</mark>, I would explore the city, try local food, and experience daily life, <span class=\"conn\">such as</span> using public transport and visiting <mark class=\"idiom\">neighbourhood shops（便利店）</mark>. I only want to stay there for a short period of time <span class=\"conn\">because</span> I see it more as a <mark class=\"idiom\">cultural experience(文化体验)</mark> rather than a long-term plan. I believe living in a foreign country can be exciting, <span class=\"conn\">but</span> it can also be stressful due to <mark class=\"idiom\">language barriers（语言障碍）</mark> and different working styles. A short stay would allow me to learn from the culture, improve my communication skills, and gain <mark class=\"idiom\">international experience（海外经历）</mark> without too much pressure. <span class=\"conn\">Overall</span>, I think a short stay in Japan would <mark class=\"idiom\">broaden my horizons（拓展视野）</mark> and help me <mark class=\"idiom\">grow personally and professionally（个人素养和专业能力共同提升）</mark>, which is why it is a country I would really like to experience for a limited time.", "t": "我希望能在日本停留并工作一段时间的外国。最初，我通过电影、电视节目以及网络上的旅游视频来了解这个国家。后来，我还阅读了有关日本文化及日常生活的文章，尤其是人们对纪律、礼貌与效率的重视方式。随着时间的推移，我对在那里实际生活与工作的情形愈发感到好奇。如果有机会的话，我很想能在像东京这样的大城市停留几个月。在此期间，我希望从事一份与教育相关的工作，比如教授英语或协助整理课程资料。工作之余，我会探索这座城市，品尝当地美食，体验日常生活，比如乘坐公共交通工具以及逛逛附近的商店。我只想在那里停留一段较短的时间，因为我更倾向于将其视为一次文化体验而非一项长期计划。我相信生活在异国他乡可能会充满乐趣，但也可能因为语言障碍和不同的工作方式而产生压力。短暂的停留将使我能够从中汲取文化养分、提升沟通技巧并积累海外经历，同时不会承受过大的压力。总的来说，我认为在日本短暂停留将能拓宽我的视野，并有助于我在个人和职业层面实现成长。正因如此，我确实非常希望能有机会在有限的时间内亲身体验这个国家。", "p3": [{"q": "Why do some people think it is better to ask for advice from friends than from parents?", "a": "Some people prefer asking friends for advice because friends are usually closer to them in age and life experience. Friends may better understand modern pressures, such as relationships, career choices, or social life. In addition, people sometimes feel more comfortable sharing personal problems with friends, because there is less fear of being judged. Parents, although caring, may have more traditional views, which might not always match today’s reality. So advice from friends can feel more relatable and emotionally supportive.", "t": ""}, {"q": "When would old people ask young people for advice?", "a": "Older people often ask young people for advice when it comes to new technology, such as smartphones, online payments, or social media. They may also seek help with modern trends, like new ways of working or studying. In some cases, grandparents ask younger family members for suggestions about lifestyle, health apps, or travel arrangements. This shows that learning can go both ways, and younger generations can provide useful knowledge in a fast-changing world.<br><br><strong>想拥有的科技产品</strong>", "t": ""}]}, {"id": "c33", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a piece of technology (not a phone) that you would like to own", "shouldsay": ["What it is", "How much it costs", "How you knew it", "And explain why you would like to own it"], "a": "I'd like to talk about a piece of technology that I would really like to own in the future, which is a high-quality <mark class=\"idiom\">noise-cancelling（降噪）</mark> headphone. This kind of headphone is mainly designed to <mark class=\"idiom\">reduce background noise（环境噪音）</mark> and create a quiet listening environment. It can be used when studying, working, travelling, or even just relaxing at home. I think it would be especially useful in noisy places like public transport or cafés. <span class=\"conn\">As for</span> the price, a good noise-cancelling headphone usually costs around a few thousand yuan, depending on the brand and features. It's not cheap, <span class=\"conn\">but</span> I see it as a <mark class=\"idiom\">long-term investment（长期投资）</mark> rather than an <mark class=\"idiom\">unnecessary（不必要的）</mark> luxury. <span class=\"conn\">I first</span> learned about this technology through <mark class=\"idiom\">online reviews(网络评价)</mark> and videos. Some of my friends also use noise-cancelling headphones and often recommend them to me. They told me that once you try them, it's hard to go back to normal headphones, <span class=\"conn\">because</span> the <mark class=\"idiom\">difference is very clear（差别明显）</mark>. The main reason I want to own one is that I <mark class=\"idiom\">value concentration and efficiency(看重专注与效率)</mark>. I often need to focus on reading, planning, or studying, and noise can be very <mark class=\"idiom\">distracting(让人分心)</mark>. With noise-cancelling headphones, I believe I could <mark class=\"idiom\">work more productively（有成效的）</mark> and feel less stressed. <span class=\"conn\">In addition</span>, they would also improve my listening experience when I enjoy music or podcasts. <span class=\"conn\">Overall</span>, I think this piece of technology would not only make my daily life more comfortable, <span class=\"conn\">but also</span> help me <mark class=\"idiom\">manage my time and energy better(更好地管理时间与精力)</mark>, which is why I would really like to own it.", "t": "我想谈谈一件我未来非常希望能拥有的科技产品，那就是一款高品质的降噪耳机。这种耳机主要设计用于降低环境噪音并营造一个安静的聆听环境。它适用于学习、工作、旅行，甚至是在家放松时使用。我认为它尤其适用于嘈杂的环境，如公共交通或咖啡馆等场所。至于价格方面，一款优质的降噪耳机通常售价在几千元左右，具体价格视品牌及功能特性而定。虽然这并非一笔小开销，但我将其视为一项长期投资而非一种不必要的奢侈品。我最初是通过网络评价和视频了解这种技术的。我的一些朋友也使用降噪耳机，并且经常向我推荐它们。他们告诉我，一旦你尝试过这种耳机，就很难再回到使用普通耳机的时候了，因为两者的差异非常明显。我之所以想拥有一副降噪耳机的主要原因在于，我十分看重专注力和效率。我常常需要专注于阅读、规划或学习，而噪音可能会极大地分散我的注意力。有了降噪耳机，我相信自己能够更加高效地工作，同时也能减少压力感。此外，它们还能提升我在欣赏音乐或收听播客时的聆听体验。总的来说，我认为这项科技产品不仅会使我的日常生活更加舒适，还能帮助我更好地管理时间和精力。正因如此，我真的很想拥有它。", "p3": [{"q": "What are the differences between the technology of the past and that of today?", "a": "Technology in the past was more basic and mainly focused on simple functions. Today’s technology is more advanced, faster, and highly connected through the internet. It also plays a bigger role in daily life, such as work, study, and entertainment. In addition, modern technology is more user-friendly and accessible to ordinary people.", "t": ""}, {"q": "What technology do young people like to use?", "a": "Young people usually prefer technologies related to communication and entertainment. For example, they often use social media apps, streaming platforms, and gaming devices. They also like technology that is convenient and portable, such as tablets and wireless headphones. These tools allow them to stay connected and express themselves easily.", "t": ""}, {"q": "What are the differences between online and face-to-face communication?", "a": "Online communication is more convenient and allows people to talk across long distances. However, face-to-face communication is usually more personal and emotional, because people can see body language and facial expressions. Misunderstandings are also more common online, since messages may lack tone and context.", "t": ""}, {"q": "Do you think technology has changed the way people communicate?", "a": "Yes, technology has clearly changed the way people communicate. People now rely more on messages, voice notes, and video calls instead of in-person conversations. While communication has become faster and easier, it is sometimes less deep and more casual than before.", "t": ""}, {"q": "What negative effects does technology have on people’s relationships?", "a": "One negative effect is that people may spend too much time on their devices and ignore those around them. This can reduce real interaction and emotional connection. Technology can also create misunderstandings, especially when people communicate mainly through text messages.", "t": ""}, {"q": "What are the differences between making friends in real life and online?", "a": "Making friends in real life usually builds stronger trust, because people interact face to face over time. Online friendships are easier to start and can connect people with similar interests, but they may be less stable. In some cases, people online may not be completely honest about themselves.<br><br><strong>擅长做计划的人</strong>", "t": ""}]}, {"id": "c34", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a person who makes plans a lot and is good at planning", "shouldsay": ["Who he/she is", "How you knew him/her", "What plans he/she makes", "And explain how you feel about this person"], "a": "I'd like to describe a person who is very good at making plans, and that person is one of my <mark class=\"idiom\">close colleagues(亲密同事)</mark>. I got to know him a few years ago when we <mark class=\"idiom\">started working together（一起工作）</mark>. From the beginning, I noticed that he was <mark class=\"idiom\">extremely organised(极有条理)</mark>. <span class=\"conn\">Unlike</span> many people who prefer to <mark class=\"idiom\">act spontaneously(随意行事)</mark>, he always thinks ahead and prepares everything in advance. He makes plans for almost every aspect of his life. At work, he plans projects very carefully, including deadlines, <mark class=\"idiom\">task distribution（任务分配）</mark>, and <mark class=\"idiom\">possible risks（潜在风险）</mark>. He often <mark class=\"idiom\">breaks big goals into smaller steps(把大目标拆成小步骤)</mark>, which makes them easier to manage. <span class=\"conn\">Besides</span> work, he also plans his personal life well. <span class=\"conn\">For example</span>, he usually plans his weekly schedule, exercise routine, and even short trips in detail. What impresses me most is that his plans are <mark class=\"idiom\">not rigid（一成不变）</mark>. If something unexpected happens, he knows how to <mark class=\"idiom\">adjust his plan(调整计划)</mark> instead of getting stressed. <span class=\"conn\">Because of this</span>, things around him often run smoothly, and people enjoy working with him. I feel <mark class=\"idiom\">very positive about（对...非常欣赏）</mark> this person. <span class=\"conn\">On the one hand</span>, I admire his ability to <mark class=\"idiom\">stay organised（有条有理）</mark> and calm. <span class=\"conn\">On the other hand</span>, he has influenced me to plan my own time better. <span class=\"conn\">Although</span> I'm not as organised as he is, I've learned that good planning can <mark class=\"idiom\">reduce stress and improve efficiency(减压并提高效率)</mark>. <span class=\"conn\">That's why</span> I really respect him and think he is someone worth learning from.", "t": "我想描述一位非常擅长制定计划的人，而此人正是我的某位亲密同事。数年前我们开始一起工作时，我得以结识了他。从一开始，我就注意到他非常有条理。与许多喜欢随意行事的人不同，他总是能未雨绸缪，凡事都提前做好准备。他几乎为生活的方方面面都制定了计划。在工作中，他非常细致地规划项目，包括设定截止日期、任务分配以及可能出现的各种风险。他常常将大目标分解为若干小步骤，这使得目标的实现变得更为容易掌控。除了工作之外，他也很注重个人生活的规划。例如，他通常会详细规划每周的日程安排、锻炼计划，甚至包括短途旅行的计划。最令我印象深刻的是，他的计划并非一成不变。如果发生意外情况，他懂得如何调整自己的计划，而非因此而感到焦虑。正因如此，他周围的事物往往能够顺利运转，人们也乐于与他共事。我对这个人感到非常欣赏。一方面，我钦佩他保持条理清晰和沉着冷静的能力；另一方面，他对我产生了影响，促使我更好地规划自己的时间。尽管我并没有像他那样善于组织，但我已经认识到良好的规划能够减轻压力并提高效率。正因如此，我真的很尊敬他，认为他是一位值得学习的人。", "p3": [{"q": "Do you think it’s important to plan ahead?", "a": "Yes, I think planning ahead(提前规划) is important because it helps people use time and resources more efficiently(提前规划). It can also reduce stress(缓解压力), especially when you face deadlines( 面 临 截 止 日 期 ) or big decisions. However, plans should be flexible, because unexpected things(意料之外的事情) can always happen. So the key is to plan, but not to over- control(过度控制) everything.", "t": ""}, {"q": "What activities do we need to plan ahead?", "a": "We usually need to plan ahead for activities that involve(涉及...的活动) time, money, or other people(时间、金钱或他人). For example, travelling, important exams, job interviews, and weddings all require preparation(需要准备). Even daily things like a weekly schedule(每周日程) or a fitness plan(健身计划) can be helpful. The more complex(复杂的) the activity is, the more planning is needed.", "t": ""}, {"q": "Do you think children should plan their future careers?", "a": "To some extent(在某种程度上), yes. Children don’t need a fixed career plan(固定的职业规划), but they should explore their interests(探索他们的兴趣) and understand their strengths(了解自己 的优势). Early planning can guide their subject choices(学科选择) and skill development. At the same time, they should keep an open mind(保持开放心态) because their interests may change as they grow up.", "t": ""}, {"q": "Should children ask their teachers or parents for advice when making plans?", "a": "Yes, I think they should, because teachers and parents have more experience(经验更丰富) and can offer practical guidance(切实可行的指导). Teachers may understand a student’s learning ability and habits(学习能力与习惯), while parents know their personality and values(性格与价值 观). However, children should not rely completely on(完全依赖于...) others. They should listen, compare advice(权衡), and then make their own decisions.", "t": ""}, {"q": "Is making study plans popular among young people?", "a": "Yes, it’s quite popular, especially among(尤其是在...群体中) students who are preparing for exams. Many young people use apps or planners to organise tasks and track progress(组织任务并 追踪进度). That said(尽管如此), some students make plans but don’t follow them, because the plan is either too strict or not realistic(太严苛或不切实际). A good plan should be simple and doable(简单且可行).", "t": ""}, {"q": "Do you think choosing a college major is closely related to a person’s future career?", "a": "In many cases, yes, especially for majors like(诸如...的专业) medicine, law, or engineering, where professional knowledge is required( 需要专业知识). However, in some fields, such as business or media, people can change directions( 转 变 方 向 ) more easily. Also, skills like communication, problem-solving, and learning ability matter a lot(非常重要) in the long run(从长 远来看). So a major is important, but it doesn’t completely decide someone’s future(完全决定某人 的未来).<br><br><strong>喜欢画画的孩子</strong>", "t": ""}]}, {"id": "c35", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a child who loves drawing/painting", "shouldsay": ["Who he/she is", "How/when you knew him/her", "How often he/she draws/paints", "And explain why you think he/she loves drawing/painting"], "a": "I'd like to describe a child who really loves drawing, and he is my cousin's son, who is about eight years old. <span class=\"conn\">I first</span> got to know him a few years ago when I visited my cousin's family during a holiday. <span class=\"conn\">At that time</span>, I noticed that he was always holding a pencil or a piece of paper. <span class=\"conn\">While</span> other children were playing with toys or watching cartoons, he preferred to <mark class=\"idiom\">sit quietly and draw(安静地画画)</mark>. He draws almost every day, <span class=\"conn\">especially</span> after school or on weekends. Sometimes he spends more than an hour drawing <mark class=\"idiom\">without getting bored（不觉得无聊）</mark>. He likes drawing animals, cartoon characters, and <mark class=\"idiom\">scenes from his imagination(想象中的场景)</mark>, <span class=\"conn\">such as</span> fantasy cities or space worlds. His parents often buy him colouring pencils and sketchbooks to <mark class=\"idiom\">encourage him(鼓励他)</mark>. I think he loves drawing for several reasons. <span class=\"conn\">First</span>, drawing allows him to <mark class=\"idiom\">express himself freely(自由表达自我)</mark>. He doesn't need to explain his ideas with words, <span class=\"conn\">because</span> he can show them through pictures. <span class=\"conn\">Second</span>, he is a very <mark class=\"idiom\">patient and focused(有耐心又专注)</mark> child, and drawing helps him stay calm and concentrated. <span class=\"conn\">Finally</span>, he often receives praise from his teachers and family members, which gives him confidence and <mark class=\"idiom\">motivates him to keep practising(激励他坚持练习)</mark>. <span class=\"conn\">Overall</span>, I think drawing plays a very positive role in his life. It not only helps him <mark class=\"idiom\">develop creativity（发展创造力）</mark>, <span class=\"conn\">but also</span> improves his <mark class=\"idiom\">ability to focus（专注力）</mark>. I really hope he can keep this hobby as he grows up, <span class=\"conn\">because</span> it brings him joy and a strong sense of achievement.", "t": "我想描述一个非常喜爱绘画的孩子。他是我表弟的儿子，大约八岁。我最初认识他是在几年前的一个假期期间，当时我拜访了表亲的家人。那时，我注意到他总是拿着一支铅笔或一张纸。当其他孩子都在玩玩具或看动画片时，他却更喜欢安静地坐着画画。他几乎每天都会画画，尤其是在放学后或周末的时候。有时他会花费超过一小时的工夫来作画，而且始终不觉得厌烦。他喜欢画动物、卡通角色以及源自自己想象力的场景，比如幻想中的城市或太空世界。他的父母经常为他购买彩色铅笔和素描本，以激励他的创作热情。我认为他喜爱绘画有多个原因。首先，绘画使他能够自由地表达自我。他无需用语言来解释自己的想法，因为可以通过图画来展现它们。其次，他是一位非常耐心且专注的孩子，而绘画有助于他保持冷静和专注。最后，他经常从老师及家人那里获得赞许，这为他带来了自信，并激励他持续练习。总的来说，我认为绘画在他的生活中扮演着非常积极的角色。它不仅有助于他培养创造力，还提升了他的专注力。我真心希望他能随着成长继续坚持这一爱好，因为这为他带来了快乐和强烈的成就感。", "p3": [{"q": "What is the right age for a child to learn drawing?", "a": "I think children can start learning drawing quite early, around 3 to 5 years old, because they naturally enjoy(天生喜欢) using colours and shapes(色彩与形状). At that stage(在那个阶段), it should be more about fun and creativity(乐趣与创造力), not strict skills(严苛的技能). As they grow older, maybe around primary school(小学), they can learn basic techniques(基础技法) if they are interested. The key is to keep it enjoyable(保持其趣味性).", "t": ""}, {"q": "Why do most children draw more often than adults do?", "a": "Children usually have more free time and fewer responsibilities(更少的责任), so they can draw just for fun. Also, they are less worried about being “good” or “bad”, so they feel freer to express themselves(表达自我). Adults, on the other hand(另一方面), often focus on work and may think drawing is not practical(不切实际). Some adults also stop drawing because they fear making mistakes(害怕犯错).", "t": ""}, {"q": "Why do some people visit galleries or museums instead of viewing artworks online?", "a": "Seeing artworks in person(亲身) gives a different experience. People can notice real colours, textures(质感), and details that are hard to feel through a screen(难以通过屏幕感知 ). The atmosphere of a museum(博物馆的氛围) also helps people slow down and focus(慢下来并专注). In addition, visiting a gallery can be a social and cultural activity(一种社交与文化活动), not just a way to “see pictures”.", "t": ""}, {"q": "Do you think galleries and museums should be free of charge?", "a": "I think it depends. Free entry(免费入场) can encourage more people, especially students and families, to enjoy art and learn from it. However, museums also need money for maintenance(维护) and exhibitions(展览). A good solution could be free days or discounted tickets(打折票), so the public can access culture(接触文化资源) while the museum can still operate well(良好运行).", "t": ""}, {"q": "How do artworks inspire people?", "a": "Artworks can inspire people(激励他人) by offering new ideas and different ways of seeing the world(看世界的不同方式). They can also trigger emotions(触发情感), such as hope, curiosity, or even sadness, which makes people reflect on life(感悟人生). Sometimes art motivates people to(激 励某人做某事) create their own work, like writing, photography, or design. In this way, art can influence both feelings and creativity(影响情感与创造力).", "t": ""}, {"q": "What are the differences between reading a book and visiting a museum?", "a": "Reading a book is usually more private and requires imagination( 私 密且 需 要 想 象 力 ), because you create images in your mind(在脑海中构建意象). Visiting a museum is more visual and direct(直观且直接), since you see real objects and artworks. Also, books often give deeper explanations through words(通过文字进行更深层的解释), while museums provide a stronger sense of atmosphere(更强的氛围感) and real-life experience(真实的生活体验). Both are valuable, but they offer different types of learning.<br><br><strong>App/程序</strong>", "t": ""}]}, {"id": "c36", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a program or app on your computer or phone", "shouldsay": ["What it is", "How often you use it", "When/how you use it", "When/how you found it", "And explain how you feel about it"], "a": "I'd like to describe an app on my phone called Notion, which I use very frequently. Notion is a <mark class=\"idiom\">productivity app(效率应用)</mark> that helps me <mark class=\"idiom\">organise tasks（规划任务）</mark>, notes and plans in one place. I use it almost every day, sometimes several times a day, <span class=\"conn\">especially</span> on weekdays. It has become part of my <mark class=\"idiom\">daily routine（日常生活）</mark>. I usually use this app in the morning to plan what I need to do for the day. <span class=\"conn\">For example</span>, I write down my work tasks, study goals and reminders, and I decide which ones are the most important. During the day, I check it briefly to make sure I'm <mark class=\"idiom\">on track(按计划进行)</mark>. In the evening, I sometimes use it again to review what I've done and prepare for the next day. <span class=\"conn\">I first</span> found this app online when I was looking for a <mark class=\"idiom\">better way to manage my time(更好地管理时间)</mark>. I saw many people recommending it on social media and in online forums. Some of my friends were also using it, <span class=\"conn\">so</span> I decided to download it and try it myself. <span class=\"conn\">Overall</span>, I feel very positive about this app. I like it <span class=\"conn\">because</span> it is <mark class=\"idiom\">simple but flexible(简单又灵活)</mark>, and I can <mark class=\"idiom\">customise it to suit my own needs(根据自己的需要定制)</mark>. <span class=\"conn\">Since</span> I started using it, I feel more organised and less stressed, which is why it's one of my favourite apps.", "t": "我想描述一下我手机上一个叫做 Notion 的应用，我经常使用它。是一款生产力应用程序，帮助我在一个地方组织任务、笔记和计划。我几乎每天都使用它，有时一天好几次，尤其是在工作日。它已经成为我日常生活中的一部分。我通常在早上使用这个应用程序来规划当天需要做的事情。例如，我写下我的工作任务、学习目标和提醒事项，并决定哪些是最重要的。在白天，我会简单地检查一下，以确保我在正确的轨道上。晚上，我有时会再次使用它来回顾我已经做了什么并为第二天做准备。我第一次在网上找到这个应用程序，当时我在寻找更好的时间管理方法。我看到很多人在社交媒体和在线论坛上推荐它。我的一些朋友也在使用它，所以我决定下载并自己尝试一下。总的来说，我对这个应用程序感到非常积极。我喜欢它是因为它简单但灵活，我可以根据自己的需要进行定制。自从我开始使用它以来，我觉得更有条理，压力更小，这就是为什么它是我的最爱之一的原因之一。", "p3": [{"q": "What are the differences between old and young people when using apps?", "a": "Young people usually learn new apps faster and are more willing to try different functions. They often use apps for social media, entertainment, and online shopping. Older people tend to prefer simple and practical apps, such as messaging, payments, and news. Also, many older users are more careful about privacy and may feel less confident when the interface is complicated.", "t": ""}, {"q": "Why do some people not like using apps?", "a": "Some people don’t like apps because they feel they are time-consuming and distracting. Others worry about privacy, such as personal data being collected or shared. In addition, some apps are not user- friendly, with too many ads or complicated steps. For these people, websites or offline services feel more comfortable and reliable.", "t": ""}, {"q": "What apps are popular in your country? Why?", "a": "In China, apps like WeChat and Alipay are extremely popular because they cover many daily needs, such as chatting, paying, and booking services. Short-video apps are also common because they provide quick entertainment and are easy to use. These apps succeed mainly because they are convenient and have a large user base, so people naturally follow the trend.", "t": ""}, {"q": "Should parents limit their children’s use of computer games? Why and how?", "a": "Yes, I think some limits are necessary, especially for younger children. Too much gaming can affect sleep, study habits, and even eyesight. Parents can set clear rules, such as time limits on weekdays, and encourage other activities like sports or reading. More importantly, parents should communicate with children and explain the reasons, instead of simply banning games.", "t": ""}, {"q": "Do you think young people are more and more reliant on these programs?", "a": "Yes, I do. Many young people use apps for almost everything, from communication to learning and even ordering food. This reliance brings convenience, but it can also reduce independent thinking and self-control. So I think it’s important for young people to use apps as tools, rather than letting apps control their daily life.<br><br><strong>微笑的场合</strong>", "t": ""}]}, {"id": "c37", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe an occasion when many people were smiling", "shouldsay": ["When it happened", "Who you were with", "What happened", "And explain why most people were smiling"], "a": "I'd like to describe an occasion when many people were smiling, which was a small celebration held after an important exam. This happened about a year ago, after my classmates and I finished a <mark class=\"idiom\">major exam（重要的考试）</mark> that we had been preparing for a long time. We were all <mark class=\"idiom\">under a lot of pressure(承受很大压力)</mark> before that day, <span class=\"conn\">so</span> everyone was really looking forward to the moment it ended. I was with my classmates and a few teachers. After the exam, we gathered near the school gate and decided to have a simple meal together. People were chatting, laughing, and <mark class=\"idiom\">sharing their feelings(分享感受)</mark> about the exam. Some talked about difficult questions, <span class=\"conn\">while</span> others joked about their mistakes. Even the teachers looked more relaxed than usual. What impressed me most was the <mark class=\"idiom\">atmosphere(氛围)</mark>. Almost everyone was smiling, not because the exam was easy, <span class=\"conn\">but</span> because the pressure was finally gone. We felt <mark class=\"idiom\">relieved(松了一口气)</mark> and proud that we had <mark class=\"idiom\">done our best(尽了全力)</mark>. For many of us, it was also a moment of freedom, <span class=\"conn\">since</span> we could finally rest and enjoy some time without worrying about study plans or deadlines. I think most people were smiling <span class=\"conn\">because</span> it was a <mark class=\"idiom\">shared experience(共同的经历)</mark>. We had gone through stress together, and finishing the exam felt like a <mark class=\"idiom\">small victory(小小的胜利)</mark>. That moment reminded me how powerful a <mark class=\"idiom\">sense of relief and togetherness(放松与团结的感觉)</mark> can be, and it made the whole experience very memorable.", "t": "我想描述一个众人皆面带微笑的场景，那是在一场重要考试结束后举行的小型庆祝活动上。这件事大约发生在一年前，当时我和我的同学们刚刚完成了一场我们为之准备了很长时间的重要考试。在那之前，我们每个人都承受着巨大的压力，因此每个人都非常期待这一刻的结束。当时我正与同学们以及几位老师在一起。考试结束后，我们聚集在校园大门口，决定一起吃顿简单的便餐。大家边聊边笑，分享着各自对考试的感受。有人谈论着难题，也有人拿自己的错误开玩笑。就连老师们看起来也比平时更加放松。最令我印象深刻的是那里的氛围。几乎每个人都在微笑，这并不是因为考试变得简单了，而是因为压力终于消失了。我们感到如释重负，并为自己尽了全力而感到自豪。对于我们中的许多人而言，这也是一段自由的时刻，因为我们终于可以放松下来，尽情享受一段时光，而无须再为学习计划或截止日期而担忧。我想大多数人都面带微笑，因为这是一种共同的体验。我们共同经历了压力，而完成考试则仿佛是一场小小的胜利。那一刻让我深刻体会到一种释然与团结的感觉是何等强大，这也使得整个经历变得格外难忘。", "p3": [{"q": "Do you think people who like to smile are more friendly?", "a": "In general, yes. People who smile often give others a positive first impression(第一印象) and seem more approachable(平易近人的). Smiling can help reduce distance(缩短距离) between people and make communication easier. However, friendliness also depends on behaviour and attitude, not just facial expressions(面部表情).", "t": ""}, {"q": "Why do most people smile in photographs?", "a": "Most people smile in photographs because they want to look happy and leave a good memory(留下 美好的回忆). Photos often record important moments(记录重要时刻), so people prefer to show their best side(展现自己最好的一面). Smiling also makes the picture look more natural and pleasant(自然且令人愉悦). In addition, it has become a social habit(社会习惯) when taking photos.", "t": ""}, {"q": "Do women smile more than men? Why?", "a": "In many cases, yes. Women are often encouraged by society(受社会鼓励) to appear warm and friendly(显得温暖而友好), so smiling becomes more common for them. Men, on the other hand, may feel pressure to look serious or confident(严肃或自信). However, this difference is influenced by(受...影响) culture and personality, not gender alone(仅仅因为性别).", "t": ""}, {"q": "Do people smile more when they are younger or older?", "a": "I think younger people tend to smile more. They usually have fewer responsibilities(更少的责任) and feel more relaxed about life. Older people may face more pressure from work or family, which can reduce spontaneous smiles(自发的微笑). That said, some older people smile more because they become calmer and more accepting(更从容、更随缘) over time.", "t": ""}, {"q": "Is smiling important in your culture?", "a": "Yes, smiling is quite important in my culture. It is often seen as a sign of politeness and respect(礼貌 与尊重的标志), especially in daily interactions(日常互动). Smiling can help avoid conflict(避免冲 突) and create a friendly atmosphere(友好的氛围). Even in formal situations(正式场合), a light smile(浅笑) is usually appreciated.", "t": ""}, {"q": "Are there any occasions when people need to pretend to smile?", "a": "Yes, there are. For example, in customer service(客户服务) or professional settings(职业场合), people may smile even when they feel tired or stressed. This is often done to stay polite and professional(保持礼貌与专业). However, pretending too much(过度伪装) can be emotionally exhausting(身心俱疲), so balance is important(平衡很重要).<br><br><strong>为家人骄傲</strong>", "t": ""}]}, {"id": "c38", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a time when you felt proud of a family member", "shouldsay": ["When it happened", "Who the person is", "What the person did", "And explain why you felt proud of him/her"], "a": "I'd like to talk about a time when I felt very proud of one of my family members, and that person is my mother. This happened a few years ago, when my mother decided to <mark class=\"idiom\">make a big change(做出重大改变)</mark> in her life. She had been working in the same job for many years, <span class=\"conn\">but</span> she felt it no longer suited her. <span class=\"conn\">Even though</span> she was already in her fifties, she chose to learn new skills and start a different kind of work. What impressed me most was her attitude. She attended training courses, studied on her own, and <mark class=\"idiom\">wasn't afraid of asking for help(不怕求助)</mark> from younger people. <span class=\"conn\">At the beginning</span>, things were not easy for her, and she often felt tired and stressed. <span class=\"conn\">However</span>, she <mark class=\"idiom\">never gave up(从不放弃)</mark> and kept pushing herself forward. I felt extremely proud of her <span class=\"conn\">because</span> many people are afraid of change, <span class=\"conn\">especially</span> at that age. She showed great <mark class=\"idiom\">courage and determination（勇气与决心）</mark> by <mark class=\"idiom\">stepping out of her comfort zone（舒适区）</mark>. <span class=\"conn\">Instead of</span> complaining about difficulties, she focused on solving problems and improving herself. This experience taught me an important lesson. Seeing my mother face challenges with such a <mark class=\"idiom\">positive mindset（积极心态）</mark> encouraged me to be braver in my own life. <span class=\"conn\">That's why</span> this moment has stayed in my memory, and why I still feel proud of her whenever I think about it.", "t": "我想谈谈一段令我感到非常自豪的经历，那是在我的一位家庭成员身上发生的，这个人就是我的母亲。这件事发生在几年前，当时我母亲决定要在自己的人生中做出重大改变。她已在同一份工作上工作了多年，但感觉这份工作已不再适合她。尽管当时她已经年过五十，她还是选择学习新技能并从事一种全新的工作。最令我印象深刻的是她的态度。她参加了培训课程，独自进行学习，并且不畏惧向年轻人寻求帮助。起初，对她来说一切都并非易事，她时常感到疲惫和压力重重。然而，她从未放弃，始终不断砥砺前行。我感到非常为她感到自豪，因为许多人害怕改变，尤其是在那个年龄阶段。她表现出了极大的勇气和决心，毅然走出了自己的舒适区。她没有抱怨遇到的困难，而是专注于解决问题并提升自我。这段经历给我上了一堂重要的课。看到我的母亲以如此积极的心态面对挑战，激励我在自己的人生中变得更加勇敢。正因如此，这段经历才得以铭刻在我的记忆中，每当回想起此事时，我仍会为她感到自豪。", "p3": [{"q": "When would parents feel proud of their children?", "a": "Parents usually feel proud when their children show good character, not only good results. For example, they may feel proud when a child is responsible, kind, or independent. Of course, achievements like winning a competition or improving grades can also make parents proud. But in the long run, many parents value attitude and effort more.", "t": ""}, {"q": "Should parents reward children? Why and how?", "a": "Yes, I think rewards can be useful if they are used wisely. Rewards can encourage children and help them build good habits, especially when they are young. Parents can use small rewards, like extra play time or a family activity, rather than expensive gifts. It’s also important to praise the process, such as effort and discipline, not only the final result.", "t": ""}, {"q": "Is it good to reward children too often? Why?", "a": "No, rewarding too often can create problems. Children may become dependent on rewards and stop doing things for the right reasons. They might ask, “What do I get if I do it?” instead of developing self-motivation. So rewards should be occasional and meaningful, not automatic.", "t": ""}, {"q": "On what occasions would adults be proud of themselves?", "a": "Adults often feel proud when they overcome difficulties or achieve a long-term goal. For example, getting a promotion, learning a new skill, or improving health through exercise can be proud moments. Some adults also feel proud when they handle pressure well or support their family. In short, it’s usually about personal growth and responsibility.", "t": ""}, {"q": "Do rewards help a child become better?", "a": "Rewards can help, but they are not the only factor. They can provide short-term motivation and make children feel recognised. However, to become truly better, children also need guidance, good habits, and a supportive environment. If rewards replace real learning, the effect may be limited.", "t": ""}, {"q": "What do you think about children working hard just for grades?", "a": "I understand why it happens, because exams can strongly influence a child’s future. However, if children only care about grades, they may lose interest in learning and feel stressed all the time. Ideally, grades should be one goal, but children should also develop real skills, curiosity, and confidence. Parents and schools can help by focusing more on progress and learning methods, not just scores.<br><br><strong>对家庭重要的东西</strong>", "t": ""}]}, {"id": "c39", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe something important that has been kept in your family for a long time", "shouldsay": ["What it is", "When your family had it", "How your family got it", "And explain why it is important to your family"], "a": "I'd like to describe something important that has been kept in my family for a long time, which is an old wooden desk that belonged to my grandfather. My family has had this desk for more than forty years. My grandfather bought it when he was young, long before I was born. After he passed away, the desk was kept by my parents, and now it is placed in our study room. <span class=\"conn\">As far as I know</span>, my grandfather got this desk when he first started working. <span class=\"conn\">At that time</span>, money was limited, <span class=\"conn\">so</span> he chose something <mark class=\"idiom\">simple but solid（简约但结实）</mark>. He used this desk every day for reading, writing letters, and doing paperwork. <span class=\"conn\">Later</span>, my father also used it when he was a student, and I used it myself when I was preparing for important exams. This desk is important to my family not because of its <mark class=\"idiom\">material value（物质价值）</mark>, <span class=\"conn\">but</span> because of its <mark class=\"idiom\">emotional meaning（情感价值）</mark>. It reminds us of my grandfather's <mark class=\"idiom\">hardworking attitude(勤奋的态度)</mark> and simple lifestyle. Every time I see it, I feel a <mark class=\"idiom\">sense of connection between different generations(几代人之间的联系)</mark> in my family. I think objects like this <mark class=\"idiom\">carry memories and family values(承载记忆与家族价值观)</mark>. Keeping it helps us remember where we come from and encourages us to <mark class=\"idiom\">stay patient and disciplined（坚守耐心与自律）</mark>. <span class=\"conn\">That's why</span> this desk is something truly important to my family.", "t": "我想描述一件在我家族中珍藏已久的重要物品，那是一张属于我祖父的旧式木制书桌。我们家这把书桌已有四十多年的历史了。我的祖父年轻时便购置了它，那是在我出生之前很久的事。他去世后，书桌由我的父母保管，如今它被摆放在我们家的书房里。据我所知，我的祖父在刚开始工作时便拥有了这张书桌。当时经济条件有限，所以他选择了既简约又结实的一款。他每天都用它来阅读、写信和处理文书工作。后来，我父亲在上学期间也曾使用过这张书桌，而我自己在准备重要考试时也用过它。这张书桌对于我的家庭而言十分重要，这并非因为它具有物质价值，而是因为它承载着情感意义。它让我们想起祖父勤勉的工作态度和简朴的生活方式。每当我看到它时，都会感受到家族中不同世代之间的一种联结感。我认为这样的物品承载着记忆与家庭价值观。保留它有助于我们忆起自己的来处，并激励我们保持耐心与自律。正因如此，这张书桌对于我的家庭而言具有极其重要的意义。", "p3": [{"q": "What things do families keep for a long time?", "a": "Families often keep items with emotional value, such as old photos, letters, jewellery, or handmade gifts. Some also keep practical things that last a long time, like furniture or traditional tools. These objects are usually connected to family memories and important events. In many cases, they are passed down from one generation to another.", "t": ""}, {"q": "What’s the difference between things valued by people in the past and today?", "a": "In the past, people tended to value durability and usefulness, because life was not as convenient as it is now. They often kept items for many years and repaired them when they were broken. Today, many people value convenience, design, and brand image, and they replace things more quickly. However, some people still value tradition and prefer meaningful items.", "t": ""}, {"q": "What kinds of things are kept in museums?", "a": "Museums usually keep objects that have historical, cultural, or artistic value. For example, they may display ancient tools, traditional clothing, paintings, and documents. Some museums also keep scientific items, such as old machines or inventions. These collections help people understand the past and how society has developed.", "t": ""}, {"q": "What’s the influence of technology on museums?", "a": "Technology has made museums more interactive and engaging. Many museums now use videos, audio guides, and digital screens to explain exhibitions more clearly. Some even offer virtual tours, which allow people to visit online. However, technology can sometimes distract visitors if it is overused, so a good balance is important.", "t": ""}, {"q": "What are the benefits of technology for learning history?", "a": "Technology makes learning history easier and more vivid. People can watch documentaries, view digital archives, and explore historical maps online. It also helps students understand complex events through animations or interactive materials. Overall, technology makes history more accessible and more interesting.", "t": ""}, {"q": "Why do people visit museums?", "a": "People visit museums to learn about history, culture, and art in a more direct way. Seeing real objects can be more impressive than reading about them online. Museums also provide a quiet and educational environment, which is good for families and students. In addition, for some people, visiting museums is a meaningful way to spend time and broaden their horizons.<br><br><strong>商场</strong>", "t": ""}]}, {"id": "c40", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a shopping mall", "shouldsay": ["What its name is", "Where it is", "How often you visit it", "And what you usually buy at the mall"], "a": "I'd like to describe a shopping mall that I often visit, called IFC Mall. This shopping mall is located in the <mark class=\"idiom\">city centre(市中心)</mark>, not far from where I live, <span class=\"conn\">so</span> it's very convenient to get there by metro. The area around it is quite modern, and it's also close to office buildings and <mark class=\"idiom\">tourist attractions（旅游景点）</mark>, which makes it very <mark class=\"idiom\">lively(充满活力)</mark>. I don't go there every week, <span class=\"conn\">but</span> I usually visit it once or twice a month, <span class=\"conn\">especially</span> on weekends or holidays. Sometimes I go there alone to relax, and sometimes I meet friends there. It's not only a place for shopping, <span class=\"conn\">but also</span> a place where I can spend time and enjoy myself. When I go to this mall, I usually buy <mark class=\"idiom\">daily necessities（生活必需品）</mark> or clothes. There are many <mark class=\"idiom\">international brands(国际品牌)</mark>, <span class=\"conn\">so</span> it's easy to find something of good quality. I also like to buy coffee or dessert there, <span class=\"conn\">because</span> the cafés are comfortable and nicely designed. <span class=\"conn\">Occasionally</span>, I watch a movie in the cinema inside the mall, <span class=\"conn\">especially</span> when a new film comes out. What I like most about this shopping mall is the <mark class=\"idiom\">overall experience（综合体验）</mark>. It's clean, <mark class=\"idiom\">well-organised（规划合理）</mark>, and not too noisy compared with some other malls. I feel relaxed when I'm there, even if I don't buy much. <span class=\"conn\">That's why</span> it's one of my favourite shopping malls and a place I enjoy visiting regularly.", "t": "我想描述一下我经常光顾的一家购物中心，它名为 IFC 商场。这座购物中心位于市中心，离我居住的地方不远，因此乘坐地铁前往非常便捷。周边区域相当现代化，且邻近办公楼和旅游景点，这使得这里显得格外热闹。我并非每周都去那里，但通常每月会去一两次，尤其是在周末或节假日的时候。有时我会独自前往那里放松身心，有时也会在那里与朋友相聚。它不仅仅是一个购物的场所，更是一个让我能够消磨时光、尽情享受的地方。当我前往这家商场时，我通常会购买日常必需品或衣物。这里有许多国际知名品牌，因此很容易找到品质上乘的商品。我还喜欢在这里购买咖啡或甜点，因为这里的咖啡馆环境舒适、设计雅致。偶尔，我还会在商场内的电影院里观看电影，尤其是当有新片上映时。我最喜欢这家购物中心的一点在于其整体体验。这里整洁有序，而且相较于其他一些商场而言，噪音也不算太大。即便我并未在此处购买太多东西，我也能感到放松自在。正因如此，它才成为了我最喜爱的购物中心之一，也是我乐于定期造访的地方。", "p3": [{"q": "Why do people buy things they don’t need?", "a": "People often buy unnecessary things because of emotional reasons, such as stress, boredom, or the desire to feel happier. Advertising and discounts also play a big role, because they create a sense of urgency. In addition, shopping can give people short-term satisfaction, even if the item is not really useful.", "t": ""}, {"q": "Do you think it’s a waste of time to go shopping?", "a": "I don’t think it’s always a waste of time. For some people, shopping is a way to relax or socialise, especially when they go with friends or family. However, if people shop without a clear purpose or spend too much time comparing products, it can become inefficient. So it really depends on how and why people shop.", "t": ""}, {"q": "Why are some people keen on shopping?", "a": "Some people enjoy shopping because it helps them release pressure and improve their mood. Others like the feeling of choosing and buying new things, which gives them a sense of control or achievement. For some, shopping is also a hobby or a social activity, not just a practical task.", "t": ""}, {"q": "What kind of people like shopping?", "a": "People who like fashion, trends, or new products are often keen on shopping. Those with more free time or stronger spending power may also enjoy it more. In addition, people who are outgoing and enjoy social environments may like shopping malls, because they offer entertainment, food, and social interaction.", "t": ""}, {"q": "Where do people like to shop in your country?", "a": "In my country, many people like shopping in large shopping malls because they offer everything in one place, including clothing, food, and entertainment. Malls are also comfortable, especially in hot summers or cold winters, since they are air-conditioned. At the same time, online shopping is extremely popular now, because it is convenient and often cheaper. People can easily compare prices and have items delivered to their homes. So overall, both shopping malls and online platforms are the most common choices.", "t": ""}, {"q": "Do you think women like shopping more than men?", "a": "Generally speaking, women may seem to enjoy shopping more because they often pay more attention to fashion and daily household needs. Shopping can also be a social activity for some women, like going out with friends. However, I don’t think it’s simply about gender. Many men also enjoy shopping, especially for electronics, sports equipment, or luxury products. So it depends more on personal interests rather than whether someone is male or female.<br><br><strong>自行车/摩托车/汽车旅行</strong>", "t": ""}]}, {"id": "c41", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a bicycle/motorcycle/car trip you would like to go", "shouldsay": ["Who you would like to go with", "Where you would like to go", "When you would like to go", "And explain why you would like to go by bicycle/motorcycle/car"], "a": "I'd like to describe a car trip that I would really like to go on in the future. For this trip, I would like to go with one or two close friends. We know each other very well, <span class=\"conn\">so</span> travelling together would be relaxed and enjoyable. We could <mark class=\"idiom\">take turns driving（轮流驾驶）</mark>, chatting along the way, and stopping whenever we feel like it. The place I would like to go to is a <mark class=\"idiom\">coastal area(沿海地区)</mark> with beautiful scenery, <span class=\"conn\">such as</span> a seaside city or a small town by the ocean. I imagine driving along the coast, with the sea on one side and mountains or small villages on the other. We could stop to take photos, enjoy local food, and <mark class=\"idiom\">watch the sunset(看日落)</mark> by the sea. I would like to go on this trip during a long holiday, maybe in summer or early autumn, when the weather is warm but not too hot. That would be the best time to enjoy outdoor views and spend time on the road <mark class=\"idiom\">without feeling rushed(不慌不忙)</mark>. I prefer travelling by car <span class=\"conn\">because</span> it gives me a strong <mark class=\"idiom\">sense of freedom(自由感)</mark>. <span class=\"conn\">Unlike</span> public transport, a car allows us to <mark class=\"idiom\">control our own schedule(掌控自己的行程)</mark> and change plans easily. We don't have to worry about timetables, and we can explore places that are <mark class=\"idiom\">not very touristy(游客较少)</mark>. I think this kind of road trip would be relaxing, flexible, and memorable, <span class=\"conn\">which is why</span> I really want to experience it.", "t": "对于此次旅程，我希望能与一两位亲密朋友同行。我们彼此非常了解，因此结伴出行会既轻松又愉快。我们可以轮流驾驶，沿途畅聊，并且随时可根据心情选择停留。我想去的地方是一片拥有美丽景色的沿海区域，比如一座海滨城市或依傍着海洋的小镇。我想象着自己沿着海岸线驾车前行，一侧是海洋，另一侧是山脉或小村庄。我们可以在途中停下来拍照、品尝当地美食，并观赏海边日落的美景。我希望能在一个长假期间进行这次旅行，或许是在夏季或初秋时节，那时天气温暖但不至于过于炎热。那将是尽情欣赏户外美景、悠然自得地在路上徜徉的最佳时机。我更喜欢驾车出行，因为这能让我强烈感受到自由的感觉。与公共交通不同，汽车使我们能够掌控自己的行程安排，并能够轻松改变计划。我们无需担心时刻表的问题，而且还能探索那些不太受游客青睐的地点。我认为这种自驾游会非常放松、灵活且令人难忘，这也是我十分想亲身体验一番的原因。", "p3": [{"q": "Which form of vehicle is more popular in your country, bikes, cars or motorcycles?", "a": "In China, cars are very popular, especially among families, because they are convenient for commuting and travelling. At the same time, bikes and e-bikes are also common in big cities for short distances, since they are cheap and flexible. Motorcycles are less common in many urban areas because of traffic rules and safety concerns, although they are still used more in some smaller cities and rural areas.", "t": ""}, {"q": "Do you think air pollution comes mostly from mobile vehicles?", "a": "Vehicles are definitely one important source, especially in large cities with heavy traffic. However, I don’t think they are the only main cause. Factories, construction, and power generation can also contribute a lot to air pollution. So vehicles matter, but the real situation depends on the city and its industries.", "t": ""}, {"q": "Do you think people need to change the way of transportation drastically to protect the environment?", "a": "In the long term, yes, some major changes are necessary. For example, people can rely more on public transport, and cities can encourage electric vehicles and cycling. But I don’t think change must be sudden or extreme, because many people still need cars for work or family reasons. A more realistic approach is gradual change with better infrastructure and clear policies.", "t": ""}, {"q": "How are the transportation systems in urban areas and rural areas different?", "a": "Urban areas usually have more developed systems, such as metros, buses, and ride-hailing services, so people have many choices. Rural areas often have fewer public transport options, and buses may not be frequent or reliable. As a result, people in rural areas may depend more on private vehicles. In addition, roads and traffic management are usually better in cities than in remote areas.<br><br><strong>鼓励你保护自然的人</strong>", "t": ""}]}, {"id": "c42", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a person who encouraged you to protect the nature", "shouldsay": ["Who he/she is", "How he/she encouraged you", "What he/she encouraged you to do", "And explain how you feel about this person"], "a": "I'd like to describe a person who encouraged me to protect nature, and that person is one of my former teachers. I got to know her when I was a student at school. She was <span class=\"conn\">not only</span> our teacher, <span class=\"conn\">but also</span> someone who really <mark class=\"idiom\">cared about environmental issues(关心环境问题)</mark>. She often talked to us about nature and the <mark class=\"idiom\">importance of protecting the environment(保护环境的重要性)</mark>, both in and outside the classroom. She encouraged me mainly <mark class=\"idiom\">through her actions rather than just words(以行动而非言语)</mark>. <span class=\"conn\">For example</span>, she organised activities <span class=\"conn\">such as</span> cleaning parks, <mark class=\"idiom\">reducing waste(减少浪费)</mark> at school, and using <mark class=\"idiom\">reusable bottles(可重复使用的瓶子)</mark> instead of disposable ones. She also shared real examples of environmental problems, like pollution and <mark class=\"idiom\">climate change（气候变化）</mark>, which made these issues feel more real and closer to our daily life. What she encouraged me to do was actually <mark class=\"idiom\">simple but practical(简单却实用)</mark>. She told us to start with small habits, <span class=\"conn\">such as</span> <mark class=\"idiom\">sorting rubbish（垃圾分类）</mark>, saving water and electricity, and avoiding unnecessary plastic use. She believed that even <mark class=\"idiom\">small actions could make a difference(小行动也能带来改变)</mark> if many people did them together. I feel <mark class=\"idiom\">very positive about(非常欣赏)</mark> this person. I admire her <span class=\"conn\">because</span> she didn't force us to do anything, <span class=\"conn\">but</span> <mark class=\"idiom\">inspired us to care more about nature(激励我们更关心自然)</mark>. <span class=\"conn\">Because of</span> her influence, I became more aware of my daily behaviour and its <mark class=\"idiom\">impact on the environment(对环境的影响)</mark>. I think she played an important role in <mark class=\"idiom\">shaping my attitude(塑造我的态度)</mark> toward protecting nature, and <span class=\"conn\">that's why</span> I really respect her.", "t": "我想描述一位曾鼓励我保护自然的人，此人正是我的一位前教师。我还在学校读书时便结识了她。她不仅是我们的老师，还是一位真正关心环境问题的人。她经常与我们谈论大自然以及保护环境的重要性，无论是在课堂内还是课堂外。她主要是通过实际行动而非单纯言语来鼓励我。例如，她组织了各种活动，如清理公园、减少学校内的废弃物、使用可重复使用的水瓶而非一次性用品等。她还分享了有关环境问题的真实案例，如污染和气候变化等，这让这些问题显得更加真实，也更贴近我们的日常生活。她鼓励我去做的事情其实相当简单但却十分实用。她告诉我们要从一些小习惯入手，比如分类垃圾、节约用水和用电、避免无谓地使用塑料制品。她相信，如果众多人共同采取这些行动，即便是微小的举动也能产生显著影响。我对这个人感到非常欣赏。我钦佩她，因为她并未强迫我们做任何事情，而是激发了我们对自然的更多关注。由于她的影响，我开始更加留意自己的日常行为及其对环境造成的影响。我认为她在塑造我对保护自然的观念方面起到了重要作用，正因如此，我由衷地尊敬她。", "p3": [{"q": "How can parents teach their children to protect nature?", "a": "Parents can start by setting a good example(树立榜样) in daily life, such as sorting rubbish(垃圾 分类), saving water and electricity(节水节电), and reducing plastic use(减少塑料使用). They can also involve children in simple activities, like planting a small tree, recycling, or joining a community clean-up(社区清理活动). More importantly, parents should explain why these actions matter(解 释为何这些行动很重要), so children understand the meaning instead of just following rules(遵循规 则).", "t": ""}, {"q": "Should schools teach children to get close to nature?", "a": "Yes, I think schools should do that. Being close to nature helps children develop curiosity(培养好 奇心) and respect for the environment. Schools can organise outdoor classes(户外课堂), field trips(实地考察), or small gardening projects(小型园艺项目), so students learn through real experiences. It can also reduce stress(减轻压力) and improve students’ mental health(心理健康), especially in busy cities.", "t": ""}, {"q": "Do you think there should be laws to protect nature?", "a": "Yes, laws are necessary(必要的) because some environmental problems are too large to solve through personal efforts alone(单凭个人努力). For example, industries need clear rules about pollution control(污染控制), waste management(废物管理), and resource use(资源利用). However, laws work best when people also have environmental awareness(环保意识) and are willing to cooperate(愿意配合). So we need both strict rules and public education.<br><br><strong>机智解决问题的人</strong>", "t": ""}]}, {"id": "c43", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a person who solved a problem in a smart way", "shouldsay": ["Who this person is", "What the problem was", "How he/she solved it", "And explain why you think he/she did it in a smart way"], "a": "I'd like to describe a person who solved a problem in a smart way, and this person is one of my colleagues. The problem happened at work about a year ago. Our team was working on an important project, <span class=\"conn\">but</span> close to the deadline we realised that there was a serious <mark class=\"idiom\">communication problem(沟通问题)</mark>. Different team members had different understandings of their tasks, which caused delays and <mark class=\"idiom\">repeated（重复的）</mark> work. Everyone felt stressed, and the <mark class=\"idiom\">atmosphere became quite tense(气氛变得紧张)</mark>. <span class=\"conn\">Instead of</span> blaming others, my colleague <mark class=\"idiom\">stayed calm（保持冷静）</mark> and tried to understand the situation. <span class=\"conn\">First</span>, he suggested holding a short meeting where everyone clearly explained what they were <mark class=\"idiom\">responsible for（对...负责）</mark>. <span class=\"conn\">Then</span>, he create
