e a little volcano using <mark class=\"idiom\">baking soda and vinegar（小苏打和醋）</mark>. It was super simple, <span class=\"conn\">but</span> it really <mark class=\"idiom\">brought the theory to life（让理论变得生动）</mark>.", "t": "我做过不少有趣的实验。比如化学课上，我们曾用小苏打和醋做了座小火山。特别简单，但真的让理论变得生动了起来。"}, {"q": "5. Do you like watching science TV programs?", "a": "Yeah, I'm <mark class=\"idiom\">a big fan of（很喜欢）</mark> <mark class=\"idiom\">documentaries（纪录片）</mark>, <span class=\"conn\">especially</span> ones about space and nature. They're <span class=\"conn\">not only</span> <mark class=\"idiom\">educational（有教育意义的）</mark> <span class=\"conn\">but also</span> <mark class=\"idiom\">amazing to look at（画面超美的）</mark>. I usually watch an episode or two before bed to <mark class=\"idiom\">wind down（放松一下）</mark>.", "t": "是的，我很喜欢纪录片，尤其是关于太空和自然的。它们不仅有教育意义，画面也超美。我通常会在睡前看一两集放松一下。"}, {"q": "6. Do Chinese people often visit science museums?", "a": "I'd say it's getting <mark class=\"idiom\">more and more common（越来越普遍）</mark>, <span class=\"conn\">especially</span> with families that have kids. Parents take their children there to learn through <mark class=\"idiom\">hands-on exhibits（互动展品）</mark>, <span class=\"conn\">which</span> is a fun way to learn. <span class=\"conn\">During holidays</span>, these places can get really <mark class=\"idiom\">packed（挤满人）</mark>.", "t": "我觉得这越来越普遍了，尤其是有孩子的家庭。父母带孩子去那里通过互动展品来学习，这是一种有趣的学习方式。一到假期，这些地方会挤满人。"}]}, {"id": "t17", "tag": "本季新题", "emoji": "🪞", "title": "Mirrors", "count": 4, "items": [{"q": "1. Do you like looking at yourself in the mirror? How often?", "a": "Yeah, <span class=\"conn\">but</span> only a few times a day, <span class=\"conn\">mainly when</span> I get up or before I <mark class=\"idiom\">head out（出门）</mark>. I just <mark class=\"idiom\">take a quick look（快速看一眼）</mark> to check my hair and outfit. I'm not the type to stand there <mark class=\"idiom\">staring at（盯着看）</mark> myself for ages.", "t": "会，但一天就几次，主要是起床后或出门前。我就快速看一眼，整理一下头发和穿搭。我不是那种会对着镜子盯着自己看半天的人。"}, {"q": "2. Have you ever bought mirrors?", "a": "Yeah, I bought a <mark class=\"idiom\">full-length mirror（全身镜）</mark> for my bedroom last year. I needed one so I could see my whole outfit before going out. It was pretty cheap <span class=\"conn\">but</span> really <mark class=\"idiom\">handy（实用的）</mark>.", "t": "买过，去年我给卧室买了面全身镜。我需要一面镜子，好在出门前看看整套搭配。它挺便宜的，但真的很实用。"}, {"q": "3. Do you usually take a mirror with you?", "a": "No, not really. I hardly ever <mark class=\"idiom\">carry a mirror around（随身带镜子）</mark>, <span class=\"conn\">since</span> I can just use my phone's <mark class=\"idiom\">front camera（前置摄像头）</mark> <span class=\"conn\">if</span> I need to check my face. It's way more <mark class=\"idiom\">convenient（方便）</mark> than carrying an actual mirror about.", "t": "不，基本不带。我很少随身带镜子，因为需要看看脸时，直接用手机前置摄像头就行了。这比带一面真镜子方便多了。"}, {"q": "4. Would you use mirrors to decorate your room?", "a": "Yeah, I think that's a great idea. A <mark class=\"idiom\">well-placed（摆放得当的）</mark> mirror can make a small room <mark class=\"idiom\">look bigger and brighter（显得更大更亮）</mark>. <span class=\"conn\">Plus</span>, a <mark class=\"idiom\">stylish（时尚的）</mark> mirror by itself makes a nice bit of wall decoration.", "t": "会，我觉得这是个好主意。一面摆放得当的镜子能让小房间显得更大更亮。再加上，一面时尚的镜子本身就是墙上一件不错的装饰。"}]}, {"id": "t18", "tag": "本季新题", "emoji": "🚀", "title": "Outer space and stars", "count": 4, "items": [{"q": "1. Have you ever learnt about outer space and stars?", "a": "Yeah, I <mark class=\"idiom\">picked up some basics（学了点基础）</mark> at school, mostly in geography and physics. I <span class=\"conn\">also</span> enjoy watching documentaries about <mark class=\"idiom\">the universe（宇宙）</mark> in my free time. <span class=\"conn\">The more</span> I learn, <span class=\"conn\">the more</span> curious I get.", "t": "是的，我在学校学了点基础，主要是地理和物理课上。空闲时我也喜欢看关于宇宙的纪录片。我学得越多，就越好奇。"}, {"q": "2. Do you like science fiction movies? Why?", "a": "Yeah, I'm <mark class=\"idiom\">a huge fan of（超级喜欢）</mark> sci-fi movies. I love <span class=\"conn\">how</span> they take you to these <mark class=\"idiom\">imaginary worlds（想象的世界）</mark> and get you thinking about the future. Films <span class=\"conn\">like</span> Interstellar honestly <mark class=\"idiom\">blow my mind（让我震撼）</mark> with how creative they are.", "t": "是的，我超级喜欢科幻片。我喜欢它们把你带进想象中的世界、让你思考未来的样子。像《星际穿越》这样的片子，那种创意真的让我大为震撼。"}, {"q": "3. Do you want to know more about outer space?", "a": "Definitely. Space is <mark class=\"idiom\">full of mysteries（充满谜团的）</mark>, <span class=\"conn\">and</span> there's so much we still don't get. I'm <span class=\"conn\">especially</span> curious about whether there's <mark class=\"idiom\">life on other planets（其他星球的生命）</mark>. It's the kind of topic I could read about for hours.", "t": "当然想。太空充满了谜团，还有太多我们至今都不了解的。我尤其好奇其他星球上是否有生命。这是那种我能读上好几个小时都不腻的话题。"}, {"q": "4. Do you want to go into outer space in the future?", "a": "That would be <mark class=\"idiom\">a dream come true（梦想成真）</mark>, <span class=\"conn\">but</span> honestly it sounds a bit scary too. <span class=\"conn\">If</span> <mark class=\"idiom\">space travel（太空旅行）</mark> ever becomes safe and affordable, I'd love to <mark class=\"idiom\">give it a go（试一试）</mark>. <span class=\"conn\">For now though</span>, I'll just enjoy watching it from the ground.", "t": "那将是梦想成真，但说实话听着也有点吓人。如果有一天太空旅行变得既安全又负担得起，我很乐意去试一试。不过现在，我还是只在地面上看看就好。"}]}, {"id": "t19", "tag": "本季新题", "emoji": "🎤", "title": "Singing", "count": 6, "items": [{"q": "1. Do you like singing? Why?", "a": "Yeah, I love singing, <span class=\"conn\">even though</span> I'm not very good at it. <span class=\"conn\">For me</span>, it's a great way to <mark class=\"idiom\">let off steam（释放压力）</mark> and express how I feel. I often <mark class=\"idiom\">sing along to（跟着唱）</mark> my favourite songs in the shower.", "t": "是的，我很喜欢唱歌，尽管唱得不怎么样。对我来说，这是释放压力、表达情绪的好方式。我洗澡时经常会跟着自己喜欢的歌一起唱。"}, {"q": "2. Have you ever learnt how to sing?", "a": "Not properly, no. I've never taken any actual <mark class=\"idiom\">singing lessons（声乐课）</mark>, <span class=\"conn\">but</span> I've <mark class=\"idiom\">picked up a few tricks（学了点技巧）</mark> from watching videos online. I'm definitely just <mark class=\"idiom\">an amateur（业余爱好者）</mark>, singing for fun.", "t": "正经的没有。我从没上过真正的声乐课，但通过看网上的视频学了点技巧。我绝对只是个业余爱好者，纯粹唱着玩。"}, {"q": "3. Who do you want to sing for?", "a": "I'd love to sing for my close friends and family. They're the people I <mark class=\"idiom\">feel most relaxed around（在面前最放松）</mark>, <span class=\"conn\">so</span> I'm not afraid of <mark class=\"idiom\">messing up（出错）</mark> in front of them. Singing together always <mark class=\"idiom\">brings us closer（拉近距离）</mark>.", "t": "我很想为亲近的朋友和家人唱歌。他们是我在面前最放松的人，所以我不怕在他们面前出错。一起唱歌总能拉近我们的距离。"}, {"q": "4. Do you think singing can bring happiness to people?", "a": "Definitely. Singing can instantly <mark class=\"idiom\">lift your mood（提升心情）</mark> and help you <mark class=\"idiom\">forget your worries（忘掉烦恼）</mark>. <span class=\"conn\">Whether</span> you're singing on your own <span class=\"conn\">or</span> with friends <mark class=\"idiom\">at a karaoke（在 KTV）</mark>, it's always <mark class=\"idiom\">a fun time（很开心的事）</mark>.", "t": "当然可以。唱歌能瞬间提升你的心情，帮你忘掉烦恼。无论是一个人唱，还是和朋友在 KTV 一起唱，都是件很开心的事。"}, {"q": "5. Do you like listening to others singing?", "a": "Yeah, very much. I really enjoy watching <mark class=\"idiom\">singing shows（歌唱节目）</mark> and <mark class=\"idiom\">live concerts（现场演唱会）</mark>. <span class=\"conn\">There's just something special about</span> hearing a <mark class=\"idiom\">talented（有才华的）</mark> person sing live — it <mark class=\"idiom\">gives me goosebumps（让我起鸡皮疙瘩）</mark>.", "t": "是的，非常喜欢。我很享受看歌唱节目和现场演唱会。听一个有才华的人现场演唱有种特别的感觉——会让我起鸡皮疙瘩。"}, {"q": "6. Have you ever taken a singing class?", "a": "No, I haven't, <span class=\"conn\">but</span> it's something I'd like to try someday. I think <mark class=\"idiom\">proper training（正规训练）</mark> could help me <mark class=\"idiom\">control my breathing and pitch（控制气息和音准）</mark> better. <span class=\"conn\">For now though</span>, I just sing casually for fun.", "t": "没有，但这是我以后想试试的。我觉得正规训练能帮我更好地控制气息和音准。不过现在，我只是随性地唱着玩。"}]}, {"id": "t20", "tag": "本季新题", "emoji": "👕", "title": "Clothing", "count": 6, "items": [{"q": "1. What kind of clothes do you like to wear?", "a": "I usually <mark class=\"idiom\">go for（选）</mark> <mark class=\"idiom\">casual, comfy clothes（休闲又舒适的衣服）</mark>, <span class=\"conn\">like</span> jeans and a simple T-shirt. I'm not really one to <mark class=\"idiom\">follow the latest trends（追潮流）</mark>. <span class=\"conn\">As long as</span> something feels comfortable, I'm happy to wear it.", "t": "我通常会选休闲又舒适的衣服，比如牛仔裤配件简单的 T 恤。我不太爱追最新潮流。只要穿着舒服，我就愿意穿。"}, {"q": "2. Do you prefer to wear comfortable and casual clothes or smart clothes?", "a": "Most of the time I'd go for casual clothes, <span class=\"conn\">because</span> they give me more <mark class=\"idiom\">freedom to move around（活动自如）</mark>. <span class=\"conn\">But</span> on <mark class=\"idiom\">formal occasions（正式场合）</mark>, I'll <mark class=\"idiom\">dress up（打扮一下）</mark> a bit to look <mark class=\"idiom\">presentable（得体）</mark>.", "t": "大多数时候我会选休闲装，因为它们让我活动起来更自如。但在正式场合，我会打扮一下，让自己看起来得体些。"}, {"q": "3. Do you like wearing T-shirts?", "a": "Yeah, T-shirts are my <mark class=\"idiom\">go-to（首选）</mark>, <span class=\"conn\">especially</span> in summer. They're light, <mark class=\"idiom\">breathable（透气的）</mark> and <mark class=\"idiom\">easy to match（好搭配）</mark> with anything. <span class=\"conn\">Plus</span>, you can find them in <mark class=\"idiom\">tons of（很多）</mark> different styles and colours.", "t": "是的，T 恤是我的首选，尤其是夏天。它们轻便、透气，而且和什么都好搭配。再加上，它们的款式和颜色也多到数不过来。"}, {"q": "4. Do you spend a lot of time choosing clothes?", "a": "Not really, to be honest. I usually <mark class=\"idiom\">figure out（想好）</mark> what to wear in a couple of minutes, <span class=\"conn\">since</span> I keep my <mark class=\"idiom\">wardrobe（衣柜里的衣服）</mark> pretty simple. <span class=\"conn\">The only time</span> I take longer <span class=\"conn\">is when</span> I'm dressing up for <mark class=\"idiom\">a special occasion（特殊场合）</mark>.", "t": "说实话，并没有。我通常几分钟内就能想好穿什么，因为我的衣柜很简单。唯一会花长点时间的，是要为特殊场合打扮的时候。"}, {"q": "5. Do you wear different styles of clothes on weekdays and weekends?", "a": "Yeah, definitely. On weekdays I tend to <mark class=\"idiom\">dress a bit smarter（穿得正式点）</mark>, <span class=\"conn\">especially</span> for work or class. <span class=\"conn\">But</span> on weekends, I just <mark class=\"idiom\">throw on（随手套上）</mark> whatever's comfy and relaxing.", "t": "是的，绝对会。工作日我会穿得正式点，尤其是上班或上课。但周末我就随手套上任何舒适放松的衣服。"}, {"q": "6. What colour clothes do you like?", "a": "I'm <mark class=\"idiom\">a big fan of（很喜欢）</mark> <mark class=\"idiom\">neutral colours（中性色）</mark> like black, white and grey. They're easy to match and <mark class=\"idiom\">never go out of style（永不过时）</mark>. <span class=\"conn\">Now and then</span> I'll add something in a brighter colour to <mark class=\"idiom\">make my outfit stand out（让穿搭出彩）</mark>.", "t": "我很喜欢黑、白、灰这类中性色。它们好搭配，而且永不过时。偶尔我会加一件颜色更亮的单品，让整身穿搭更出彩。"}]}, {"id": "t21", "tag": "本季新题", "emoji": "😄", "title": "Jokes & Comedies", "count": 5, "items": [{"q": "1. Are you good at telling jokes?", "a": "Honestly, not really. I can enjoy a good joke, <span class=\"conn\">but</span> I'm pretty bad at telling them myself. I always end up forgetting <mark class=\"idiom\">the punchline（笑点）</mark>, <span class=\"conn\">which</span> kind of <mark class=\"idiom\">ruins the whole thing（毁了整个效果）</mark>.", "t": "说实话，不太行。我能欣赏一个好笑话，但自己讲就很糟糕。我总是讲到最后忘了笑点，结果把整个效果都毁了。"}, {"q": "2. Do your friends like to tell jokes?", "a": "Yeah, a couple of my friends are really <mark class=\"idiom\">funny（有趣的）</mark>. They always know how to <mark class=\"idiom\">lighten the mood（活跃气氛）</mark> and get everyone laughing. <mark class=\"idiom\">Hanging out with（和……一起玩）</mark> them is never boring.", "t": "是的，我有几个朋友特别有趣。他们总知道怎么活跃气氛、把大家逗笑。和他们一起玩从来不会无聊。"}, {"q": "3. Do you like to watch comedies?", "a": "Yeah, comedies are my favourite. <span class=\"conn\">After</span> a stressful day, watching a funny film is the best way to relax and <mark class=\"idiom\">have a good laugh（开怀大笑）</mark>. They never fail to <mark class=\"idiom\">cheer me up（让我开心起来）</mark>.", "t": "是的，喜剧是我的最爱。压力大的一天之后，看部搞笑电影是放松、开怀大笑的最好方式。它们总能让我开心起来。"}, {"q": "4. Have you ever watched a live show?", "a": "Yeah, I once went to a <mark class=\"idiom\">stand-up comedy（脱口秀）</mark> show with my friends. <mark class=\"idiom\">The vibe（氛围）</mark> was amazing, <span class=\"conn\">and</span> the comedian was <mark class=\"idiom\">hilarious（超搞笑的）</mark>. It was a totally different experience from watching one on a screen.", "t": "看过，我曾和朋友去看了一场脱口秀。现场氛围特别棒，那位喜剧演员也超搞笑。这和在屏幕上看完全是两种体验。"}, {"q": "5. Are comedy shows popular in your country?", "a": "Yeah, very much so. Over the past few years, stand-up comedy has really <mark class=\"idiom\">taken off（火起来了）</mark> <mark class=\"idiom\">among young people（在年轻人中）</mark>. I think it's <span class=\"conn\">because</span> it helps them relax and <mark class=\"idiom\">laugh off the stress（笑对压力）</mark> of daily life.", "t": "是的，非常受欢迎。过去这几年，脱口秀在年轻人中真的火了起来。我觉得这是因为它能帮他们放松，笑着面对日常生活的压力。"}]}, {"id": "t22", "tag": "本季新题", "emoji": "🎧", "title": "Headphones", "count": 5, "items": [{"q": "1. Do you use headphones?", "a": "Yeah, I use them every single day. I <mark class=\"idiom\">rely on（依赖）</mark> them for listening to music, watching videos and taking <mark class=\"idiom\">online calls（线上通话）</mark>. <span class=\"conn\">Honestly</span>, I <mark class=\"idiom\">can't picture my daily life without（无法想象没有……的生活）</mark> them.", "t": "是的，我每天都用。我靠它们听音乐、看视频、接打线上电话。说实话，我无法想象没有它们的日常生活。"}, {"q": "2. What type of headphones do you use?", "a": "I mainly use <mark class=\"idiom\">wireless earbuds（无线耳机）</mark>, <span class=\"conn\">because</span> they're small and easy to <mark class=\"idiom\">carry around（随身带）</mark>. They've <span class=\"conn\">also</span> got a <mark class=\"idiom\">noise-cancelling（降噪）</mark> feature, <span class=\"conn\">which</span> is great when I'm somewhere <mark class=\"idiom\">noisy（嘈杂的）</mark>.", "t": "我主要用无线耳机，因为它们小巧、便于随身带。它们还带降噪功能，在嘈杂的地方特别好用。"}, {"q": "3. When would you use headphones?", "a": "I use them in <mark class=\"idiom\">all kinds of situations（各种场合）</mark>. <span class=\"conn\">For example</span>, I put them on when I'm <mark class=\"idiom\">commuting（通勤）</mark>, working out or studying in the library. <span class=\"conn\">Basically</span>, <span class=\"conn\">whenever</span> I want to focus or enjoy some music <mark class=\"idiom\">on my own（独自地）</mark>.", "t": "我在各种场合都会用。比如通勤、健身，或者在图书馆学习时我都会戴上。基本上，只要我想集中注意力，或者一个人听点音乐，就会用。"}, {"q": "4. In what conditions would you not use headphones?", "a": "I <mark class=\"idiom\">steer clear of（避开不用）</mark> them when I'm walking down the street or <mark class=\"idiom\">crossing the road（过马路）</mark>, <span class=\"conn\">mainly</span> for safety. I <span class=\"conn\">also</span> <mark class=\"idiom\">take them off（摘下来）</mark> when I'm talking to someone, <span class=\"conn\">since</span> it'd be <mark class=\"idiom\">rude（不礼貌的）</mark> not to.", "t": "走在街上或过马路时我会避开不用，主要是为了安全。和别人说话时我也会摘下来，因为不摘会显得不礼貌。"}, {"q": "5. Is wearing headphones comfortable?", "a": "It really depends on the type. Earbuds are light and comfy <mark class=\"idiom\">for short periods（短时间内）</mark>, <span class=\"conn\">but</span> they can <mark class=\"idiom\">hurt my ears（弄痛耳朵）</mark> <span class=\"conn\">if</span> I wear them too long. <mark class=\"idiom\">Over-ear headphones（头戴式耳机）</mark>, <span class=\"conn\">on the other hand</span>, are softer but a bit heavy.", "t": "这真的看类型。入耳式耳机短时间戴着轻便又舒服，但戴太久会弄痛耳朵。而头戴式耳机相对更柔软，只是有点重。"}]}, {"id": "t23", "tag": "老题沿用", "emoji": "💬", "title": "Food", "count": 4, "items": [{"q": "1. What is your favourite food?", "a": "My favourite food is probably <mark class=\"idiom\">Chinese home-style cooking（家常菜）</mark>, <span class=\"conn\">especially</span> simple dishes <mark class=\"idiom\">like steamed fish（清蒸鱼）</mark> or <mark class=\"idiom\">stir-fried vegetables（炒青菜）</mark>. I like food that is <mark class=\"idiom\">fresh and not too oily(新鲜不油腻)</mark>. It makes me feel comfortable and healthy.", "t": "我大概最喜欢吃的是中式家常菜，特别是清蒸鱼、炒青菜这类简单的菜。我喜欢新鲜不油腻的食物，吃起来舒服又健康。"}, {"q": "2. What kind of food did you like when you were young?", "a": "<span class=\"conn\">When I was young</span>, I preferred <mark class=\"idiom\">fried food and sweet snacks(油炸食品和甜点)</mark>, <span class=\"conn\">such as</span> fried chicken and chocolate. I didn't really <mark class=\"idiom\">care about nutrition(在意营养)</mark> at that time. I just <mark class=\"idiom\">ate whatever tasted good(只要好吃就吃)</mark>.", "t": "当我还年轻的时候，我更喜欢油炸食品和甜点，比如炸鸡和巧克力。那时候我并不太在意营养，只要好吃就吃。"}, {"q": "3. Do you eat different foods at different times of the year?", "a": "Yes, I do. In summer, I prefer <mark class=\"idiom\">lighter food(清淡的食物)</mark> like salads, fruit, and <mark class=\"idiom\">cold dishes（冷盘）</mark> <span class=\"conn\">because</span> they are <mark class=\"idiom\">refreshing(清爽的)</mark>. In winter, I usually eat warmer and heavier food, <span class=\"conn\">such as</span> <mark class=\"idiom\">hot soup or hotpot(热汤或火锅)</mark>.", "t": "是的我喜欢。在夏天，我更喜欢清淡的食物，比如沙拉、水果和冷盘，因为它们令人清爽。在冬天，我通常吃温暖且丰盛的食物，比如热汤或火锅。"}, {"q": "4. Has your favourite food changed since you were a child?", "a": "Yes, it has changed quite a lot. Now I <mark class=\"idiom\">pay more attention to(更注重)</mark> health and balance instead of taste only. I prefer <mark class=\"idiom\">natural and less processed food（天然且加工较少的食物）</mark> compared to when I was a child.", "t": "对，变化很大。现在的我更注重健康和平衡，而不仅仅是味道。我更喜欢天然、加工较少的食物，相比小时候的饮食习惯有很大不同。"}]}, {"id": "t24", "tag": "老题沿用", "emoji": "💬", "title": "Pets and Animals", "count": 4, "items": [{"q": "1. What’s your favourite animal? Why?", "a": "My favourite animal is the dog. Dogs are <mark class=\"idiom\">loyal and friendly(忠诚又友好)</mark>, and they can <mark class=\"idiom\">build a strong connection with(建立深厚的联系)</mark> people. I also think they are very good <mark class=\"idiom\">companions(伙伴)</mark>.", "t": "我最喜欢的动物是狗。狗忠诚又友好，它们能够与人建立牢固的联系。我也认为它们是非常好的伴侣。"}, {"q": "2. Where do you prefer to keep your pet, indoors or outdoors?", "a": "I prefer to keep pets indoors. It's <mark class=\"idiom\">safer for them(对它们更安全)</mark>, <span class=\"conn\">especially</span> in big cities. <span class=\"conn\">Also</span>, pets can <mark class=\"idiom\">spend more time with(花更多时间陪伴)</mark> their owners indoors.", "t": "我更喜欢在室内养宠物。这会对它们更安全，特别是在大城市。而且，宠物在室内可以和他们的主人相处更多时间。"}, {"q": "3. Have you ever had a pet before?", "a": "No, I haven't had a pet myself. <span class=\"conn\">However</span>, some of my friends have dogs and cats, and I often play with them. That experience makes me <mark class=\"idiom\">want to have a pet(想养一只宠物)</mark> in the future.", "t": "不，我自己还没有养过宠物。不过，我的一些朋友养了狗和猫，我经常去和它们玩。那种经历让我将来也想养一只宠物。"}, {"q": "4. What is the most popular animal in China?", "a": "I think dogs and cats are the <mark class=\"idiom\">most popular animals(最受欢迎的动物)</mark> in China. Many families keep them as pets <span class=\"conn\">because</span> they are <mark class=\"idiom\">easy to interact with（容易和....互动）</mark>. <span class=\"conn\">In addition</span>, they can <mark class=\"idiom\">bring a lot of joy(带来很多快乐)</mark> to daily life.", "t": "我认为狗和猫是在中国最受欢迎的动物。许多家庭养它们作为宠物，因为它们容易互动。此外，它们还能给日常生活带来很多欢乐。"}]}, {"id": "t25", "tag": "老题沿用", "emoji": "💬", "title": "Sports team", "count": 4, "items": [{"q": "1. Have you ever been part of a sports team?", "a": "Yes, I have. I was once part of a <mark class=\"idiom\">school basketball team(校篮球队)</mark>. It helped me learn how to <mark class=\"idiom\">cooperate with others(与他人合作)</mark> and <mark class=\"idiom\">work as a group(团队协作)</mark>.", "t": "是的我参加过。我曾经是学校篮球队的一员。这让我学会了如何与他人合作以及团队作战。"}, {"q": "2. Is team sports popular in your culture?", "a": "Yes, team sports are quite popular in my culture. Sports like basketball and football are <mark class=\"idiom\">especially common(尤其普遍)</mark> among students. Many people play them <mark class=\"idiom\">for fun and exercise(为了娱乐和锻炼)</mark>.", "t": "是的团队运动在我的文化中非常受欢迎。像是篮球和足球这样的运动在学生中尤其常见。很多人为了娱乐和锻炼而参加这些运动。"}, {"q": "3. Do you like watching team games? Why?", "a": "Yes, I do. Watching team games is exciting <span class=\"conn\">because</span> the <mark class=\"idiom\">result is often unpredictable(结果难以预料)</mark>. I also enjoy the <mark class=\"idiom\">team spirit(团队精神)</mark> and cooperation during the game.", "t": "是的我喜欢。观看团队比赛很刺激，因为结果往往难以预料。我也喜欢比赛中体现的团队精神和合作。"}, {"q": "4. What are the differences between team sports and individual sports?", "a": "Team sports focus more on <mark class=\"idiom\">cooperation and communication(合作与沟通)</mark>. <span class=\"conn\">In contrast</span>, individual sports depend mainly on <mark class=\"idiom\">personal ability and self-discipline(个人能力与自律)</mark>. Both types of sports have their own advantages.", "t": "团队运动更多注重的是合作与沟通。相比之下，个人运动主要依赖个人能力和自律。两种类型的运动各有其优势。"}]}, {"id": "t26", "tag": "老题沿用", "emoji": "💬", "title": "Hobby", "count": 4, "items": [{"q": "1. Do you have any hobbies?", "a": "Yes, I do. I enjoy <mark class=\"idiom\">working out and reading(健身和阅读)</mark> in my free time. These hobbies help me <mark class=\"idiom\">relax and stay healthy(放松并保持健康)</mark>.", "t": "是的我喜欢。我喜欢在空闲时间锻炼和阅读。这些爱好帮助我放松并保持健康。"}, {"q": "2. Did you have any hobbies when you were a child?", "a": "Yes, when I was a child, I liked playing sports and watching cartoons. I also enjoyed <mark class=\"idiom\">spending time outdoors(在户外玩)</mark> with my friends. Those activities made my childhood quite fun.", "t": "是的当我还是个孩子的时候，我喜欢运动和看动画片。我还喜欢和朋友们一起在户外玩。这些活动让我的童年非常快乐。"}, {"q": "3. Do you have a hobby that you’ve had since childhood?", "a": "Yes, I do. I've <mark class=\"idiom\">loved reading(热爱阅读)</mark> since I was young. <span class=\"conn\">Although</span> my reading interests have changed, reading has always been <mark class=\"idiom\">part of my life(我生活的一部分)</mark>.", "t": "我有。我从小就喜欢阅读。虽然我的阅读兴趣有所改变，但阅读一直是我生活的一部分。"}, {"q": "4. Do you have the same hobbies as your family members?", "a": "Some of them are similar. <span class=\"conn\">For example</span>, my family and I all enjoy <mark class=\"idiom\">walking and chatting together(一起散步聊天)</mark>. <span class=\"conn\">However</span>, we also have our own <mark class=\"idiom\">personal interests(个人兴趣)</mark>.", "t": "他们中的一些是相似的。比如说，我和家人都喜欢一起散步和聊天。不过，我们也有各自的个人兴趣。"}]}, {"id": "t27", "tag": "老题沿用", "emoji": "💬", "title": "Morning time", "count": 5, "items": [{"q": "1. Do you like getting up early in the morning?", "a": "Yes, I do, <span class=\"conn\">especially</span> on weekdays. Getting up early helps me feel more <mark class=\"idiom\">organised and productive（有条有理）</mark>. I enjoy having some <mark class=\"idiom\">quiet time(安静的时光)</mark> in the morning.", "t": "是的我会，尤其是在周末。早起让我感到更有条理和更高效。我喜欢那些在早上安静的时间。"}, {"q": "2. What do you usually do in the morning?", "a": "I usually wake up, wash up, and have a <mark class=\"idiom\">simple breakfast(简单的早餐)</mark>. Sometimes I do a bit of exercise or <mark class=\"idiom\">stretching（拉伸运动）</mark>. <span class=\"conn\">After that</span>, I start my work or daily tasks.", "t": "我通常会起床、洗漱，然后吃一顿简单的早餐。有时我会做一些运动或拉伸。之后，我就开始工作或处理日常事务。"}, {"q": "3. What did you do in the morning when you were little? Why?", "a": "When I was little, I usually got up early to go to school. My parents wanted me to <mark class=\"idiom\">arrive on time(准时到校)</mark> and have breakfast at home. My mornings were quite <mark class=\"idiom\">rushed（十分匆忙）</mark> back then.", "t": "当我还小的时候，我通常很早就起床去上学。我父母希望我能准时到校，并在家吃早餐。那时我的早晨总是很匆忙。"}, {"q": "4. Are there any differences between what you do in the morning now and what you did in the past?", "a": "Yes, there are clear differences. Now my mornings are more <mark class=\"idiom\">relaxed and flexible(轻松又灵活)</mark>. <span class=\"conn\">In the past</span>, I followed a <mark class=\"idiom\">fixed school schedule(固定的上学时间表)</mark> and had much less freedom.", "t": "是的，确实有明显的差别。现在的我早晨更加轻松和灵活。在过去，我遵循固定的学校时间表，自由度要小得多。"}, {"q": "5. Do you spend your mornings doing the same things on both weekends and weekdays? Why?", "a": "No, not really. On weekdays, my mornings are more <mark class=\"idiom\">structured(规律的)</mark> <span class=\"conn\">because</span> of work. On weekends, I prefer to <mark class=\"idiom\">sleep a bit longer(多睡一会儿)</mark> and <mark class=\"idiom\">take things more slowly（生活节奏放慢一些）</mark>.", "t": "不，并不是。工作日的时候，我的早晨比较有规律，因为要上班。周末的话，我更喜欢多睡一会儿，生活节奏放慢一些。"}]}, {"id": "t28", "tag": "老题沿用", "emoji": "💬", "title": "Gifts", "count": 5, "items": [{"q": "1. Have you ever sent handmade gifts to others?", "a": "Yes, I have. I once made a <mark class=\"idiom\">small card(小卡片)</mark> for a friend's birthday. It wasn't expensive, <span class=\"conn\">but</span> it <mark class=\"idiom\">showed my care and effort(表达了我的用心)</mark>.", "t": "对的，我做过。我曾经为一位朋友的生日做过一张小卡。虽然它不贵，但它表达了我对他的关心和努力。"}, {"q": "2. Have you ever received a great gift?", "a": "Yes, I have. I once received a book from a <mark class=\"idiom\">close friend(挚友)</mark>. It was <mark class=\"idiom\">meaningful(有意义的)</mark> <span class=\"conn\">because</span> it <mark class=\"idiom\">matched my interests(很合我的兴趣)</mark> very well.", "t": "对的，我有过。曾经我收到过一位亲密朋友送的一本书。这本书很有意义，因为它非常符合我的兴趣。"}, {"q": "3. What do you consider when choosing a gift?", "a": "I usually think about the person's <mark class=\"idiom\">personality and hobbies(性格和爱好)</mark>. I also consider whether the gift is <mark class=\"idiom\">practical(实用的)</mark>. For me, <mark class=\"idiom\">usefulness is more important than price(实用比价格更重要)</mark>.", "t": "我通常会考虑这个人的性格和爱好。我也会考虑礼物是否实用。对我来说，实用性往往比价格更重要。"}, {"q": "4. Do you think you are good at choosing gifts?", "a": "I think I'm quite good at it. I spend time thinking about what the other person might <mark class=\"idiom\">really need(真正需要)</mark>. I believe a <mark class=\"idiom\">thoughtful gift(贴心的礼物)</mark> is always appreciated.", "t": "我觉得我在这方面还挺擅长的。我会花时间思考对方真正需要的是什么。我相信贴心的礼物总是会被人欣赏的。"}, {"q": "5. What gift have you received recently?", "a": "Recently, I received a <mark class=\"idiom\">small but useful(小巧又实用)</mark> daily item from a friend. It's something I can use every day, which makes it very <mark class=\"idiom\">practical(实用的)</mark>. I really liked it.", "t": "就在最近，我收到了一位朋友送的一件小巧但实用的日用品。这是我每天都可以用到的东西，因此显得非常实用。我真的很喜欢它。"}]}, {"id": "t29", "tag": "老题沿用", "emoji": "💬", "title": "Reading", "count": 4, "items": [{"q": "1. Do you like reading?", "a": "Yes, I do. Reading helps me <mark class=\"idiom\">relax and learn new ideas(放松并学习新知识)</mark> at the same time. I usually read in the evening or <mark class=\"idiom\">before going to bed(睡前)</mark>.", "t": "是的，我喜欢。阅读既能让我放松，又能同时学习新知识。我通常在晚上或睡前阅读。"}, {"q": "2. Do you prefer to read on paper or on a screen?", "a": "I prefer reading on a screen <span class=\"conn\">because</span> it's more <mark class=\"idiom\">convenient(方便的)</mark>. I can easily <mark class=\"idiom\">carry my phone or tablet(带着手机或平板)</mark> and read anywhere. <span class=\"conn\">However</span>, for long reading, I still <mark class=\"idiom\">like paper books（纸质书）</mark>.", "t": "我更喜欢在屏幕上阅读，因为这更方便。我可以轻松携带手机或平板电脑，随时随地阅读。然而，对于长时间阅读而言，我仍然喜欢纸质书籍。"}, {"q": "3. When do you need to read carefully, and when not?", "a": "I need to read carefully when I'm studying or reading <mark class=\"idiom\">important information(重要信息)</mark>, <span class=\"conn\">such as</span> work documents or instructions. When I read news or online articles, I usually <mark class=\"idiom\">read more quickly(读得更快)</mark>. It <mark class=\"idiom\">depends on the purpose(取决于目的)</mark> of reading.", "t": "在学习或阅读重要信息时，比如工作文件或说明，我需要仔细阅读。当我看新闻或网络文章时，我通常会读得更快。这取决于阅读的目的。"}, {"q": "4. Do you prefer scanning or detailed reading?", "a": "It depends on the situation. If I just want to <mark class=\"idiom\">get the main idea(了解大意)</mark>, I prefer <mark class=\"idiom\">scanning(略读)</mark>. <span class=\"conn\">But</span> if the content is important, I choose <mark class=\"idiom\">detailed reading(精读)</mark>.", "t": "这取决于具体情况。如果我只是想了解大意，我更喜欢浏览。但如果内容很重要，我会选择精读。"}]}, {"id": "t30", "tag": "老题沿用", "emoji": "💬", "title": "Walking", "count": 5, "items": [{"q": "1. Do you walk a lot?", "a": "Yes, I do. Walking is part of my <mark class=\"idiom\">daily routine(日常习惯)</mark>, <span class=\"conn\">especially</span> when I go to work or <mark class=\"idiom\">do errands(办杂事)</mark>. It's a simple way to <mark class=\"idiom\">stay active(保持活力)</mark>.", "t": "是的我会。步行是我日常生活的一部分，尤其是在上班或办事的时候。这是一种保持活跃的简单方式。"}, {"q": "2. Did you often go outside to have a walk when you were a child?", "a": "Yes, <mark class=\"idiom\">quite often（时不时）</mark>. I used to walk and play outside with my friends after school. It was a <mark class=\"idiom\">common way（常见方式）</mark> to relax and have fun.", "t": "是的，我经常如此。我过去常在放学后和朋友们一起在外面走动和玩耍。这是放松和娱乐的常见方式。"}, {"q": "3. Why do people like to walk in parks?", "a": "<span class=\"conn\">Because</span> parks are quiet and <mark class=\"idiom\">full of greenery（绿意盎然）</mark>. Walking there helps people <mark class=\"idiom\">relax and reduce stress(放松并减压)</mark>. The environment is much nicer than <mark class=\"idiom\">busy streets(繁忙的街道)</mark>.", "t": "因为公园安静且绿意盎然。在那里散步有助于人们放松和减压。环境比繁忙的街道要好得多。"}, {"q": "4. Where would you like to take a long walk if you had the chance?", "a": "I'd like to take a long walk <mark class=\"idiom\">by the seaside(在海边)</mark>. The <mark class=\"idiom\">fresh air(新鲜空气)</mark> and the sound of the waves are very <mark class=\"idiom\">calming(令人平静的)</mark>. It would be a great way to <mark class=\"idiom\">clear my mind(理清思绪)</mark>.", "t": "我想在海边散一次长长的步。清新的空气和海浪的声音非常让人平静。这将是一个清理思绪的好方法。"}, {"q": "5. Where did you go for a walk lately?", "a": "Recently, I went for a walk around my <mark class=\"idiom\">neighbourhood(社区)</mark>. I usually walk there in the evening to <mark class=\"idiom\">relax after a long day(忙碌一天后放松)</mark>. It helps me <mark class=\"idiom\">unwind(放松)</mark>.", "t": "最近，我去我的社区附近散步。我通常在晚上去那里散步，以便在漫长的一天后放松身心。这有助于我舒缓压力。"}]}, {"id": "t31", "tag": "老题沿用", "emoji": "💬", "title": "Typing", "count": 4, "items": [{"q": "1. Do you prefer typing or handwriting?", "a": "I prefer typing <span class=\"conn\">because</span> it's <mark class=\"idiom\">faster and more convenient(更快更方便)</mark>. I can <mark class=\"idiom\">organise my ideas（整理思路）</mark> more easily when I type. Handwriting is fine, <span class=\"conn\">but</span> I don't use it as often.", "t": "我更喜欢打字，因为它更快也更方便。我在打字时可以更容易地整理我的想法。手写也挺好的，但我不经常使用。"}, {"q": "2. Do you type on a desktop or laptop keyboard every day?", "a": "Yes, I do. I use a laptop every day for work and <mark class=\"idiom\">daily communication（日常交流）</mark>. Typing has become an <mark class=\"idiom\">essential part of my routine(我日常中不可或缺的一部分)</mark>.", "t": "是的，我会用。我每天都在用笔记本电脑工作和进行日常沟通。打字已经成为我日常生活中必不可少的一部分。"}, {"q": "3. When did you learn how to type on a keyboard?", "a": "I learned how to type when I was in primary school. <span class=\"conn\">At first</span>, I typed very slowly. <span class=\"conn\">Over time</span>, I <mark class=\"idiom\">became more familiar with(变得更熟悉)</mark> the keyboard.", "t": "我在小学时就学会了打字。一开始，我打字很慢。随着时间的推移，我对键盘变得越来越熟悉。"}, {"q": "4. How do you improve your typing?", "a": "I improve my typing mainly through <mark class=\"idiom\">daily practice(每天练习)</mark>. <span class=\"conn\">Since</span> I type a lot for work, my speed has <mark class=\"idiom\">improved naturally(自然而然提高)</mark>. I also try to <mark class=\"idiom\">focus on accuracy(注重准确性)</mark>.", "t": "我主要通过每天的练习来提高打字水平。由于工作中需要大量打字，我的速度自然就提高了。我也会尽量关注准确性。"}]}, {"id": "t32", "tag": "老题沿用", "emoji": "💬", "title": "Scenery", "count": 4, "items": [{"q": "1. Do you look out the window at the scenery when travelling by bus or car?", "a": "Yes, I usually do. Looking at the scenery helps me <mark class=\"idiom\">relax during the journey(旅途中放松)</mark>. It also <mark class=\"idiom\">makes the trip feel shorter(让旅程感觉更短)</mark>.", "t": "是的，我通常会这样做。欣赏风景可以让我在旅途中放松心情，也让我感觉旅程更短一些。"}, {"q": "2. Do you prefer the mountains or the sea?", "a": "I prefer the sea. I find the <mark class=\"idiom\">sound of the waves(海浪声)</mark> and the <mark class=\"idiom\">open view(开阔的视野)</mark> very <mark class=\"idiom\">calming(令人平静的)</mark>. It helps me <mark class=\"idiom\">clear my mind(理清思绪)</mark>.", "t": "我个人更喜欢大海。我感觉海浪的声音和开阔的视野非常让人平静。这有助于我清理思绪。"}, {"q": "3. Do you like to take scenery pictures?", "a": "Yes, I do. I like taking pictures to <mark class=\"idiom\">record my trips(记录旅行)</mark>. They help me <mark class=\"idiom\">remember the places(记住去过的地方)</mark> I've visited.", "t": ""}, {"q": "4. What are the most beautiful sights you have seen while traveling?", "a": "One of the most beautiful sights I've seen is the <mark class=\"idiom\">seaside at sunset(日落时的海边)</mark>. The sky <mark class=\"idiom\">changes colour(变换色彩)</mark>, and the view feels very <mark class=\"idiom\">peaceful(宁静的)</mark>. It <mark class=\"idiom\">left a deep impression on me(给我留下深刻印象)</mark>.", "t": "是的我喜欢。我喜欢拍照来记录我的旅行。它们能帮助我记住我去过的地方。"}]}, {"id": "t33", "tag": "老题沿用", "emoji": "💬", "title": "Building", "count": 4, "items": [{"q": "1. Are there tall buildings near your home?", "a": "Yes, there are. I live in a <mark class=\"idiom\">city area（市区）</mark>, <span class=\"conn\">so</span> there are several tall <mark class=\"idiom\">residential（高层）</mark> and <mark class=\"idiom\">office buildings（写字楼）</mark> nearby. It's quite <mark class=\"idiom\">common in big cities(大城市里很常见)</mark>.", "t": "对，是有的。我住在城市区域，所以附近有几栋高层住宅楼和办公楼。这在大城市里很常见。"}, {"q": "2. Do you take photos of buildings?", "a": "Sometimes, yes. I usually take photos of buildings when they have a <mark class=\"idiom\">special design（特殊设计）</mark> or <mark class=\"idiom\">historical value（历史价值）</mark>. <mark class=\"idiom\">Modern architecture（现代建筑）</mark> also <mark class=\"idiom\">interests me（吸引我）</mark>.", "t": "有时候会。通常当建筑有特殊设计或历史价值时，我会拍照。现代建筑也让我感兴趣。"}, {"q": "3. Is there a building that you would like to visit?", "a": "Yes, I'd like to visit some famous <mark class=\"idiom\">landmark buildings(地标建筑)</mark> in other countries. I'm interested in buildings that <mark class=\"idiom\">combine history and culture(融合历史与文化)</mark>. Visiting them helps me <mark class=\"idiom\">understand the place better(更好地了解当地)</mark>.", "t": "是的，我挺想去其他国家参观一些著名的地标建筑。我对那些融合了历史和文化的建筑很感兴趣。参观它们能帮助我更好地了解当地。"}, {"q": "4. Do you want to live in a tall building?", "a": "It depends. Living in a tall building can offer a <mark class=\"idiom\">great view(极佳的视野)</mark> and good facilities. <span class=\"conn\">However</span>, I also <mark class=\"idiom\">value comfort and convenience（重视舒适度与便利性）</mark>, <span class=\"conn\">so</span> I wouldn't choose a very high floor.", "t": "这要看情况。住在高楼固然可以享受很好的视野和设施。然而，我也很重视舒适度和便利性，所以我不会选择非常高的楼层。"}]}, {"id": "t34", "tag": "老题沿用", "emoji": "💬", "title": "Children activities", "count": 2, "items": [{"q": "1. What were your favourite activities when you were a child?", "a": "When I was a child, I enjoyed <mark class=\"idiom\">playing outside(在户外玩)</mark> with my friends. We often played simple games and <mark class=\"idiom\">rode bicycles(骑自行车)</mark> together. Those activities made me feel <mark class=\"idiom\">relaxed and happy(放松又开心)</mark>.", "t": "当我还是个孩子时，我喜欢和朋友们一起在外面玩。我们经常玩一些简单的游戏，一起骑自行车。这些活动让我感到轻松和快乐。"}, {"q": "2. Did you prefer to do activities alone or with a group of people when you were a child?", "a": "I preferred doing activities <mark class=\"idiom\">with a group of people（一群人）</mark>. It was <mark class=\"idiom\">more fun to（做...更有趣）</mark> play with friends and share ideas. Group activities also helped me <mark class=\"idiom\">make friends easily(轻松交到朋友)</mark>.", "t": "我更喜欢与一群人一起参加活动。和朋友一起玩并分享想法会更有趣。集体活动也帮助我更容易交到朋友。（待补充"}]}, {"id": "t35", "tag": "老题沿用", "emoji": "💬", "title": "Views", "count": 3, "items": [{"q": "1. Do you like taking pictures of different views?", "a": "Yes, I do. I enjoy <mark class=\"idiom\">taking pictures（拍照）</mark> when the view is special or relaxing. It's a good way to <mark class=\"idiom\">record memories（保留记忆）</mark> from different places.", "t": "是的我喜欢。当看到特别的或让人放松的景色时，我喜欢拍照。这是记录不同地方回忆的好方法。"}, {"q": "2. Do you prefer views in urban areas or rural areas?", "a": "I prefer views in <mark class=\"idiom\">rural areas（乡村）</mark>. They are usually <mark class=\"idiom\">quieter and closer to nature(更安静、更亲近自然)</mark>. Looking at these views helps me <mark class=\"idiom\">feel calm(感到平静)</mark>.", "t": "我更喜欢乡村的景色。它们通常更安静，也离自然更近。单单是看着这些景色就能让我感到平静。"}, {"q": "3. Do you prefer views in your own country or in other countries?", "a": "I <mark class=\"idiom\">enjoy views in both（两者都...）</mark>. Views in my own country feel <mark class=\"idiom\">familiar and comfortable(熟悉又舒适)</mark>, <span class=\"conn\">while</span> views in other countries feel <mark class=\"idiom\">fresh and interesting(新鲜又有趣)</mark>. Each has its own <mark class=\"idiom\">charm(魅力)</mark>.", "t": "我两种都喜欢。对自己国家的风景感到熟悉和舒适，而其他国家的风景则令人耳目一新和有趣。每种都有它独特的魅力。（待补充"}]}, {"id": "t36", "tag": "老题沿用", "emoji": "💬", "title": "Crowded place", "count": 5, "items": [{"q": "1. Is the city where you live crowded?", "a": "Yes, the city where I live, Shanghai, is quite crowded, <span class=\"conn\">especially</span> in popular areas like <mark class=\"idiom\">shopping streets(商业街)</mark> and public transportation. There are always a lot of people, <span class=\"conn\">especially</span> during <mark class=\"idiom\">rush hours(高峰时段)</mark> or holidays.", "t": "是的，我生活的城市上海非常拥挤，尤其是在一些热门区域，比如商业街和公共交通上。总是有很多人，特别是在早晚高峰或者节假日期间。"}, {"q": "2. Is there a crowded place near where you live?", "a": "Yes, there's a famous shopping mall near my place that tends to be crowded, <span class=\"conn\">especially</span> on weekends. People come from all over the city to shop, eat, and <mark class=\"idiom\">hang out(聚会)</mark>, <span class=\"conn\">so</span> it's always <mark class=\"idiom\">bustling with activity(熙熙攘攘)</mark>.", "t": "是的，我家附近有一个很有名的商场，通常都很拥挤，尤其是在周末。人们从全市各地过来购物、吃饭、休闲，所以那里总是非常热闹。"}, {"q": "3. Do you like crowded places?", "a": "Not really. <span class=\"conn\">While</span> I understand that crowded places are often <mark class=\"idiom\">exciting and full of energy(热闹又充满活力)</mark>, I personally prefer <mark class=\"idiom\">quieter spaces(更安静的空间)</mark> where I can relax and <mark class=\"idiom\">avoid the noise(避开喧闹)</mark>. It's nice to visit crowded places <mark class=\"idiom\">occasionally(偶尔)</mark>, <span class=\"conn\">but</span> I wouldn't want to spend too much time there.", "t": "不太喜欢。虽然我理解拥挤的地方通常很有活力、很热闹，但我个人更喜欢安静的空间，可以放松并避开噪音。偶尔去一次还可以，但我不想在那里待太久。"}, {"q": "4. Do most people like crowded places?", "a": "I think most people enjoy crowded places when they want <mark class=\"idiom\">excitement(刺激感)</mark> or to <mark class=\"idiom\">socialise(社交)</mark>. <span class=\"conn\">For example</span>, many people love going to festivals or concerts where there are <mark class=\"idiom\">large crowds(大批人群)</mark>. <span class=\"conn\">But</span> of course, some prefer more <mark class=\"idiom\">peaceful and quiet environments(宁静的环境)</mark>.", "t": "我觉得大多数人在想要体验热闹或者社交的时候，会喜欢人多的地方。比如很多人喜欢去音乐节或者演唱会，因为那里人群很多。不过当然，也有人更喜欢安静和平和的环境。"}, {"q": "5. When was the last time you were in a crowded place?", "a": "The last time I was in a crowded place was last weekend when I visited a popular <mark class=\"idiom\">shopping district(商业区)</mark>. It was especially busy <span class=\"conn\">because</span> of a <mark class=\"idiom\">sale event(促销活动)</mark>, and it took me a while to <mark class=\"idiom\">find a seat(找到座位)</mark> in a café. <span class=\"conn\">Despite</span> the crowd, I still enjoyed the <mark class=\"idiom\">atmosphere(氛围)</mark>.", "t": "我上一次去人很多的地方是在上周末，我去了一个很受欢迎的商业区。因为有促销活动，所以特别拥挤，我在咖啡馆里找座位都花了不少时间。虽然人很多，但我还是挺享受那种氛围的。"}]}, {"id": "t37", "tag": "老题沿用", "emoji": "⏳", "title": "Spare time（补充）", "count": 4, "items": [{"q": "1. Do you often have free time?", "a": "Not as much as I'd like, to be honest. On weekdays I'm usually pretty <mark class=\"idiom\">tied up with（忙于）</mark> work, <span class=\"conn\">so</span> I only get a bit of free time in the evenings. Weekends are when I really <mark class=\"idiom\">get to relax（能放松一下）</mark>.", "t": "说实话，没有我想要的那么多。工作日我通常都忙于工作，所以只有晚上才有点空。周末才是我真正能放松的时候。"}, {"q": "2. What do you usually do in your spare time?", "a": "It depends on my mood. Sometimes I just <mark class=\"idiom\">chill at home（在家放松）</mark> watching shows or <mark class=\"idiom\">scrolling through my phone（刷手机）</mark>. <span class=\"conn\">But</span> when the weather's nice, I like to go out for a walk or <mark class=\"idiom\">meet up with（约……碰头）</mark> friends.", "t": "看心情。有时我就在家放松，看看剧或者刷刷手机。但天气好的时候，我喜欢出去散步，或者约朋友碰个头。"}, {"q": "3. Which day do you have more free time on, Saturday or Sunday?", "a": "Definitely Saturday. I usually save my <mark class=\"idiom\">chores（杂事）</mark> and plans for the weekend, <span class=\"conn\">so</span> Saturday feels more <mark class=\"idiom\">open and relaxed（自由轻松）</mark>. Sunday tends to get a bit tense, <span class=\"conn\">since</span> I start thinking about <mark class=\"idiom\">the week ahead（接下来的一周）</mark>.", "t": "肯定是周六。杂事和安排我一般都留到周末，所以周六感觉更自由轻松。周日往往会有点紧绷，因为我开始想接下来一周的事了。"}, {"q": "4. Would you like to have more free time in the future?", "a": "Definitely, who wouldn't? With more free time, I'd love to travel more and <mark class=\"idiom\">pick up some new hobbies（培养些新爱好）</mark>. <span class=\"conn\">That said</span>, I think a healthy balance between work and free time matters most.", "t": "当然，谁不想呢？要是有更多空闲，我很想多去旅行、培养些新爱好。话虽如此，我觉得工作和空闲之间的健康平衡才最重要。"}]}, {"id": "t38", "tag": "老题沿用", "emoji": "🧠", "title": "Memory（补充）", "count": 4, "items": [{"q": "1. Are you good at memorising things?", "a": "Honestly, it depends on what it is. I'm pretty good at <mark class=\"idiom\">remembering faces（记住面孔）</mark> and places, <span class=\"conn\">but</span> I'm <mark class=\"idiom\">terrible with（很不擅长）</mark> names and numbers. I usually have to <mark class=\"idiom\">write those down（记下来）</mark> or I'll forget them.", "t": "说实话，看是什么。我挺擅长记面孔和地点的，但对名字和数字就很不在行。这些我通常得记下来，不然就会忘。"}, {"q": "2. Have you ever forgotten something important?", "a": "Yeah, more than once. Once I <mark class=\"idiom\">completely forgot（彻底忘了）</mark> about a friend's birthday until she messaged me, <span class=\"conn\">which</span> was really <mark class=\"idiom\">embarrassing（尴尬的）</mark>. <span class=\"conn\">Ever since then</span>, I <mark class=\"idiom\">set reminders（设提醒）</mark> on my phone for important dates.", "t": "有，还不止一次。有一次我彻底忘了一个朋友的生日，直到她发消息给我，真的很尴尬。从那以后，我就在手机上给重要日子设提醒了。"}, {"q": "3. What do you need to remember in your daily life?", "a": "Quite a lot, actually. I need to <mark class=\"idiom\">keep track of（记住、跟进）</mark> work <mark class=\"idiom\">deadlines（截止日期）</mark>, appointments and my daily <mark class=\"idiom\">to-do list（待办清单）</mark>. <span class=\"conn\">On top of that</span>, there are little things like passwords and where I left my keys.", "t": "其实挺多的。我得记住工作的截止日期、各种约会，还有每天的待办清单。除此之外，还有些小事，比如密码、钥匙放哪儿了。"}, {"q": "4. How do you remember important things?", "a": "I <mark class=\"idiom\">rely on（依赖）</mark> my phone a lot, to be honest. I put everything into the calendar and <mark class=\"idiom\">set alarms（设闹钟）</mark> <span class=\"conn\">so</span> I don't forget. For really important stuff, I'll <span class=\"conn\">also</span> write a note and <mark class=\"idiom\">stick it somewhere（贴在某个地方）</mark> I can see.", "t": "说实话，我很依赖手机。我会把所有事都放进日历、设上闹钟，这样就不会忘。真正重要的事，我还会写张便条，贴在自己看得见的地方。"}]}, {"id": "t39", "tag": "补充·非大陆", "emoji": "💬", "title": "Old buildings（非大陆）", "count": 4, "items": [{"q": "1. Have you ever seen old buildings in the city?", "a": "Yes, quite a few. In Shanghai, for example, <mark class=\"idiom\">you can still see old villas（老洋房）</mark> <mark class=\"idiom\">and historical buildings（历史建筑）</mark> in areas like the former French Concession. They give the city a sense of history and character.", "t": "有，见过不少。比如在上海，像原法租界一带还能看到老洋房和历史建筑。它们让这座城市更有历史感和性格。"}, {"q": "2. Do you think we should preserve old buildings in cities?", "a": "<span class=\"conn\">Definitely</span>. <mark class=\"idiom\">Old buildings are part of a city's memory（城市记忆的一部分）</mark>, <mark class=\"idiom\">so tearing them down（拆掉它们）</mark> <mark class=\"idiom\">would be a real shame（很可惜的事）</mark>. <span class=\"conn\">Of course</span>, <mark class=\"idiom\">they need to be repaired and used properly（被修缮并合理使用）</mark> <span class=\"conn\">instead of</span> being left empty.", "t": "当然应该。老建筑是城市记忆的一部分，直接拆掉会很可惜。当然，它们也需要被修缮和合理使用，而不是空置。"}, {"q": "3. Do you prefer living in an old building or a modern house?", "a": "<mark class=\"idiom\">For daily life（日常生活）</mark>, <mark class=\"idiom\">I would choose a modern house（现代住宅）</mark> <span class=\"conn\">because</span> <mark class=\"idiom\">it is more comfortable and easier to maintain（更容易维护）</mark>. <mark class=\"idiom\">But aesthetically（从审美上说）</mark>, <mark class=\"idiom\">old buildings are much more charming and distinctive（有魅力且有辨识度）</mark>.", "t": "日常居住的话，我会选现代住宅，因为更舒服，也更容易维护。但从审美上说，老建筑明显更有魅力、更有辨识度。"}, {"q": "4. Are there any old buildings you want to see in the future? Why?", "a": "Yes, <mark class=\"idiom\">I would love to visit more traditional houses（传统民居）</mark> in Beijing or Suzhou. I am curious about how people used to design homes around family life, privacy, and social status.", "t": "有，我很想去看看北京或苏州更多的传统建筑。我很好奇以前的人如何围绕家庭生活、隐私和社会身份来设计住宅。"}]}, {"id": "t40", "tag": "补充·非大陆", "emoji": "💬", "title": "Morning routines（非大陆）", "count": 4, "items": [{"q": "1. Do you like getting up early in the morning?", "a": "I do, <span class=\"conn\">but</span> I would <mark class=\"idiom\">not say I am naturally a morning person（早起型）</mark>. When I get up early, I <mark class=\"idiom\">feel I have more control over the day（更能掌控一天）</mark> <mark class=\"idiom\">and I can get important things done（完成重要事情）</mark> before distractions start.", "t": "喜欢，但我不算天生的早起型。早起的时候，我会感觉自己更能掌控这一天，也能在各种干扰出现之前先完成重要的事情。"}, {"q": "2. What is your morning routine?", "a": "My routine is pretty simple. I drink some water, open the curtains, check my schedule, and then make a quick breakfast or coffee. If I have time, I also do some light stretching.", "t": "我的早晨流程很简单。我会先喝水、拉开窗帘、看一下日程，然后做一顿简单早餐或咖啡。有时间的话，我也会做一点拉伸。"}, {"q": "3. Is breakfast important?", "a": "Yes, I think it matters a lot. <mark class=\"idiom\">A proper breakfast（像样的早餐）</mark> <mark class=\"idiom\">keeps my energy stable（让精力保持稳定）</mark> <mark class=\"idiom\">and stops me from feeling irritated（感到烦躁）</mark> <mark class=\"idiom\">or unfocused（烦躁或注意力不集中）</mark> later in the morning.", "t": "重要。我觉得一顿合适的早餐能让我的能量更稳定，也能避免上午后半段变得烦躁或注意力不集中。"}, {"q": "4. What do you do right after getting up in the morning?", "a": "The first thing I usually do is check the time and drink water. <mark class=\"idiom\">I try not to scroll through social media（刷社交媒体）</mark> immediately <span class=\"conn\">because</span> it can easily waste twenty minutes without me noticing.", "t": "我通常第一件事是看时间、喝水。我尽量不一醒来就刷社交媒体，因为很容易不知不觉浪费二十分钟。"}]}, {"id": "t41", "tag": "补充·非大陆", "emoji": "💬", "title": "Evening time（非大陆）", "count": 6, "items": [{"q": "1. Do you like the morning or evening?", "a": "I <mark class=\"idiom\">prefer the evening because it feels more relaxing（更放松）</mark>. In the morning I usually think about tasks and deadlines, <mark class=\"idiom\">but in the evening I can slow down（慢下来）</mark> <mark class=\"idiom\">and have some personal time（个人时间）</mark>.", "t": "我更喜欢晚上，因为晚上更放松。早上我通常会想到任务和截止日期，但晚上可以慢下来，有一点属于自己的时间。"}, {"q": "2. What do you usually do in the evening?", "a": "I usually have dinner, reply to messages, <mark class=\"idiom\">and do some light work（做一点轻量工作）</mark> <span class=\"conn\">if</span> necessary. <span class=\"conn\">After that</span>, I like watching videos, listening to music, or simply doing nothing for a <span class=\"conn\">while</span>.", "t": "我通常会吃晚饭、回复消息，如果有必要就做一点轻量工作。之后我喜欢看视频、听音乐，或者就单纯放空一会儿。"}, {"q": "3. What did you do in the evening when you were little? Why?", "a": "<span class=\"conn\">When</span> I was little, I usually did homework and watched TV with my family. Back then, <mark class=\"idiom\">evenings felt very routine-based（有固定流程的）</mark> <span class=\"conn\">because</span> school life was quite structured.", "t": "小时候，我晚上通常写作业，然后和家人一起看电视。那时候晚上很有固定流程，因为学校生活本身就很规律。"}, {"q": "4. Are there any differences between what you do in the evening now and what you did in the past?", "a": "Yes, a <mark class=\"idiom\">big difference is that I have more freedom（更多自由）</mark> now. <span class=\"conn\">In the past</span>, my evening was mostly arranged by schoolwork, <span class=\"conn\">but</span> now I can decide whether to work, rest, exercise, or meet friends.", "t": "有，很大的区别是我现在更自由。过去晚上基本被作业安排好，现在我可以自己决定工作、休息、运动或见朋友。"}, {"q": "5. Do you spend your evenings doing the same things on both weekends and weekdays? Why?", "a": "Not really. On weekdays, my evenings are usually quieter and more practical, <span class=\"conn\">while</span> on weekends I am more likely to eat out or meet friends <span class=\"conn\">because</span> I do not need to wake up early the next day.", "t": "不太一样。工作日晚上通常更安静、更实用；周末我更可能出去吃饭或见朋友，因为第二天不用早起。"}, {"q": "6. What do you hate doing in the evening?", "a": "<mark class=\"idiom\">I hate dealing with complicated work problems（复杂的工作问题）</mark> late at night. My brain is usually tired by then, <span class=\"conn\">so</span> difficult decisions can <mark class=\"idiom\">easily make me anxious and affect my sleep（影响睡眠）</mark>.", "t": "我讨厌晚上很晚还处理复杂的工作问题。那时候大脑已经累了，困难决策很容易让我焦虑，影响睡眠。"}]}, {"id": "t42", "tag": "补充·非大陆", "emoji": "💬", "title": "History（非大陆）", "count": 4, "items": [{"q": "1. Have you ever been to historical museums?", "a": "Yes, many times. I <mark class=\"idiom\">have been to museums that show local history（地方历史）</mark>, <mark class=\"idiom\">ancient objects（古代文物）</mark>, <mark class=\"idiom\">and old photographs（老照片）</mark>. They make history feel much more real than textbooks.", "t": "去过很多次。我去过展示地方历史、古代文物和老照片的博物馆。它们让历史比课本上的内容真实得多。"}, {"q": "2. Do you like history?", "a": "Yes, I do, <mark class=\"idiom\">especially modern history（近现代史）</mark> <mark class=\"idiom\">and social history（社会史）</mark>. <mark class=\"idiom\">I am interested in how ordinary people's lives（普通人的生活）</mark> <mark class=\"idiom\">were shaped by major events（重大事件）</mark>.", "t": "喜欢，尤其是近现代史和社会史。我对重大事件如何影响普通人的生活很感兴趣。"}, {"q": "3. When was the last time you read about history?", "a": "<span class=\"conn\">Probably</span> last month. <mark class=\"idiom\">I read an article about old neighbourhoods（老街区）</mark> in Shanghai and how they changed over the past century. It was short, <span class=\"conn\">but</span> quite fascinating.", "t": "大概是上个月。我读了一篇关于上海老街区以及它们在过去一个世纪如何变化的文章。文章不长，但很有意思。"}, {"q": "4. Did you like history when you were young?", "a": "Not that much. When I was a child, <mark class=\"idiom\">history felt like memorising dates and names（死记日期和名字）</mark>. I only started to enjoy it later <span class=\"conn\">when</span> I saw the stories behind those facts.", "t": "小时候没那么喜欢。那时历史像是在背年代和人名。后来我看到这些事实背后的故事，才开始喜欢历史。"}]}, {"id": "t43", "tag": "补充·非大陆", "emoji": "💬", "title": "Films / Cinemas（非大陆）", "count": 7, "items": [{"q": "1. What films do you like?", "a": "<mark class=\"idiom\">I like realistic dramas（现实题材剧情片）</mark> <mark class=\"idiom\">and well-made science-fiction films（制作精良的科幻片）</mark>. <mark class=\"idiom\">I enjoy films that either reflect real life（反映现实生活）</mark> <mark class=\"idiom\">or create a completely convincing imaginary world（想象世界）</mark>.", "t": "我喜欢现实题材剧情片和制作精良的科幻片。我喜欢那种要么能反映现实生活、要么能创造出可信想象世界的电影。"}, {"q": "2. Did you often watch films when you were a child?", "a": "Yes, <span class=\"conn\">but</span> mostly on TV or DVDs. Going to the cinema was not as common for me back then, <mark class=\"idiom\">so it felt like a special treat（特别奖励）</mark>.", "t": "经常看，但主要是在电视或DVD上看。那时候去电影院对我来说没那么频繁，所以像是一种特别的奖励。"}, {"q": "3. Did you ever go to the cinema alone as a child?", "a": "No, I do not think <span class=\"conn\">so</span>. As a child, I always went with my parents or classmates <span class=\"conn\">because</span> it was safer and more fun.", "t": "没有，我觉得没有。小时候我总是和父母或同学一起去，因为更安全，也更好玩。"}, {"q": "4. Do you often go to the cinema with your friends?", "a": "Not very often now, <span class=\"conn\">but</span> I still do it <span class=\"conn\">when</span> there is a film we are all excited about. It is more enjoyable <span class=\"conn\">when</span> we can discuss it afterwards.", "t": "现在不算经常，但如果有大家都很期待的电影，我还是会和朋友去。看完之后还能一起讨论，会更有意思。"}, {"q": "5. Do you think going to the cinema is a good way to spend time with friends?", "a": "Yes, <mark class=\"idiom\">it is a low-pressure way to hang out（轻松社交方式）</mark>. You do not need to talk all the time, <mark class=\"idiom\">but you still share an experience（共享体验）</mark> together.", "t": "是的，这是很低压力的相处方式。你不用一直聊天，但你们仍然共同经历了一件事。"}, {"q": "6. How often do you watch films?", "a": "I probably watch one or two films a month. If I am busy, I may only watch short videos instead, <span class=\"conn\">but</span> I still prefer films <span class=\"conn\">when</span> I have enough time.", "t": "我大概一个月看一两部电影。如果忙的话，我可能只看短视频，但有足够时间时，我还是更喜欢电影。"}, {"q": "7. Do you prefer to watch films at home or in the cinema?", "a": "<mark class=\"idiom\">For big visual films（视觉大片）</mark>, I prefer the cinema <span class=\"conn\">because</span> the sound and screen are much better. <mark class=\"idiom\">For quiet dramas（安静的剧情片）</mark>, watching at home is more comfortable.", "t": "如果是视觉效果强的大片，我更喜欢在电影院看，因为音效和银幕都更好。如果是安静的剧情片，在家看更舒服。"}]}, {"id": "t44", "tag": "补充·非大陆", "emoji": "💬", "title": "Art（非大陆）", "count": 4, "items": [{"q": "1. Do you like art?", "a": "Yes, <span class=\"conn\">although</span> I am not an expert. I like <mark class=\"idiom\">art because it offers another way to understand（另一种理解方式）</mark> <mark class=\"idiom\">people's emotions（人的情感）</mark>, values, and imagination.", "t": "喜欢，虽然我不是专家。我喜欢艺术，因为它提供了另一种理解人的情绪、价值观和想象力的方式。"}, {"q": "2. Do you like visiting art galleries?", "a": "Yes, <mark class=\"idiom\">especially when the gallery is not too crowded（不太拥挤）</mark>. <mark class=\"idiom\">I enjoy walking slowly and spending time with（花时间欣赏）</mark> a few works <span class=\"conn\">rather than</span> trying to see everything.", "t": "喜欢，尤其是美术馆不太拥挤的时候。我喜欢慢慢走，花时间看少数几件作品，而不是硬把所有东西都看完。"}, {"q": "3. Do you want to be an artist?", "a": "<span class=\"conn\">Probably</span> not. I respect artists a lot, <span class=\"conn\">but</span> I do <mark class=\"idiom\">not think I have the talent or patience（天赋或耐心）</mark> <mark class=\"idiom\">to make art professionally（专业从事艺术）</mark>.", "t": "可能不会。我很尊重艺术家，但我不觉得自己有足够的天赋或耐心把艺术当成职业。"}, {"q": "4. Do you like modern art or traditional art?", "a": "<mark class=\"idiom\">I lean towards traditional art（传统艺术）</mark> <span class=\"conn\">because</span> it is easier for me to understand, <mark class=\"idiom\">but modern art can be very thought-provoking（引人深思的）</mark> <span class=\"conn\">when</span> I know the background.", "t": "我更偏向传统艺术，因为它对我来说更容易理解。但如果了解背景，现代艺术也会很发人深省。"}]}, {"id": "t45", "tag": "补充·非大陆", "emoji": "💬", "title": "Dream and Ambition（非大陆）", "count": 4, "items": [{"q": "1. What was your childhood dream?", "a": "<span class=\"conn\">When</span> I was a child, I wanted to become a teacher or a writer. I liked explaining things to others and creating little stories in my notebook.", "t": "小时候，我想当老师或作家。我喜欢给别人解释事情，也喜欢在本子上编小故事。"}, {"q": "2. Are you the kind of person who sticks to dreams?", "a": "I would say yes, <span class=\"conn\">but</span> in a realistic way. I <mark class=\"idiom\">do not hold on to every childish dream（童年梦想）</mark>, <span class=\"conn\">but</span> <mark class=\"idiom\">I try to keep the core of it（核心部分）</mark> and adjust my path <span class=\"conn\">when</span> necessary.", "t": "我觉得是，但我是比较现实地坚持。我不会抓住每个幼稚的梦想不放，但会保留梦想的核心，并在必要时调整路径。"}, {"q": "3. What is your dream job?", "a": "<mark class=\"idiom\">My dream job（理想工作）</mark> <mark class=\"idiom\">would be something creative and meaningful（有创造性且有意义的）</mark>, where I can keep learning, help others, and still have some control over my own time.", "t": "我的理想工作应该是有创造性、有意义的，既能让我持续学习、帮助别人，也能让我对自己的时间有一定掌控。"}, {"q": "4. Do you think you are an ambitious person?", "a": "Yes, <span class=\"conn\">but</span> I am not the aggressive type. <mark class=\"idiom\">I have clear goals（清晰目标）</mark> and I care about progress, <span class=\"conn\">but</span> I also value stability and mental balance.", "t": "是的，但我不是特别激进的那种。我有清晰目标，也在意进步，但我同样重视稳定和心理平衡。"}]}, {"id": "t46", "tag": "补充·非大陆", "emoji": "💬", "title": "Sports Programs（非大陆）", "count": 6, "items": [{"q": "1. Do you like watching sports programs on TV?", "a": "Sometimes. <mark class=\"idiom\">I am not a die-hard sports fan（铁杆体育迷）</mark>, <mark class=\"idiom\">but I enjoy major events（重大事件）</mark> <span class=\"conn\">because</span> the atmosphere is exciting and the commentary makes it easier to follow.", "t": "有时候喜欢。我不是铁杆体育迷，但我喜欢看大型赛事，因为氛围很刺激，解说也让比赛更容易看懂。"}, {"q": "2. Do you like to watch live sports games?", "a": "Yes, <mark class=\"idiom\">live games（直播比赛）</mark> are more exciting <span class=\"conn\">because</span> anything can happen. You can feel the tension and the energy from both players and the audience.", "t": "喜欢，直播比赛更刺激，因为什么都可能发生。你能感受到运动员和观众双方的紧张感和能量。"}, {"q": "3. Who do you like to watch sports games with?", "a": "I prefer watching them with friends who understand the sport. <mark class=\"idiom\">They can explain the rules and small details（小细节）</mark>, which makes the whole experience more enjoyable.", "t": "我更喜欢和懂这项运动的朋友一起看。他们能解释规则和细节，让整个体验更有意思。"}, {"q": "4. What kinds of games do you expect to watch in the future?", "a": "I would like to watch more international football matches or tennis games. <mark class=\"idiom\">They are competitive（竞争激烈的）</mark>, <mark class=\"idiom\">fast-paced（快节奏的）</mark>, and easy to get emotionally involved in.", "t": "我以后想看更多国际足球赛或网球赛。它们竞争性强、节奏快，也很容易让人投入情绪。"}, {"q": "5. Do you prefer to watch sports games alone or with a group of friends?", "a": "With friends, definitely. <mark class=\"idiom\">Sports are more fun when people react together（一起反应）</mark>, cheer together, and argue a little about the result.", "t": "肯定是和朋友一起看。体育比赛大家一起反应、一起欢呼、甚至为结果争论几句，会更有意思。"}, {"q": "6. Have you ever watched a sports game in a stadium?", "a": "Yes, once. The match itself was not even that important, <mark class=\"idiom\">but the atmosphere in the stadium（体育场）</mark> <mark class=\"idiom\">was unforgettable（难忘的）</mark> <span class=\"conn\">because</span> everyone was shouting and cheering.", "t": "看过一次。那场比赛本身甚至没那么重要，但体育场里的氛围很难忘，因为所有人都在呐喊和欢呼。"}]}, {"id": "t47", "tag": "补充·非大陆", "emoji": "💬", "title": "Study", "count": 10, "items": [{"q": "1. Is it your ideal major / original thought?", "a": "Not completely. It was not my only dream choice, <span class=\"conn\">but</span> the more I study it, the more I can see its value and practical use.", "t": "不完全是。它不是我唯一的梦想选择，但越学我越能看到它的价值和实际用途。"}, {"q": "2. What do you think is the most interesting part of your major?", "a": "The most interesting part is understanding how people learn and communicate. It makes me think about language not just as knowledge, <span class=\"conn\">but</span> as a real-life tool.", "t": "最有趣的是理解人们如何学习和交流。它让我意识到语言不只是知识，更是现实生活中的工具。"}, {"q": "3. How did you feel on your first day in that school / university?", "a": "I felt nervous <span class=\"conn\">but</span> excited. Everything was new, <span class=\"conn\">so</span> I was a bit overwhelmed, <span class=\"conn\">but</span> I also felt that a new chapter had started.", "t": "我既紧张又兴奋。一切都很新，所以有点不知所措，但也感觉人生新阶段开始了。"}, {"q": "4. Do you think your school / university is a good place to study?", "a": "Yes, overall it is. It has decent facilities and a serious academic atmosphere, <span class=\"conn\">although</span> some courses could be more practical.", "t": "总体来说是的。学校设施不错，学习氛围也认真，虽然有些课程可以更实用一点。"}, {"q": "5. Is there anything you think should be improved in your school / college?", "a": "I hope there could be more practical workshops and career guidance, <span class=\"conn\">because</span> students need more than textbook knowledge.", "t": "我希望能有更多实践工作坊和职业指导，因为学生需要的不只是课本知识。"}, {"q": "6. Have you ever thought about changing the present study place?", "a": "Not seriously. I have had moments of doubt, <span class=\"conn\">but</span> I think adapting to a place is also part of growing up.", "t": "没有认真考虑过。我也有过怀疑的时刻，但我觉得适应一个地方也是成长的一部分。"}, {"q": "7. Do you think you study too hard?", "a": "Sometimes, yes. When deadlines pile up, I can push myself too much, <span class=\"conn\">so</span> I need to remind myself to rest properly.", "t": "有时候是的。截止日期堆在一起时，我会把自己逼得太紧，所以需要提醒自己好好休息。"}, {"q": "8. What are your extra-curricular activities?", "a": "I sometimes join language clubs, volunteer activities, or sports events. They help me meet people and take a break from academic pressure.", "t": "我有时会参加语言社团、志愿活动或体育活动。它们能让我认识人，也能暂时从学业压力中抽离出来。"}, {"q": "9. Do you prefer to study on your own or with others?", "a": "For memorising and writing, I prefer studying alone. For discussion-based tasks, working with others is more useful <span class=\"conn\">because</span> I can hear different ideas.", "t": "背诵和写作时我更喜欢一个人学。讨论型任务和别人一起更有用，因为能听到不同想法。"}, {"q": "10. Does your study meet your expectation?", "a": "Mostly, yes. It is more demanding than I expected, <span class=\"conn\">but</span> it also gives me more opportunities to improve myself.", "t": "大体符合。它比我想象中更费力，但也给了我更多提升自己的机会。"}]}, {"id": "t48", "tag": "补充·非大陆", "emoji": "💬", "title": "Home / Accommodation", "count": 2, "items": [{"q": "1. When do you spend your time at home longer, weekends or workdays?", "a": "<span class=\"conn\">Definitely</span> on weekends. On workdays I am usually busy outside, <span class=\"conn\">but</span> at weekends I can stay home, clean up, cook, and properly relax.", "t": "肯定是周末。工作日我通常在外面忙，周末可以待在家里、收拾房间、做饭，也能真正放松。"}, {"q": "2. Is there anything you want to make a change in your home?", "a": "Yes, I would like to improve the lighting and add more storage space. A brighter and better-organised home would make me feel more comfortable.", "t": "有，我想改善灯光，再增加一些收纳空间。更明亮、更有条理的家会让我更舒服。"}]}, {"id": "t49", "tag": "补充·非大陆", "emoji": "💬", "title": "Pets and Animals", "count": 4, "items": [{"q": "1. Is keeping pets popular in your country?", "a": "Yes, it is very popular, especially among young people in big cities. Pets give them companionship and make life feel less lonely.", "t": "很流行，尤其是在大城市年轻人中。宠物能提供陪伴，让生活没那么孤单。"}, {"q": "2. Should schools teach children knowledge about pets and animals?", "a": "Yes, I think <span class=\"conn\">so</span>. Children should learn how to respect animals and take care of them responsibly, <span class=\"conn\">instead of</span> treating pets like toys.", "t": "应该。孩子应该学习如何尊重动物、负责任地照顾动物，而不是把宠物当玩具。"}, {"q": "3. Do you like visiting zoos?", "a": "It depends. I like well-managed zoos that focus on education and animal protection, <span class=\"conn\">but</span> I dislike places where animals look stressed or poorly treated.", "t": "看情况。我喜欢管理良好、重视教育和动物保护的动物园，但不喜欢那些动物看起来压力很大或被照顾得不好的地方。"}, {"q": "4. Have you ever visited a zoo?", "a": "Yes, I visited zoos several times <span class=\"conn\">when</span> I was younger. The most memorable part was seeing animals that I had only seen in books before.", "t": "去过，我小时候去过几次动物园。最难忘的是看到以前只在书里见过的动物。"}]}, {"id": "t50", "tag": "补充·非大陆", "emoji": "💬", "title": "Childhood Activities", "count": 2, "items": [{"q": "1. Did you prefer to do activities alone or with a group of people when you were a child?", "a": "I preferred doing things with a small group of friends. It felt more fun and less lonely, <span class=\"conn\">but</span> I did not like huge groups <span class=\"conn\">because</span> they could be noisy.", "t": "小时候我更喜欢和一小群朋友一起活动。这样更有趣，也没那么孤单，但我不喜欢太大的群体，因为会很吵。"}, {"q": "2. Are there any differences between the activities you liked when you were a child and those you like now?", "a": "Yes. As a child, I liked outdoor games and cartoons. Now I prefer quieter activities, like reading, watching films, or exercising.", "t": "有。小时候我喜欢户外游戏和动画片。现在我更喜欢安静一点的活动，比如阅读、看电影或运动。"}]}, {"id": "t51", "tag": "补充·非大陆", "emoji": "💬", "title": "Life stages", "count": 6, "items": [{"q": "1. What did you often do with your friends in your childhood?", "a": "We often played games outdoors, rode bikes, and visited each other's homes after school. <mark class=\"idiom\">Life felt simpler and less competitive（竞争激烈的）</mark> back then.", "t": "小时候我们常常在户外玩游戏、骑车，放学后去彼此家里玩。那时候生活更简单，也没那么有竞争感。"}, {"q": "2. What do you think is the most important at the moment?", "a": "At the moment, I think building a stable routine is most important. It helps me make progress without burning myself out.", "t": "目前我觉得建立稳定的生活节奏最重要。它能帮助我持续进步，而不是把自己耗尽。"}, {"q": "3. Do you have any plans for the next five years?", "a": "Yes, I want to improve my professional skills, save more money, and build a healthier lifestyle. I do not want my life to be only about work.", "t": "有。我想提升专业能力、多存钱，也建立更健康的生活方式。我不希望生活只有工作。"}, {"q": "4. How do people remember each stage of their lives?", "a": "People usually remember life stages through photos, important places, old friends, <mark class=\"idiom\">and major events（重大事件）</mark> like graduation, moving house, or starting a job.", "t": "人们通常通过照片、重要地点、老朋友，以及毕业、搬家、开始工作等重大事件来记住人生阶段。"}, {"q": "5. Do you enjoy being the age you are now?", "a": "Yes, mostly. I have more independence and self-awareness now, <span class=\"conn\">although</span> I also face more pressure and responsibility.", "t": "大体上享受。现在我更独立，也更了解自己，虽然也面对更多压力和责任。"}, {"q": "6. At what age do you think people are the happiest?", "a": "I do not think there is one perfect age. People can be happy at different stages <span class=\"conn\">if</span> they have good relationships, health, and a sense of purpose.", "t": "我不觉得有一个完美年龄。只要有好的关系、健康和目标感，人们在不同阶段都可以幸福。"}]}, {"id": "t52", "tag": "补充·非大陆", "emoji": "💬", "title": "Views", "count": 1, "items": [{"q": "1. Have you seen an unforgettable and beautiful view or scenery?", "a": "Yes, I once saw a sunset by the sea, and the whole sky turned orange and pink. It was simple, <span class=\"conn\">but</span> it made me feel calm and grateful.", "t": "有，我曾经在海边看过一次日落，整片天空变成橙色和粉色。画面很简单，但让我觉得平静又感恩。"}]}, {"id": "t53", "tag": "补充·非大陆", "emoji": "💬", "title": "Spare Time", "count": 1, "items": [{"q": "1. Do you have more free time on weekdays or weekends?", "a": "I definitely have more free time on weekends. On weekdays, even <span class=\"conn\">when</span> I finish work, my mind is still half occupied by tasks and messages.", "t": "我周末肯定有更多空闲时间。工作日即使结束工作，我脑子里也还会被任务和消息占着一半。"}]}], "cue": [{"id": "c1", "tag": "本季新题", "emoji": "🏙️", "ztitle": "喜欢或不喜欢的高建筑", "describe": "Describe a tall building you like or dislike", "shouldsay": ["What it is used for", "Where it is", "What it looks like", "And explain why you like/dislike it"], "a": "I'd like to talk about a tall building that really impresses me, which is <mark class=\"idiom\">（漂亮、地道、可替换的万能开头句）</mark> the Shanghai Tower. It's mainly a place for offices and shops, and it's even got restaurants and <mark class=\"idiom\">viewing decks（观景台）</mark> for tourists.<br><br>It's right <mark class=\"idiom\">in the heart of（位于……中心）</mark> Lujiazui, which is Shanghai's <mark class=\"idiom\">financial district（金融区）</mark>. It stands next to a couple of other famous <mark class=\"idiom\">skyscrapers（摩天大楼）</mark>, <span class=\"conn\">so</span> together they make a pretty stunning <mark class=\"idiom\">skyline（天际线）</mark>.<br><br><span class=\"conn\">As for</span> what it looks like, it's incredibly tall and has this cool <mark class=\"idiom\">twisting shape（扭转的造型）</mark> that <mark class=\"idiom\">spirals up（盘旋而上）</mark> into the sky. The whole thing is covered in glass, <span class=\"conn\">which</span> <mark class=\"idiom\">catches the sunlight（反射阳光）</mark> beautifully, <span class=\"conn\">especially</span> at sunset.<br><br>I really like it <span class=\"conn\">because</span> it's not just a building — it's kind of <mark class=\"idiom\">a symbol of（……的象征）</mark> how fast the city has grown. Standing up on the deck and looking down at the whole city always <mark class=\"idiom\">takes my breath away（让我惊叹不已）</mark>. <span class=\"conn\">That's why</span> it's my favourite building in China.", "t": "我想谈谈一座很让我惊艳的高楼——上海中心大厦。它主要是个办公和购物的地方，里面甚至还有餐厅和供游客参观的观景台。<br><br>它就在陆家嘴的中心地带，也就是上海的金融区。它旁边还有另外几座著名的摩天大楼，所以它们一起构成了一道相当壮观的天际线。<br><br>说到它的样子，它高得惊人，有一种很酷的、向天空盘旋而上的扭转造型。整栋楼都覆盖着玻璃，能把阳光反射得很漂亮，尤其是在日落时分。<br><br>我很喜欢它，因为它不只是一栋楼——它某种程度上是这座城市发展速度的象征。站在观景台上俯瞰整座城市，总能让我惊叹不已。这就是为什么它是我在中国最喜欢的建筑。", "p3": [{"q": "1) Are there many tall buildings in your country?", "a": "Yes, definitely. In big cities like Shanghai and Shenzhen, tall buildings are everywhere, mostly used as offices or apartments. This is mainly because land is limited, so building upwards is the most efficient way to use space.", "t": ""}, {"q": "2) What are the differences between those tall buildings in your country?", "a": "They vary quite a lot. Some are modern glass towers used for business, while others are residential blocks that look much plainer. Generally, commercial buildings are taller and more eye-catching, since companies want to show off their image.", "t": ""}, {"q": "3) Why are different places laid out and designed differently?", "a": "I think it mainly depends on their purpose and the local culture. For example, business districts are designed to look impressive and professional, while residential areas focus more on comfort and convenience. Climate and history also play a part in how places are planned.", "t": ""}, {"q": "4) What are the advantages of living in tall buildings?", "a": "There are several benefits. You usually get a great view and more sunlight on the higher floors, and it's often quieter, away from street noise. Besides, many high-rise buildings come with good facilities like gyms and security systems.", "t": ""}, {"q": "5) Why do some people like to remodel and decorate their homes themselves?", "a": "For many people, it's a way to express their personality and make the space truly their own. It can also save money compared with hiring professionals. On top of that, the whole process gives them a real sense of accomplishment.", "t": ""}, {"q": "6) What kind of interior design style do most people like?", "a": "It really depends on personal taste, but minimalist style has become very popular these days. People like it because it looks clean and modern, and makes rooms feel more spacious. That said, some still prefer a warmer, more traditional look.", "t": ""}]}, {"id": "c2", "tag": "本季新题", "emoji": "🎬", "ztitle": "有趣视频", "describe": "Describe an interesting video", "shouldsay": ["When and where you watched it", "What it is about", "Why you watched it", "And explain how you feel about it"], "a": "I'd like to talk about an interesting video I watched not long ago, which is <mark class=\"idiom\">（漂亮、地道、可替换的万能开头句）</mark> a clip I <mark class=\"idiom\">came across（偶然刷到）</mark> on Douyin one night, while I was <mark class=\"idiom\">scrolling through my phone（刷手机）</mark> before bed.<br><br>The video was about a <mark class=\"idiom\">street musician（街头艺人）</mark> playing in a busy subway station. He was singing an old classic on his guitar, <span class=\"conn\">and</span> <span class=\"conn\">little by little</span> a big crowd <mark class=\"idiom\">gathered around（围拢过来）</mark> him to listen and <mark class=\"idiom\">sing along（跟着唱）</mark>.<br><br>Honestly, I clicked on it just <mark class=\"idiom\">out of curiosity（出于好奇）</mark>, <span class=\"conn\">because</span> the <mark class=\"idiom\">thumbnail（封面图）</mark> looked pretty touching. <span class=\"conn\">Once</span> I started watching, I couldn't stop, <span class=\"conn\">since</span> the whole <mark class=\"idiom\">vibe（氛围）</mark> was so warm and the music was lovely.<br><br>It really <mark class=\"idiom\">moved me（打动了我）</mark> and <mark class=\"idiom\">put a smile on my face（让我会心一笑）</mark>. It reminded me that music can <mark class=\"idiom\">bring strangers together（让陌生人聚到一起）</mark>, <span class=\"conn\">even</span> in such an ordinary place. <span class=\"conn\">That's why</span> I saved it and have watched it a few times since.", "t": "我想谈谈一个我不久前看的有趣视频——那是我某天晚上睡前刷手机时，在抖音上偶然刷到的一个片段。<br><br>这个视频讲的是一位街头艺人在繁忙的地铁站里表演。他抱着吉他唱着一首老经典，渐渐地，一大群人围拢过来听他唱、还跟着一起唱。<br><br>说实话，我点开它只是出于好奇，因为封面图看着挺打动人的。一旦开始看，我就停不下来了，因为整个氛围太温暖了，音乐也很好听。<br><br>它真的打动了我，让我会心一笑。它提醒我，音乐能让陌生人聚到一起，哪怕是在这样一个再普通不过的地方。这就是为什么我把它收藏了，之后还看了好几遍。", "p3": [{"q": "1) What kind of videos do people in your country like to watch?", "a": "People here enjoy a wide range of videos, but short, entertaining clips are by far the most popular. Things like funny moments, food reviews and travel vlogs get the most attention. I think it's because they're easy to watch and perfect for killing time.", "t": ""}, {"q": "2) Which is more helpful, watching videos or reading books?", "a": "Both have their own value, to be honest. Videos are great for picking up practical skills quickly, since you can see exactly how things are done. However, books are better for deep thinking and detailed knowledge, so it really depends on your purpose.", "t": ""}, {"q": "3) What skills can people learn from watching videos?", "a": "Quite a lot, actually. People can pick up cooking, languages, or even editing skills just by following online tutorials. The biggest advantage is that they can learn at their own pace and repeat the difficult parts whenever they need to.", "t": ""}, {"q": "4) Are there any differences between the videos that young people and old people like to watch?", "a": "Yes, there's a clear difference. Young people tend to prefer fast-paced, trendy content like games and short comedy clips. Older people, on the other hand, usually enjoy news, health tips or traditional opera, which suit their interests better.", "t": ""}, {"q": "5) Are there any differences between the videos that young men and young women like to watch?", "a": "To some extent, yes, though it's not absolute. Generally, young men lean towards sports, gaming and tech videos, while young women may watch more about fashion, beauty and lifestyle. Still, plenty of people enjoy both, so these are just rough tendencies.", "t": ""}, {"q": "6) What makes a video go viral online?", "a": "I think a few key factors matter. The video usually needs to be either really funny, emotional, or surprising enough to make people want to share it. Good timing and a catchy title also help it spread quickly across social media.", "t": ""}]}, {"id": "c3", "tag": "本季新题", "emoji": "🏚️", "ztitle": "去过的无聊地方", "describe": "Describe a boring place", "shouldsay": ["Where it is", "Who you went there with", "What you did there", "And explain why you think it is a boring place"], "a": "I'd like to talk about a place I found <mark class=\"idiom\">pretty boring（挺无聊的）</mark>, which is <mark class=\"idiom\">（漂亮、地道、可替换的万能开头句）</mark> a small local museum in my hometown. It's a tiny <mark class=\"idiom\">two-storey（两层的）</mark> building on a quiet street in the old part of town.<br><br>I went there with my parents during a public holiday a couple of years ago. They thought it would be <mark class=\"idiom\">educational（有教育意义的）</mark>, <span class=\"conn\">so</span> they <mark class=\"idiom\">kept saying we should go（一直说我们该去）</mark>, <span class=\"conn\">even though</span> I wasn't really interested.<br><br>We spent about an hour walking around, looking at some old farming tools and <mark class=\"idiom\">faded photos（褪色的老照片）</mark>. There wasn't much information to read, <span class=\"conn\">and</span> no fun interactive bits at all, <span class=\"conn\">so</span> we basically just <mark class=\"idiom\">glanced at（匆匆看了一眼）</mark> things and moved on.<br><br>I found it boring <span class=\"conn\">mainly because</span> everything felt <mark class=\"idiom\">old and lifeless（陈旧又没生气）</mark>. The displays were <mark class=\"idiom\">badly laid out（布置得乱七八糟）</mark> and there was nothing to <mark class=\"idiom\">grab your attention（抓住你的注意力）</mark>. <span class=\"conn\">To be honest</span>, I couldn't wait to leave and go grab lunch <span class=\"conn\">instead</span>.", "t": "我想谈谈一个我觉得挺无聊的地方——我家乡的一家小型本地博物馆。它是一栋小小的两层建筑，在老城区一条安静的街道上。<br><br>几年前的一个公共假期，我和父母一起去的。他们觉得那里会很有教育意义，所以一直说我们该去看看，尽管我并不太感兴趣。<br><br>我们在里面走了大约一个小时，看了一些旧农具和褪色的老照片。可读的介绍不多，也完全没有什么好玩的互动环节，所以我们基本上就是匆匆看一眼就走了。<br><br>我觉得它无聊，主要是因为一切都显得陈旧又没生气。展品布置得乱七八糟，也没有任何能抓住你注意力的东西。说实话，我当时只想赶紧离开，去吃个午饭。", "p3": [{"q": "1) Why do most children think education is boring?", "a": "I think it's mainly because traditional teaching can be quite repetitive and exam-focused. Children are full of energy and curiosity, so sitting still and memorising facts feels dull to them. They usually prefer learning through games and hands-on activities.", "t": ""}, {"q": "2) Why aren't young people willing to listen to the experiences of older people?", "a": "Partly because they feel the older generation's experiences are out of date. Society changes so fast that young people believe the old ways may no longer apply. Also, they often want to figure things out and learn from their own mistakes.", "t": ""}, {"q": "3) What can people do when they feel bored?", "a": "There are plenty of options. They can pick up a hobby, do some exercise, or simply call a friend for a chat. Personally, I think doing something creative, like drawing or cooking, is the best way to turn boredom into something enjoyable.", "t": ""}, {"q": "4) Why are some teachers' classes boring? Are there any solutions?", "a": "Some classes are boring because the teacher just reads from the textbook without any interaction. A good solution would be to add more discussions, real-life examples and group activities. When students are actively involved, even difficult subjects become interesting.", "t": ""}, {"q": "5) Why do some young people feel bored when talking with old people?", "a": "It's usually down to the generation gap. Young and old people often have different interests, values and ways of communicating, so they struggle to find common topics. Sometimes young people also lack the patience for longer, slower conversations.", "t": ""}, {"q": "6) Do most people think news about celebrities is boring?", "a": "It really depends on the person. Many people, especially fans, find celebrity gossip entertaining and follow it closely. However, others see it as meaningless and a waste of time, since they'd rather focus on more serious or useful news.", "t": ""}]}, {"id": "c4", "tag": "本季新题", "emoji": "🌅", "ztitle": "早起经历", "describe": "Describe a time when you got up early", "shouldsay": ["When it was", "What you did", "Why you got up early", "And how you felt about it"], "a": "I'd like to talk about a time when I got up <mark class=\"idiom\">super early（超级早地）</mark>, which was <mark class=\"idiom\">（漂亮、地道、可替换的万能开头句）</mark> during a trip to Mount Tai last summer.<br><br>I <mark class=\"idiom\">set my alarm（定了闹钟）</mark> for around three in the morning and started <mark class=\"idiom\">hiking up（徒步上山）</mark> in the dark with a group of friends. We climbed for nearly two hours, using our <mark class=\"idiom\">phone torches（手机手电）</mark> to light the way, <span class=\"conn\">and</span> <span class=\"conn\">finally</span> made it to the top just <mark class=\"idiom\">before dawn（黎明前）</mark>.<br><br>The reason I got up so early was to <mark class=\"idiom\">catch the sunrise（看日出）</mark> from the top. It's said to be one of the most <mark class=\"idiom\">amazing views（壮观的景色）</mark> in China, <span class=\"conn\">so</span> none of us wanted to miss it.<br><br><span class=\"conn\">At first</span> I felt <mark class=\"idiom\">worn out（精疲力竭）</mark> and a bit <mark class=\"idiom\">grumpy（暴躁的）</mark>, <span class
