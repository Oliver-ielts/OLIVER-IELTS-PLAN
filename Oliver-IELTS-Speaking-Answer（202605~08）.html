d a simple task list and timeline and shared it with the whole team. This helped everyone <mark class=\"idiom\">see the overall picture（全面了解情况）</mark> and understand how their work was connected. What made his solution smart was that it was <mark class=\"idiom\">simple and practical(简单又实用)</mark>. He didn't make the problem more complicated or emotional. He focused on communication and organisation, which were the <mark class=\"idiom\">real issues(真正的问题)</mark>. <span class=\"conn\">As a result</span>, the team quickly <mark class=\"idiom\">got back on track(回到正轨)</mark>, and we managed to finish the project on time. I think he solved the problem in a smart way <span class=\"conn\">because</span> he <mark class=\"idiom\">stayed logical under pressure(压力下保持理性)</mark> and addressed the <mark class=\"idiom\">root cause(根本原因)</mark> instead of the surface problem. His approach also improved teamwork and reduced stress, which <mark class=\"idiom\">made a big difference（产生重大影响）</mark> for everyone involved.", "t": "我想描述一位以聪明的方式解决问题的人，而此人正是我的某位同事。问题大约发生在一年前的工作中。我们的团队当时正忙于一项重要项目，但临近截止日期时，我们意识到存在严重的沟通问题。不同团队成员对各自任务的理解存在差异，这导致了延误和重复工作的情况。所有人都感到压力倍增，气氛也变得相当紧张。我的同事没有责怪他人，而是保持了冷静，并努力去理解当前的状况。首先，他建议召开一次简短的会议，让每个人都能明确阐述自己所负责的工作内容。接着，他制作了一份简明扼要的任务清单及时间线，并将其分享给整个团队。此举有助于大家全面了解情况，并理解各自工作之间的关联。他的解决方案之所以显得高明，是因为它既简单又实用。他没有使问题变得更加复杂或情绪化。他专注于沟通与组织这两个真正关键的问题。因此，团队很快便重新步入正轨，并最终按时完成了项目。我认为他以一种聪明的方式解决了这个问题，因为他能在压力下保持理性，并着眼于根本原因而非表面问题。他的方法还促进了团队协作并减轻了压力，这对所有相关人员来说都产生了显著的积极影响。", "p3": [{"q": "Do you think children are born smart or they learn to become smart?", "a": "I think it’s a mix of both(两者的结合). Some children are naturally quick learners(天生的快速学 习者), but intelligence also depends a lot on environment and training. With the right guidance, practice, and feedback, many children can become “smarter” in a practical sense(实际意义上). So talent matters, but learning habits(学习习惯) and effort matter a great deal(非常重要) too.", "t": ""}, {"q": "How do children become smart at school?", "a": "They become smarter by building strong basics(扎实的基础) and learning how to think, not just memorise. Good teachers encourage students to ask questions, solve problems step by step(循序渐 进), and reflect on mistakes(反思错误). Group work and projects can also help, because students learn communication and critical thinking(批判性思维). In my opinion, a supportive classroom environment(支持性的课堂环境) is just as important as(与...同样重要) textbooks.", "t": ""}, {"q": "Why are some people well-rounded and others only good at one thing?", "a": "One reason is personality: some people are curious(好奇心强的) and enjoy trying different areas, while others prefer to focus deeply(深耕) on a single skill. Another reason is opportunity and education—if someone is exposed to(暴露于) many activities when they are young, they are more likely to become well-rounded(全面发展的). On the other hand, specialising(专业化) can also be a smart strategy(聪明的策略), especially in fields that require years of practice, like music or science.", "t": ""}, {"q": "Why does modern society need talents of all kinds?", "a": "Modern society is complex(复杂的), so it needs different types of talents to function well(良好运作). For example, we need engineers to build technology, doctors to protect public health, teachers to educate the next generation(教育下一代), and artists to bring creativity and culture(带来创意与 文化). Different talents also support innovation(支持创新), because new ideas often come from cooperation across fields(跨领域合作). That’s why diversity of skills is essential for progress(对进 步至关重要).<br><br><strong>朋友所学</strong>", "t": ""}]}, {"id": "c44", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe one of your friends who learned something new (not a teacher)", "shouldsay": ["Who he/she is", "What he/she learned", "Why he/she learned this", "And explain whether it would be easier to learn from a teacher"], "a": "I'd like to describe one of my friends who learned something new recently. He is a close friend of mine, and we have known each other for several years. He is an office worker, <span class=\"conn\">but</span> he is always interested in <mark class=\"idiom\">developing new skills(培养新技能)</mark> in his spare time. What he learned was basic <mark class=\"idiom\">video editing(视频剪辑)</mark>. <span class=\"conn\">At first</span>, he didn't know much about editing software, <span class=\"conn\">but</span> over a few months, he learned how to cut clips, add subtitles, insert background music, and create simple <mark class=\"idiom\">visual effects(视觉效果)</mark>. Now he can make short videos that look quite professional. The reason he learned this skill was mainly because of his work and personal interest. His company started to focus more on <mark class=\"idiom\">online marketing(网络营销)</mark>, and they needed video content for social media. <span class=\"conn\">Instead of</span> relying on others, he decided to <mark class=\"idiom\">learn it himself(自学)</mark>. He also enjoys creating and sharing videos, <span class=\"conn\">so</span> it became a useful hobby as well. I think it might have been easier to learn from a teacher, <span class=\"conn\">especially</span> at the beginning. A teacher could give <mark class=\"idiom\">clear guidance(明确指导)</mark> and help him avoid mistakes. <span class=\"conn\">However</span>, learning by himself also had advantages, <span class=\"conn\">because</span> he could <mark class=\"idiom\">practise at his own pace(按自己的节奏练习)</mark> and focus on what he needed most. <span class=\"conn\">Overall</span>, I really admire his <mark class=\"idiom\">motivation to keep learning(持续学习的动力)</mark> new things.", "t": "", "p3": [{"q": "Is it necessary to keep learning after graduating from school?", "a": "Yes, I think it’s necessary. Knowledge and skills can become outdated quickly, especially in modern society. Continuous learning helps people stay competitive at work and adapt to changes. It also supports personal growth, not just career development.", "t": ""}, {"q": "Should teachers make learning in their classes fun?", "a": "Yes, to a certain extent. Making classes interesting can help students stay focused and motivated. However, fun should not replace clear learning goals. The best approach is to combine enjoyment with structure, so students can learn effectively while staying engaged.", "t": ""}, {"q": "Do you think there are too many subjects for students to learn?", "a": "In some cases, yes. Students often have a heavy workload, which can cause stress and reduce learning efficiency. When there are too many subjects, students may focus on memorising instead of understanding. A more balanced curriculum could help them learn more deeply.", "t": ""}, {"q": "Is it better to focus on a few subjects or to learn many subjects?", "a": "It depends on the stage of learning. At a younger age, learning many subjects helps students discover their interests and develop basic skills. Later on, focusing on a few key subjects can allow deeper learning and expertise. So a combination of both is ideal.", "t": ""}, {"q": "Do you think enterprises should provide training for their employees?", "a": "Yes, definitely. Training helps employees improve their skills and adapt to new technologies or methods. It can also increase job satisfaction and loyalty. From the company’s perspective, well- trained employees usually perform better and contribute more.", "t": ""}, {"q": "Do you think it is good for older adults to continue learning?", "a": "Yes, it is very beneficial. Learning new things can keep older adults mentally active and improve their confidence. It also gives them a sense of purpose and social connection. In addition, lifelong learning can help them adapt better to modern life.<br><br><strong>不享受的音乐活动</strong>", "t": ""}]}, {"id": "c45", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe an event you attended in which you didn’t enjoy the music played", "shouldsay": ["What it was", "Who you went with", "Why you decided to go there", "And explain why you didn’t enjoy it"], "a": "I'd like to describe an event I attended where I didn't really enjoy the music, which was a wedding ceremony I went to last year. I went there with my parents, <span class=\"conn\">because</span> the wedding was held by one of our relatives. <span class=\"conn\">Since</span> it was a family event, I felt it was necessary to attend, even though I wasn't very interested in weddings in general. I decided to go mainly <mark class=\"idiom\">out of respect and responsibility(出于尊重和责任)</mark>. In my culture, weddings are important family occasions, and showing up is a way to support the couple. <span class=\"conn\">Also</span>, my parents asked me to go with them, <span class=\"conn\">so</span> I didn't really think too much about whether I would enjoy the event or not. <span class=\"conn\">However</span>, I didn't enjoy the music played at the wedding. Most of the music was very <mark class=\"idiom\">traditional and old-fashioned(传统又老派)</mark>, which didn't <mark class=\"idiom\">match my personal taste(符合我的口味)</mark>. The songs were played at a very high volume, and they were repeated many times during the ceremony. After a while, the music <mark class=\"idiom\">felt noisy rather than festive(吵闹而非喜庆)</mark>. <span class=\"conn\">In addition</span>, the sound system wasn't very good, <span class=\"conn\">so</span> the music sounded unclear and a bit uncomfortable to listen to. <span class=\"conn\">Although</span> I understood that the music was chosen to create a <mark class=\"idiom\">joyful atmosphere(欢乐的气氛)</mark> for older family members, it didn't work well for me. This experience made me realise that <mark class=\"idiom\">music taste can be very different across generations(音乐品味存在代际差异)</mark>, and enjoying an event doesn't always mean enjoying every part of it. <span class=\"conn\">Overall</span>, I was happy for the couple, <span class=\"conn\">but</span> the music itself was definitely not something I enjoyed.", "t": "", "p3": [{"q": "What kind of music events do people like today?", "a": "Nowadays, many people enjoy live concerts and music festivals because the atmosphere is exciting and social. Some also like smaller events, such as acoustic shows in cafés or live-house performances, because they feel more intimate. In addition, online live streams have become popular since they are convenient and cheaper. Overall, people tend to choose events that match their lifestyle and budget.", "t": ""}, {"q": "Do you think children should receive some musical education?", "a": "Yes, I think basic musical education is beneficial for children. It helps them develop rhythm, listening skills, and creativity. It can also improve patience and concentration, especially when they learn an instrument. However, it shouldn’t be forced—children should have the freedom to choose based on interest.", "t": ""}, {"q": "What are the differences between old and young people’s music preferences?", "a": "Young people often prefer modern styles like pop, hip-hop, or electronic music because they are influenced by social media and trends. Older people may prefer more classic or traditional music, partly because of nostalgia and life experience. Another difference is that younger listeners focus more on rhythm and vibe, while older listeners may care more about lyrics and melody. Of course, these are general trends, and personal taste can vary.", "t": ""}, {"q": "What kind of music events are there in your country?", "a": "In China, there are many types of music events. Large-scale concerts by famous singers are common in big cities, and there are also music festivals during holidays. Besides that, many cities have live- house shows, where smaller bands perform. Traditional performances, such as Chinese instruments or opera, are also available, especially in cultural theatres.<br><br><strong>近期观影</strong>", "t": ""}]}, {"id": "c46", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a movie you watched and enjoyed recently", "shouldsay": ["When and where you watched it", "Who you watched it with", "What it was about", "And explain why you watched this movie"], "a": "I'd like to talk about a movie I watched and really enjoyed recently, which is Forrest Gump. I watched this movie about a month ago at home, on a weekend evening. I had some free time and wanted to watch something <mark class=\"idiom\">relaxing but meaningful(轻松又有意义)</mark>, <span class=\"conn\">so</span> I chose this film. <span class=\"conn\">Even though</span> it's not a new movie, it still felt very fresh to me. I watched it by myself, which actually helped me <mark class=\"idiom\">focus more on the story(更专注于故事)</mark> and the emotions. Sometimes I prefer watching movies alone, <span class=\"conn\">especially</span> when the film is more thoughtful and emotional. The movie is about a man called Forrest Gump, who is <mark class=\"idiom\">simple-minded but kind-hearted(头脑简单却善良)</mark>. Through his life story, the film shows how he experiences many important events in American history. What I liked most is that <span class=\"conn\">although</span> he faces many difficulties, he always <mark class=\"idiom\">stays honest, positive, and hardworking(保持诚实、积极、勤奋)</mark>. The story is not complicated, <span class=\"conn\">but</span> it is very touching. I watched this movie <span class=\"conn\">because</span> I had heard many people say it was inspiring. After watching it, I completely agreed. The movie made me <mark class=\"idiom\">reflect on life and success(反思人生与成功)</mark>. It showed that success doesn't always come from being clever, <span class=\"conn\">but</span> from being <mark class=\"idiom\">sincere and persistent(真诚且坚持)</mark>. <span class=\"conn\">That's why</span> I enjoyed it so much and would recommend it to others.", "t": "", "p3": [{"q": "What kinds of movies do you think are successful in your country?", "a": "In China, movies that are emotionally engaging and easy to relate to are often successful, such as family films and stories about ordinary people. Big-budget action or sci-fi films with strong visual effects also attract large audiences, especially during holidays. In addition, comedies can do well because people want to relax. Overall, films that match public mood and offer a strong viewing experience tend to succeed.", "t": ""}, {"q": "What are the factors that make a successful movie?", "a": "A successful movie usually needs a solid storyline that keeps people interested from beginning to end. Good acting and believable characters also matter because audiences want emotional connection. Production quality, such as music, editing, and visuals, can greatly improve the experience. Finally, timing and marketing are important, since a great film still needs the right audience and release window.", "t": ""}, {"q": "Do Chinese people prefer to watch domestic movies or foreign movies?", "a": "I think many Chinese people watch both, depending on the genre. Domestic films often feel closer to daily life and culture, so they can be more relatable. Foreign films, especially Hollywood movies, may attract viewers with strong special effects and different storytelling styles. So preference is not fixed— it changes with the film itself and the audience’s interests.", "t": ""}, {"q": "Do you think only well-known directors can create the best movies?", "a": "No, I don’t think so. Famous directors usually have more resources and experience, which can help them produce high-quality films. However, new directors can also create excellent movies because they may have fresh ideas and a unique style. In the end, creativity and storytelling ability matter more than reputation.", "t": ""}, {"q": "Do you think successful movies should have well-known actors or actresses in leading roles?", "a": "Well-known actors can help a movie become popular at the beginning, because they bring attention and fans. But they are not a guarantee of success. If the story is weak, audiences may still give negative reviews. I think strong acting is important, but the film’s overall quality is the key factor.", "t": ""}, {"q": "Why do people prefer to watch movies in the cinema?", "a": "Many people prefer cinemas because the big screen and sound system create a more immersive experience. It also feels more special and focused, since you’re less likely to be distracted by your phone. For some people, going to the cinema is a social activity, like a date or time with friends. So it’s not just about the movie, but also the atmosphere.<br><br><strong>有趣的建筑</strong>", "t": ""}]}, {"id": "c47", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe an interesting building", "shouldsay": ["Where it is", "What it looks like", "What function it has", "And explain why you think it is interesting"], "a": "I'd like to describe an interesting building that I find very impressive, which is the Shanghai Tower. This building is located in the Pudong area of Shanghai, right in the <mark class=\"idiom\">city centre(市中心)</mark>. It's part of a group of famous <mark class=\"idiom\">skyscrapers(摩天大楼)</mark> and is easy to recognise <span class=\"conn\">because</span> it is the tallest building in China. I've seen it many times, both from far away and up close. <span class=\"conn\">In terms of</span> appearance, the building has a very <mark class=\"idiom\">modern and unique design(现代又独特的设计)</mark>. It is extremely tall and has a <mark class=\"idiom\">twisted shape(扭转的造型)</mark>, which makes it look <mark class=\"idiom\">dynamic rather than rigid(灵动而不呆板)</mark>. The glass exterior reflects the sky and nearby buildings, <span class=\"conn\">so</span> it looks different at different times of the day. At night, the lights make it even more impressive and <mark class=\"idiom\">futuristic(充满未来感)</mark>. <span class=\"conn\">As for</span> its function, the Shanghai Tower is not just an office building. It includes offices, hotels, shopping areas, and even an <mark class=\"idiom\">observation deck（观景台）</mark> for tourists. Many people visit it to enjoy the city view from the top, <span class=\"conn\">while</span> others work there every day. <span class=\"conn\">So</span> it plays an important role in both business and tourism. I think this building is interesting <span class=\"conn\">because</span> it represents <mark class=\"idiom\">modern technology and urban development(现代科技与城市发展)</mark>. It shows how architecture can be <mark class=\"idiom\">both practical and artistic(既实用又有艺术性)</mark>. To me, it is not only a building, <span class=\"conn\">but also</span> a <mark class=\"idiom\">symbol of the city's progress(城市进步的象征)</mark> and ambition. <span class=\"conn\">That's why</span> I find it so fascinating.", "t": "", "p3": [{"q": "What types of buildings are popular in your country?", "a": "In China, modern high-rise buildings are very popular, especially in big cities, because they save space and support urban development. Shopping malls and mixed-use buildings are also common, as they combine work, entertainment, and daily life. At the same time, traditional-style buildings are still valued in historical areas and tourist cities. So there is a mix of modern and traditional architecture.", "t": ""}, {"q": "Is it worth spending a lot of money on the exterior appearance of a building?", "a": "It can be worth it in some cases. A well-designed exterior can improve a city’s image and attract tourists or businesses. However, if too much money is spent only on appearance, it may reduce the building’s practicality. I think spending should be balanced between looks and real function.", "t": ""}, {"q": "Is it more important for a building to look good on the outside or on the inside?", "a": "In my opinion, the inside is more important. People use the interior every day, so comfort, safety, and functionality matter more in the long term. That said, the exterior also plays a role, especially for public buildings. Ideally, a good building should be both practical inside and pleasant to look at outside.", "t": ""}, {"q": "Why do people like to visit historical sites?", "a": "People like visiting historical sites because they help us understand the past more directly. Seeing real buildings and objects can be more meaningful than reading about history in books. Historical sites also give people a sense of culture and identity. For many visitors, it’s both an educational and emotional experience.<br><br><strong>发挥想象力</strong>", "t": ""}]}, {"id": "c48", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a time you needed to use your imagination", "shouldsay": ["When it was", "Why you needed to use imagination", "How difficult or easy it was", "And explain how you felt about it"], "a": "I'd like to describe a time when I really needed to use my imagination, which was during a group project at university. This happened about two years ago, when my classmates and I were asked to design a <mark class=\"idiom\">creative presentation(创意展示)</mark> for a course assignment. The topic itself was quite <mark class=\"idiom\">open-ended(开放式的)</mark>, and there were no clear instructions about how the final presentation should look. I needed to use my imagination <span class=\"conn\">because</span> we wanted our presentation to <mark class=\"idiom\">stand out from others(脱颖而出)</mark>. <span class=\"conn\">Instead of</span> giving a traditional speech with slides full of text, we tried to <mark class=\"idiom\">tell a story(讲一个故事)</mark> and present the topic from a <mark class=\"idiom\">different perspective(不同的角度)</mark>. I imagined how the audience might feel and what would keep them interested, <span class=\"conn\">so</span> I suggested using real-life examples, simple role play, and <mark class=\"idiom\">visual elements(视觉元素)</mark> to make the presentation more <mark class=\"idiom\">engaging(吸引人的)</mark>. <span class=\"conn\">At first</span>, it wasn't very easy. I felt a bit stressed <span class=\"conn\">because</span> I wasn't sure whether my ideas were practical or too risky. <span class=\"conn\">However</span>, once we started discussing and testing these ideas, the process became much smoother. Using imagination actually helped us <mark class=\"idiom\">solve problems(解决问题)</mark> and <mark class=\"idiom\">connect different ideas together(把不同想法串联起来)</mark>. <span class=\"conn\">In the end</span>, I felt quite proud and satisfied. The presentation went well, and our classmates reacted positively. This experience showed me that imagination is not only useful for creative work, <span class=\"conn\">but also</span> for <mark class=\"idiom\">problem-solving and communication(解决问题与沟通)</mark>. It also gave me more confidence to share my ideas in the future.", "t": "", "p3": [{"q": "Do you think adults can have lots of imagination?", "a": "Yes, I think adults can still be very imaginative. Although daily responsibilities may limit creativity, imagination doesn’t disappear with age. In fact, adults often use imagination in more practical ways, such as solving problems or planning projects. Experience can actually make imagination more realistic and effective.", "t": ""}, {"q": "Do you think imagination is essential for scientists?", "a": "Yes, imagination is essential for scientists. It helps them form new hypotheses and think beyond existing theories. Many scientific breakthroughs begin with imaginative thinking about “what if” situations. Without imagination, science would rely only on repeating known facts.", "t": ""}, {"q": "What kinds of jobs need imagination?", "a": "Jobs related to creativity usually need imagination, such as designers, writers, artists, and filmmakers. However, imagination is also important in jobs like marketing, teaching, and even business management. These roles require people to come up with new ideas, approaches, or solutions. So imagination is useful in many fields, not just creative ones.", "t": ""}, {"q": "What subjects are helpful for children's imagination?", "a": "Subjects like art, music, and literature are especially helpful because they encourage free expression and creativity. Drama and creative writing also allow children to explore different ideas and roles. Even subjects like science can develop imagination when students are encouraged to ask questions and experiment. So imagination can be developed across many subjects.", "t": ""}, {"q": "What games help develop children's imagination?", "a": "Role-playing games are very effective, such as playing “house” or pretending to be doctors or teachers. Building games like blocks or Lego also help children imagine and create new structures. Story-based games encourage children to invent characters and situations. These games allow children to think freely and creatively.", "t": ""}, {"q": "How important is imagination to children?", "a": "Imagination is extremely important for children’s development. It helps them understand the world, express emotions, and solve problems. Through imagination, children also develop communication and social skills. Overall, it supports both cognitive and emotional growth.<br><br><strong>乐于助人的人</strong>", "t": ""}]}, {"id": "c49", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a person who often helps others", "shouldsay": ["Who this person is", "How often he/she helps others", "How/why he/she helps others", "And how you feel about this person"], "a": "I'd like to describe a person who often helps others, and that person is my neighbour. She is a <mark class=\"idiom\">middle-aged woman(中年女性)</mark> who lives in the same building as my family. I've known her for several years, and she is well known in our community for being kind and <mark class=\"idiom\">supportive(乐于支持的)</mark>. Almost everyone recognises her as someone who is always <mark class=\"idiom\">willing to lend a hand(乐于伸出援手)</mark>. She helps others quite <mark class=\"idiom\">frequently(频繁地)</mark>, sometimes almost every day. <span class=\"conn\">For example</span>, she often helps elderly people carry heavy bags, explains how to use smartphones, or looks after children when parents are busy. She doesn't treat helping others as something special—it feels like a <mark class=\"idiom\">natural part of her daily life(她日常生活中自然的一部分)</mark>. She helps people in very <mark class=\"idiom\">practical ways(实际的方式)</mark>. If someone has a small problem, she <mark class=\"idiom\">listens patiently(耐心倾听)</mark> and tries to offer useful advice. Sometimes she helps simply by spending time with people who feel lonely. I think she helps others <span class=\"conn\">because</span> she <mark class=\"idiom\">genuinely cares(由衷地关心)</mark> about people around her and believes that a friendly community makes life easier for everyone. I feel very positive about this person. I really admire her attitude toward life and other people. She has shown me that helping others doesn't always require money or big actions—sometimes <mark class=\"idiom\">small gestures(微小的举动)</mark> can <mark class=\"idiom\">make a big difference(带来很大不同)</mark>. Being around her has encouraged me to be more <mark class=\"idiom\">considerate(体贴的)</mark> and helpful in my own life.", "t": "我想描写一个经常帮助别人的人，那个人就是我的邻居。她是一位和我家人住在同一栋楼里的中年女性。我认识她好几年了，她因善良和乐于助人在我们社区很出名。几乎每个人都认为她是一个总是愿意伸出援手的人。她帮助别人的频率很高。例如，她经常帮老人提重物，讲解智能手机的用法，或者在父母忙碌时照看孩子。她不觉得助人是什么特别的事——这感觉就像她日常生活中自然而然的一部分。", "p3": [{"q": "Should children help their parents with household chores?", "a": "Yes, I think children should help with household chores. Doing simple tasks like cleaning or washing dishes can teach them responsibility and independence. It also helps children understand that family life requires cooperation. Of course, chores should be age-appropriate and not interfere with study.", "t": ""}, {"q": "What kind of help do people need when looking for a new job?", "a": "People usually need both practical and emotional support. Practical help includes advice on writing a CV, preparing for interviews, or understanding the job market. Emotional support is also important, because job searching can be stressful and discouraging. Encouragement from others can help people stay confident and motivated.", "t": ""}, {"q": "Who should people ask for help, colleagues or family members?", "a": "It depends on the situation. Colleagues are often more helpful with work-related problems because they understand the professional context. Family members, on the other hand, are better for emotional support and honest advice. Ideally, people should choose based on the type of help they need.<br><br><strong>花费超过预期的物品</strong>", "t": ""}]}, {"id": "c50", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe an item on which you spent more than expected", "shouldsay": ["What it is", "How much you spent on it", "Why you bought it", "And explain why you think you spent more than expected"], "a": "I'd like to describe an item that I spent more money on than I originally expected, which was a pair of <mark class=\"idiom\">wireless noise-cancelling headphones(无线降噪耳机)</mark>. I bought them about half a year ago, and in the end, I spent around 2,000 yuan on them. <span class=\"conn\">At first</span>, I planned to buy a cheaper pair, maybe around 800 to 1,000 yuan, <span class=\"conn\">but</span> I ended up choosing a more expensive model. The reason I bought these headphones was that I often study and work in <mark class=\"idiom\">noisy environments(嘈杂的环境)</mark>, <span class=\"conn\">such as</span> cafés or on public transport. I wanted something that could help me <mark class=\"idiom\">focus better(更专注)</mark> and also improve my listening experience. I also enjoy listening to podcasts and music, <span class=\"conn\">so</span> <mark class=\"idiom\">good sound quality(良好的音质)</mark> was important to me. I think I spent more than expected for a few reasons. <span class=\"conn\">First</span>, when I tried different brands in the store, I realised that the more expensive ones were much more comfortable and effective at <mark class=\"idiom\">blocking noise(隔绝噪音)</mark>. <span class=\"conn\">Second</span>, the salesperson introduced many <mark class=\"idiom\">extra features(额外功能)</mark>, like longer battery life and better audio performance, which made the product seem <mark class=\"idiom\">more worth the price(更物有所值)</mark>. <span class=\"conn\">Finally</span>, I saw it as a <mark class=\"idiom\">long-term investment(长期投资)</mark>, <span class=\"conn\">since</span> I would use it almost every day. <span class=\"conn\">Although</span> it cost more than I planned, I don't regret buying it, <span class=\"conn\">because</span> it has made my daily life much more <mark class=\"idiom\">convenient and enjoyable(方便又愉快)</mark>.", "t": "", "p3": [{"q": "Do you often buy more than you expected?", "a": "Not very often, but it does happen sometimes. Usually, I have a budget in mind, but when I see something with better quality or extra features, I may spend a bit more. Also, discounts and promotions can influence my decision. However, I try to control unnecessary spending and think carefully before buying expensive items.", "t": ""}, {"q": "What do you think young people spend most of their money on?", "a": "I think young people today spend a large part of their money on daily lifestyle needs, such as food delivery, clothing, and entertainment. Many also spend on technology, like smartphones, headphones, or gaming devices. In addition, some young people invest in education, such as language courses or professional training, because they want to improve themselves.", "t": ""}, {"q": "Do you think it is important to save money? Why?", "a": "Yes, I believe saving money is very important. It provides financial security in case of emergencies, such as health problems or sudden job changes. Saving also helps people plan for long-term goals, like buying a house or travelling. Even small savings can build good financial habits and reduce stress in the future.", "t": ""}, {"q": "Do people buy things they don’t need?", "a": "Yes, quite often. Many people buy unnecessary things because of advertising, social pressure, or emotional reasons like boredom or stress. Shopping can bring short-term satisfaction, even if the item is not truly useful. That’s why learning self-control and spending wisely is becoming more important nowadays.<br><br><strong>鼓励别人做不愿做的事</strong>", "t": ""}]}, {"id": "c51", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a time when you encouraged someone to do something that he/she", "shouldsay": [], "a": "I'd like to talk about a time when I encouraged my friend to do something he didn't want to do, which was attending a <mark class=\"idiom\">job interview(求职面试)</mark>. He is a close friend of mine. Last year, he was thinking about changing jobs <span class=\"conn\">because</span> he felt <mark class=\"idiom\">stuck in his current position(困在目前的职位)</mark>. <span class=\"conn\">However</span>, when he finally got an interview opportunity, he became nervous and wanted to cancel it. He kept saying he wasn't ready and he was <mark class=\"idiom\">afraid of failing(害怕失败)</mark>. I encouraged him to go anyway. I told him that an interview is not only a test, <span class=\"conn\">but also</span> a <mark class=\"idiom\">chance to learn(学习的机会)</mark> what companies are looking for. I suggested that he <mark class=\"idiom\">treat it as practice(把它当作练习)</mark> rather than a life-changing decision. I also helped him prepare by doing a simple <mark class=\"idiom\">mock interview(模拟面试)</mark> and reminding him to <mark class=\"idiom\">focus on his strengths(突出自己的优势)</mark>. <span class=\"conn\">At first</span>, he reacted negatively. He looked stressed and tried to find excuses. <span class=\"conn\">But</span> after we talked for a while, he <mark class=\"idiom\">calmed down(冷静下来)</mark> and agreed to <mark class=\"idiom\">give it a try(试一试)</mark>. I encouraged him <span class=\"conn\">because</span> I knew he would <mark class=\"idiom\">regret it(后悔)</mark> if he didn't go. I believed that <mark class=\"idiom\">stepping out of his comfort zone(走出舒适区)</mark> was necessary for his growth. <span class=\"conn\">In the end</span>, he didn't get that job, <span class=\"conn\">but</span> he <mark class=\"idiom\">gained confidence(获得了信心)</mark> and did much better in later interviews.", "t": "", "p3": [{"q": "How can leaders encourage their employees?", "a": "Leaders can encourage employees by giving clear goals and recognising progress. Praise and feedback are important, but they should be specific, not just general compliments. Leaders can also support employees with training and resources, so people feel they are improving. Finally, a fair and respectful workplace naturally motivates people to do their best.", "t": ""}, {"q": "When should parents encourage their children?", "a": "Parents should encourage children when they face challenges or feel discouraged, such as during exams, competitions, or learning new skills. Encouragement is also important when children try something unfamiliar, because they may feel insecure. However, parents should not encourage blindly; they should guide children to set realistic goals and learn from mistakes.", "t": ""}, {"q": "What kind of encouragement should parents give?", "a": "Parents should give encouragement that focuses on effort and progress, not only results. For example, instead of saying “You are the best,” they can say “I’m proud of how hard you worked.” Practical support is also helpful, such as helping children plan their time or break a big task into smaller steps. This kind of encouragement builds confidence and responsibility.", "t": ""}, {"q": "Do you think some people are better than others at persuading?", "a": "Yes, definitely. Some people are naturally better communicators and understand others’ emotions well. They know how to choose the right words and timing, and they can stay calm during disagreement. Also, persuasive people often use logic and examples instead of pressure. That’s why their words feel more convincing. Part 2&amp;3<br><br><strong>重要的好朋友</strong>", "t": ""}]}, {"id": "c52", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a good friend who is important to you", "shouldsay": ["Who he/she is", "How/where you got to know him/her", "How long you have known each other", "And explain why he/she is important to you"], "a": "I'd like to describe a good friend who is very important to me. His name is Jason, and we first met in our first year of university. We were <mark class=\"idiom\">put into the same group(被分到同一个小组)</mark> for a presentation, and we ended up spending a lot of time preparing slides and practising together. That experience helped us <mark class=\"idiom\">become close very quickly(很快变得亲近)</mark>. I've known him for about seven years now. After graduation, we didn't live in the same neighbourhood, <span class=\"conn\">but</span> we <mark class=\"idiom\">kept in touch(保持联系)</mark>. We usually meet for coffee once or twice a month, and we also message each other when something important happens. Jason is important to me for a few reasons. <span class=\"conn\">First</span>, he is extremely <mark class=\"idiom\">reliable(可靠的)</mark>. When I'm under pressure, he doesn't just say \"Don't worry\"; he actually helps me <mark class=\"idiom\">think through the problem(彻底思考问题)</mark> and make a practical plan. <span class=\"conn\">Second</span>, he is <mark class=\"idiom\">honest in a respectful way(礼貌地诚实)</mark>. If I make a bad decision, he will <mark class=\"idiom\">point it out(指出问题)</mark> calmly instead of simply agreeing with me. <span class=\"conn\">Finally</span>, he makes me feel understood. We have similar values about work and personal growth, <span class=\"conn\">so</span> talking to him always gives me <mark class=\"idiom\">clarity and motivation(清晰感与动力)</mark>. <span class=\"conn\">Overall</span>, he's not only a friend I can have fun with, <span class=\"conn\">but also</span> someone I can <mark class=\"idiom\">trust during difficult times(患难时信任)</mark>.", "t": "我想描写一位对我非常重要的好朋友。他叫 Jason，我们是在大学一年级认识的。我们被分到同一个组做演示，结果花了很多时间一起准备幻灯片和练习。那次经历让我们很快变得亲近。我认识他大约七年了。毕业后，我们没住在一个社区，但一直保持联系。我们通常每月喝一两次咖啡，重要事情发生时也会给对方发信息。Jason 对我很重要有几个原因：首先，他非常可靠；其次，他能以尊重的方式保持诚实；最后，他让我感到被理解。", "p3": [{"q": "How do children make friends at school?", "a": "They often make friends through shared activities, like group work, sports, or club events. Children also bond quickly when they sit next to each other or play during breaks. In general, daily interaction makes friendships happen naturally.", "t": ""}, {"q": "How do children make friends when they are not at school?", "a": "They can make friends in their neighbourhood, in hobby classes, or through online communities. For example, children may meet others in sports training or art lessons. Parents also play a role by arranging playdates.", "t": ""}, {"q": "Is it better for children to have a few close friends or many casual friends?", "a": "I think a few close friends are more valuable. Close friendships provide emotional support and teach loyalty and communication. Many casual friends can be fun, but they may not be reliable when a child faces problems.", "t": ""}, {"q": "Can a child’s relationship with friends be replaced by parents or family members?", "a": "Not really. Family provides love and security, but friends offer peer support and social learning. Children learn how to cooperate, solve conflicts, and build identity through friendships, which is hard to replace.", "t": ""}, {"q": "Differences between friends made inside and outside the workplace?", "a": "Workplace friendships are often shaped by professional roles and shared tasks. Outside the workplace, friendships are usually based more on personal interests and values. Also, workplace friendships may involve more boundaries because of competition or hierarchy.", "t": ""}, {"q": "Is it possible for bosses and employees to become friends?", "a": "Yes, but it can be complicated. If both sides keep clear boundaries and stay professional at work, it can work well. However, it may cause unfairness or pressure if the relationship becomes too personal.<br><br><strong>想再去一次的远行</strong>", "t": ""}]}, {"id": "c53", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a long journey you had and would like to take again", "shouldsay": ["When/where you went", "Who you had the journey with", "Why you had the journey", "And explain why you would like to have it again"], "a": "I'd like to talk about a long journey I had that I would love to take again. It was a trip to Yunnan, and we travelled from Kunming to Dali and then to Lijiang. The whole journey lasted about ten days. I went with two close friends. We chose this trip <span class=\"conn\">because</span> we wanted a <mark class=\"idiom\">break from city life(逃离城市生活)</mark> and we were interested in Yunnan's nature and culture. We took a high-speed train for part of the trip and also used taxis and local buses. Along the way, we visited the <mark class=\"idiom\">ancient towns(古镇)</mark>, tried local food, and spent time walking around lakes and mountain areas. What I remember most is the <mark class=\"idiom\">slower pace of life(更慢的生活节奏)</mark>. In Dali, we cycled near Erhai Lake and <mark class=\"idiom\">watched the sunset(看日落)</mark>. In Lijiang, we explored the old town at night when the streets were lit up and full of music. We talked a lot during the journey—about career pressure, future goals, and what kind of lifestyle we really wanted. I'd like to take this journey again <span class=\"conn\">because</span> it felt <mark class=\"idiom\">refreshing and meaningful(令人焕然一新又有意义)</mark>. It wasn't only sightseeing; it gave me time to <mark class=\"idiom\">reflect and reset my mind(反思并放空)</mark>. <span class=\"conn\">Also</span>, the scenery was beautiful, and the <mark class=\"idiom\">cultural atmosphere(文化氛围)</mark> was very different from where I live, <span class=\"conn\">so</span> the whole experience felt special.", "t": "", "p3": [{"q": "Is travelling by plane a good choice?", "a": "Yes, especially for long-distance travel because it saves time. It’s also relatively safe and convenient. However, it can be expensive and less comfortable for some people.", "t": ""}, {"q": "Differences between group travelling and travelling alone?", "a": "Group travel is more social and sometimes safer, because you support each other. But it requires compromise. Solo travel offers more freedom and flexibility, but it can feel lonely and you must handle problems yourself.", "t": ""}, {"q": "What do we need to prepare for a long journey?", "a": "We need to plan transportation and accommodation in advance, and prepare essential items like medicines and proper clothing. Budget planning is also important. Mentally, we should be ready for unexpected changes.", "t": ""}, {"q": "Why do some people like making long journeys?", "a": "Because long journeys allow deeper experiences. People can explore different cultures, relax properly, and break away from routine. It also gives a stronger sense of adventure.", "t": ""}, {"q": "Why do some people prefer travelling in their own country?", "a": "It’s cheaper and more convenient, and there’s less language stress. People may also feel more secure and familiar with local food and customs. Some countries are large enough to offer a wide variety of experiences.", "t": ""}, {"q": "Why do some people prefer travelling abroad?", "a": "Because it feels more exciting and offers a completely different environment. People can learn new cultures and broaden their horizons. For many, it’s also a way to improve language skills and gain new perspectives.<br><br><strong>别人帮忙下做的决定</strong>", "t": ""}]}, {"id": "c54", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe an important decision made with the help of other people", "shouldsay": ["What the decision was", "Why you made the decision", "Who helped you make the decision", "And how you felt about it"], "a": "One important decision I made with the help of other people was choosing my <mark class=\"idiom\">career path(职业道路)</mark>. After university, I was uncertain whether to pursue a career in teaching or move into a <mark class=\"idiom\">corporate role(企业岗位)</mark>. I was passionate about both, <span class=\"conn\">but</span> I couldn't decide which direction to take. I made the decision to become an English teacher <span class=\"conn\">because</span> of the advice from a <mark class=\"idiom\">mentor(导师)</mark> and some close friends. They encouraged me to think about <mark class=\"idiom\">what I truly enjoyed doing(我真正热爱做的事)</mark>, which was helping others learn and develop new skills. They pointed out that teaching would offer a <mark class=\"idiom\">fulfilling, long-term career(有成就感的长期事业)</mark> where I could <mark class=\"idiom\">make a positive impact(带来积极影响)</mark>. Their advice helped me realise that I would find <mark class=\"idiom\">greater satisfaction(更大的满足感)</mark> in a job that <mark class=\"idiom\">aligned with my values(契合我的价值观)</mark>, rather than simply seeking a higher salary or prestige in a corporate environment. I felt grateful and relieved after making the decision. <span class=\"conn\">While</span> it was a bit <mark class=\"idiom\">nerve-wracking(令人紧张的)</mark> initially, I quickly realised that it was the right choice for me. The support from my mentor and friends gave me the <mark class=\"idiom\">confidence to take the leap(放手一搏的信心)</mark> and pursue my passion.", "t": "", "p3": [{"q": "What kind of decisions do you think are meaningful?", "a": "Meaningful decisions are those that shape your future, such as career choices, relationships, and personal growth. They often involve long-term impacts, requiring careful thought and consideration.", "t": ""}, {"q": "What important decisions should be made by teenagers themselves?", "a": "Teenagers should be involved in decisions about their education, career aspirations, and personal values. These decisions will help them develop independence and take responsibility for their future.", "t": ""}, {"q": "Why are some people unwilling to make quick decisions?", "a": "Some people hesitate because they fear making the wrong choice. They may worry about the consequences or feel uncertain about their options. The fear of failure often makes decision-making difficult.", "t": ""}, {"q": "Do people like to ask for advice more for their personal life or their work?", "a": "People tend to ask for advice about their personal life more frequently. Relationships and family decisions often feel more emotionally charged, so they seek input from close friends or family.", "t": ""}, {"q": "Why do some people like to ask others for advice?", "a": "People seek advice to gain different perspectives and reassurance. It helps them feel more confident in their decisions and reduces uncertainty, especially in complex situations.<br><br><strong>去过且喜欢的城市（补充）</strong>", "t": ""}]}, {"id": "c55", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a city you enjoyed visiting", "shouldsay": ["Where it is", "When you visited it", "How long you stayed there", "What you did there", "And explain why you enjoyed visiting it"], "a": "I'd like to talk about a city I really enjoyed visiting, which is <mark class=\"idiom\">（漂亮、地道、可替换的万能开头句）</mark> Chengdu, <mark class=\"idiom\">the capital of（……的省会）</mark> Sichuan Province in southwest China.<br><br>I went there about two years ago during a <mark class=\"idiom\">summer holiday（暑假）</mark>, <span class=\"conn\">and</span> I stayed for around five days. It was <mark class=\"idiom\">my first time（我第一次）</mark> in the city, <span class=\"conn\">so</span> I was really excited.<br><br>While I was there, I visited the <mark class=\"idiom\">giant panda base（大熊猫基地）</mark>, wandered around the old streets, <span class=\"conn\">and</span> ate way too much <mark class=\"idiom\">spicy hotpot（辣火锅）</mark>. I <span class=\"conn\">also</span> spent <mark class=\"idiom\">a lazy afternoon（一个慵懒的下午）</mark> in a traditional <mark class=\"idiom\">teahouse（茶馆）</mark>, <span class=\"conn\">which</span> I loved.<br><br>I enjoyed it so much <span class=\"conn\">because</span> the city has such a relaxed, <mark class=\"idiom\">laid-back vibe（悠闲的氛围）</mark>. The food was <mark class=\"idiom\">incredible（好吃到不行）</mark> and the people were really <mark class=\"idiom\">warm and friendly（热情友好）</mark>. <span class=\"conn\">That's why</span> I'd happily go back anytime.", "t": "我想谈谈一座我特别喜欢去的城市——成都，中国西南部四川省的省会。<br><br>我大约两年前的一个暑假去的，待了大概五天。那是我第一次去这座城市，所以特别兴奋。<br><br>在那儿的时候，我去了大熊猫基地、在老街上闲逛，还吃了多到不行的辣火锅。我还在一家传统茶馆里度过了一个慵懒的下午，特别喜欢。<br><br>我之所以这么享受，是因为这座城市有种特别放松、悠闲的氛围。食物好吃到不行，人也热情友好。这就是为什么我随时都乐意再去。", "p3": [{"q": "1) What kinds of facilities do big cities have?", "a": "Big cities usually have a wide range of facilities. There are shopping malls, hospitals, parks and excellent public transport like subways. On top of that, they offer plenty of entertainment, such as cinemas, museums and sports centres.", "t": ""}, {"q": "2) Do you think modern cities are suitable for young people or old people?", "a": "I'd say they suit young people a bit more. Cities offer more job opportunities, entertainment and a fast-paced lifestyle that young people enjoy. Older people sometimes prefer quieter places, though many still like cities for the convenient healthcare.", "t": ""}, {"q": "3) Before you travel to a city, what factors would you consider?", "a": "I usually think about a few things first. The cost, the weather and the main attractions are the big ones. I also check the transport and safety, since those really affect how smooth and enjoyable the trip will be.", "t": ""}, {"q": "4) What are the disadvantages of living in a very famous city?", "a": "There are a few downsides. Famous cities tend to be crowded and expensive, especially the housing. They can also be noisy and stressful, with heavy traffic and a fast pace of life that not everyone enjoys.", "t": ""}, {"q": "5) Do you prefer to visit well-developed cities or cities with a long history?", "a": "Personally, I lean towards cities with a long history. I find their culture, architecture and stories far more fascinating than modern skyscrapers. That said, a city that combines both, like Xi'an, would be the perfect choice.", "t": ""}, {"q": "6) For those who live in cities, is it because they want to or have to?", "a": "I think it's a mix of both. Some people genuinely love the convenience and opportunities cities offer. Others, however, live there mainly because that's where the jobs are, so it's more out of necessity than choice.<br><br><strong>安静的地方（补充）</strong>", "t": ""}]}, {"id": "c56", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a quiet place you like to go", "shouldsay": ["Where it is", "How you knew it", "How often you go there", "What you do there", "And explain how you feel about the place"], "a": "I'd like to talk about a quiet place I love going to, which is <mark class=\"idiom\">（漂亮、地道、可替换的万能开头句）</mark> a small <mark class=\"idiom\">public library（公共图书馆）</mark> near my home.<br><br>I <mark class=\"idiom\">came across（偶然发现）</mark> it <mark class=\"idiom\">by chance（碰巧）</mark> a few years ago while I was walking around the neighbourhood. I noticed it <mark class=\"idiom\">tucked away（隐藏在）</mark> on a quiet side street, <span class=\"conn\">and</span> I've been <mark class=\"idiom\">a regular（常客）</mark> ever since.<br><br>I usually go there once or twice a week, <span class=\"conn\">especially</span> at weekends. I mostly read books, study, <span class=\"conn\">or</span> just sit by the window with a coffee and <mark class=\"idiom\">let my mind wander（放空神游）</mark>.<br><br>I feel completely <mark class=\"idiom\">at peace（平静的）</mark> <span class=\"conn\">whenever</span> I'm there. It's <mark class=\"idiom\">a calm little escape（一个宁静的小避风港）</mark> from the noise and stress of everyday life. <span class=\"conn\">That's why</span> it's become my favourite place to <mark class=\"idiom\">recharge（恢复精力）</mark>.", "t": "我想谈谈一个我很喜欢去的安静地方——我家附近一座小小的公共图书馆。<br><br>几年前我在社区附近散步时碰巧发现了它。我注意到它藏在一条安静的小巷里，从那以后我就成了那儿的常客。<br><br>我通常每周去一两次，尤其是周末。我主要在那儿看书、学习，或者就坐在窗边喝杯咖啡、放空神游一下。<br><br>每次在那儿，我都感到无比平静。它是一个让我远离日常喧嚣和压力的宁静小避风港。这就是为什么它成了我最爱的\"充电\"之地。", "p3": [{"q": "1) Is it easy to find quiet places in your country? Why?", "a": "It's getting harder, especially in big cities. With so many people and so much traffic, truly quiet spots are becoming rare. However, you can still find some peace in places like libraries, parks or temples if you look for them.", "t": ""}, {"q": "2) How do people spend their leisure time in your country?", "a": "People spend it in all sorts of ways. Many relax at home watching shows or scrolling on their phones, while others go shopping, exercise or meet friends. Travelling has also become a very popular way to unwind.", "t": ""}, {"q": "3) How does technology affect the way people spend their leisure time?", "a": "Technology has changed it a lot. Nowadays, people spend much of their free time on phones and computers, watching videos or playing games. While this is convenient, it also means people spend less time outdoors or with others in person.", "t": ""}, {"q": "4) Do you think only old people have time for leisure?", "a": "No, I don't think so. Although retired people generally have more free time, everyone needs and finds some leisure. Even busy workers and students make time to relax, since it's essential for staying healthy and happy.", "t": ""}, {"q": "5) Why do old people prefer to live in quiet places?", "a": "Mostly because quiet places feel more peaceful, which suits their slower pace of life. They also tend to dislike the noise and crowds of busy cities. On top of that, fresh air and a calm environment are better for their health.", "t": ""}, {"q": "6) Why are there more noises made at home now than in the past?", "a": "I think it's largely down to all the electronic devices we now have, like TVs, speakers and appliances. Homes are also more packed with gadgets than before. On top of that, cities have grown noisier overall, and that noise easily reaches our homes.<br><br><strong>喜欢的电视/网络节目（补充）</strong>", "t": ""}]}, {"id": "c57", "tag": "老题沿用", "emoji": "🗂️", "ztitle": "", "describe": "Describe a TV or online program you like to watch", "shouldsay": ["What it is", "What it is about", "Who you watch it with", "And explain why you like to watch it"], "a": "I'd like to talk about an online program I really enjoy, which is <mark class=\"idiom\">（漂亮、地道、可替换的万能开头句）</mark> a popular <mark class=\"idiom\">talk show（访谈节目）</mark> that I <mark class=\"idiom\">stream（在线看）</mark> on my phone.<br><br>In each episode, <mark class=\"idiom\">the host（主持人）</mark> invites interesting guests and chats with them about their lives, careers <span class=\"conn\">and</span> views on <mark class=\"idiom\">hot topics（热门话题）</mark>. It's a nice mix of fun, emotion and <mark class=\"idiom\">real insight（真知灼见）</mark>.<br><br>I usually watch it <mark class=\"idiom\">on my own（一个人）</mark>, late in the evening <span class=\"conn\">when</span> I'm <mark class=\"idiom\">winding down（放松）</mark> before bed. <span class=\"conn\">Sometimes</span> I'll <span class=\"conn\">also</span> share <mark class=\"idiom\">funny clips（搞笑片段）</mark> with my friends <span class=\"conn\">so</span> we can chat about them.<br><br>I like it <span class=\"conn\">because</span> it's both <mark class=\"idiom\">entertaining（有趣的）</mark> and <mark class=\"idiom\">thought-provoking（发人深省的）</mark>. The conversations often make me laugh, <span class=\"conn\">but</span> they also make me see things differently. <span class=\"conn\">That's why</span> I <mark class=\"idiom\">never miss（从不错过）</mark> a new episode.", "t": "我想谈谈一个我很喜欢的网络节目——一档很火的访谈节目，我经常在手机上看。<br><br>每一期里，主持人都会请来有意思的嘉宾，和他们聊各自的生活、事业，以及对热门话题的看法。它把趣味、情感和真知灼见很好地融合在了一起。<br><br>我通常一个人看，在睡前放松的深夜时分。有时我也会把搞笑片段分享给朋友，这样我们就能一起聊聊。<br><br>我喜欢它，是因为它既有趣又发人深省。那些对话常逗得我笑，但也让我换个角度看问题。这就是为什么我从不错过任何一期新节目。", "p3": [{"q": "1) What programs do people like to watch in your country?", "a": "People here enjoy a wide variety. Reality shows, talk shows and TV dramas are extremely popular, especially among young people. News and documentaries also have a loyal audience, particularly among older viewers.", "t": ""}, {"q": "2) Do people in your country like to watch foreign TV programs?", "a": "Yes, quite a lot, especially younger people. Many enjoy foreign dramas and shows because they offer a window into different cultures and lifestyles. Subtitles and streaming platforms have made them really easy to access these days.", "t": ""}, {"q": "3) What's the benefit of letting kids watch animal videos than visiting zoos?", "a": "Animal videos are convenient, cheap and safe, and kids can watch them anytime at home. They can also show animals in the wild that you'd never see in a zoo. That said, I don't think they can fully replace the excitement of seeing real animals in person.", "t": ""}, {"q": "4) Do teachers play videos in class in your country?", "a": "Yes, it's quite common nowadays. Teachers often use short videos to make lessons more vivid and easier to understand. As long as it's used in moderation, I think it's a great way to keep students engaged.", "t": ""}, {"q": "5) Do you think watching talk shows is a waste of time?", "a": "Not at all, in my opinion. A good talk show can be both relaxing and informative, since you can learn from the guests' experiences and ideas. Of course, like anything, it only becomes a waste of time if you watch it excessively.", "t": ""}, {"q": "6) Do you think we can acquire knowledge from watching TV programs?", "a": "Definitely. Many programs, like documentaries and educational shows, teach us about history, science and the wider world. Even entertainment shows can broaden our perspectives. The key is choosing quality content rather than watching mindlessly.", "t": ""}]}, {"id": "c58", "tag": "补充·非大陆", "emoji": "🗂️", "ztitle": "", "describe": "Describe a person who works in a successful company（非大陆）", "shouldsay": ["Who he/she is", "What he/she does in the company", "What business the company does", "And explain why you think it is a successful company", "Part 2 Sample Answer", "Part 3"], "a": "I would like to talk about a university friend of mine who now works for ByteDance, which <mark class=\"idiom\">is one of the most successful technology companies（科技公司）</mark> in China. <mark class=\"idiom\">He works as a product operations（产品运营）</mark> specialist, <span class=\"conn\">so</span> <mark class=\"idiom\">his job is to look at user feedback（用户反馈）</mark>, analyse data, and help improve how an app works for ordinary users.<br><br>The <mark class=\"idiom\">company mainly runs internet platforms and digital products（数字产品）</mark>, including short-video apps, content platforms, and online services. What impresses me <mark class=\"idiom\">most is that the company is extremely user-focused（以用户为中心）</mark>. They do not just make a product and leave it there; they keep testing, adjusting, <mark class=\"idiom\">and improving it based on real user behaviour（真实用户行为）</mark>.<br><br>I think it is a successful company <span class=\"conn\">because</span> it has strong technology, <mark class=\"idiom\">a huge user base（用户基础）</mark>, <mark class=\"idiom\">and a very fast learning culture（学习文化）</mark>. My friend told me that the work can be intense, <span class=\"conn\">but</span> he also learns a lot <span class=\"conn\">because</span> everyone moves quickly and takes results seriously. <span class=\"conn\">To me</span>, a successful company is not just rich or famous. It should have products that people actually use, <mark class=\"idiom\">a clear business model（清晰的商业模式）</mark>, and the ability to keep changing. <span class=\"conn\">By that standard</span>, this company is definitely successful.", "t": "我想谈谈我的一位大学朋友，他现在在字节跳动工作，这是一家中国非常成功的科技公司。他做的是产品运营，主要看用户反馈、分析数据，并帮助改善普通用户使用App的体验。 这家公司主要做互联网平台和数字产品，包括短视频应用、内容平台和在线服务。最让我印象深刻的是，这家公司非常以用户为中心。他们不会只是做出一个产品就放在那里，而是会根据真实用户行为不断测试、调整和改进。 我觉得它成功，是因为它有强大的技术、庞大的用户基础和非常快速的学习文化。我朋友说工作强度不低，但也学得很多，因为大家行动很快，也很重视结果。对我来说，成功公司不只是有钱或有名，而是产品真的有人用、商业模式清晰，并且有持续变化的能力。按这个标准，它确实很成功。", "p3": [{"q": "Do you think governments should provide financial support to companies?", "a": "Yes, <mark class=\"idiom\">but mainly to small businesses（小企业）</mark> <mark class=\"idiom\">or companies in strategic industries（战略行业）</mark>. Large profitable companies <mark class=\"idiom\">should not rely too much on public money（公共资金）</mark>.", "t": ""}, {"q": "Do you think companies should donate money to help society?", "a": "Yes. <mark class=\"idiom\">If a company benefits from society（受益于社会）</mark>, it should give something back, either through donations, education programs, <mark class=\"idiom\">or environmental projects（环保项目）</mark>.", "t": ""}, {"q": "Do you think customer satisfaction is important for a company?", "a": "<span class=\"conn\">Definitely</span>. If customers are unhappy, even a famous company can lose trust quickly. Good products and good service are both essential.", "t": ""}]}, {"id": "c59", "tag": "补充·非大陆", "emoji": "🗂️", "ztitle": "", "describe": "Describe a person who likes to look after the natural world", "shouldsay": ["Who this person is", "What he or she does", "How he or she does it", "And explain how you feel about this person", "Part 2 Sample Answer", "Part 3"], "a": "I would like to talk about one of my <mark class=\"idiom\">neighbours who really cares about the natural world（自然世界）</mark>. She is not an environmental activist in a dramatic way, <mark class=\"idiom\">but she has built many small habits（小习惯）</mark> <mark class=\"idiom\">into her daily life（日常生活）</mark>.<br><br><span class=\"conn\">For example</span>, she sorts waste carefully, uses reusable bags, grows plants on her balcony, and tries to avoid buying things she does not need. She also volunteers in community clean-up activities several times a year. What I admire is that she does these things consistently, not just <span class=\"conn\">when</span> people are watching.<br><br>She once told me that protecting nature does not have to start with big slogans. It can start with using less plastic, wasting less food, and teaching children to respect animals and plants. I find that attitude very practical and convincing.<br><br>I feel a lot of respect for her <span class=\"conn\">because</span> she proves that ordinary people can still make a difference. Her lifestyle is not extreme, <span class=\"conn\">but</span> it is responsible. It <mark class=\"idiom\">reminds me that looking after the natural world（自然世界）</mark> is not a one-day event; it is a way of living.", "t": "我想谈谈我的一位邻居，她非常关心自然环境。她不是那种特别高调的环保人士，但她把很多小习惯融入了日常生活。 比如，她认真垃圾分类，使用可重复利用的袋子，在阳台种植物，也尽量避免买不需要的东西。她每年还会参加几次社区清洁志愿活动。我佩服的是，她做这些事情很持续，并不是为了给别人看。 她曾经告诉我，保护自然不一定要从宏大的口号开始，可以从少用塑料、少浪费食物、教孩子尊重动植物开始。我觉得这种态度很实际，也很有说服力。 我很尊重她，因为她证明普通人也能产生影响。她的生活方式不极端，但很负责任。她提醒我，照顾自然不是一天的活动，而是一种生活方式。", "p3": [{"q": "Should parents teach children how to protect the environment?", "a": "Yes. Children form habits early, <span class=\"conn\">so</span> parents should teach them not to waste food, water, or electricity.", "t": ""}, {"q": "What laws about the environment are effective in your country?", "a": "Rules on waste sorting and limits on pollution can be effective <span class=\"conn\">if</span> they are enforced properly.", "t": ""}, {"q": "Is it easy for children in cities to get close to the natural world?", "a": "Not always, <span class=\"conn\">because</span> many city children spend most of their time indoors. Parks and school trips can help.", "t": ""}, {"q": "What can people do to protect the natural world?", "a": "People can reduce waste, <mark class=\"idiom\">use public transport（公共交通）</mark>, recycle properly, and support products that are less harmful to the environment.", "t": ""}]}, {"id": "c60", "tag": "补充·非大陆", "emoji": "🗂️", "ztitle": "", "describe": "Describe a place you would like to visit in your free time（非大陆）", "shouldsay": ["Where it is", "What you will do there", "How long you will stay there", "And explain why you would like to visit it", "Part 2 Sample Answer", "Part 3"], "a": "A place I would like to visit in <mark class=\"idiom\">my free time is a quiet seaside town（安静的海边小镇）</mark> near Shanghai. <mark class=\"idiom\">It is not a famous tourist attraction（旅游景点）</mark>, <span class=\"conn\">but</span> that is exactly why I want to go there.<br><br>If I go, I will probably walk along the coast, drink coffee in a small cafe, take some photos, and maybe read a book by the water. I do not want to pack the schedule with too many activities. <mark class=\"idiom\">I just want to slow down（慢下来）</mark> <mark class=\"idiom\">and enjoy a different pace of life（不同的生活节奏）</mark>.<br><br>I would probably stay there for one or two days. A short trip would be enough <span class=\"conn\">because</span> the main purpose is not sightseeing, <mark class=\"idiom\">but mental reset（心理重启）</mark>.<br><br>I would like to visit it <mark class=\"idiom\">because city life can be noisy and fast-paced（快节奏的）</mark>. Sometimes I need a place where I do not have to make decisions all the time. The sea, the wind, and the open view would help me relax and clear my mind.", "t": "我想在空闲时间去的地方是上海附近一个安静的海边小镇。它不是著名景点，但这正是我想去的原因。 如果去的话，我大概会沿着海边散步，在小咖啡馆喝咖啡，拍点照片，也可能在水边读书。我不想把行程排得太满，只想慢下来，感受一种不同的生活节奏。 我大概会在那里待一两天。短途旅行就够了，因为主要目的不是观光，而是让大脑重启一下。 我想去那里，是因为城市生活很吵、节奏很快。有时候我需要一个不用一直做决定的地方。大海、风和开阔的视野会帮我放松，也能让我清空思绪。", "p3": [{"q": "Why do some people choose not to travel abroad?", "a": "Some people worry about the cost, language barriers, or complicated visa procedures. Others simply prefer familiar places.", "t": ""}, {"q": "Do you think a gap period in life is important?", "a": "It can be important <span class=\"conn\">if</span> people use it wisely. A short break can help people rethink their goals and recover from stress.", "t": ""}]}, {"id": "c61", "tag": "补充·非大陆", "emoji": "🗂️", "ztitle": "", "describe": "Describe an important river/lake in your country（非大陆）", "shouldsay": ["Where it is located", "How big/long it is", "What it looks like", "And explain why it is important", "Part 2 Sample Answer", "Part 3"], "a": "<mark class=\"idiom\">I would like to describe the Yangtze River（长江）</mark>, which is one of the most important rivers in China. <mark class=\"idiom\">It runs through many provinces（流经很多省份）</mark> <mark class=\"idiom\">and finally flows into the sea（入海）</mark> near Shanghai. It is incredibly long, stretching for thousands of kilometres, <span class=\"conn\">so</span> it connects many regions across the country.<br><br><span class=\"conn\">In different places</span>, the river looks very different. <span class=\"conn\">In some areas</span>, it is wide and calm, <span class=\"conn\">while</span> in others <mark class=\"idiom\">it runs through mountains and creates dramatic scenery（壮观景色）</mark>. In cities like Shanghai, it is closely connected with transport, trade, and urban life.<br><br><mark class=\"idiom\">The Yangtze River（长江）</mark> is important for several reasons. <span class=\"conn\">Historically</span>, it supported farming, transport, and trade. <span class=\"conn\">Today</span>, <mark class=\"idiom\">it still plays a huge role（发挥重要作用）</mark> in shipping, industry, tourism, and water resources. Many cities along the river developed <span class=\"conn\">because</span> of it.<br><br><span class=\"conn\">To me</span>, the Yangtze is not just a natural feature. It is also part of China's economy, history, and culture. That is why people often see it as a symbol of the country.", "t": "我想描述长江，它是中国最重要的河流之一。它流经很多省份，最后在上海附近入海。长江非常长，绵延数千公里，因此连接了中国很多地区。 在不同地方，长江的样子很不一样。有些地方宽阔平静，有些地方穿过山脉，形成壮观景色。在上海这样的城市，它又和交通、贸易和城市生活紧密相连。 长江重要有几个原因。历史上，它支撑了农业、交通和贸易。今天，它仍然在航运、工业、旅游和水资源方面发挥巨大作用。很多沿江城市的发展都离不开它。 对我来说，长江不只是一条自然河流，也是中国经济、历史和文化的一部分。所以人们常常把它看作国家象征。", "p3": [{"q": "Are rivers and lakes important to a country?", "a": "Yes. They provide water, support agriculture, help transport goods, <mark class=\"idiom\">and often become tourist attraction（旅游景点）</mark>s.", "t": ""}, {"q": "What are the popular water sports in your country?", "a": "Swimming, rowing, kayaking, and paddle boarding are becoming more popular, especially in tourist areas.", "t": ""}, {"q": "Are rivers and lakes good for transport?", "a": "Large rivers can be very useful for transport <span class=\"conn\">because</span> ships can carry heavy goods at a relatively low cost.", "t": ""}, {"q": "How do rivers and lakes benefit local people?", "a": "They can create jobs in tourism, fishing, transport, and restaurants, and they also improve the local environment <span class=\"conn\">if</span> well protected.", "t": ""}]}, {"id": "c62", "tag": "补充·非大陆", "emoji": "🗂️", "ztitle": "", "describe": "Describe a change that you made recently", "shouldsay": ["What the change was", "What caused the change", "What you did for the change", "And explain how you feel about the change", "Part 2 Sample Answer", "Part 3"], "a": "A recent change I made was to stop checking my phone immediately after waking up. I made this change <span class=\"conn\">because</span> I realised that the first twenty minutes of my day were often wasted on messages and social media. It made me feel distracted before I even started working.<br><br>To make the change easier, I put my phone away from my bed and started using a simple alarm clock instead. After getting up, I drink water, open the curtains, and write down the three most important tasks of the day. I only check my phone after that.<br><br><span class=\"conn\">At first</span>, it felt a bit uncomfortable <span class=\"conn\">because</span> checking my phone had become automatic. But after a few days, I noticed that my mornings became calmer and more focused.<br><br>I feel very positive about this change. It is not a huge life transformation, <span class=\"conn\">but</span> it gives me a better start to the day and reduces unnecessary stress.", "t": "我最近做的一个改变是：早上起床后不再立刻看手机。我做这个改变，是因为我发现一天最开始的二十分钟经常被消息和社交媒体浪费掉，还没开始工作就已经分心了。 为了更容易做到，我把手机放远，不放在床边，并改用一个简单闹钟。起床后，我会喝水、拉开窗帘，写下一天最重要的三件事，之后才看手机。 一开始有点不舒服，因为看手机已经变成自动反应。但几天之后，我发现早晨更平静，也更专注了。 我对这个改变很满意。它不是巨大的人生转变，但能让我一天开头更好，也减少不必要的压力。", "p3": [{"q": "Is it good to change one's daily routine?", "a": "Yes, <span class=\"conn\">if</span> the old routine is unhealthy or inefficient. Small changes can make life much better.", "t": ""}, {"q": "Do you think it is good to change jobs?", "a": "It depends. Changing jobs can bring growth, <span class=\"conn\">but</span> people should not change only <span class=\"conn\">because</span> of temporary frustration.", "t": ""}, {"q": "Who tends to change their daily routine more, young people or old people?", "a": "Young people usually change more <span class=\"conn\">because</span> their study, work, and social lives are less fixed.", "t": ""}]}, {"id": "c63", "tag": "补充·非大陆", "emoji": "🗂️", "ztitle": "", "describe": "Describe a special day out that cost you little money / did not cost you much（非大陆）", "shouldsay": ["When the day was", "Where you went", "How much you spent", "And explain how you feel about the day", "Part 2 Sample Answer", "Part 3"], "a": "I would like to talk about a day out I had with a friend last autumn. <mark class=\"idiom\">We went to a riverside park（江边公园）</mark> in Shanghai on a Sunday afternoon. <mark class=\"idiom\">It was a very simple plan（简单安排）</mark>, <span class=\"conn\">but</span> it turned out to be one of the most relaxing days I had that month.<br><br>We did not spend much money at all. The park was free, and we only bought two cups of coffee and some snacks from a convenience store. Altogether, I think I spent less than 50 yuan.<br><br>We walked along the river, sat on the grass, watched people walking their dogs, and talked about work and life. There was no pressure to take photos or visit famous places. We just enjoyed the weather and the conversation.<br><br>I felt very refreshed that day. It reminded me that a good day out does not have to be expensive. <mark class=\"idiom\">Sometimes good company（好的陪伴）</mark>, <mark class=\"idiom\">fresh air（新鲜空气）</mark>, and a relaxed mood are enough.", "t": "我想说的是去年秋天和朋友出去玩的一天。那是周日下午，我们去了上海一个江边公园。计划很简单，但结果成了那个月最放松的一天之一。 我们几乎没花什么钱。公园免费，我们只是从便利店买了两杯咖啡和一些零食。总共我觉得花了不到50元。 我们沿着江边散步，坐在草地上，看别人遛狗，也聊了工作和生活。没有必须拍照或打卡名胜的压力，只是享受天气和聊天。 那天我感觉很恢复。它提醒我，开心的一天不一定要贵。有时候好的陪伴、新鲜空气和放松的心情就够了。", "p3": [{"q": "Do people like to spend their leisure time out in your country?", "a": "Yes, especially on weekends. People like going to parks, malls, restaurants, and short-distance travel spots.", "t": ""}, {"q": "How does technology affect the way people spend their leisure time?", "a": "Technology gives people more options, from streaming videos to booking trips, <span class=\"conn\">but</span> it can also make people spend too much time on screens.", "t": ""}, {"q": "Why do people like to have days off?", "a": "Days off help people recover physically and mentally. They also allow people to spend time with family and friends.", "t": ""}]}, {"id": "c64", "tag": "补充·非大陆", "emoji": "🗂️", "ztitle": "", "describe": "Describe a time when you were stuck in a traffic jam for a very long time（非大陆）", "shouldsay": ["When it happened", "Where you were stuck", "What you did while waiting", "And explain how you felt in the traffic jam", "Part 2 Sample Answer", "Part 3"], "a": "I <mark class=\"idiom\">remember being stuck in a terrible traffic jam（交通堵塞）</mark> during a holiday trip. <mark class=\"idiom\">It happened on a national holiday（法定假期）</mark> <span class=\"conn\">when</span> many people were leaving the city at the same time. I was in a car with my family on the highway, <mark class=\"idiom\">and the traffic barely moved（几乎没动）</mark> for nearly two hours.<br><br><span class=\"conn\">At first</span>, I kept checking the map, hoping the red line would disappear, <span class=\"conn\">but</span> it only became worse. Later, <mark class=\"idiom\">I tried to distract myself（转移注意力）</mark> by listening to music and chatting with my family. We also ate some snacks <span class=\"conn\">because</span> there was nothing else to do.<br><br><span class=\"conn\">To be honest</span>, I felt impatient and a little helpless. The worst part was <mark class=\"idiom\">not knowing exactly when the road would clear（道路恢复通畅）</mark>. But after a <span class=\"conn\">while</span>, I accepted the situation and stopped complaining.<br><br>That <mark class=\"idiom\">experience taught me that travelling during public holidays（公共假期）</mark> <mark class=\"idiom\">requires a lot of patience（需要很多耐心）</mark>. <span class=\"conn\">Since then</span>, I try to leave earlier or choose trains <span class=\"conn\">if</span> possible.", "t": "我记得一次假期出行时遇到了严重堵车。那是在一个法定假期，很多人同时离开城市。我和家人在高速公路上，车流几乎两个小时都没怎么动。 一开始我一直看地图，希望红色拥堵线能消失，但情况反而更糟。后来我只能听音乐、和家人聊天来转移注意力。我们还吃了些零食，因为也没别的事可做。 说实话，我当时很不耐烦，也有点无助。最难受的是不知道路到底什么时候会通。但过了一会儿，我接受了现实，也不再抱怨。 这次经历让我明白，假期出行真的需要很多耐心。从那以后，我会尽量早点出发，或者能坐火车就坐火车。", "p3": [{"q": "How can we solve traffic jam problems?", "a": "<mark class=\"idiom\">Cities can improve public transport（公共交通）</mark>, manage parking better, and encourage flexible working hours.", "t": ""}, {"q": "Can developing public transport solve traffic jams?", "a": "It can help a lot, <span class=\"conn\">but</span> <mark class=\"idiom\">it may not solve everything unless public transport（公共交通）</mark> is convenient, clean, and reliable.", "t": ""}, {"q": "Would you rather be in a car or a bus in a traffic jam?", "a": "I would rather be in a car <span class=\"conn\">because</span> it is more private and comfortable, <span class=\"conn\">although</span> buses are better for the environment.", "t": ""}]}, {"id": "c65", "tag": "补充·非大陆", "emoji": "🗂️", "ztitle": "", "describe": "Describe a time when you organized a happy event successfully（非大陆）", "shouldsay": ["What the event was", "How you prepared for it", "Who helped you to organize it", "And explain why you think it was a successful event", "Part 2 Sample Answer", "Part 3"], "a": "I <mark class=\"idiom\">would like to describe a small birthday dinner（生日晚餐）</mark> <mark class=\"idiom\">I organised for one of my close friends（亲密朋友）</mark>. It was not a huge party, <span class=\"conn\">but</span> I wanted it to feel warm and personal.<br><br>About a week before the dinner, I booked a quiet restaurant, contacted several friends, <mark class=\"idiom\">and asked everyone to keep it a surprise（保密）</mark>. I also ordered a small cake and prepared a short video with messages from people who could not come.<br><br>Two friends helped me a lot. One of them decorated the table, and <mark class=\"idiom\">the other helped collect photos and video clips（视频片段）</mark>. On the day of the event, everything went quite smoothly. My friend was genuinely surprised <span class=\"conn\">when</span> she saw us, and she almost cried <span class=\"conn\">when</span> we played the video.<br><br>I think it was successful <mark class=\"idiom\">because it made her feel loved and remembered（感到被爱和被记得）</mark>. The event did not cost a lot, <mark class=\"idiom\">but it had emotional value（情感价值）</mark>. That was exactly what I hoped to achieve.", "t": "我想描述的是我给一位好朋友组织的一次小型生日晚餐。它不是大型派对，但我希望它温暖、私人化。 晚餐前大约一周，我订了一家安静的餐厅，联系了几个朋友，并让大家保密。我还订了一个小蛋糕，准备了一段短视频，里面有一些不能到场的朋友发来的祝福。 有两个朋友帮了我很多。一个负责装饰桌子，另一个帮忙收集照片和视频片段。活动当天，一切都很顺利。我的朋友看到我们时真的很惊喜，看到视频时差点哭了。 我觉得它成功，是因为它让她感受到被爱和被记得。这次活动花费不高，但很有情感价值。这正是我想达到的效果。", "p3": [{"q": "How can parents help children to be organized?", "a": "Parents can teach children to make simple lists, keep their rooms tidy, and prepare school materials in advance.<br><br>On what occasions do people need to be organized?<br><br>People need to be organized for exams, travel, meetings, weddings, and any event involving other people.", "t": ""}, {"q": "Do people need others' help when organizing things?", "a": "Often yes. Even a capable person may need help with details, timing, or communication.", "t": ""}]}, {"id": "c66", "tag": "补充·非大陆", "emoji": "🗂️", "ztitle": "", "describe": "Describe a thing you did to learn another language（非大陆）", "shouldsay": ["What language you learned", "What you did", "How it helped you learn the language", "And how you felt about it", "Part 2 Sample Answer", "Part 3"], "a": "A thing I did to learn another <mark class=\"idiom\">language was keeping a short daily speaking diary（每日口语日记）</mark> in English. I chose English <span class=\"conn\">because</span> it is useful for study, work, <mark class=\"idiom\">and international communication（国际交流）</mark>.<br><br>Every night, <mark class=\"idiom\">I recorded a one-minute voice note（一分钟语音记录）</mark> about my day. I did not write a perfect script. I just tried to talk naturally about what happened, what I learned, or how I felt. After recording, I listened <mark class=\"idiom\">to it again and noticed mistakes in pronunciation（发音）</mark>, grammar, or word choice.<br><br>This method helped me <mark class=\"idiom\">because it forced me to produce the language（主动输出语言）</mark> <span class=\"conn\">instead of</span> only reading or listening to it. It also made me more aware of the phrases I lacked in real communication.<br><br><span class=\"conn\">At first</span>, I felt embarrassed listening to my own voice, <span class=\"conn\">but</span> later I found it useful and even motivating. Small daily practice made the language feel less like a school subject and more like a real tool.", "t": "我学另一门语言时做的一件事，是坚持用英语做简短的每日口语日记。我选择英语，因为它对学习、工作和国际交流都很有用。 每天晚上，我会录一段一分钟左右的语音，说说自己这一天。我不会写完美稿子，而是尽量自然地讲发生了什么、学到了什么或有什么感受。录完后，我会再听一遍，注意发音、语法或用词问题。 这个方法有帮助，因为它逼我输出语言，而不是只读或只听。它也让我更清楚自己在真实交流中缺哪些表达。 一开始听自己的声音很尴尬，但后来我觉得它很有用，甚至很有动力。每天一点点练习，让语言不再像学校科目，而更像真实工具。", "p3": [{"q": "What difficulties do people face when learning a language?", "a": "<mark class=\"idiom\">They often struggle with pronu
