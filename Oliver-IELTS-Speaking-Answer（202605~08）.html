nciation（发音）</mark>, grammar, vocabulary, and the fear of making mistakes in front of others.", "t": ""}, {"q": "Is language learning important?", "a": "Yes. It helps with work, travel, cultural understanding, and access to information.", "t": ""}, {"q": "Is it better to study a language alone or in a group?", "a": "Both have advantages. Studying alone is flexible, <span class=\"conn\">but</span> group learning gives people interaction and motivation.", "t": ""}, {"q": "Has technology made it unnecessary to learn languages?", "a": "No. Translation tools are useful, <span class=\"conn\">but</span> they cannot fully replace real communication and cultural understanding.", "t": ""}]}, {"id": "c67", "tag": "补充·非大陆", "emoji": "🗂️", "ztitle": "", "describe": "Describe a special cake you received from others（非大陆）", "shouldsay": ["When it happened", "Where it happened", "Who you got the cake from", "And explain why it was a special cake", "Part 2 Sample Answer", "Part 3"], "a": "I <mark class=\"idiom\">would like to talk about a birthday cake（生日蛋糕）</mark> I received from my friends a few years ago. <mark class=\"idiom\">It happened at a small restaurant（小餐厅）</mark> after work. I thought we were just having a normal dinner, <span class=\"conn\">but</span> they had secretly prepared a cake for me.<br><br>The cake was not huge or expensive. <mark class=\"idiom\">It was a simple chocolate cake（简单巧克力蛋糕）</mark> <mark class=\"idiom\">with a small message on it（上面的祝福语）</mark>. What made it special was that my friends had chosen the <mark class=\"idiom\">flavour because they remembered I liked dark chocolate（黑巧克力）</mark> and did not like overly sweet desserts.<br><br><span class=\"conn\">When</span> the staff brought it out, everyone started singing happy birthday. I was a bit embarrassed, <span class=\"conn\">but</span> <span class=\"conn\">also</span> very touched. At that time, I was under a lot of pressure, <span class=\"conn\">so</span> the surprise made me feel supported.<br><br><span class=\"conn\">To me</span>, the cake was special not <span class=\"conn\">because</span> of its price, <mark class=\"idiom\">but because of the thought behind it（背后的心意）</mark>. It showed that my friends knew me well and cared about my feelings.", "t": "我想谈谈几年前朋友送我的一个生日蛋糕。那是在下班后的一家小餐厅。我以为我们只是普通吃饭，但他们偷偷给我准备了蛋糕。 蛋糕不大，也不贵。它是一个简单的巧克力蛋糕，上面有一句小祝福。特别之处在于，我的朋友记得我喜欢黑巧克力、不喜欢太甜的甜品，所以特意选了这个口味。 服务员把蛋糕端出来时，大家开始唱生日歌。我有点尴尬，但也非常感动。那段时间我压力很大，所以这个惊喜让我感觉被支持。 对我来说，这个蛋糕特别不在于价格，而在于背后的心意。它说明我的朋友了解我，也在乎我的感受。", "p3": [{"q": "What are the differences between special food in China and other countries?", "a": "Chinese special food is often connected with festivals and family gatherings, <span class=\"conn\">while</span> in other countries it may be linked more to religion or local customs.", "t": ""}, {"q": "Why are some people willing to spend a lot of money on meals on special days?", "a": "They want to create memories, show respect, and make the occasion feel important.", "t": ""}, {"q": "Is it good to communicate when eating with your family?", "a": "Yes. Meals are a natural time for family members to talk, relax, and maintain relationships.", "t": ""}, {"q": "What do you think of people using mobile phones during a meal?", "a": "I think it is acceptable for quick messages, <span class=\"conn\">but</span> constantly using a phone at the table is impolite.", "t": ""}]}, {"id": "c68", "tag": "补充·非大陆", "emoji": "🗂️", "ztitle": "", "describe": "Describe a piece of local news that people are interested in", "shouldsay": ["What it was about", "Where you saw/heard it", "Who was involved", "And explain why people were interested in it", "Part 2 Sample Answer", "Part 3"], "a": "<mark class=\"idiom\">A piece of local news（本地新闻）</mark> that many people were interested in was about the opening of a new metro line in the city. <mark class=\"idiom\">I first saw it on a local news（本地新闻）</mark> account online, and later I <mark class=\"idiom\">heard people talking about it in my neighbourhood（社区）</mark>.<br><br>The news involved the local government, transport department, construction workers, and of course ordinary residents. The new line connected several residential areas with business districts, <mark class=\"idiom\">so it changed many people's daily commute（每日通勤）</mark>.<br><br>People were interested in it <span class=\"conn\">because</span> transport is closely related to everyday life. <span class=\"conn\">For some residents</span>, the new metro line meant they could save twenty or thirty minutes on the way to work. It also made nearby communities more attractive to live in.<br><br>I found the news practical and positive. It was not dramatic, <span class=\"conn\">but</span> it affected real people directly. <mark class=\"idiom\">That is why local news（本地新闻）</mark> can sometimes feel more relevant than big international headlines.", "t": "一条很多人感兴趣的本地新闻，是关于城市一条新地铁线路开通的。我最早是在一个本地新闻账号上看到的，后来也听到小区里有人讨论。 这条新闻涉及地方政府、交通部门、施工人员，当然也包括普通居民。这条新线路连接了几个居民区和商务区，所以改变了很多人的日常通勤。 人们感兴趣，是因为交通和日常生活关系太密切了。对一些居民来说，新地铁线路意味着上班路上能节省二三十分钟，也让附近社区变得更适合居住。 我觉得这条新闻很实用，也很积极。它并不戏剧化，但直接影响真实的人。这就是为什么本地新闻有时候比国际大新闻更有相关性。", "p3": [{"q": "Do people read the newspaper where you live?", "a": "Some older people still do, <span class=\"conn\">but</span> most younger people read news on phones <span class=\"conn\">instead of</span> printed newspapers.", "t": ""}, {"q": "Do people prefer local or international news?", "a": "It depends. <mark class=\"idiom\">Local news（本地新闻）</mark> <mark class=\"idiom\">is more practical for daily life（日常生活）</mark>, <span class=\"conn\">while</span> international news helps people understand the wider world.", "t": ""}, {"q": "Is it important to have a national identity?", "a": "Yes. A healthy national identity can give people a sense of belonging, as long as it does not become narrow-minded.", "t": ""}, {"q": "How can people develop their national identity?", "a": "They can learn history, understand culture, take part in public life, and respect both their own country and other cultures.", "t": ""}]}]};
</script>
<script>
/* ---------------- state ---------------- */
const S = { view:"home", q:"", tag:"all", mask:false, done:loadDone() };
function loadDone(){ try{ return JSON.parse(localStorage.getItem("oliver_spk_done")||"{}"); }catch(e){ return {}; } }
function saveDone(){ try{ localStorage.setItem("oliver_spk_done",JSON.stringify(S.done)); }catch(e){} }
function isDone(id){ return !!S.done[id]; }
function toggleDone(id){ if(S.done[id]) delete S.done[id]; else S.done[id]=1; saveDone(); }

const main = document.getElementById("main");
const TAGS = ["all","本季新题","老题沿用","万年老题","补充·非大陆"];
const TAGLABEL = {all:"全部",本季新题:"本季新题",老题沿用:"老题沿用",万年老题:"必考·万年老题","补充·非大陆":"含非大陆"};
function badgeClass(t){ return t==="本季新题"?"new":t==="老题沿用"?"keep":t==="万年老题"?"must":"cn"; }

/* ---------------- tabs ---------------- */
document.getElementById("tabs").addEventListener("click",e=>{
  const t=e.target.closest(".tab"); if(!t) return;
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===t));
  S.view=t.dataset.view; S.q=""; S.tag="all"; render();
});

/* ---------------- render ---------------- */
function render(){
  if(S.view==="home") return renderHome();
  if(S.view==="guide") return renderGuide();
  renderList(S.view); // part1 / cue
}

function controlsHTML(){
  const chips = TAGS.map(t=>`<div class="chip ${S.tag===t?'on':''}" data-tag="${t}">${TAGLABEL[t]}</div>`).join("");
  return `<div class="controls">
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="searchbox" placeholder="搜索题目 / 话题…" value="${escAttr(S.q)}">
    </div>
    <div class="chips" id="chips">${chips}</div>
    <div class="masktoggle ${S.mask?'on':''}" id="masktoggle"><span class="switch"></span>遮挡答案 · 自测</div>
  </div>`;
}
function wireControls(filterFn){
  const sb=document.getElementById("searchbox");
  if(sb){ sb.addEventListener("input",()=>{ S.q=sb.value; filterFn(); }); sb.focus({preventScroll:true});
          sb.setSelectionRange(sb.value.length,sb.value.length); }
  const chips=document.getElementById("chips");
  if(chips) chips.addEventListener("click",e=>{const c=e.target.closest(".chip"); if(!c)return; S.tag=c.dataset.tag; render();});
  const mt=document.getElementById("masktoggle");
  if(mt) mt.addEventListener("click",()=>{ S.mask=!S.mask; mt.classList.toggle("on",S.mask); });
}

function matchTag(item){ return S.tag==="all"||item.tag===S.tag; }
function matchQuery(text){ if(!S.q.trim())return true; return text.toLowerCase().includes(S.q.trim().toLowerCase()); }

function renderList(kind){
  const items = kind==="part1"?DATA.part1:DATA.cue;
  main.innerHTML = `<div class="view">${controlsHTML()}<div class="grid" id="grid"></div></div>`;
  const grid=document.getElementById("grid");
  function draw(){
    const list = items.filter(it=>{
      if(!matchTag(it)) return false;
      const hay = kind==="part1"
        ? it.title+" "+it.items.map(q=>q.q).join(" ")
        : it.ztitle+" "+it.describe+" "+it.p3.map(p=>p.q).join(" ");
      return matchQuery(hay);
    });
    if(!list.length){ grid.innerHTML=`<div class="empty" style="grid-column:1/-1">没有匹配的结果，换个关键词试试～</div>`; return; }
    grid.innerHTML = list.map(it=>cardHTML(kind,it)).join("");
  }
  draw();
  grid.addEventListener("click",e=>{const c=e.target.closest(".card"); if(!c)return; openDetail(kind,c.dataset.id);});
  wireControls(draw);
}

function cardHTML(kind,it){
  const done=isDone(it.id)?"done":"";
  if(kind==="part1"){
    const sub = it.items[0]? it.items[0].q.replace(/^\d+\.\s*/,'') : "";
    return `<div class="card ${done}" data-id="${it.id}">
      <div class="done-tick">✓</div>
      <span class="em">${it.emoji}</span>
      <h3>${escHTML(it.title)}</h3>
      <div class="sub">${escHTML(sub)}</div>
      <div class="meta"><span class="badge ${badgeClass(it.tag)}">${TAGLABEL[it.tag]}</span>
        <span class="count">${it.count} 题</span></div>
    </div>`;
  } else {
    return `<div class="card ${done}" data-id="${it.id}">
      <div class="done-tick">✓</div>
      <span class="em">${it.emoji}</span>
      <h3>${escHTML(it.ztitle||it.describe)}</h3>
      <div class="sub">${escHTML(it.describe)}</div>
      <div class="meta"><span class="badge ${badgeClass(it.tag)}">${TAGLABEL[it.tag]}</span>
        <span class="count">P3 · ${it.p3.length} 问</span></div>
    </div>`;
  }
}

/* ---------------- detail sheet ---------------- */
const scrim=document.getElementById("scrim"), sheet=document.getElementById("sheet");
scrim.addEventListener("click",closeDetail);
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeDetail(); });

function answerBlock(html){
  const m=S.mask?"masked":"";
  return `<div class="answer ${m}"><div class="atext">${html}</div>
    <div class="reveal-hint"><span class="ic">👁</span>点击显示参考答案</div></div>`;
}
function transBlock(t){
  if(!t) return "";
  return `<button class="trans-btn">显示中文译文</button><div class="trans">${t}</div>`;
}

function openDetail(kind,id){
  const it=(kind==="part1"?DATA.part1:DATA.cue).find(x=>x.id===id);
  if(!it) return;
  let body="";
  if(kind==="part1"){
    body = it.items.map((q,i)=>`
      <div class="qblock">
        <div class="qhead"><span class="qmark">Q${i+1}</span><span>${escHTML(q.q.replace(/^\d+\.\s*/,''))}</span></div>
        ${answerBlock(q.a)}
        ${transBlock(q.t)}
      </div>`).join("");
    sheet.innerHTML = sheetHead(it.emoji, it.title, "", it.tag, it.id) +
      `<div class="sheet-body">${markBtn(it.id)}${body}</div>`;
  } else {
    const bullets = it.shouldsay.map(b=>`<li>${b}</li>`).join("");
    const p3 = it.p3.map((p,i)=>`
      <div class="qblock">
        <div class="qhead"><span class="qmark">${escHTML((p.q.match(/^\d+\)/)||[`${i+1})`])[0])}</span><span>${escHTML(p.q.replace(/^\d+\)\s*/,''))}</span></div>
        ${answerBlock(p.a)}
        ${transBlock(p.t)}
      </div>`).join("");
    sheet.innerHTML = sheetHead(it.emoji, it.ztitle||it.describe, it.describe, it.tag, it.id) +
      `<div class="sheet-body">
        ${markBtn(it.id)}
        <div class="cuecard">
          <div class="lab">Part 2 · Cue Card</div>
          <div class="desc">${escHTML(it.describe)}</div>
          <ul><li style="font-weight:800;color:#1d4f8c;list-style:none">You should say:</li>${bullets}</ul>
        </div>
        <div class="section-label">参考答案 · 7分原创</div>
        ${answerBlock(it.a)}
        ${transBlock(it.t)}
        ${it.p3.length?`<div class="section-label">Part 3 · 延展讨论</div>${p3}`:""}
      </div>`;
  }
  wireSheet();
  scrim.classList.add("open"); sheet.classList.add("open");
  sheet.scrollTop=0; document.body.style.overflow="hidden";
}
function sheetHead(em,title,dz,tag,id){
  return `<div class="sheet-head">
    <span class="em">${em}</span>
    <div class="tt"><h2>${escHTML(title)}</h2>${dz?`<div class="dz">${escHTML(dz)}</div>`:""}
      <div class="meta"><span class="badge ${badgeClass(tag)}">${TAGLABEL[tag]}</span></div></div>
    <button class="x" id="closeX">✕</button></div>`;
}
function markBtn(id){
  const d=isDone(id);
  return `<button class="mark-done ${d?'done':''}" data-id="${id}">${d?'✓ 已掌握（点击取消）':'标记为已掌握'}</button>`;
}
function wireSheet(){
  document.getElementById("closeX").addEventListener("click",closeDetail);
  sheet.querySelectorAll(".answer.masked").forEach(a=>{
    a.addEventListener("click",()=>{ a.classList.remove("masked"); });
  });
  sheet.querySelectorAll(".trans-btn").forEach(b=>{
    b.addEventListener("click",()=>{ const t=b.nextElementSibling; const open=t.classList.toggle("show");
      b.textContent=open?"隐藏中文译文":"显示中文译文"; });
  });
  const md=sheet.querySelector(".mark-done");
  if(md) md.addEventListener("click",()=>{ const id=md.dataset.id; toggleDone(id);
    const d=isDone(id); md.classList.toggle("done",d); md.textContent=d?"✓ 已掌握（点击取消）":"标记为已掌握"; });
}
function closeDetail(){ scrim.classList.remove("open"); sheet.classList.remove("open"); document.body.style.overflow=""; }

/* ---------------- home ---------------- */
function renderHome(){
  const nTopic=DATA.part1.length, nQ=DATA.part1.reduce((s,t)=>s+t.count,0);
  const nCue=DATA.cue.length, nP3=DATA.cue.reduce((s,c)=>s+c.p3.length,0);
  const total=nQ+nCue+nP3;
  const doneCount=Object.keys(S.done).length;
  const allCards=DATA.part1.length+DATA.cue.length;
  const pct=allCards?Math.round(doneCount/allCards*100):0;
  main.innerHTML=`<div class="view">
    <div class="hero">
      <h2>当季雅思口语题库，全部配 7 分原创参考答案</h2>
      <p>这是 2026 年 5–8 月换季更新版，覆盖 Part 1 高频问答与 Part 2&amp;3 题卡（含非大陆题）。答案均按 Oliver 教学体系手写：地道表达、逻辑连接、中英对照，并可开启「遮挡答案」做主动回忆自测。</p>
      <div class="statrow">
        <div class="stat"><div class="n">${nQ}</div><div class="l">Part 1 问答</div></div>
        <div class="stat"><div class="n">${nCue}</div><div class="l">Part 2 题卡</div></div>
        <div class="stat"><div class="n">${nP3}</div><div class="l">Part 3 延展问</div></div>
        <div class="stat"><div class="n">${pct}<small>%</small></div><div class="l">已掌握 ${doneCount}/${allCards}</div></div>
      </div>
    </div>
    <div class="legend">
      <h4>颜色标注说明</h4>
      <div class="legitems">
        <div class="legitem"><span class="swatch" style="background:var(--idiom);color:#3a2c00">地道表达</span> 黄底 = 可直接套用的高分表达</div>
        <div class="legitem"><span class="swatch" style="background:rgba(209,72,54,.13);color:var(--red)">逻辑连词</span> 红字 = 句间逻辑衔接</div>
        <div class="legitem"><span class="swatch" style="background:rgba(37,99,176,.13);color:var(--blue)">题目 / 题卡</span> 蓝字 = 考题</div>
        <div class="legitem"><span class="swatch" style="background:rgba(248,228,236,.7);color:var(--red)">译 中文译文</span> 点开按需查看</div>
      </div>
    </div>
    <div class="howto">
      <h4>怎么用这套题库</h4>
      <ol>
        <li><b>先看话题，再练答案。</b>在 Part 1 / 题卡 两个标签里按话题浏览，点开任意卡片查看参考答案。</li>
        <li><b>开启「遮挡答案 · 自测」</b>，答案会被模糊处理，先自己说一遍，再点开对照——这才是提分的关键。</li>
        <li><b>黄底优先记。</b>黄底是可迁移的高分表达，红字帮你把句子连起来；译文按需查看，不要依赖。</li>
        <li><b>练完点「已掌握」</b>，上方进度会自动记录（仅存在你本机浏览器）。</li>
      </ol>
    </div>
  </div>`;
}
